  const [theme,setTheme]=useState(()=>{ try{ return localStorage.getItem('demo-theme')||'system'; }catch(e){ return 'system'; } });
  useEffect(()=>{
    const el=document.documentElement;
    el.classList.toggle('dark', theme==='dark');
    el.classList.toggle('claude', theme==='system');
    try{ localStorage.setItem('demo-theme',theme); }catch(e){}
  },[theme]);
  return [theme,setTheme];
}

  if(effIsAdmin){ tabs.push(['manage','평가 관리']); }

  return (
    <div className="min-h-screen">
      <header className="sticky top-0 z-30 bg-white/90 dark:bg-slate-900/90 backdrop-blur border-b border-slate-200 dark:border-slate-700">
        <div className="max-w-[1200px] mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-4 flex-wrap">
          <div className="flex items-center gap-3">
            <a href="index.html" className="w-9 h-9 rounded-lg bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center" title="포털로">
              <Icon path="M12 15a7 7 0 100-14 7 7 0 000 14zM8.21 13.89L7 23l5-3 5 3-1.21-9.12" className="w-5 h-5 text-white" />
            </a>
            <div>
              <h1 className="font-bold text-slate-900 dark:text-slate-100">인사평가 시스템</h1>
              <p className="text-xs text-slate-500 dark:text-slate-400">KPI + 360도 역량평가 {isAdmin?'· 관리자':'· '+((me&&me.name)||session.user.email)}</p>
            </div>
          </div>
          <div className="flex items-center gap-2">
            {busy && <span className="text-xs text-indigo-600">저장 중…</span>}
            {notice && <span className="text-xs text-emerald-600 bg-emerald-50 dark:bg-emerald-950 px-3 py-1.5 rounded-md">{notice}</span>}
            {isAdmin && <select value={viewAs} onChange={e=>setViewAs(e.target.value)} title="보기 전환(개발용)" className="text-xs border border-slate-200 dark:border-slate-700 rounded-lg px-2 py-1.5 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300"><option value="admin">관리자 보기</option><option value="leader">팀장 보기</option><option value="staff">직원 보기</option></select>}
            <ThemeToggle />
            <a href="index.html" className="text-xs font-bold px-3.5 py-2 rounded-lg bg-rose-600 text-white border border-rose-700 shadow-md hover:bg-rose-700 transition">DEMO 인사시스템</a>
            {effIsAdmin && <a href="hr.html" className="text-xs font-bold px-3.5 py-2 rounded-lg bg-slate-700 text-white border border-slate-800 shadow-md hover:bg-slate-800 transition">e-HR</a>}
            {effIsAdmin && <a href="demo-payroll.html" target="_blank" rel="noopener noreferrer" className="text-xs font-bold px-3.5 py-2 rounded-lg bg-emerald-600 text-white border border-emerald-700 shadow-md hover:bg-emerald-700 transition">급여자동화시스템</a>}
            <button onClick={()=>sb.auth.signOut().then(()=>window.location.href='index.html')} className="text-sm text-slate-600 dark:text-slate-300 hover:text-slate-900 px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">로그아웃</button>
          </div>
        </div>
        <div className="max-w-[1200px] mx-auto px-4 sm:px-6 flex gap-2 pt-1 pb-3 overflow-x-auto">
          {tabs.map(([k,label])=>{ const on=tab===k;
            return <button key={k} onClick={()=>setTab(k)} className={"relative px-4 py-2.5 text-sm rounded-lg border transition whitespace-nowrap shrink-0 "+(on?"bg-indigo-600 border-indigo-600 text-white font-bold shadow-md":"bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 font-medium hover:bg-slate-50 dark:hover:bg-slate-700/40 hover:text-slate-900")}>{label}{k==='kpi'&&pendingN>0&&<span className="absolute -top-1.5 -right-1.5 min-w-[18px] h-[18px] px-1 rounded-full bg-rose-500 text-white text-[10px] font-bold flex items-center justify-center">{pendingN}</span>}</button>;
          })}
        </div>
      </header>

      <main className="max-w-[1200px] mx-auto px-4 sm:px-6 py-6">
        {err && <div className="mb-4 text-sm text-red-600 bg-red-50 dark:bg-red-950 border border-red-200 rounded-lg px-4 py-3">오류: {err}</div>}
        {tab==='home' && <HomeTab me={me} isAdmin={effIsAdmin} cycles={cycles} comps={comps} cfg={cfg} emps={emps} setTab={setTab} openComp={()=>setShowComp(true)} pendingN={pendingN} />}
        {tab==='manage' && effIsAdmin && <ManageTab cycles={cycles} emps={emps} comps={comps} cfg={cfg} grades={grades} reload={()=>loadAll(session.user.email)} setBusy={setBusy} flash={flash} setErr={setErr} email={session.user.email} />}
        {tab==='eval360' && <Eval360Tab me={me} emps={emps} comps={comps} cfg={cfg} cycles={cycles} setBusy={setBusy} flash={flash} setErr={setErr} openComp={()=>setShowComp(true)} viewAs={viewAs} />}
        {tab==='myresult' && <MyResultTab me={me} cycles={cycles} grades={grades} setErr={setErr} />}
        {tab==='kpi' && <KpiHubTab me={me} emps={emps} cycles={cycles} cfg={cfg} isAdmin={effIsAdmin} setBusy={setBusy} flash={flash} setErr={setErr} comps={comps} grades={grades} pendingN={pendingN} />}
        {showComp && <div className="fixed inset-0 bg-black/50 z-50 flex items-start justify-center p-4 overflow-y-auto" onClick={()=>setShowComp(false)}>
          <div className="bg-white dark:bg-slate-800 rounded-2xl max-w-4xl w-full my-8 shadow-2xl" onClick={e=>e.stopPropagation()}>
            <div className="flex justify-between items-center px-5 py-3 border-b border-slate-100 dark:border-slate-700 sticky top-0 bg-white dark:bg-slate-800 rounded-t-2xl z-10">
              <h3 className="font-bold text-slate-800 dark:text-slate-100">역량 모델</h3>
              <button onClick={()=>setShowComp(false)} className="text-slate-400 hover:text-slate-600 text-2xl leading-none">×</button>
            </div>
            <div className="p-5"><CompModelTab comps={comps} cfg={cfg} grades={grades} /></div>
          </div>
        </div>}
      </main>
    </div>
  );
}

function Stub({ title, desc }){
  return (
    <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-10 text-center">
      <div className="w-12 h-12 mx-auto mb-3 rounded-xl bg-indigo-50 dark:bg-indigo-950 flex items-center justify-center">
        <Icon path="M12 8v4l3 3M12 3a9 9 0 100 18 9 9 0 000-18z" className="w-6 h-6 text-indigo-400" />
      </div>
      <div className="font-bold text-slate-800 dark:text-slate-100">{title}</div>
      <p className="text-sm text-slate-500 dark:text-slate-400 mt-1 max-w-md mx-auto">{desc}</p>
      <span className="inline-block mt-3 text-xs bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 px-3 py-1 rounded-full">준비중</span>
    </div>
  );
}

function HomeTab({ me, isAdmin, cycles, comps, cfg, emps, setTab, openComp, pendingN }){
  const cycle=cycles.find(c=>c.status==='IN_PROGRESS')||cycles[0];
  const [data,setData]=useState(null);
  const [adminStats,setAdminStats]=useState(null);
  const empById=useMemo(()=>Object.fromEntries(emps.map(e=>[e.id,e])),[emps]);
  const active=useMemo(()=>emps.filter(e=>e.status!=='퇴사'),[emps]);
  const commonCnt=comps.filter(c=>c.track==='COMMON').length;

  useEffect(()=>{ (async()=>{
    if(!cycle||!me){ setData({ empty:true }); return; }
    const cid=cycle.cycle_id;
    const [tg,r360,kp,ks,fb,rs]=await Promise.all([
      sb.from('eval_targets').select('*').eq('cycle_id',cid),
      sb.from('eval_360').select('*').eq('cycle_id',cid).eq('rater_id',me.id),
      sb.from('eval_kpi').select('id').eq('cycle_id',cid).eq('employee_id',me.id),
      sb.from('eval_kpi_status').select('*').eq('cycle_id',cid).eq('employee_id',me.id).maybeSingle(),
      sb.from('eval_feedback').select('period').eq('cycle_id',cid).eq('employee_id',me.id),
      sb.from('eval_results').select('*').eq('cycle_id',cid).eq('employee_id',me.id).maybeSingle()
    ]);
    const targets=tg.data||[]; const targetIds=new Set(targets.filter(t=>t.eval_type!=='EXCLUDED').map(t=>t.employee_id));
    const tasks=[];
    if(targetIds.has(me.id)) tasks.push({ r:me, type:'self' });
    const mgr=empById[me.manager_id]; if(mgr&&targetIds.has(mgr.id)) tasks.push({ r:mgr, type:'subordinate' });
    targets.filter(t=>t.eval_type!=='EXCLUDED'&&Array.isArray(t.peer_rater_ids)&&t.peer_rater_ids.indexOf(me.id)>=0).forEach(t=>{ const rt=empById[t.employee_id]; if(rt&&rt.id!==me.id) tasks.push({ r:rt, type:'peer' }); });
    active.filter(e=>e.manager_id===me.id&&targetIds.has(e.id)).forEach(e=>tasks.push({ r:e, type:'manager' }));
    const appc=(ratee,type)=>compsForRating(ratee, type||'self', me, comps, cfg);
    let tot=0,don=0; const my360=r360.data||[];
    tasks.forEach(t=>{ const ac=appc(t.r, t.type); tot+=ac.length; const set=new Set(my360.filter(x=>x.ratee_id===t.r.id&&x.rater_type===t.type&&x.score!=null).map(x=>x.comp_id)); don+=ac.filter(c=>set.has(c.comp_id)).length; });
    setData({ kpiCount:(kp.data||[]).length, kpiStatus: (ks&&ks.data)?ks.data.status:'NONE', total360:tot, done360:don, feedbackCount:(fb.data||[]).length, result:(rs&&rs.data)?rs.data:null });
  })(); },[cycle&&cycle.cycle_id, me&&me.id]);

  useEffect(()=>{ (async()=>{
    if(!isAdmin||!cycle){ return; }
    const cid=cycle.cycle_id;
    const [tg,ks,r360,rs]=await Promise.all([
      sb.from('eval_targets').select('employee_id,eval_type').eq('cycle_id',cid),
      sb.from('eval_kpi_status').select('employee_id,status').eq('cycle_id',cid),
      sb.from('eval_360').select('rater_id').eq('cycle_id',cid),
      sb.from('eval_results').select('employee_id').eq('cycle_id',cid)
    ]);
    const tgs=(tg.data||[]).filter(t=>t.eval_type!=='EXCLUDED'); const N=tgs.length;
    const stMap={}; (ks.data||[]).forEach(x=>stMap[x.employee_id]=x.status);
    let approved=0,submitted=0,rejected=0;
    tgs.forEach(t=>{ const st=stMap[t.employee_id]; if(st==='APPROVED')approved++; else if(st==='SUBMITTED')submitted++; else if(st==='REJECTED')rejected++; });
    setAdminStats({ N, approved, submitted, rejected, notSubmitted:N-approved-submitted, raters:new Set((r360.data||[]).map(x=>x.rater_id)).size, results:(rs.data||[]).length, activeCount:active.length });
  })(); },[isAdmin, cycle&&cycle.cycle_id]);

  const tier = me ? tierRatio(me,'REGULAR',cfg) : { key:'-', ratio:[60,40] };
  const KS_LABEL={ NONE:['미작성','bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300'], DRAFT:['작성중','bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300'], SUBMITTED:['승인 대기','bg-amber-100 dark:bg-amber-950 text-amber-700 dark:text-amber-300'], APPROVED:['승인 완료','bg-emerald-100 dark:bg-emerald-950 text-emerald-700 dark:text-emerald-300'], REJECTED:['반려','bg-rose-100 dark:bg-rose-950 text-rose-700 dark:text-rose-300'] };

  const d=data&&!data.empty?data:null;
  const kpiSt=d?d.kpiStatus:'NONE';
  const steps=[
    { no:1, title:'KPI 작성 · 승인', tab:'kpi', desc:'연초에 본인 성과목표(KPI)를 작성하고 승인 요청하세요. 본부장(없으면 대표이사)이 승인하면 확정됩니다.',
      badge:(KS_LABEL[kpiSt]||KS_LABEL.NONE), done:kpiSt==='APPROVED', warn:kpiSt==='REJECTED' },
    { no:2, title:'분기 면담', tab:'kpi', desc:'분기마다 팀장과 면담하고, 기록은 KPI · 면담 탭에서 확인합니다.',
      badge:[ (d?d.feedbackCount:0)+'/4 분기', 'bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300'], done:(d?d.feedbackCount:0)>0, info:true },
    { no:3, title:'360도 평가 참여', tab:'eval360', desc:'본인 · 동료 · 상사 · 부하에 대한 역량평가를 입력합니다.',
      badge:[ d?(d.done360+'/'+d.total360+' 항목'):'0/0', (d&&d.total360>0&&d.done360>=d.total360)?'bg-emerald-100 dark:bg-emerald-950 text-emerald-700 dark:text-emerald-300':'bg-amber-100 dark:bg-amber-950 text-amber-700 dark:text-amber-300'], done:!!(d&&d.total360>0&&d.done360>=d.total360) },
    { no:4, title:'종합 결과 확인', tab:'myresult', desc:'평가가 마무리되면 역량 · 성과 · 종합점수와 등급을 확인합니다.',
      badge:[ (d&&d.result)?'공개됨':'대기중', (d&&d.result)?'bg-emerald-100 dark:bg-emerald-950 text-emerald-700 dark:text-emerald-300':'bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300'], done:!!(d&&d.result) },
  ];

  function finalCheck(){
    const missing=[];
    if(kpiSt!=='APPROVED' && kpiSt!=='SUBMITTED') missing.push({ label:'KPI 작성 · 승인 요청', tab:'kpi' });
    if(d && d.total360>0 && d.done360<d.total360) missing.push({ label:'360도 평가 입력', tab:'eval360' });
    if(missing.length){
      alert('아직 완료하지 않은 항목이 있습니다:\n\n'+missing.map(m=>'• '+m.label).join('\n')+'\n\n[확인]을 누르면 첫 번째 미완료 화면으로 이동합니다.');
      setTab(missing[0].tab);
    } else {
      alert('필수 항목(KPI 제출 · 360도 입력)을 모두 완료했습니다. 수고하셨습니다!');
    }
  }

  const Stat=({label,val,color})=> <div className="bg-slate-50 dark:bg-slate-900 rounded-xl p-3"><div className="text-xs text-slate-400 dark:text-slate-500">{label}</div><div className={"font-bold text-lg mt-0.5 "+(color||'text-slate-800 dark:text-slate-100')}>{val}</div></div>;
  const Box=({title,sub,color})=> <div className={"rounded-xl px-4 py-3 text-center border "+color}><div className="font-bold text-sm">{title}</div>{sub&&<div className="text-[11px] opacity-80 mt-0.5">{sub}</div>}</div>;

  return (
    <div className="space-y-6">
      <div className="bg-gradient-to-br from-indigo-600 to-purple-600 rounded-2xl p-6 text-white">
        <div className="text-lg font-bold">{me?me.name+'님, 환영합니다':'환영합니다'}</div>
        <div className="text-sm opacity-90 mt-0.5">{me?(me.team+' · '+me.position):''}</div>
        <div className="mt-4 text-sm">{cycle? <span>현재 <b>{cycle.name}</b> · 평가 방식: <b>KPI(성과) + 360도 다면(역량)</b></span> : <span className="opacity-90">진행 중인 평가주기가 없습니다.</span>}</div>
      </div>

      {pendingN>0 && <button onClick={()=>setTab('kpi')} className="w-full mb-4 bg-rose-50 dark:bg-rose-950/40 border border-rose-200 dark:border-rose-900 rounded-xl px-4 py-3 text-left flex items-center justify-between hover:shadow-md transition">
        <span className="text-sm font-semibold text-rose-700 dark:text-rose-300">🔔 내 승인을 기다리는 KPI가 {pendingN}건 있습니다</span>
        <span className="text-xs text-rose-500">검토하러 가기 →</span>
      </button>}
      {isAdmin && adminStats && (
        <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-5">
          <h2 className="font-bold text-slate-800 dark:text-slate-100 mb-3">전사 진행률 <span className="text-xs font-normal text-slate-400 dark:text-slate-500">{cycle&&cycle.name}</span></h2>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 text-center">
            <Stat label="KPI 승인완료" val={adminStats.approved+' / '+adminStats.N} color="text-emerald-600" />
            <Stat label="승인 대기" val={adminStats.submitted} color="text-amber-600" />
            <Stat label="미제출" val={adminStats.notSubmitted} color="text-rose-600" />
            <Stat label="360 참여인원" val={adminStats.raters+' / '+adminStats.activeCount} color="text-indigo-600" />
          </div>
          <div className="text-xs text-slate-400 dark:text-slate-500 mt-3">반려 {adminStats.rejected}건 · 결과 산정 {adminStats.results}명</div>
        </div>
      )}

      <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-5">
        <h2 className="font-bold text-slate-800 dark:text-slate-100 mb-4">평가 개요</h2>
        <div className="flex flex-col items-center gap-2">
          <div className="flex items-stretch gap-3 flex-wrap justify-center">
            <Box title="역량평가 (360도)" sub={"공통 "+(cfg.comp_common_max||80)+" + 직무 "+(cfg.comp_job_max||20)} color="bg-indigo-50 dark:bg-indigo-950 border-indigo-200 dark:border-indigo-900 text-indigo-700 dark:text-indigo-300" />
            <div className="flex items-center text-2xl font-bold text-slate-300 dark:text-slate-600">+</div>
            <Box title="성과평가 (KPI)" sub="가중치 × 점수" color="bg-emerald-50 dark:bg-emerald-950 border-emerald-200 dark:border-emerald-900 text-emerald-700 dark:text-emerald-300" />
          </div>
          <Icon path="M12 5v14M6 13l6 6 6-6" className="w-5 h-5 text-slate-300 dark:text-slate-600" />
          <Box title={"종합 = 역량 : 성과 "+tier.ratio[0]+":"+tier.ratio[1]} sub={"직급별 비중 · 내 유형: "+tier.key} color="bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200" />
          <Icon path="M12 5v14M6 13l6 6 6-6" className="w-5 h-5 text-slate-300 dark:text-slate-600" />
          <Box title="등급 S · A · B · C · D" sub="핵심역량 게이트 반영 · 기준 인상률" color="bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-800 dark:text-slate-100" />
        </div>
      </div>

      <div>
        <div className="flex items-center justify-between mb-3">
          <h2 className="font-bold text-slate-800 dark:text-slate-100">평가 진행 순서 <span className="text-xs font-normal text-slate-400 dark:text-slate-500">(카드를 누르면 해당 화면으로 이동)</span></h2>
          {!data && <span className="text-xs text-slate-400">불러오는 중…</span>}
        </div>
        <div className="space-y-2">
          {steps.map((st,i)=>(
            <div key={st.no}>
              <button onClick={()=>setTab(st.tab)} className="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-4 text-left hover:shadow-md hover:border-indigo-300 dark:hover:border-indigo-700 transition flex items-center gap-4">
                <div className={"w-9 h-9 shrink-0 rounded-full flex items-center justify-center font-bold text-sm "+(st.done?"bg-emerald-500 text-white":st.warn?"bg-rose-500 text-white":"bg-indigo-100 dark:bg-indigo-950 text-indigo-600 dark:text-indigo-300")}>{st.done?'✓':st.no}</div>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="font-semibold text-slate-800 dark:text-slate-100">{st.title}</span>
                    <span className={"text-[11px] px-2 py-0.5 rounded-full "+st.badge[1]}>{st.badge[0]}</span>
                    {st.info && <span className="text-[10px] text-slate-400 dark:text-slate-500">(팀장이 기록)</span>}
                  </div>
                  <div className="text-xs text-slate-500 dark:text-slate-400 mt-1">{st.desc}</div>
                </div>
                <Icon path="M9 18l6-6-6-6" className="w-4 h-4 text-slate-300 dark:text-slate-600 shrink-0" />
              </button>
              {i<steps.length-1 && <div className="flex justify-center py-0.5"><Icon path="M12 5v14M6 13l6 6 6-6" className="w-4 h-4 text-slate-200 dark:text-slate-700" /></div>}
            </div>
          ))}
        </div>
        <button onClick={finalCheck} className="w-full mt-3 py-3 rounded-xl bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 font-bold text-sm hover:opacity-90">내 평가 최종 확인</button>
        <p className="text-xs text-slate-400 dark:text-slate-500 mt-2 text-center">필수 항목(KPI 제출 · 360도 입력)이 빠지면 알림과 함께 해당 화면으로 이동합니다.</p>
      </div>

      <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-5">
        <div className="flex items-center justify-between mb-2">
          <h2 className="font-bold text-slate-800 dark:text-slate-100">평가 항목</h2>
          <button onClick={openComp} className="text-xs text-indigo-600 dark:text-indigo-400 hover:underline">역량 모델 자세히 →</button>
        </div>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
          <div className="bg-indigo-50 dark:bg-indigo-950 rounded-xl p-4">
            <div className="font-semibold text-indigo-700 dark:text-indigo-300">역량평가 (360도)</div>
            <ul className="text-xs text-slate-600 dark:text-slate-300 mt-2 space-y-1">

            <div key={k} className="bg-slate-50 dark:bg-slate-900 rounded-lg p-3">
              <div className="text-slate-400 dark:text-slate-500">{lb}</div>
              <div className="font-bold text-slate-800 dark:text-slate-100 mt-0.5">역량:성과 {cfg[k]||'-'}</div>

        </div>
        <div className="mt-3 flex flex-wrap gap-2">

        </div>
      </div>

      <div>
        <div className="flex items-center gap-2 mb-2"><h3 className="font-bold text-slate-800 dark:text-slate-100">공통역량</h3><span className="text-xs text-slate-400 dark:text-slate-500">전 직원 · 합계 {commonSum}점 (택1 포함 80점)</span></div>
        {CAT_ORDER.map(cat=> byCat(cat).length>0 && (
          <div key={cat} className="mb-3">
            <div className="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1.5">{cat}</div>

        ))}
      </div>

      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <h3 className="font-bold text-slate-800 dark:text-slate-100 mb-2">리더 택1 <span className="text-xs text-slate-400 dark:text-slate-500 font-normal">(리더급, 10점)</span></h3>
          <div className="space-y-2">{leader.map(c=><CompCard key={c.comp_id} c={c} />)}</div>
        </div>
        <div>
          <h3 className="font-bold text-slate-800 dark:text-slate-100 mb-2">비리더 택1 <span className="text-xs text-slate-400 dark:text-slate-500 font-normal">(비리더급, 10점)</span></h3>
          <div className="space-y-2">{follower.map(c=><CompCard key={c.comp_id} c={c} />)}</div>
        </div>
      </div>

      <div>
        <div className="flex items-center gap-2 mb-2 flex-wrap">
          <h3 className="font-bold text-slate-800 dark:text-slate-100">직무역량 <span className="text-xs text-slate-400 dark:text-slate-500 font-normal">(소속 직무 세트, 20점)</span></h3>
          <div className="flex flex-wrap gap-1">
            {JOB_TRACKS.map(t=><button key={t} onClick={()=>setJobTrack(t)} className={"text-xs px-2.5 py-1 rounded-full border "+(jobTrack===t?"bg-slate-900 text-white border-slate-900":"bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/40")}>{TRACK_LABEL[t]}</button>)}

var SETTING_POSITIONS=['대표이사','본부장','팀장','파트장','매니저','연구원'];
function SettingsSection({ cfg, reload, setBusy, flash, setErr }){
  const g=(k,d)=>cfg[k]!=null?cfg[k]:d;
  const POSDEF={대표이사:'40:60',본부장:'40:60',팀장:'40:60',파트장:'50:50',매니저:'60:40',연구원:'60:40'};
  const [f,setF]=useState(()=>{
    const o={
      rater_weight_self:g('rater_weight_self','10'), rater_weight_manager:g('rater_weight_manager','50'),
      rater_weight_peer:g('rater_weight_peer','30'), rater_weight_subordinate:g('rater_weight_subordinate','10'),
      comp_common_max:g('comp_common_max','80'), comp_job_max:g('comp_job_max','20'),
      core_gate_enabled:g('core_gate_enabled','true'), core_gate_min:g('core_gate_min','65'),
      partlead_assign:g('partlead_assign','false'), leadership_roles:g('leadership_roles','팀장,본부장,대표이사,파트장'),
      adjust_band_pct:g('adjust_band_pct','5'), salary_h1_weight:g('salary_h1_weight','50'), salary_h2_weight:g('salary_h2_weight','50'),
      ratio_simple:g('ratio_simple', g('ratio_new','100:0')),
      newhire_defer_months:g('newhire_defer_months','3'), newhire_ramp_months:g('newhire_ramp_months','6'), ratio_newhire:g('ratio_newhire','100:0'),
      anon_min_type:g('anon_min_type','3'), anon_min_other:g('anon_min_other','2')
    };
    const oldmap={대표이사:g('ratio_leader','40:60'),본부장:g('ratio_leader','40:60'),팀장:g('ratio_leader','40:60'),파트장:g('ratio_partlead','50:50'),매니저:g('ratio_general','60:40'),연구원:g('ratio_general','60:40')};
    SETTING_POSITIONS.forEach(P=>{ const raw=g('ratio_pos_'+P, oldmap[P]||POSDEF[P]); const pr=String(raw).split(':'); o['rc_'+P]=(pr[0]!=null&&pr[0]!=='')?pr[0]:'60'; o['rk_'+P]=(pr[1]!=null&&pr[1]!=='')?pr[1]:'40'; });
    return o;
  });
  const set=(k,v)=>setF(s=>Object.assign({},s,{[k]:v}));
  const rwSum=['rater_weight_self','rater_weight_manager','rater_weight_peer','rater_weight_subordinate'].reduce((a,k)=>a+(Number(f[k])||0),0);
  async function save(){
    setBusy(true);
    const rows=[];
    Object.keys(f).forEach(k=>{ if(k.indexOf('rc_')===0||k.indexOf('rk_')===0) return; rows.push({key:k,value:String(f[k])}); });
    SETTING_POSITIONS.forEach(P=>{ rows.push({key:'ratio_pos_'+P, value:(f['rc_'+P]||'0')+':'+(f['rk_'+P]||'0')}); });
    const res=await sb.from('eval_config').upsert(rows,{onConflict:'key'});
    setBusy(false);
    if(res.error){ setErr(res.error.message); return; }
    flash('평가 설정이 저장되었습니다'); reload();
  }
  const numF=(label,k)=><Field label={label}><input type="number" value={f[k]} onChange={e=>set(k,e.target.value)} className="inp" /></Field>;
  const card="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-5";
  return (
    <div className="space-y-4 max-w-2xl">
      <div className={card}>
        <div className="font-bold text-slate-800 dark:text-slate-100">평가자 유형 비중 (역량 360 가중치)</div>
        <div className="text-xs text-slate-500 dark:text-slate-400 mt-1">역량 점수 산정 시 평가자 유형별 가중치. 합계 <b className={rwSum===100?"text-emerald-600":"text-rose-600"}>{rwSum}%</b> (100 권장)</div>
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-3">{numF('본인','rater_weight_self')}{numF('상사','rater_weight_manager')}{numF('동료','rater_weight_peer')}{numF('부하','rater_weight_subordinate')}</div>
      </div>
      <div className={card}>
        <div className="font-bold text-slate-800 dark:text-slate-100">직급별 역량 : 성과(KPI) 비중</div>
        <div className="text-xs text-slate-500 dark:text-slate-400 mt-1">직급마다 종합점수의 역량 : 성과 반영 비중을 설정합니다. (합계 100 권장)</div>
        <div className="mt-3 space-y-2">
          <div className="grid grid-cols-12 gap-2 text-[11px] text-slate-400 dark:text-slate-500 px-1"><div className="col-span-4">직급</div><div className="col-span-3 text-center">역량 비중(%)</div><div className="col-span-3 text-center">성과 비중(%)</div><div className="col-span-2 text-center">합계</div></div>
          {SETTING_POSITIONS.map(P=>{ const sum=(Number(f['rc_'+P])||0)+(Number(f['rk_'+P])||0);
            return <div key={P} className="grid grid-cols-12 gap-2 items-center">
              <div className="col-span-4 text-sm font-medium text-slate-700 dark:text-slate-200">{P}</div>
              <div className="col-span-3"><input type="number" value={f['rc_'+P]} onChange={e=>set('rc_'+P,e.target.value)} className="inp text-center" /></div>
              <div className="col-span-3"><input type="number" value={f['rk_'+P]} onChange={e=>set('rk_'+P,e.target.value)} className="inp text-center" /></div>
              <div className={"col-span-2 text-center text-sm font-bold "+(sum===100?'text-emerald-600':'text-amber-600')}>{sum}</div>
            </div>; })}
        </div>
        <div className="mt-3 pt-3 border-t border-slate-100 dark:border-slate-700"><Field label="간이평가(신규·특례) 역량:성과 — 안 쓰면 무시"><input value={f.ratio_simple} onChange={e=>set('ratio_simple',e.target.value)} placeholder="100:0" className="inp !w-40" /></Field></div>
      </div>
      <div className={card}>
        <div className="font-bold text-slate-800 dark:text-slate-100">역량 배점 · 핵심역량 게이트</div>
        <div className="grid grid-cols-2 gap-3 mt-3">
          {numF('공통역량 배점','comp_common_max')}{numF('직무역량 배점','comp_job_max')}{numF('게이트 기준점(미만 시 하향)','core_gate_min')}
          <Field label="핵심역량 게이트"><select value={f.core_gate_enabled} onChange={e=>set('core_gate_enabled',e.target.value)} className="inp"><option value="true">사용 (미달 시 S/A→B)</option><option value="false">사용 안 함</option></select></Field>
        </div>
      </div>
      <div className={card}>
        <div className="font-bold text-slate-800 dark:text-slate-100">신규입사 규칙 (재직기간 기반)</div>
        <div className="text-xs text-slate-500 dark:text-slate-400 mt-1">입사일(e-HR) 기준 자동 적용 — 성과(KPI) 미성숙 보정.</div>
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 mt-3">
          {numF('평가 유예 기준(개월 미만)','newhire_defer_months')}
          {numF('역량위주 상한(개월 미만)','newhire_ramp_months')}
          <Field label="성과 미성숙 구간 역량:성과"><input value={f.ratio_newhire} onChange={e=>set('ratio_newhire',e.target.value)} placeholder="100:0" className="inp" /></Field>
        </div>
        <div className="text-xs text-slate-500 dark:text-slate-400 mt-2">예) 3개월 미만=유예(다음 반기 포함), 3~6개월=역량:성과 100:0, 6개월 이상=직급별 비중.</div>
      </div>
      <div className={card}>
        <div className="font-bold text-slate-800 dark:text-slate-100">결과 조정 · 신연봉</div>
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 mt-3">{numF('관리자 조정 허용폭(%)','adjust_band_pct')}{numF('신연봉 상반기 비중(%)','salary_h1_weight')}{numF('신연봉 하반기 비중(%)','salary_h2_weight')}</div>
        <div className="text-xs text-slate-500 dark:text-slate-400 mt-2">결과 산정에서 역량·종합·인상률·신연봉을 이 폭(±%) 내에서 수동 조정. 신연봉은 하반기 저장 시 상·하반기 종합을 이 비중으로 합산해 산출.</div>
      </div>
      <div className={card}>
        <div className="font-bold text-slate-800 dark:text-slate-100">기타</div>
        <div className="grid grid-cols-1 gap-3 mt-3">
          <Field label="리더 직책 (쉼표 구분 — 리더십 평가 대상 판정)"><input value={f.leadership_roles} onChange={e=>set('leadership_roles',e.target.value)} className="inp" /></Field>
          <Field label="파트장 360 평가자 지정 허용"><select value={f.partlead_assign} onChange={e=>set('partlead_assign',e.target.value)} className="inp"><option value="false">사용 안 함</option><option value="true">사용</option></select></Field>{numF('360 익명보호 — 유형당 최소 인원','anon_min_type')}{numF('360 익명보호 — 타인 최소 인원','anon_min_other')}
        </div>
      </div>
      <button onClick={save} className="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">설정 저장</button>
    </div>
  );
}

function ManageTab({ cycles, emps, comps, cfg, grades, reload, setBusy, flash, setErr, email }){

  const [showNew,setShowNew]=useState(false);
  const [editCycle,setEditCycle]=useState(null);
  const pill=on=>"px-4 py-2 text-sm rounded-lg border transition "+(on?"bg-indigo-600 border-indigo-600 text-white font-bold":"bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/40");

    <div>
      <div className="flex gap-2 mb-4">
        <button onClick={()=>setSub('status')} className={pill(sub==='status')}>진행 현황</button>
        <button onClick={()=>setSub('cycles')} className={pill(sub==='cycles')}>평가주기</button>
        <button onClick={()=>setSub('targets')} className={pill(sub==='targets')}>대상자 지정</button>
        <button onClick={()=>setSub('results')} className={pill(sub==='results')}>결과 산정</button>

        <button onClick={()=>setSub('settings')} className={pill(sub==='settings')}>평가 설정</button>
      </div>
      {sub==='status' && <StatusSection cycles={cycles} emps={emps} setErr={setErr} />}
      {sub==='cycles' && <div>
        <div className="flex items-center justify-between mb-3">
          <h2 className="font-semibold text-slate-800 dark:text-slate-100">평가주기 <span className="text-slate-400 dark:text-slate-500 font-normal">({cycles.length})</span></h2>
          <button onClick={()=>setShowNew(true)} className="text-sm px-3 py-1.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">+ 평가주기 생성</button>
        </div>
        <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl overflow-hidden">

            <thead className="bg-slate-50 dark:bg-slate-900 text-slate-500 dark:text-slate-400 text-xs"><tr>
              <th className="text-left px-4 py-2.5">주기 ID</th><th className="text-left px-4 py-2.5">이름</th><th className="text-left px-4 py-2.5">기간</th><th className="text-left px-4 py-2.5">상태</th><th className="px-4 py-2.5"></th>
            </tr></thead>

              {cycles.length===0 && <tr><td colSpan="5" className="px-4 py-8 text-center text-slate-300 dark:text-slate-600">평가주기가 없습니다. 생성해 주세요.</td></tr>}
              {cycles.map(c=>{ const st=CYCLE_STATUS[c.status]||['?','bg-slate-100 dark:bg-slate-700'];
                return <tr key={c.cycle_id} className="hover:bg-slate-50 dark:hover:bg-slate-700/40">
                  <td className="px-4 py-2.5 font-mono text-xs text-slate-600 dark:text-slate-300">{c.cycle_id}</td>

              })}

        </div>
        {showNew && <CycleModal reload={reload} setBusy={setBusy} flash={flash} setErr={setErr} email={email} onClose={()=>setShowNew(false)} />}
        {editCycle && <CycleModal cycle={editCycle} reload={reload} setBusy={setBusy} flash={flash} setErr={setErr} email={email} onClose={()=>setEditCycle(null)} />}
      </div>}
      {sub==='targets' && <TargetsSection cycles={cycles} emps={emps} cfg={cfg} setBusy={setBusy} flash={flash} setErr={setErr} />}
      {sub==='results' && <ResultsSection cycles={cycles} emps={emps} comps={comps} cfg={cfg} grades={grades} setBusy={setBusy} flash={flash} setErr={setErr} />}
      {sub==='email' && <EmailPanel cycles={cycles} emps={emps} cfg={cfg} setBusy={setBusy} flash={flash} setErr={setErr} />}
      {sub==='settings' && <SettingsSection cfg={cfg} reload={reload} setBusy={setBusy} flash={flash} setErr={setErr} />}
    </div>
  );
}

const TPL_ORDER=[['prepare','평가 준비'],['start','평가 시작'],['remind','평가 독려'],['closing','종료 임박'],['closed','평가 종료']];
function EmailPanel({ cycles, emps, cfg, setBusy, flash, setErr }){
  const inProg=cycles.find(c=>c.status==='IN_PROGRESS');
  const [cid,setCid]=useState(inProg?inProg.cycle_id:(cycles[0]?cycles[0].cycle_id:''));
  const [templates,setTemplates]=useState([]);
  const [selKey,setSelKey]=useState('prepare');
  const [scope,setScope]=useState('all');
  const [statuses,setStatuses]=useState([]);
  const [targets,setTargets]=useState([]);
  const [edit,setEdit]=useState(null);
  const [excl,setExcl]=useState(()=>new Set());
  const [q,setQ]=useState('');
  const cycle=cycles.find(c=>c.cycle_id===cid);
  const active=useMemo(()=>emps.filter(e=>e.status!=='퇴사'&&e.email),[emps]);

  async function loadT(){ const { data, error }=await sb.from('eval_email_templates').select('*'); if(error){ setErr(error.message); return; } setTemplates(data||[]); }
  useEffect(()=>{ loadT(); },[]);
  useEffect(()=>{ setExcl(new Set()); },[scope,cid]);
  useEffect(()=>{ (async()=>{ if(!cid){ setStatuses([]); setTargets([]); return; } const [ks,tg]=await Promise.all([ sb.from('eval_kpi_status').select('employee_id,status').eq('cycle_id',cid), sb.from('eval_targets').select('employee_id,eval_type').eq('cycle_id',cid) ]); setStatuses(ks.data||[]); setTargets(tg.data||[]); })(); },[cid]);

  const tpl=templates.find(t=>t.key===selKey)||{ key:selKey, subject:'', body:'' };
  const stMap=Object.fromEntries(statuses.map(x=>[x.employee_id,x.status]));
  const targetIds=new Set((targets||[]).filter(t=>t.eval_type!=='EXCLUDED').map(t=>t.employee_id));
  const rcpts = scope==='kpi_missing'
    ? active.filter(e=>targetIds.has(e.id) && stMap[e.id]!=='SUBMITTED' && stMap[e.id]!=='APPROVED')
    : active;
  const toggle=id=>setExcl(sset=>{ const n=new Set(sset); n.has(id)?n.delete(id):n.add(id); return n; });
  const rcptsFinal=rcpts.filter(e=>!excl.has(e.id));
  const rcptsView = q? rcpts.filter(e=>(e.name||'').indexOf(q)>=0||(e.email||'').indexOf(q)>=0) : rcpts;
  const allSelected = rcpts.length>0 && rcpts.every(e=>!excl.has(e.id));
  function clickAll(){ if(scope!=='all'){ setScope('all'); setExcl(new Set()); return; } setExcl(allSelected? new Set(rcpts.map(e=>e.id)) : new Set()); }
  function selVisible(on){ setExcl(sset=>{ const n=new Set(sset); rcptsView.forEach(e=>{ on?n.delete(e.id):n.add(e.id); }); return n; }); }
  function render(txt, emp){ const dl=cycle?(cycle.kpi_input_end||cycle.end_date||''):''; let x=String(txt||''); x=x.split('{name}').join(emp?emp.name:''); x=x.split('{cycle}').join(cycle?cycle.name:''); x=x.split('{deadline}').join(dl?String(dl).slice(0,10):''); return x; }
  const sample=active[0]||{ name:'홍길동' };

  async function send(){
    if(!tpl.subject){ alert('먼저 템플릿을 저장하세요'); return; }
    if(!rcptsFinal.length){ alert('수신자를 선택하세요'); return; }
    if(!confirm(rcptsFinal.length+'명에게 발송할까요?\n제목: '+render(tpl.subject,sample))) return;
    const emails=rcptsFinal.map(e=>({ to:e.email, subject:render(tpl.subject,e), html:render(tpl.body,e).split('\n').join('<br>') }));
    setBusy(true);
    const { data, error }=await sb.functions.invoke('send-eval-email', { body:{ emails } });
    setBusy(false);
    if(error){ let detail=error.message; try{ if(error.context&&error.context.json){ const b=await error.context.json(); if(b&&b.error) detail=b.error; } }catch(_){} setErr('발송 실패: '+detail+' (Supabase → Edge Functions → send-eval-email → Logs에서 상세 확인)'); return; }
    if(data&&data.error){ setErr('발송 오류: '+data.error); return; }
    const okN=(data&&data.sent!=null)?data.sent:rcptsFinal.length; const fl=(data&&data.failed)||[];
    if(fl.length){ setErr('발송 '+okN+'건 성공 / '+fl.length+'건 실패: '+fl.join(', ')+' — (테스트 모드는 Resend 가입 이메일로만 발송됩니다. 도메인 인증 필요)'); }
    else flash(okN+'건 발송 완료');
  }

  return (
    <div>
      <div className="flex items-center gap-2 mb-3 flex-wrap">
        <select value={cid} onChange={e=>setCid(e.target.value)} className="inp !w-52">
          <option value="">평가주기 선택</option>
          {cycles.map(c=><option key={c.cycle_id} value={c.cycle_id}>{c.name}</option>)}
        </select>
      </div>
      <div className="flex gap-2 mb-4 flex-wrap">
        {TPL_ORDER.map(o=>{ const on=selKey===o[0];
          return <button key={o[0]} onClick={()=>setSelKey(o[0])} className={"px-3 py-1.5 text-sm rounded-lg border "+(on?"bg-indigo-600 border-indigo-600 text-white font-bold":"bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/40")}>{o[1]}</button>;
        })}
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-4">
          <div className="flex items-center justify-between mb-2">
            <h3 className="font-semibold text-slate-800 dark:text-slate-100">템플릿 미리보기</h3>
            <button onClick={()=>setEdit(tpl)} className="text-xs px-3 py-1.5 bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 rounded-lg">템플릿 수정</button>
          </div>
          <div className="text-xs text-slate-400 dark:text-slate-500 mb-1">제목</div>
          <div className="text-sm font-medium text-slate-800 dark:text-slate-100 mb-3">{render(tpl.subject,sample)||'(비어있음 — 수정하세요)'}</div>
          <div className="text-xs text-slate-400 dark:text-slate-500 mb-1">본문</div>
          <div className="text-sm text-slate-600 dark:text-slate-300 whitespace-pre-wrap bg-slate-50 dark:bg-slate-900 rounded-lg p-3 max-h-64 overflow-y-auto">{render(tpl.body,sample)||'(비어있음)'}</div>
          <div className="text-[11px] text-slate-400 dark:text-slate-500 mt-2">변수: {'{name}'} 이름 · {'{cycle}'} 평가주기 · {'{deadline}'} 마감일 (수신자별로 자동 치환)</div>
        </div>

        <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-4">
          <h3 className="font-semibold text-slate-800 dark:text-slate-100 mb-2">수신자</h3>
          <div className="flex gap-2 mb-3">
            <button onClick={clickAll} className={"text-xs px-3 py-1.5 rounded-lg border "+(scope==='all'?"bg-indigo-600 border-indigo-600 text-white":"bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300")}>전체 재직자{scope==='all'?(allSelected?' ✓':' ○'):''}</button>
            <button onClick={()=>setScope('kpi_missing')} className={"text-xs px-3 py-1.5 rounded-lg border "+(scope==='kpi_missing'?"bg-indigo-600 border-indigo-600 text-white":"bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300")}>KPI 미제출자</button>
          </div>
          <div className="flex items-center justify-between mb-2">
            <div className="text-sm text-slate-600 dark:text-slate-300">선택 <b className="text-indigo-600 dark:text-indigo-400">{rcptsFinal.length}</b> / {rcpts.length}명</div>
            <div className="flex gap-1"><button onClick={()=>selVisible(true)} className="text-[11px] px-2 py-0.5 rounded border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300">전체선택</button><button onClick={()=>selVisible(false)} className="text-[11px] px-2 py-0.5 rounded border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300">전체해제</button></div>
          </div>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 이름/이메일 검색" className="w-full mb-2 text-sm border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-1.5 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 outline-none focus:border-indigo-400" />
          <div className="max-h-48 overflow-y-auto border border-slate-100 dark:border-slate-700 rounded-lg divide-y divide-slate-50 dark:divide-slate-800">
            {rcptsView.map(e=>{ const on=!excl.has(e.id); return <label key={e.id} className="flex items-center gap-2 px-3 py-1.5 text-xs cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700/40"><input type="checkbox" checked={on} onChange={()=>toggle(e.id)} /><span className="text-slate-700 dark:text-slate-200">{e.name}</span><span className="text-slate-400 dark:text-slate-500 ml-auto">{e.email}</span></label>; })}
            {rcptsView.length===0 && <div className="px-3 py-4 text-xs text-slate-400 dark:text-slate-500 text-center">{rcpts.length===0?'대상이 없습니다.':'검색 결과가 없습니다.'}</div>}
          </div>
          <button onClick={send} disabled={!cid||!rcptsFinal.length} className="w-full mt-4 py-2.5 rounded-lg bg-emerald-600 text-white font-bold text-sm hover:bg-emerald-700 disabled:opacity-40">선택한 {rcptsFinal.length}명에게 발송</button>
          <p className="text-[11px] text-slate-400 dark:text-slate-500 mt-2">실제 발송은 Resend 발송기능(Edge Function)이 배포된 후 작동합니다.</p>
        </div>
      </div>
      {edit && <EmailTemplateModal tpl={edit} reload={loadT} setBusy={setBusy} flash={flash} setErr={setErr} onClose={()=>setEdit(null)} />}
    </div>
  );
}

function EmailTemplateModal({ tpl, reload, setBusy, flash, setErr, onClose }){
  const nameMap={ prepare:'평가 준비 안내', start:'평가 시작 안내', remind:'평가 독려', closing:'종료 임박 안내', closed:'평가 종료 안내' };
  const [subject,setSubject]=useState(tpl.subject||'');
  const [body,setBody]=useState(tpl.body||'');
  async function save(){
    setBusy(true);
    const res=await sb.from('eval_email_templates').upsert({ key:tpl.key, subject, body },{ onConflict:'key' });
    setBusy(false);
    if(res.error){ setErr(res.error.message); return; }
    flash('템플릿이 저장되었습니다'); await reload(); onClose();
  }
  return (
    <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
      <div className="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-lg p-5 max-h-[92vh] overflow-y-auto">
        <h3 className="font-bold text-slate-800 dark:text-slate-100 mb-4">템플릿 수정 · {nameMap[tpl.key]||tpl.key}</h3>
        <div className="space-y-3">
          <Field label="제목"><input value={subject} onChange={e=>setSubject(e.target.value)} className="inp" /></Field>
          <Field label="본문"><textarea value={body} onChange={e=>setBody(e.target.value)} rows="10" className="inp" /></Field>
          <div className="text-[11px] text-slate-400 dark:text-slate-500">사용 가능 변수: {'{name}'} {'{cycle}'} {'{deadline}'}</div>
        </div>
        <div className="flex justify-end gap-2 mt-5">
          <button onClick={onClose} className="px-4 py-2 text-sm text-slate-600 dark:text-slate-300 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">취소</button>
          <button onClick={save} className="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">저장</button>
        </div>
      </div>
    </div>
  );
}

function TargetsSection({ cycles, emps, cfg, setBusy, flash, setErr }){
  const [cid,setCid]=useState(cycles[0]?cycles[0].cycle_id:'');
  const [targets,setTargets]=useState([]);
  const [loading,setLoading]=useState(false);
  const [peerT,setPeerT]=useState(null);
  const empById=useMemo(()=>Object.fromEntries(emps.map(e=>[e.id,e])),[emps]);
  const active=useMemo(()=>emps.filter(e=>e.status!=='퇴사'),[emps]);

  async function load(){
    if(!cid){ setTargets([]); return; }
    setLoading(true);
    const { data, error }=await sb.from('eval_targets').select('*').eq('cycle_id',cid);
    setLoading(false);
    if(error){ setErr(error.message); return; }
    setTargets(data||[]);
  }
  useEffect(()=>{ load(); },[cid]);

  async function generate(){
    if(!cid){ alert('평가주기를 선택하세요'); return; }
    const have=new Set(targets.map(t=>t.employee_id));
    const add=active.filter(e=>!have.has(e.id)).map(e=>({ cycle_id:cid, employee_id:e.id, manager_id:e.manager_id||null, eval_type:'REGULAR' }));
    if(!add.length){ alert('추가할 신규 대상자가 없습니다(이미 모두 생성됨).'); return; }
    setBusy(true);
    const res=await sb.from('eval_targets').upsert(add,{ onConflict:'cycle_id,employee_id' });
    setBusy(false);
    if(res.error){ setErr(res.error.message); return; }
    flash(add.length+'명 대상자 생성'); load();
  }
  async function setType(t,val){ setBusy(true); const res=await sb.from('eval_targets').update({ eval_type:val }).eq('id',t.id); setBusy(false); if(res.error){ setErr(res.error.message); return; } load(); }
  async function remove(t){ if(!confirm('이 대상자를 제외(삭제)할까요?')) return; setBusy(true); const res=await sb.from('eval_targets').delete().eq('id',t.id); setBusy(false); if(res.error){ setErr(res.error.message); return; } load(); }

  function raters(ratee){
    const mgr=ratee.manager_id?1:0;
    const peers=active.filter(e=>e.group_id===ratee.group_id && e.id!==ratee.id).length;
    const subs=active.filter(e=>e.manager_id===ratee.id).length;
    return { mgr, peers, subs, total:1+mgr+peers+subs };
  }
  const rows=targets.map(t=>({ t, e:empById[t.employee_id] })).filter(r=>r.e).sort((a,b)=>(a.e.team||'').localeCompare(b.e.team||'')||(a.e.name||'').localeCompare(b.e.name||''));

  return (
    <div>
      <div className="flex items-center gap-2 mb-3 flex-wrap">
        <select value={cid} onChange={e=>setCid(e.target.value)} className="inp w-full sm:!w-56">
          <option value="">평가주기 선택</option>
          {cycles.map(c=><option key={c.cycle_id} value={c.cycle_id}>{c.name}</option>)}
        </select>
        <button onClick={generate} disabled={!cid} className="text-sm px-3 py-1.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-40">재직자 대상자 자동생성</button>
        {cid && <span className="text-xs text-slate-400 dark:text-slate-500">대상 {rows.length}명</span>}
      </div>
      {!cid ? <div className="text-slate-400 dark:text-slate-500 text-sm py-6">평가주기를 선택하세요.</div> :
       loading ? <div className="text-slate-400 dark:text-slate-500 text-sm py-6">불러오는 중…</div> :
       rows.length===0 ? <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl p-8 text-center text-slate-400 dark:text-slate-500">대상자가 없습니다. "재직자 대상자 자동생성"을 눌러 추가하세요.</div> :
      <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 dark:bg-slate-900 text-slate-500 dark:text-slate-400 text-xs"><tr>
            <th className="text-left px-4 py-2.5">이름</th><th className="text-left px-4 py-2.5">부서</th><th className="text-left px-4 py-2.5">직속상사</th><th className="text-left px-4 py-2.5">평가자 구성</th><th className="px-4 py-2.5"></th><th className="text-left px-4 py-2.5">평가유형</th><th className="px-4 py-2.5"></th>
          </tr></thead>
          <tbody className="divide-y divide-slate-100 dark:divide-slate-800">
            {rows.map(({t,e})=>{ const mgr=empById[e.manager_id]; const subs=active.filter(x=>x.manager_id===e.id).length; const peers=(t.peer_rater_ids||[]).length;
              return <tr key={t.id} className="hover:bg-slate-50 dark:hover:bg-slate-700/40">
                <td className="px-4 py-2.5 font-medium text-slate-800 dark:text-slate-100">{e.name} <span className="text-xs text-slate-400 dark:text-slate-500">{e.position}</span></td>
                <td className="px-4 py-2.5 text-slate-600 dark:text-slate-300">{e.team}</td>
                <td className="px-4 py-2.5 text-slate-500 dark:text-slate-400">{mgr?mgr.name:'-'}</td>
                <td className="px-4 py-2.5 text-slate-500 dark:text-slate-400 text-xs">본인 · 상사 {mgr?1:0} · 부하 {subs} · <span className={peers?"text-indigo-600 font-semibold":"text-amber-600"}>동료 {peers}</span></td>
                <td className="px-4 py-2.5"><button onClick={()=>setPeerT(t)} className="text-xs px-2 py-1 rounded border border-indigo-200 text-indigo-600 hover:bg-indigo-50 whitespace-nowrap">동료 지정</button></td>
                <td className="px-4 py-2.5">
                  <select value={t.eval_type} onChange={ev=>setType(t,ev.target.value)} className="text-xs border border-slate-200 dark:border-slate-700 rounded px-2 py-1 outline-none">
                    <option value="REGULAR">정규</option><option value="SIMPLE">간이</option><option value="EXCLUDED">제외</option>
                  </select>
                </td>
                <td className="px-4 py-2.5 text-right"><button onClick={()=>remove(t)} className="text-xs text-red-500 hover:text-red-700">삭제</button></td>
              </tr>;
            })}
          </tbody>
        </table>
      </div>}
      <p className="text-xs text-slate-400 dark:text-slate-500 mt-3">본인 · 직속상사 · 부하(직속 하급자)는 조직도 기준 자동입니다. <b>동료 평가자</b>는 업무 유관성을 고려해 <b>[동료 지정]</b>으로 직접 선택·수정하세요. 실제 점수 입력은 <b>360도 평가</b> 화면에서 이뤄집니다.</p>
      {peerT && <PeerModal target={peerT} ratee={empById[peerT.employee_id]} emps={emps} setBusy={setBusy} setErr={setErr} onSave={()=>{ setPeerT(null); load(); }} onClose={()=>setPeerT(null)} />}
    </div>
  );
}

function PeerModal({ target, ratee, emps, setBusy, setErr, onSave, onClose }){
  const active=emps.filter(e=>e.status!=='퇴사' && e.id!==(ratee&&ratee.id));
  const [sel,setSel]=useState(()=>new Set((target.peer_rater_ids)||[]));
  const [q,setQ]=useState('');
  const toggle=id=>setSel(s=>{ const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });
  const list=active.filter(e=>!q||(e.name||'').indexOf(q)>=0||(e.team||'').indexOf(q)>=0).sort((a,b)=>(a.team||'').localeCompare(b.team||'')||(a.name||'').localeCompare(b.name||''));
  async function save(){ setBusy(true); const res=await sb.from('eval_targets').update({ peer_rater_ids:Array.from(sel) }).eq('id',target.id); setBusy(false); if(res.error){ setErr(res.error.message); return; } onSave(); }
  return (
    <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-md p-5 max-h-[90vh] flex flex-col" onClick={ev=>ev.stopPropagation()}>

function descendantsOf(id, emps){
  const byMgr={}; emps.forEach(e=>{ if(e.manager_id){ (byMgr[e.manager_id]=byMgr[e.manager_id]||[]).push(e); } });
  const out=[], stack=(byMgr[id]||[]).slice(), seen={};
  while(stack.length){ const e=stack.pop(); if(seen[e.id]) continue; seen[e.id]=1; out.push(e); (byMgr[e.id]||[]).forEach(c=>stack.push(c)); }
  return out;
}
function canDesignate(p,cfg){
  if(!p) return false;
  const pos=String(p.position||'')+' '+String(p.rank||'');
  if(pos.indexOf('팀장')>=0||pos.indexOf('본부장')>=0||pos.indexOf('대표')>=0) return true;
  if(pos.indexOf('파트장')>=0 && String(cfg&&cfg.partlead_assign)==='true') return true;
  return false;
}
function compsForRating(ratee, raterType, rater, comps, cfg){
  const all=comps.filter(c=>c.active!==false);
  const tr=getEvalTrack(ratee); const rateeLeader=isLeaderRole(ratee,cfg);
  const sameTeam=!!(rater&&ratee&&rater.team&&rater.team===ratee.team);
  const COMMON=c=>c.track==='COMMON', JOB=c=>c.track===tr, LEADER=c=>c.track==='LEADER', FOLLOWER=c=>c.track==='FOLLOWER';
  let pick;
  if(raterType==='self'||raterType==='manager') pick=c=>COMMON(c)||JOB(c)||(rateeLeader?LEADER(c):FOLLOWER(c));
  else if(raterType==='subordinate') pick=c=>COMMON(c)||JOB(c)||LEADER(c);
  else if(raterType==='peer'){ if(rateeLeader) pick=c=>COMMON(c)||LEADER(c); else if(sameTeam) pick=c=>COMMON(c)||JOB(c); else pick=c=>COMMON(c); }
  else pick=c=>COMMON(c);
  return all.filter(pick).slice().sort((a,b)=>(a.display_order||0)-(b.display_order||0));
}
function getEvalTrack(p){
  if(!p) return '';
  if(p.eval_track) return String(p.eval_track);
  const g=String(p.group_id||'');
  if(g==='g_app') return 'SWDEV';
  if(g==='g_ai') return 'AIDEV';
  const map={ 'CEO':'CORP','경영지원':'CORP','연구개발':'AIDEV','품질경영':'QA','사업본부':'SALES','전략마케팅':'MKT','국내영업':'SALES','해외영업':'SALES' };
  return map[p.team]||'CORP';
}
function isLeaderRole(p,cfg){
  if(!p) return false;
  const roles=String((cfg&&cfg.leadership_roles)||'').split(',').map(x=>x.trim()).filter(Boolean);
  const pos=String(p.position||'')+' '+String(p.rank||'');
  return roles.some(r=>r&&pos.indexOf(r)>=0);
}
const RATER_LABEL={ self:'본인', manager:'부하 평가(내가 상사)', subordinate:'상사 평가(내가 부하)', peer:'동료' };

function resolveApprover(emp, empById){
  if(!emp) return null;
  let cur=empById[emp.manager_id]; const seen={};
  while(cur && !seen[cur.id]){
    seen[cur.id]=1;
    const t=(cur.position||'')+' '+(cur.rank||'');
    if(t.indexOf('본부장')>=0) return cur;
    if(t.indexOf('대표이사')>=0) return cur;
    cur=empById[cur.manager_id];
  }
  const list=Object.keys(empById).map(k=>empById[k]);
  return list.find(e=>((e.position||'')+(e.rank||'')).indexOf('대표이사')>=0)||null;
}

function esc(v){ return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function jobGroupOf(p){ var t=getEvalTrack(p); if(t==='SALES'||t==='MKT') return '영업'; if(t==='SWDEV'||t==='AIDEV') return '개발'; return '지원'; }
function fbApplicable(ratee, comps, cfg){ var tr=getEvalTrack(ratee), lead=isLeaderRole(ratee,cfg); return comps.filter(function(c){ return c.active!==false && (c.track==='COMMON'||c.track===tr||(c.track==='LEADER'&&lead)||(c.track==='FOLLOWER'&&!lead)); }).slice().sort(function(a,b){return (a.display_order||0)-(b.display_order||0);}); }
function fbAvg(a){ return a.length? a.reduce(function(s,x){return s+x;},0)/a.length : null; }
function fbR1(v){ return v==null?null:Math.round(v*10)/10; }
function buildRadarSvg(axes){
  var cx=170,cy=150,R=100,N=axes.length,rings=[.25,.5,.75,1];
  function pt(i,f){ var a=-Math.PI/2+i*2*Math.PI/N; return [cx+Math.cos(a)*R*f, cy+Math.sin(a)*R*f]; }
  var h='';
  rings.forEach(function(rf){ h+='<polygon points="'+axes.map(function(_,i){return pt(i,rf).join(',');}).join(' ')+'" fill="none" stroke="#e6e8ee"/>'; });
  axes.forEach(function(_,i){ var e=pt(i,1); h+='<line x1="'+cx+'" y1="'+cy+'" x2="'+e[0]+'" y2="'+e[1]+'" stroke="#e6e8ee"/>'; });
  function ln(key,color,dash,fill){ if(!axes.every(function(a){return a[key]!=null;})) return ''; var p=axes.map(function(a,i){return pt(i,(a[key]||0)/100).join(',');}).join(' '); return '<polygon points="'+p+'" fill="'+(fill?color+'22':'none')+'" stroke="'+color+'" stroke-width="2"'+(dash?' stroke-dasharray="4 3"':'')+'/>'; }
  h+=ln('job','#f59e0b',true,false)+ln('team','#94a3b8',true,false)+ln('peer','#10b981',false,false)+ln('self','#6366f1',false,true);
  axes.forEach(function(a,i){ var e=pt(i,1.2); var anc=(e[0]<cx-5)?'end':(e[0]>cx+5)?'start':'middle'; h+='<text x="'+e[0]+'" y="'+(e[1]+3)+'" font-size="9" fill="#7a8194" text-anchor="'+anc+'">'+esc(a.nm)+'</text>'; });
  return '<svg viewBox="0 0 340 300" width="100%">'+h+'</svg>';
}
function computeFeedback(ratee, comps, cfg, empById, rows360, kpis){
  var minOther=Number(cfg.anon_min_other||2);
  var app=fbApplicable(ratee, comps, cfg);
  var all=Object.keys(empById).map(function(k){return empById[k];}).filter(Boolean);
  var teamSet=new Set(all.filter(function(e){return e.team===ratee.team && e.status!=='퇴사';}).map(function(e){return e.id;}));
  var jg=jobGroupOf(ratee);
  var jobSet=new Set(all.filter(function(e){return e.status!=='퇴사' && jobGroupOf(e)===jg;}).map(function(e){return e.id;}));
  function sc(rid,cid,types){ return rows360.filter(function(r){ return r.ratee_id===rid && r.comp_id===cid && r.score!=null && (!types||types.indexOf(r.rater_type)>=0); }).map(function(r){return Number(r.score);}); }
  function grp(idSet,cid){ var v=rows360.filter(function(r){ return idSet.has(r.ratee_id) && r.comp_id===cid && r.score!=null && r.rater_type!=='self'; }).map(function(r){return Number(r.score);}); return fbAvg(v); }
  var items=app.map(function(c){
    var self=fbAvg(sc(ratee.id,c.comp_id,['self']));
    var others=sc(ratee.id,c.comp_id,['manager','peer','subordinate']);
    var peer=(others.length>=minOther)?fbAvg(others):null;
    return { nm:c.name, def:String(c.description||c.rubric||'').split('\n')[0], self:fbR1(self), peer:fbR1(peer), team:fbR1(grp(teamSet,c.comp_id)), job:fbR1(grp(jobSet,c.comp_id)), masked:(others.length<minOther) };
  });
  return { items:items, jobGroup:jg };
}

function PersonPanel({ person, cid, kpiEditable, feedbackEditable, me, empById, cfg, setBusy, flash, setErr, comps, grades, cycleName }){
  const [kpis,setKpis]=useState([]);
  const [fbs,setFbs]=useState([]);
  const [status,setStatus]=useState(null);
  const [result,setResult]=useState(null);
  const [showFb,setShowFb]=useState(false);
  const [editKpi,setEditKpi]=useState(null);
  const [editFb,setEditFb]=useState(null);
  async function load(){
    if(!cid||!person){ setKpis([]); setFbs([]); setStatus(null); return; }
    const [k,f,stt,rr]=await Promise.all([
      sb.from('eval_kpi').select('*').eq('cycle_id',cid).eq('employee_id',person.id).order('id'),
      sb.from('eval_feedback').select('*').eq('cycle_id',cid).eq('employee_id',person.id),
      sb.from('eval_kpi_status').select('*').eq('cycle_id',cid).eq('employee_id',person.id).maybeSingle(),
      sb.from('eval_results').select('*').eq('cycle_id',cid).eq('employee_id',person.id).maybeSingle()
    ]);
    if(k.error){ setErr(k.error.message); return; }
    if(f.error){ setErr(f.error.message); return; }
    setKpis(k.data||[]); setFbs(f.data||[]); setStatus(stt&&stt.data?stt.data:null); setResult(rr&&rr.data?rr.data:null);
  }
  useEffect(()=>{ load(); },[cid, person&&person.id]);
  async function saveFb(period, content){ setBusy(true); const res=await sb.from('eval_feedback').upsert({ cycle_id:cid, employee_id:person.id, author_id:me.id, period, content, updated_at:new Date().toISOString() },{ onConflict:'cycle_id,employee_id,period' }); setBusy(false); if(res.error){ setErr(res.error.message); return; } flash(period+' 면담 저장됨'); load(); }
  const weightSum=kpis.reduce((s,k)=>s+Number(k.weight||0),0);
  const kpiTotal=kpis.reduce((s,k)=>s+Number(k.weight||0)*Number(k.final_score||0),0)/100;
  const minK=Number(cfg.min_kpi_count||3), maxK=Number(cfg.max_kpi_count||6);
  const PERIODS=['Q1','Q2','Q3','Q4'];
  const fbByPeriod=pr=>fbs.find(x=>x.period===pr);
  const st = status ? status.status : 'DRAFT';

function parseRatio(str){ const a=String(str||'60:40').split(':'); const x=Number(a[0]), y=Number(a[1]); return [isNaN(x)?60:x, isNaN(y)?40:y]; }
var RATIO_POSITIONS=['대표이사','본부장','팀장','파트장','매니저','연구원'];
function tierRatio(person, evalType, cfg){
  if(evalType==='SIMPLE') return { key:'간이', ratio:parseRatio(cfg.ratio_simple||cfg.ratio_new||'100:0') };
  var pos=String((person&&person.position)||'')+' '+String((person&&person.rank)||'');
  var def={대표이사:cfg.ratio_leader||'40:60',본부장:cfg.ratio_leader||'40:60',팀장:cfg.ratio_leader||'40:60',파트장:cfg.ratio_partlead||'50:50',매니저:cfg.ratio_general||'60:40',연구원:cfg.ratio_general||'60:40'};
  for(var i=0;i<RATIO_POSITIONS.length;i++){ var P=RATIO_POSITIONS[i]; if(pos.indexOf(P)>=0) return { key:P, ratio:parseRatio(cfg['ratio_pos_'+P]||def[P]) }; }
  if(/대표|이사|본부장|팀장/.test(pos)) return { key:'리더', ratio:parseRatio(cfg['ratio_pos_팀장']||cfg.ratio_leader||'40:60') };
  return { key:'일반', ratio:parseRatio(cfg['ratio_pos_연구원']||cfg.ratio_general||'60:40') };
}
function gradeOf(score, grades){ for(const g of grades){ if(score>=Number(g.min_score)&&score<=Number(g.max_score)) return g.grade; } return grades.length?grades[grades.length-1].grade:'-'; }
function compScoreFor(ratee, comps, cfg, rows){
  const tr=getEvalTrack(ratee), lead=isLeaderRole(ratee,cfg);
  const app=comps.filter(c=>c.active!==false && (c.track==='COMMON'||c.track===tr||(c.track==='LEADER'&&lead)||(c.track==='FOLLOWER'&&!lead)));
  const rw={ self:Number(cfg.rater_weight_self||10), manager:Number(cfg.rater_weight_manager||50), peer:Number(cfg.rater_weight_peer||30), subordinate:Number(cfg.rater_weight_subordinate||10) };
  let earned=0, wsum=0, rated=0; const core=[];
  app.forEach(c=>{
    const rs=rows.filter(r=>r.ratee_id===ratee.id && r.comp_id===c.comp_id && r.score!=null);
    if(!rs.length) return;
    const byType={};
    rs.forEach(r=>{ (byType[r.rater_type]=byType[r.rater_type]||[]).push(Number(r.score)); });
    let num=0, den=0;
    Object.keys(byType).forEach(t=>{ const arr=byType[t]; const avg=arr.reduce((a,b)=>a+b,0)/arr.length; const w=rw[t]||0; num+=w*avg; den+=w; });
    if(den===0) return;
    const cs=num/den;
    earned+=Number(c.weight)*cs; wsum+=Number(c.weight); rated++;
    if(c.is_core) core.push(cs);
  });
  return { score: wsum>0? earned/wsum : null, rated, applicable: app.length, core };
}
function kpiScoreFor(kpis){
  const rel=(kpis||[]).filter(k=>k.final_score!=null && Number(k.weight)>0);
  if(!rel.length) return null;
  const num=rel.reduce((s,k)=>s+Number(k.weight)*Number(k.final_score),0);
  const den=rel.reduce((s,k)=>s+Number(k.weight),0);
  return den>0? num/den : null;
}
function tenureMonthsAt(join, ref){ if(!join) return 999; var j=new Date(join); if(isNaN(j)) return 999; var r=ref?new Date(ref):new Date(); if(isNaN(r)) r=new Date(); var m=(r.getFullYear()-j.getFullYear())*12+(r.getMonth()-j.getMonth()); if(r.getDate()<j.getDate()) m-=1; return m; }
function newhireState(person, cyc, cfg){ var ref=(cyc&&cyc.end_date)||(cyc&&cyc.start_date)||null; var m=tenureMonthsAt(person&&person.join_date, ref); var dm=Number(cfg.newhire_defer_months||3), rm=Number(cfg.newhire_ramp_months||6); if(m<dm) return {defer:true,ramp:false,months:m}; if(m<rm) return {defer:false,ramp:true,months:m}; return {defer:false,ramp:false,months:m}; }
function computeResult(person, evalType, comps, cfg, grades, rows360, kpis, ratioOverride){
  const c=compScoreFor(person, comps, cfg, rows360);
  const k=kpiScoreFor(kpis);
  const tr=ratioOverride?{key:'신규',ratio:ratioOverride}:tierRatio(person, evalType, cfg); const cr=tr.ratio[0], kr=tr.ratio[1];
  let grand;
  if(k==null || kr===0){ grand = c.score!=null?c.score:0; }
  else if(c.score==null){ grand = k; }
  else { grand = c.score*(cr/100) + k*(kr/100); }
  let grade=gradeOf(grand, grades); let gated=false;
  if(String(cfg.core_gate_enabled)==='true' && c.core.length){
    const minCore=Math.min.apply(null,c.core);
    if(minCore<Number(cfg.core_gate_min||65) && (grade==='S'||grade==='A')){ grade='B'; gated=true; }
  }
  const gr=grades.find(g=>g.grade===grade);

function ResultsSection({ cycles, emps, comps, cfg, grades, setBusy, flash, setErr }){

        {cid && <button onClick={toggleFb} className={"text-sm px-3 py-1.5 rounded-lg "+(fbOpen?"bg-emerald-600 text-white":"border border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-300")}>{fbOpen?'피드백지 공개됨 ✓':'피드백지 공개'}</button>}

            <div className="bg-indigo-50 dark:bg-indigo-950 rounded-lg p-3"><div className="text-xs text-indigo-400">종합</div><div className="font-bold text-indigo-700 mt-0.5">{r.grand_total!=null?Number(r.grand_total).toFixed(1):'-'}</div></div>
          </div>
          {r.base_raise_rate!=null && <div className="text-xs text-slate-500 dark:text-slate-400 mt-3">기준 인상률: <b className="text-slate-700 dark:text-slate-200">{r.base_raise_rate}%</b></div>}
          {r.feedback && r.feedback_published && <div className="mt-3 pt-3 border-t border-slate-100 dark:border-slate-700"><div className="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">평가 총평</div><div className="text-sm text-slate-700 dark:text-slate-200 whitespace-pre-wrap">{r.feedback}</div></div>}
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
