function Icon({ path, className }) {
  return <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={path} /></svg>;
}
const AVATAR = ['bg-indigo-500','bg-blue-500','bg-emerald-500','bg-amber-500','bg-rose-500','bg-violet-500','bg-cyan-500','bg-teal-500','bg-orange-500','bg-pink-500'];
function avatarColor(name){ let h=0; for(const c of (name||'')) h=(h*31+c.charCodeAt(0))%AVATAR.length; return AVATAR[h]; }
function fmtDate(d){ return d ? String(d).slice(0,10) : '-'; }
function tenure(join, last){
  if(!join) return '-';
  const s=new Date(join), e=last?new Date(last):new Date();
  if(isNaN(s)) return '-';
  const days=Math.floor((e-s)/86400000);
  if(days<0) return '-';
  if(days<31) return days+'일';
  let months=(e.getFullYear()-s.getFullYear())*12+(e.getMonth()-s.getMonth());
  if(e.getDate()<s.getDate()) months--;
  const y=Math.floor(months/12), m=months%12;
  return y===0 ? (m+'개월') : (y+'년 '+m+'개월');
}
const ORDER_LABEL = { hire:'입사', transfer:'전보', promotion:'승진', concurrent:'겸직', concurrent_end:'겸직해제', resign:'퇴사', assignment:'보직', org_create:'조직신설', org_delete:'조직폐지', org_edit:'조직변경' };

function useTheme(){
  const [theme,setTheme]=useState(()=>{ try{ return localStorage.getItem('crescom-theme')||'system'; }catch(e){ return 'system'; } });
  useEffect(()=>{
    const el=document.documentElement;
    el.classList.toggle('dark', theme==='dark');
    el.classList.toggle('claude', theme==='system');
    try{ localStorage.setItem('crescom-theme',theme); }catch(e){}
  },[theme]);
  return [theme,setTheme];
}
const THEME_ICON={ light:"M12 3v1M12 20v1M4.9 4.9l.7.7M18.4 18.4l.7.7M3 12h1M20 12h1M4.9 19.1l.7-.7M18.4 5.6l.7-.7M12 8a4 4 0 100 8 4 4 0 000-8z", system:"M4 5h16v10H4zM8 19h8M12 15v4", dark:"M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z" };
function ThemeToggle(){
  const [theme,setTheme]=useTheme();
  const opts=[['light','라이트'],['system','시스템'],['dark','다크']];
  return (
    <div className="inline-flex items-center bg-slate-100 dark:bg-slate-700 rounded-lg p-0.5">
      {opts.map(o=>{ const on=theme===o[0];
        return <button key={o[0]} onClick={()=>setTheme(o[0])} title={o[1]} className={"px-2 py-1.5 rounded-md flex items-center "+(on?"bg-white dark:bg-slate-800 shadow text-slate-800 dark:text-slate-100":"text-slate-500 dark:text-slate-400 hover:text-slate-700")}><Icon path={THEME_ICON[o[0]]} className="w-4 h-4" /></button>;
      })}
    </div>
  );
}

  const [session,setSession]=useState(null);
  const [canEdit,setCanEdit]=useState(false);
  const [tab,setTab]=useState('org');
  const [emps,setEmps]=useState([]);
  const [groups,setGroups]=useState([]);
  const [orders,setOrders]=useState([]);

  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const [notice,setNotice]=useState('');

  async function loadAll(){
    setErr('');
    const [e1,e2,e3,e4]=await Promise.all([
      sb.from('employees').select('*'),
      sb.from('org_groups').select('*'),
      sb.from('hr_orders').select('*').order('order_date',{ascending:false}).order('created_at',{ascending:false}),
      sb.from('employee_assignments').select('*')
    ]);
    const anyErr=e1.error||e2.error||e3.error||e4.error;
    if(anyErr){ setErr(anyErr.message); return; }
    setEmps(e1.data||[]); setGroups(e2.data||[]); setOrders(e3.data||[]); setAssigns(e4.data||[]);
  }

  useEffect(()=>{ (async()=>{
    const { data:{ session } } = await sb.auth.getSession();
    if(!session){ window.location.href='index.html'; return; }
    setSession(session);
    const { data:roles } = await sb.from('user_roles').select('role').eq('email',session.user.email).eq('app','hr');
    setCanEdit(!!(roles||[]).find(r=>r.role==='SUPER'||r.role==='ADMIN'));
    await loadAll();
    setReady(true);
  })(); },[]);

  function flash(msg){ setNotice(msg); setTimeout(()=>setNotice(''),2500); }

  if(!ready) return <div className="min-h-screen flex items-center justify-center text-slate-400 dark:text-slate-500">불러오는 중…</div>;

  const active = emps.filter(e=>e.status!=='퇴사');
  const stats = { total: active.length, groups: groups.length };

  return (
    <div className="min-h-screen">
      <header className="sticky top-0 z-30 bg-white/90 dark:bg-slate-900/90 backdrop-blur border-b border-slate-200 dark:border-slate-700 no-print">
        <div className="max-w-[1400px] mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-4 flex-wrap">
          <div className="flex items-center gap-3">
            <a href="index.html" className="w-9 h-9 rounded-lg bg-gradient-to-br from-slate-700 to-slate-900 flex items-center justify-center" title="포털로">
              <Icon path="M3 21h18M5 21V7l7-4 7 4v14" className="w-5 h-5 text-white" />
            </a>
            <div>
              <h1 className="font-bold text-slate-900 dark:text-slate-100">e-HR 시스템</h1>
              <p className="text-xs text-slate-500 dark:text-slate-400">재직 {stats.total}명 · 조직 {stats.groups}개 {canEdit?'· 편집가능':'· 조회전용'}</p>
            </div>
          </div>
          <div className="flex items-center gap-3">
            {busy && <span className="text-xs text-blue-600">저장 중…</span>}
            {notice && <span className="text-xs text-emerald-600 bg-emerald-50 dark:bg-emerald-950 px-3 py-1.5 rounded-md">{notice}</span>}
            <ThemeToggle />
            <a href="index.html" className="text-xs font-bold px-3.5 py-2 rounded-lg bg-rose-600 text-white border border-rose-700 shadow-md hover:bg-rose-700 transition">CRESCOM 인사시스템</a>
            <a href="eval.html" className="text-xs font-bold px-3.5 py-2 rounded-lg bg-indigo-600 text-white border border-indigo-700 shadow-md hover:bg-indigo-700 hover:shadow-lg active:translate-y-px transition">인사평가시스템</a>
            <a href="https://script.google.com/a/macros/crescom.ai/s/AKfycbyyqy7AvqoUXDbFO0Si0ALbjUBfzsZa5nSslXhfoPGAVO539_7kjpY4o0LAsJu4j1Sp/exec" target="_blank" rel="noopener noreferrer" className="text-xs font-bold px-3.5 py-2 rounded-lg bg-emerald-600 text-white border border-emerald-700 shadow-md hover:bg-emerald-700 hover:shadow-lg active:translate-y-px transition">급여자동화시스템</a>
            <span className="text-sm text-slate-500 dark:text-slate-400 hidden sm:inline">{session.user.email}</span>
            <button onClick={()=>sb.auth.signOut().then(()=>window.location.href='index.html')} className="text-sm text-slate-600 dark:text-slate-300 hover:text-slate-900 px-3 py-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">로그아웃</button>
          </div>
        </div>
        <div className="max-w-[1400px] mx-auto px-4 sm:px-6 flex gap-2 pt-1 pb-3 overflow-x-auto">
          {[['org','조직도 관리','M3 21h18M5 21V7l7-4 7 4v14'],['orders','발령 관리','M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8zM14 2v6h6'],['emps','임직원 관리','M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M13 7a4 4 0 11-8 0 4 4 0 018 0z']].concat(canEdit?[['roles','권한 관리','M15 7a2 2 0 012 2m4 0a6 6 0 01-7.7 5.7L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.6a1 1 0 01.3-.7l5.4-5.4A6 6 0 1121 9z']]:[]).map(([k,label,ic])=>{
            const on=tab===k;
            return <button key={k} onClick={()=>setTab(k)}
              className={"flex items-center gap-1.5 px-5 py-2.5 text-sm rounded-lg border transition whitespace-nowrap shrink-0 "+(on?"bg-slate-900 border-slate-900 text-white font-bold shadow-md":"bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 font-medium hover:bg-slate-50 dark:hover:bg-slate-700/40 hover:text-slate-900")}>
              <Icon path={ic} className="w-4 h-4" />{label}</button>;
          })}
        </div>
      </header>

      <main className="max-w-[1400px] mx-auto px-4 sm:px-6 py-6">

        {tab==='orders'&& <OrdersTab emps={emps} groups={groups} orders={orders} assigns={assigns} canEdit={canEdit} reload={loadAll} setBusy={setBusy} flash={flash} setErr={setErr} />}
        {tab==='emps'  && <EmpsTab emps={emps} groups={groups} canEdit={canEdit} reload={loadAll} setBusy={setBusy} flash={flash} setErr={setErr} />}
        {tab==='roles' && canEdit && <RolesTab emps={emps} myEmail={session&&session.user&&session.user.email} setBusy={setBusy} flash={flash} setErr={setErr} />}
      </main>
    </div>
  );
}

// ════════════════════════════════════════════════════════
function RolesTab({ emps, myEmail, setBusy, flash, setErr }){
  const APPS_DEF=[['hr','e-HR'],['eval','인사평가'],['payroll','급여자동화']];
  const ROLES=['SUPER','ADMIN','USER'];
  const [rows,setRows]=useState(null);
  const [q,setQ]=useState('');
  async function load(){ const r=await sb.from('user_roles').select('*'); if(r.error){ setErr(r.error.message); return; } setRows(r.data||[]); }
  useEffect(()=>{ load(); },[]);
  const active=emps.filter(e=>e.status!=='퇴사' && e.email).slice().sort((a,b)=>(a.team||'').localeCompare(b.team||'')||(a.name||'').localeCompare(b.name||''));
  const list=active.filter(e=>!q||(e.name||'').includes(q)||(e.email||'').includes(q)||(e.team||'').includes(q));
  const of=(email,app)=>(rows||[]).find(r=>r.email===email&&r.app===app);
  async function setRole(email, app, role){
    const APPN={hr:'e-HR', eval:'인사평가', payroll:'급여자동화'};
    const cur=of(email,app);
    // 본인 e-HR 관리자 권한 하향 차단 (탭 접근 상실 방지)
    if(email===myEmail && app==='hr' && (!role || role==='USER')){
      alert('본인의 e-HR 관리자 권한은 여기서 내릴 수 없습니다.\n(권한 관리 접근을 잃게 됩니다. 이관 시 후임자에게 먼저 SUPER를 부여한 뒤 후임자가 조정하세요.)');
      load(); return;
    }
    const empNm=(active.find(x=>x.email===email)||{}).name||email;
    const curTxt=cur?cur.role:'없음';
    const newTxt=role||'없음';
    if(!confirm(empNm+' 님의 ['+(APPN[app]||app)+'] 권한을 변경할까요?\n'+curTxt+' → '+newTxt)){ load(); return; }
    setBusy(true);
    let res;
    if(!role){ if(!cur){ setBusy(false); return; } res=await sb.from('user_roles').delete().eq('id',cur.id); }
    else if(cur){ res=await sb.from('user_roles').update({role}).eq('id',cur.id); }
    else { res=await sb.from('user_roles').insert({email,app,role}); }
    setBusy(false);
    if(res.error){ setErr(res.error.message); return; }
    flash('권한 저장됨'); load();
  }
  if(rows===null) return <div className="text-slate-400 dark:text-slate-500 text-sm py-6">불러오는 중…</div>;
  const sel="text-xs border border-slate-200 dark:border-slate-700 rounded-lg px-2 py-1.5 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 outline-none";
  return (
    <div>
      <div className="flex items-center gap-2 mb-3 flex-wrap">
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 이름/이메일/팀 검색" className="inp w-full sm:!w-64" />
        <span className="text-xs text-slate-400 dark:text-slate-500">{list.length}명 · 권한이 없으면 포털에서 해당 시스템이 잠깁니다</span>
      </div>
      <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl overflow-x-auto">
        <table className="w-full text-sm whitespace-nowrap">
          <thead className="bg-slate-50 dark:bg-slate-900 text-slate-500 dark:text-slate-400 text-xs"><tr>
            <th className="text-left px-4 py-2.5">이름</th><th className="text-left px-4 py-2.5">팀</th><th className="text-left px-4 py-2.5">이메일</th>
            {APPS_DEF.map(a=><th key={a[0]} className="text-center px-4 py-2.5">{a[1]}</th>)}
          </tr></thead>
          <tbody className="divide-y divide-slate-100 dark:divide-slate-800">
            {list.map(e=>(
              <tr key={e.id} className="hover:bg-slate-50 dark:hover:bg-slate-700/40">
                <td className="px-4 py-2.5 font-medium text-slate-800 dark:text-slate-100">{e.name} <span className="text-xs text-slate-400 dark:text-slate-500">{e.position}</span></td>
                <td className="px-4 py-2.5 text-slate-600 dark:text-slate-300">{e.team}</td>
                <td className="px-4 py-2.5 text-slate-500 dark:text-slate-400 text-xs">{e.email}</td>
                {APPS_DEF.map(a=>{ const cur=of(e.email,a[0]);
                  return <td key={a[0]} className="px-4 py-2 text-center">
                    <select value={cur?cur.role:''} onChange={ev=>setRole(e.email,a[0],ev.target.value)} className={sel+(cur?(cur.role==='SUPER'?' !border-indigo-400 font-bold':' !border-emerald-300'):'')}>
                      <option value="">없음</option>
                      {ROLES.map(r=><option key={r} value={r}>{r}</option>)}
                    </select>
                  </td>; })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <p className="text-xs text-slate-400 dark:text-slate-500 mt-3">SUPER=최고 관리자 · ADMIN=관리자 · USER=일반(조회) · "없음"=접근 불가. 급여자동화는 여기(포털 표시) 외에 GAS 코드의 ACCESS_ROLES도 함께 관리해야 실제 접근이 제한됩니다.</p>
    </div>
  );
}

//  탭 1) 조직도 관리
// ════════════════════════════════════════════════════════
// ── 조직 색상/정렬 유틸 ──
const TEAM_HEX = { 'CEO':'#1e293b','사업본부':'#2563eb','전략마케팅':'#7c3aed','국내영업':'#0284c7','해외영업':'#0891b2','연구개발':'#059669','품질경영':'#d97706','경영지원':'#e11d48' };
const GROUP_HEX = { 'g_app':'#0d9488','g_ai':'#16a34a','g_medical':'#c026d3' };
function colorForGroup(g){ return GROUP_HEX[g.id] || TEAM_HEX[g.team] || '#475569'; }
function isPart(g){ return (g.name||'').indexOf('파트')>=0; }
const RANK_ORDER=['대표이사','사내이사','본부장','팀장','파트장','매니저','연구원'];
function rankIdx(e){ const i=RANK_ORDER.indexOf(e.rank||e.position||''); return i<0?90:i; }
function rankSort(a,b){ return rankIdx(a)-rankIdx(b) || (a.name||'').localeCompare(b.name||''); }

function MemberRow({ e, onClick, concurrent }){
  return (
    <button onClick={onClick} className="w-full flex items-center gap-2 px-1.5 py-1 rounded-md hover:bg-slate-50 dark:hover:bg-slate-700/40 text-left">
      <span className={"w-7 h-7 rounded-full text-white text-[10px] flex items-center justify-center shrink-0 "+avatarColor(e.name)}>{(e.name||'').slice(-2)}</span>
      <span className="min-w-0 flex-1">

const AV_HEX=['#6366f1','#3b82f6','#10b981','#f59e0b','#f43f5e','#8b5cf6','#06b6d4','#14b8a6','#f97316','#ec4899'];
function avatarHex(name){ let h=0; for(const ch of (name||'')) h=(h*31+ch.charCodeAt(0))>>>0; return AV_HEX[h%AV_HEX.length]; }

const OC={ CARD_W:220, HEADER_H:44, ROW_H:38, PAD_B:10, H_GAP:28, BASE_VGAP:54, SPINE_UP:26, SIDE_DX:64, SIDE_VGAP:12, TOP:24, LEFT:24 };
function computeOrgLayout(groups, emps, assigns){
  const byid=Object.fromEntries(emps.map(e=>[e.id,e]));
  const primary={}, concurrent={};
  emps.forEach(e=>{ if(e.status!=='퇴사'){ (primary[e.group_id]=primary[e.group_id]||[]).push(e); } });
  (assigns||[]).forEach(a=>{ const e=byid[a.employee_id]; if(e&&e.status!=='퇴사'){ (concurrent[a.group_id]=concurrent[a.group_id]||[]).push({...e,_concurrent:true,_cpos:a.position}); } });
  const kids={}, staffk={};
  groups.forEach(g=>{ if(g.parent_id){ const m=g.is_staff?staffk:kids; (m[g.parent_id]=m[g.parent_id]||[]).push(g); } });
  const membersOf=g=>{ const pm=(primary[g.id]||[]).slice().sort(rankSort); return pm.length? pm : (concurrent[g.id]||[]); };
  const cardH=g=>{ const n=membersOf(g).length; return OC.HEADER_H+(n?n*OC.ROW_H+OC.PAD_B:10); };
  const subW=g=>{ const ch=kids[g.id]||[]; if(!ch.length) return OC.CARD_W; return Math.max(OC.CARD_W, ch.reduce((t,c)=>t+subW(c),0)+(ch.length-1)*OC.H_GAP); };
  function cnt(gid){ let n=(primary[gid]||[]).length; (kids[gid]||[]).forEach(c=>{ n+=cnt(c.id); }); return n; }
  const boxes={};
  function layout(g,left,y){
    const w=subW(g), h=cardH(g); const ch=kids[g.id]||[]; const st=staffk[g.id]||[];
    const staffH=st.reduce((t,x)=>t+cardH(x)+OC.SIDE_VGAP,0);
    const gap= st.length? Math.max(OC.BASE_VGAP, OC.SIDE_VGAP+staffH+52) : OC.BASE_VGAP;
    if(!ch.length){ boxes[g.id]={x:left+(w-OC.CARD_W)/2,y,w:OC.CARD_W,h}; }
    else{
      let cur=left; const centers=[]; const rowY=y+h+gap;
      ch.forEach(c=>{ const cw=subW(c); layout(c,cur,rowY); centers.push(boxes[c.id].x+OC.CARD_W/2); cur+=cw+OC.H_GAP; });
      const cx=(centers[0]+centers[centers.length-1])/2; boxes[g.id]={x:cx-OC.CARD_W/2,y,w:OC.CARD_W,h};
    }
    const trunkX=boxes[g.id].x+OC.CARD_W/2; let sy=y+h+OC.SIDE_VGAP;
    st.forEach(sg=>{ const sh=cardH(sg); boxes[sg.id]={x:trunkX+OC.SIDE_DX,y:sy,w:OC.CARD_W,h:sh}; sy+=sh+OC.SIDE_VGAP; });
    return w;
  }
  const roots=groups.filter(g=>!g.parent_id);
  if(roots[0]) layout(roots[0],OC.LEFT,OC.TOP);
  const nodes=groups.filter(g=>boxes[g.id]).map(g=>({ g, ...boxes[g.id], color:colorForGroup(g), members:membersOf(g), conc:(concurrent[g.id]||[]), count:cnt(g.id) }));
  const links=[];
  groups.forEach(g=>{ if(!boxes[g.id])return; const b=boxes[g.id]; const trunkX=b.x+OC.CARD_W/2;
    const ch=(kids[g.id]||[]).filter(c=>boxes[c.id]); const st=(staffk[g.id]||[]).filter(c=>boxes[c.id]);
    if(ch.length){ const rowY=boxes[ch[0].id].y; const spineY=rowY-OC.SPINE_UP;
      links.push({x1:trunkX,y1:b.y+b.h,x2:trunkX,y2:spineY});
      const cxs=ch.map(c=>boxes[c.id].x+OC.CARD_W/2);
      links.push({x1:Math.min(...cxs),y1:spineY,x2:Math.max(...cxs),y2:spineY});
      ch.forEach(c=>{ const cx=boxes[c.id].x+OC.CARD_W/2; links.push({x1:cx,y1:spineY,x2:cx,y2:boxes[c.id].y}); });
    }
    st.forEach(sg=>{ const sb=boxes[sg.id]; const cy=sb.y+sb.h/2; if(!ch.length) links.push({x1:trunkX,y1:b.y+b.h,x2:trunkX,y2:cy}); links.push({x1:trunkX,y1:cy,x2:sb.x,y2:cy,staff:true}); });
  });
  let W=0,H=0; Object.values(boxes).forEach(b=>{ W=Math.max(W,b.x+b.w); H=Math.max(H,b.y+b.h); });
  return { nodes, links, W:W+OC.LEFT, H:H+OC.TOP, C:OC };
}

function NodeSVG({ n, canEdit, C, onMember, onEdit }){
  const {x,y,w,h,color,g,members,count}=n;
  const conc=n.conc||[];
  const hp="M"+x+","+(y+10)+" Q"+x+","+y+" "+(x+10)+","+y+" H"+(x+w-10)+" Q"+(x+w)+","+y+" "+(x+w)+","+(y+10)+" V"+(y+C.HEADER_H)+" H"+x+" Z";
  const hasPrimary=members.some(m=>!m._concurrent);
  const concTxt=(hasPrimary?conc:[]).filter(m=>!(g.subtitle||'').includes(m.name)).map(m=>'겸 '+((m._cpos||m.position)||'')+' '+m.name).join(' · ');
  const sub=[(g.subtitle||''), concTxt, (isPart(g)?'파트':'')].filter(Boolean).join(' · ');
  return (
    <g>
      <rect x={x} y={y} width={w} height={h} rx="10" fill="#ffffff" stroke={color} strokeOpacity="0.35" strokeWidth="1" />
      <path d={hp} fill={color} />
      <text x={x+12} y={y+19} fill="#ffffff" fontSize="13" fontWeight="700">{g.name}</text>
      {sub ? <text x={x+12} y={y+34} fill="#ffffff" fillOpacity="0.85" fontSize="10">{sub}</text> : null}
      <text x={x+w-12} y={y+18} textAnchor="end" fill="#ffffff" fontSize="11" fontWeight="700">{count}명</text>
      {canEdit ? <text x={x+w-12} y={y+35} textAnchor="end" fill="#ffffff" fillOpacity="0.8" fontSize="12" style={{cursor:'pointer'}} onClick={(ev)=>{ ev.stopPropagation(); onEdit(g); }}>✎</text> : null}
      {members.length===0 ? <text x={x+12} y={y+C.HEADER_H+20} fill="#cbd5e1" fontSize="11">소속 인원 없음</text> : null}
      {members.map((m,i)=>{ const my=y+C.HEADER_H+8+i*C.ROW_H;
        return (
          <g key={m.id+'_'+i} style={{cursor:'pointer'}} onClick={()=>onMember(m)}>
            <circle cx={x+20} cy={my+13} r="11" fill={avatarHex(m.name)} />
            <text x={x+20} y={my+13} textAnchor="middle" dominantBaseline="central" fill="#ffffff" fontSize="9">{(m.name||'').slice(-2)}</text>
            <text x={x+38} y={my+11} fill="#1e293b" fontSize="12" fontWeight="600">{m._concurrent?'겸 ':''}{m.name}<tspan fill="#94a3b8" fontSize="10" fontWeight="400">  {m._concurrent?(m._cpos||m.position):m.position}</tspan></text>
            <text x={x+38} y={my+26} fill="#94a3b8" fontSize="10">#{m.emp_no} · 근속 {tenure(m.join_date,m.last_work_day)}</text>
          </g>
        );
      })}
    </g>
  );
}

function OrgTab({ emps, groups, assigns, canEdit, reload, setBusy, flash, setErr }){
  const [selected,setSelected]=useState(null);
  const [editGroup,setEditGroup]=useState(null);
  const [zoom,setZoom]=useState(0.8);
  const vpRef=useRef(null);
  const empById=useMemo(()=>Object.fromEntries(emps.map(e=>[e.id,e])),[emps]);
  const layout=useMemo(()=>computeOrgLayout(groups,emps,assigns),[groups,emps,assigns]);
  const primaryMap=useMemo(()=>{ const m={}; emps.forEach(e=>{ if(e.status!=='퇴사')(m[e.group_id]=m[e.group_id]||[]).push(e); }); return m; },[emps]);
  const childrenMap=useMemo(()=>{ const c={}; groups.forEach(g=>{ if(g.parent_id)(c[g.parent_id]=c[g.parent_id]||[]).push(g); }); return c; },[groups]);
  const roots=groups.filter(g=>!g.parent_id);

  function center(){ const vp=vpRef.current; if(vp) vp.scrollLeft=Math.max(0,(vp.scrollWidth-vp.clientWidth)/2); }
  function fit(){ const vp=vpRef.current; if(!vp||!layout.W) return; const t=Math.min(1,Math.max(0.35,(vp.clientWidth-24)/layout.W)); setZoom(+t.toFixed(2)); }
  useEffect(()=>{ center(); },[zoom]);
  useEffect(()=>{ const id=setTimeout(fit,80); return ()=>clearTimeout(id); },[layout.W]);

  return (
    <div>
      <div className="flex items-center justify-between mb-3">
        <h2 className="font-semibold text-slate-800 dark:text-slate-100">조직도</h2>
        <div className="flex items-center gap-2">
          <div className="flex items-center gap-1 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-1 py-0.5">
            <button onClick={()=>setZoom(z=>Math.max(0.35,+(z-0.1).toFixed(2)))} className="w-7 h-7 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 rounded font-bold">－</button>
            <span className="text-xs text-slate-500 dark:text-slate-400 w-11 text-center">{Math.round(zoom*100)}%</span>
            <button onClick={()=>setZoom(z=>Math.min(1.6,+(z+0.1).toFixed(2)))} className="w-7 h-7 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 rounded font-bold">＋</button>
            <span className="w-px h-4 bg-slate-200 mx-0.5" />
            <button onClick={fit} className="px-2 h-7 text-xs text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 rounded">맞춤</button>
            <button onClick={()=>{ setZoom(1); setTimeout(center,20); }} className="px-2 h-7 text-xs text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 rounded">중앙</button>
          </div>
          <button onClick={()=>window.print()} className="text-sm px-3 py-1.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700/40">인쇄</button>
          {canEdit && <button onClick={()=>setEditGroup({ _new:true, parent_id: roots[0]?.id||null })} className="text-sm px-3 py-1.5 bg-slate-900 text-white rounded-lg hover:bg-slate-800">+ 조직 추가</button>}
        </div>
      </div>
      <div ref={vpRef} className="org-viewport border border-slate-200 dark:border-slate-700 print-area">
        <div style={{ padding:'24px' }}>
          <svg viewBox={"0 0 "+layout.W+" "+layout.H} width={layout.W*zoom} height={layout.H*zoom} style={{ display:'block' }}>
            {layout.links.map((l,i)=><line key={i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke={l.staff?'#94a3b8':'#64748b'} strokeWidth={l.staff?1.5:2} strokeLinecap="round" />)}
            {layout.nodes.map(n=><NodeSVG key={n.g.id} n={n} canEdit={canEdit} C={layout.C} onMember={setSelected} onEdit={setEditGroup} />)}
          </svg>
        </div>
      </div>
      {selected && <EmpDetailModal e={selected} manager={empById[selected.manager_id]} admin={canEdit} onClose={()=>setSelected(null)} />}
      {editGroup && <GroupEditModal g={editGroup} groups={groups} membersOf={primaryMap} childrenOf={childrenMap} canEdit={canEdit} reload={reload} setBusy={setBusy} flash={flash} setErr={setErr} onClose={()=>setEditGroup(null)} />}
    </div>
  );
}

function GroupEditModal({ g, groups, membersOf, childrenOf, canEdit, reload, setBusy, flash, setErr, onClose }){
  const isNew=!!g._new;
  const [name,setName]=useState(g.name||'');
  const [subtitle,setSubtitle]=useState(g.subtitle||'');
  const [parentId,setParentId]=useState(g.parent_id||'');
  const [team,setTeam]=useState(g.team||'');
  const [isStaff,setIsStaff]=useState(!!g.is_staff);
  const memberCount=(membersOf[g.id]||[]).length;
  const childCount=(childrenOf[g.id]||[]).length;
  const parentName=(groups.find(x=>x.id===parentId)||{}).name||'상위 조직';

  async function save(){
    if(!name.trim()){ alert('조직명을 입력하세요'); return; }
    if(isStaff && !parentId){ alert('직속(옆 라인)으로 두려면 상위 조직을 선택해야 합니다.'); return; }
    setBusy(true);
    const fields={ name:name.trim(), subtitle, parent_id:parentId||null, team, is_staff:isStaff };
    let res;
    if(isNew){
      const id='g_'+Date.now();
      res=await sb.from('org_groups').insert({ id, ...fields });
      if(!res.error) await sb.from('hr_orders').insert({ order_date:new Date().toISOString().slice(0,10), order_type:'org_create', person_name:name.trim(), detail:{ after:fields } });
    } else {
      res=await sb.from('org_groups').update(fields).eq('id',g.id);
      if(!res.error) await sb.from('hr_orders').insert({ order_date:new Date().toISOString().slice(0,10), order_type:'org_edit', person_name:name.trim(), detail:{ id:g.id, after:fields } });
    }
    setBusy(false);
    if(res.error){ setErr(res.error.message); return; }
    flash(isNew?'조직이 추가되었습니다':'조직이 수정되었습니다'); await reload(); onClose();
  }
  async function remove(){
    if(memberCount>0||childCount>0){ alert('소속 인원 또는 하위 조직이 있어 삭제할 수 없습니다. 먼저 이동시켜 주세요.'); return; }
    if(!confirm('이 조직을 폐지하시겠습니까?')) return;
    setBusy(true);
    const res=await sb.from('org_groups').delete().eq('id',g.id);
    if(!res.error) await sb.from('hr_orders').insert({ order_date:new Date().toISOString().slice(0,10), order_type:'org_delete', person_name:g.name, detail:{ id:g.id, before:{ name:g.name, parent_id:g.parent_id } } });
    setBusy(false);
    if(res.error){ setErr(res.error.message); return; }
    flash('조직이 폐지되었습니다'); await reload(); onClose();
  }

  return (
    <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-md p-5 max-h-[92vh] overflow-y-auto" onClick={ev=>ev.stopPropagation()}>
        <h3 className="font-bold text-slate-800 dark:text-slate-100 mb-4">{isNew?'조직 추가':'조직 편집'}</h3>
        <div className="space-y-3.5">
          <div>
            <Field label="조직명"><input value={name} onChange={e=>setName(e.target.value)} className="inp" placeholder="예: 품질책임자" /></Field>
            <p className="text-[11px] text-slate-400 dark:text-slate-500 mt-1">화면 조직도에 표시되는 이름입니다.</p>
          </div>
          <div>
            <Field label="부제(설명)"><input value={subtitle} onChange={e=>setSubtitle(e.target.value)} className="inp" placeholder="예: 팀장 홍길동 / 대표자 겸직" /></Field>
            <p className="text-[11px] text-slate-400 dark:text-slate-500 mt-1">조직명 아래 작게 나오는 설명(리더 이름 등). 비워도 됩니다.</p>
          </div>
          <div>
            <Field label="상위 조직">
              <select value={parentId} onChange={e=>setParentId(e.target.value)} className="inp">
                <option value="">(최상위)</option>
                {groups.filter(x=>x.id!==g.id).map(x=><option key={x.id} value={x.id}>{x.name}</option>)}
              </select>
            </Field>
            <p className="text-[11px] text-slate-400 dark:text-slate-500 mt-1">이 조직이 어느 조직 아래에 붙는지 정합니다.</p>
          </div>
          <div>
            <Field label="팀 라벨">
              <select value={team} onChange={e=>setTeam(e.target.value)} className="inp">
                <option value="">(없음)</option>
                {['CEO','사업본부','전략마케팅','국내영업','해외영업','연구개발','품질경영','경영지원'].map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            </Field>
            <p className="text-[11px] text-slate-400 dark:text-slate-500 mt-1">색상·직무 분류용 내부 태그입니다. 보통 소속 팀을 고르면 되고, 같은 팀 라벨끼리 같은 색으로 묶입니다(예: APP·AI 파트는 모두 <b>연구개발</b>).</p>
          </div>

}

function OrderNewModal({ emps, groups, assigns, reload, setBusy, flash, setErr, onClose }){
  const active=emps.filter(e=>e.status!=='퇴사');
  const [empId,setEmpId]=useState('');
  const [type,setType]=useState('transfer');
  const [date,setDate]=useState(new Date().toISOString().slice(0,10));
  const [groupId,setGroupId]=useState('');
  const [position,setPosition]=useState('');
  const [rank,setRank]=useState('');
  const [assignId,setAssignId]=useState('');
  const [reason,setReason]=useState('');
  const emp=active.find(e=>e.id===empId);
  const myAssigns=(assigns||[]).filter(a=>a.employee_id===empId);
  const gname=id=>{ const g=groups.find(x=>x.id===id); return g?g.name:id; };

  async function save(){
    if(!empId){ alert('대상 직원을 선택하세요'); return; }
    const before={ team:emp.team, position:emp.position, rank:emp.rank, group_id:emp.group_id };
    setBusy(true);
    let res={ error:null };
    if(type==='transfer'){
      const patch={}; if(groupId){ const g=groups.find(x=>x.id===groupId); patch.group_id=groupId; patch.team=g?g.team:emp.team; }
      if(Object.keys(patch).length) res=await sb.from('employees').update(patch).eq('id',empId);
      if(!res.error) res=await sb.from('hr_orders').insert({ order_date:date, order_type:'transfer', employee_id:empId, person_name:emp.name, detail:{ reason, before, after:patch } });
    } else if(type==='promotion'){
      const patch={}; if(position)patch.position=position; if(rank)patch.rank=rank;
      if(Object.keys(patch).length) res=await sb.from('employees').update(patch).eq('id',empId);
      if(!res.error) res=await sb.from('hr_orders').insert({ order_date:date, order_type:'promotion', employee_id:empId, person_name:emp.name, detail:{ reason, before, after:patch } });
    } else if(type==='resign'){
      res=await sb.from('employees').update({ last_work_day:date, status:'퇴사' }).eq('id',empId);
      if(!res.error) res=await sb.from('hr_orders').insert({ order_date:date, order_type:'resign', employee_id:empId, person_name:emp.name, detail:{ reason, before } });
    } else if(type==='concurrent'){
      if(!groupId){ setBusy(false); alert('겸직할 조직을 선택하세요'); return; }
      res=await sb.from('employee_assignments').upsert({ employee_id:empId, group_id:groupId, position:position||emp.position, rank:rank||emp.rank }, { onConflict:'employee_id,group_id' });
      if(!res.error) res=await sb.from('hr_orders').insert({ order_date:date, order_type:'concurrent', employee_id:empId, person_name:emp.name, detail:{ reason, group:gname(groupId), position:position||emp.position } });
    } else if(type==='concurrent_end'){
      if(!assignId){ setBusy(false); alert('해제할 겸직을 선택하세요'); return; }
      const a=myAssigns.find(x=>String(x.id)===String(assignId));
      res=await sb.from('employee_assignments').delete().eq('id',assignId);
      if(!res.error) res=await sb.from('hr_orders').insert({ order_date:date, order_type:'concurrent_end', employee_id:empId, person_name:emp.name, detail:{ reason, group:a?gname(a.group_id):'' } });
    }
    setBusy(false);
    if(res.error){ setErr(res.error.message); return; }
    flash('발령이 등록되었습니다'); await reload(); onClose();
  }

  return (
    <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-md p-5 max-h-[92vh] overflow-y-auto" onClick={ev=>ev.stopPropagation()}>
        <h3 className="font-bold text-slate-800 dark:text-slate-100 mb-4">발령 등록</h3>
        <div className="space-y-3">
          <Field label="대상 직원">
            <select value={empId} onChange={e=>{ setEmpId(e.target.value); setAssignId(''); }} className="inp">
              <option value="">선택</option>
              {active.map(e=><option key={e.id} value={e.id}>{e.name} ({e.team}/{e.position})</option>)}
            </select>
          </Field>
          <Field label="발령 유형">
            <select value={type} onChange={e=>setType(e.target.value)} className="inp">
              <option value="transfer">전보 (부서이동)</option>
              <option value="promotion">승진 (직위/직급)</option>
              <option value="concurrent">겸직 등록</option>
              <option value="concurrent_end">겸직 해제</option>
              <option value="resign">퇴사</option>
            </select>
          </Field>
          <Field label="발령일"><input type="date" value={date} onChange={e=>setDate(e.target.value)} className="inp" /></Field>

          {type==='transfer' && <Field label="이동할 조직">
            <select value={groupId} onChange={e=>setGroupId(e.target.value)} className="inp">
              <option value="">선택</option>{groups.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
            </select></Field>}

          {type==='promotion' && <><Field label="새 직위"><input value={position} onChange={e=>setPosition(e.target.value)} className="inp" placeholder="예: 팀장" /></Field>
            <Field label="새 직급"><input value={rank} onChange={e=>setRank(e.target.value)} className="inp" placeholder="예: 팀장" /></Field></>}

          {type==='concurrent' && <>
            <Field label="겸직할 조직">
              <select value={groupId} onChange={e=>setGroupId(e.target.value)} className="inp">
                <option value="">선택</option>{groups.filter(g=>g.id!==(emp&&emp.group_id)).map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
              </select>
            </Field>
            <Field label="겸직 직위 (비우면 현재 직위)"><input value={position} onChange={e=>setPosition(e.target.value)} className="inp" placeholder={emp?emp.position:'예: 파트장'} /></Field>
            <p className="text-[11px] text-slate-400 dark:text-slate-500 -mt-1">겸직은 주 소속은 그대로 두고, 선택한 조직에 "겸"으로 함께 표시됩니다.</p>
          </>}

          {type==='concurrent_end' && <Field label="해제할 겸직">
            <select value={assignId} onChange={e=>setAssignId(e.target.value)} className="inp">
              <option value="">선택</option>
              {myAssigns.map(a=><option key={a.id} value={a.id}>{gname(a.group_id)} ({a.position||'-'})</option>)}
            </select>
            {empId && myAssigns.length===0 && <p className="text-[11px] text-slate-400 dark:text-slate-500 mt-1">이 직원에게 등록된 겸직이 없습니다.</p>}
          </Field>}

          <Field label="사유"><input value={reason} onChange={e=>setReason(e.target.value)} className="inp" /></Field>
        </div>
        <div className="flex justify-end gap-2 mt-5">
          <button onClick={onClose} className="px-4 py-2 text-sm text-slate-600 dark:text-slate-300 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">취소</button>
          <button onClick={save} className="px-4 py-2 text-sm bg-slate-900 text-white rounded-lg hover:bg-slate-800">등록</button>
        </div>
      </div>
    </div>
  );
}
function EmpsTab({ emps, groups, canEdit, reload, setBusy, flash, setErr }){

  function exportXlsx(){

    const rows=list.map(e=> emergency

      : Object.assign({ 이름:e.name, 사번:e.emp_no, 부서:e.team, 직위:e.position, 입사일:fmtDate(e.join_date), 이메일:e.email||'' }, showSalary?{ 월급여:e.monthly_pay||'' }:{}, { 상태:e.status }));
    const ws=XLSX.utils.json_to_sheet(rows), wb=XLSX.utils.book_new();
    const title=emergency?'비상연락망':'임직원명부';

  return (

          <label className="text-xs text-slate-500 dark:text-slate-400 flex items-center gap-1"><input type="checkbox" checked={showResigned} onChange={e=>setShowResigned(e.target.checked)} /> 퇴사자 포함</label>

            <button onClick={()=>setView('general')} className={emergency?"px-3 py-1.5 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700/40":"px-3 py-1.5 bg-slate-900 text-white"}>일반</button>

          </div>
          {canEdit && !emergency && <label className="text-xs text-slate-500 dark:text-slate-400 flex items-center gap-1"><input type="checkbox" checked={showSalary} onChange={e=>setShowSalary(e.target.checked)} /> 급여 표시</label>}
        </div>

          <button onClick={exportXlsx} className="text-sm px-3 py-1.5 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700">엑셀</button>
          <button onClick={()=>window.print()} className="text-sm px-3 py-1.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700/40">인쇄</button>
          {canEdit && <button onClick={()=>setEdit({ _new:true })} className="text-sm px-3 py-1.5 bg-slate-900 text-white rounded-lg hover:bg-slate-800">+ 직원 추가</button>}
        </div>
      </div>
      <div className="text-sm font-semibold text-slate-700 dark:text-slate-200 mb-2 hidden print:block">{emergency?'비상연락망':'임직원 명부'} ({list.length}명)</div>
      <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl overflow-hidden print-area">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 dark:bg-slate-900 text-slate-500 dark:text-slate-400 text-xs">
            {emergency ? (
              <tr><th className="text-left px-4 py-2.5">이름</th><th className="text-left px-4 py-2.5">부서</th><th className="text-left px-4 py-2.5">직위</th><th className="text-left px-4 py-2.5">개인 휴대폰</th><th className="text-left px-4 py-2.5">비상연락처</th><th className="text-left px-4 py-2.5">관계</th><th className="text-left px-4 py-2.5">자택주소</th></tr>

}
function EmpEditModal({ e, groups, emps, reload, setBusy, flash, setErr, onClose }){
  const isNew=!!e._new;
  const [f,setF]=useState({
    emp_no:e.emp_no||'', name:e.name||'', position:e.position||'', rank:e.rank||'', team:e.team||'',
    group_id:e.group_id||'', join_date:e.join_date||'', email:e.email||'', monthly_pay:e.monthly_pay||'',
    manager_id:e.manager_id||'', personal_phone:e.personal_phone||'', emergency_contact:e.emergency_contact||'',
    emergency_relation:e.emergency_relation||'', home_address:e.home_address||'', education:e.education||'',
    career:e.career||'', skill:e.skill||'', concurrent_note:e.concurrent_note||''
  });
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  async function save(){
    if(!f.name.trim()||!f.emp_no.trim()){ alert('이름과 사원번호는 필수입니다'); return; }
    const g=groups.find(x=>x.id===f.group_id);
    const payload={ ...f, monthly_pay: f.monthly_pay===''?null:Number(f.monthly_pay), join_date: f.join_date||null, manager_id: f.manager_id||null, team: f.team||(g?g.team:'') };
    setBusy(true);
    let res;
    if(isNew){
      payload.id='p'+Date.now(); payload.status='재직';
      res=await sb.from('employees').insert(payload);
      if(!res.error) await sb.from('hr_orders').insert({ order_date:new Date().toISOString().slice(0,10), order_type:'hire', employee_id:payload.id, person_name:f.name, detail:{ reason:'신규 입사', after:payload } });
    } else {
      res=await sb.from('employees').update(payload).eq('id',e.id);
    }
    setBusy(false);
    if(res.error){ setErr(res.error.message); return; }
    flash(isNew?'직원이 추가되었습니다':'직원 정보가 수정되었습니다'); await reload(); onClose();
  }
  return (
    <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="bg-white dark:bg-slate-800 rounded-2xl w-full max-w-2xl max-h-[92vh] overflow-y-auto p-5" onClick={ev=>ev.stopPropagation()}>
        <h3 className="font-bold text-slate-800 dark:text-slate-100 mb-4">{isNew?'직원 추가':(f.name+' 정보 수정')}</h3>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <Field label="이름 *"><input value={f.name} onChange={e=>set('name',e.target.value)} className="inp" /></Field>
          <Field label="사원번호 *"><input value={f.emp_no} onChange={e=>set('emp_no',e.target.value)} className="inp" /></Field>
          <Field label="직위"><input value={f.position} onChange={e=>set('position',e.target.value)} className="inp" /></Field>
          <Field label="직급"><input value={f.rank} onChange={e=>set('rank',e.target.value)} className="inp" /></Field>
          <Field label="소속 조직">
            <select value={f.group_id} onChange={e=>set('group_id',e.target.value)} className="inp">
              <option value="">선택</option>{groups.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
            </select>
          </Field>
          <Field label="팀 라벨"><input value={f.team} onChange={e=>set('team',e.target.value)} className="inp" /></Field>
          <Field label="입사일"><input type="date" value={f.join_date?String(f.join_date).slice(0,10):''} onChange={e=>set('join_date',e.target.value)} className="inp" /></Field>
          <Field label="월급여"><input type="number" value={f.monthly_pay} onChange={e=>set('monthly_pay',e.target.value)} className="inp" /></Field>
          <Field label="이메일"><input value={f.email} onChange={e=>set('email',e.target.value)} className="inp" /></Field>
          <Field label="직속상사">
            <select value={f.manager_id} onChange={e=>set('manager_id',e.target.value)} className="inp">
              <option value="">선택</option>{emps.filter(x=>x.id!==e.id&&x.status!=='퇴사').map(x=><option key={x.id} value={x.id}>{x.name} ({x.position})</option>)}
            </select>
          </Field>
          <Field label="개인 휴대폰"><input value={f.personal_phone} onChange={e=>set('personal_phone',e.target.value)} className="inp" /></Field>
          <Field label="비상연락처"><input value={f.emergency_contact} onChange={e=>set('emergency_contact',e.target.value)} className="inp" /></Field>
          <Field label="비상연락 관계"><input value={f.emergency_relation} onChange={e=>set('emergency_relation',e.target.value)} className="inp" /></Field>
          <Field label="겸직 표기"><input value={f.concurrent_note} onChange={e=>set('concurrent_note',e.target.value)} className="inp" /></Field>
          <div className="col-span-2"><Field label="자택주소"><input value={f.home_address} onChange={e=>set('home_address',e.target.value)} className="inp" /></Field></div>
          <div className="col-span-2"><Field label="학력"><input value={f.education} onChange={e=>set('education',e.target.value)} className="inp" /></Field></div>
          <div className="col-span-2"><Field label="주요경력"><input value={f.career} onChange={e=>set('career',e.target.value)} className="inp" /></Field></div>
          <div className="col-span-2"><Field label="핵심역량"><input value={f.skill} onChange={e=>set('skill',e.target.value)} className="inp" /></Field></div>
        </div>
        <div className="flex justify-end gap-2 mt-5">
          <button onClick={onClose} className="px-4 py-2 text-sm text-slate-600 dark:text-slate-300 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">취소</button>
          <button onClick={save} className="px-4 py-2 text-sm bg-slate-900 text-white rounded-lg hover:bg-slate-800">저장</button>
        </div>
      </div>
    </div>
  );
}

function Field({ label, children }){
  return <label className="block"><span className="text-xs font-medium text-slate-600 dark:text-slate-300">{label}</span><div className="mt-1">{children}</div></label>;
}

// inp 공통 스타일 주입
const st=document.createElement('style');
st.textContent='.inp{width:100%;padding:.5rem .625rem;border:1px solid #cbd5e1;border-radius:.5rem;font-size:.8125rem;outline:none}.inp:focus{border-color:#0f172a;box-shadow:0 0 0 1px #0f172a}';
document.head.appendChild(st);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
