                  <div style={{display:'flex',alignItems:'center',gap:8,padding:'9px 11px',borderRadius:8,background:'rgba(34,197,94,.1)',border:'0.5px solid #22C55E55'}}>
                    <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600}}>{(custMap[sel.cust_id]||{}).hospital_name||'(고객정보 없음)'} <span style={{fontSize:10,color:'var(--t3)'}}>{sel.cust_id}</span></div><div style={{fontSize:10,color:'var(--t3)'}}>{[(custMap[sel.cust_id]||{}).region,(custMap[sel.cust_id]||{}).ceo_name].filter(Boolean).join(' · ')}</div></div>
                    <button className="btn-ghost" onClick={()=>unlink(sel)}>연결 해제</button>
                  </div>
                </div>
                :
                <div>
                  {suggest(sel).length>0&&<div style={{marginBottom:14}}>
                    <div style={{fontSize:12,fontWeight:600,color:'#85B7EB',marginBottom:6}}>추천 매칭 <span style={{fontWeight:400,color:'var(--t3)',fontSize:10}}>· 병원명 유사</span></div>
                    {suggest(sel).map(c=><CustRow key={c.cust_id} c={c} lead={sel}/>)}
                  </div>}
                  <div style={{fontSize:12,fontWeight:600,color:'var(--t2)',marginBottom:6}}>직접 검색해서 연결</div>
                  <input value={cq} onChange={e=>setCq(e.target.value)} placeholder="고객 병원명·지역·원장·연락처·고객ID 검색" style={{marginBottom:8}}/>
                  {cq.trim()&&(searchCust.length===0?<div style={{fontSize:11,color:'var(--t3)'}}>검색 결과 없음</div>:searchCust.map(c=><CustRow key={c.cust_id} c={c} lead={sel}/>))}
                </div>}
            </div>}
          </div>
        </div>
      </div>}
    </div>
  );
}

// ===== 분석건수 이상감지 계산 (CRM 로직 이식) =====
function uPad2(n){return n<10?'0'+n:String(n);}
function uMean(arr){if(!arr.length)return 0;return arr.reduce((s,v)=>s+v,0)/arr.length;}
function uStddev(arr,avg){if(arr.length<2)return 0;const v=arr.reduce((s,x)=>s+Math.pow(x-avg,2),0)/arr.length;return Math.sqrt(v);}
function uNormHospType(rawType){if(!rawType||rawType==='미확인')return '미확인';var t=rawType;if(t.indexOf('소아청소년과')>=0||t.indexOf('아동병원')>=0||t==='소아과'||t.indexOf('소아정형')>=0)return '소아청소년과';if(t.indexOf('정형외과')>=0||t==='정형회과')return '정형외과';if(t.indexOf('치과')>=0)return '치과';if(t.indexOf('대학병원')>=0||t.indexOf('종합병원')>=0)return '종합·대학병원';if(t.indexOf('한의원')>=0||t.indexOf('한방')>=0)return '한방';return '기타의원';}

function buildUsageStats(usageRows,customers,vocRows){
  var map={BA:{},OA:{}};
  usageRows.forEach(function(row){
    var ym=String(row.year_month||'').trim();var hosp=String(row.hospital_name||'').trim();var custId=String(row.cust_id||'').trim();var prod=String(row.product||'').trim().toUpperCase();var cnt=Number(row.cnt||0);
    if(!ym||!hosp||!cnt)return;if(prod!=='BA'&&prod!=='OA')return;
    if(!map[prod][hosp])map[prod][hosp]={custId:custId,months:{}};
    map[prod][hosp].months[ym]=(map[prod][hosp].months[ym]||0)+cnt;
  });
  var allYms=[];['BA','OA'].forEach(function(p){Object.keys(map[p]).forEach(function(h){Object.keys(map[p][h].months).forEach(function(ym){allYms.push(ym);});});});
  if(allYms.length===0)return {ba:{hospitals:[],summary:{}},oa:{hospitals:[],summary:{}},latestYm:''};
  allYms.sort();var latestYm=allYms[allYms.length-1];
  var yr=parseInt(latestYm.slice(0,4));var mo=parseInt(latestYm.slice(4,6));
  function recentMonths(n){var r=[];for(var i=0;i<n;i++){var m=mo-i;var y=yr;while(m<=0){m+=12;y--;}r.unshift(y+uPad2(m));}return r;}
  var planMap={},custIdMap={};
  (customers||[]).forEach(function(c){var nm=String(c.hospital_name||'').trim();if(nm){planMap[nm]=String(c.plan||'').trim();if(!custIdMap[nm])custIdMap[nm]=String(c.cust_id||'').trim();}});
  var custById={};(customers||[]).forEach(function(c){custById[String(c.cust_id||'').trim()]=c;});
  var csAlertMap={};var now=new Date();var threeMonAgo=new Date(now.getFullYear(),now.getMonth()-3,1);
  (vocRows||[]).forEach(function(r){var cid=String(r.cust_id||'').trim();var done=String(r.done||'').trim();var rt=String(r.receipt_type||'').trim();var d=new Date(String(r.received_at||''));if(!cid||isNaN(d.getTime())||d<threeMonAgo)return;if(done!=='Y'||rt==='불만'){if(!csAlertMap[cid])csAlertMap[cid]={count:0,hasBad:false};csAlertMap[cid].count++;if(rt==='불만')csAlertMap[cid].hasBad=true;}});

  function analyzeProduct(prodMap){
    var hospitals=[];var summary={안정형:0,변동형:0,성장형:0,불규칙:0,비활성:0,피크대비소멸:0};
    var recent12=recentMonths(12);var recent6=recentMonths(6);
    Object.keys(prodMap).forEach(function(hosp){
      var h=prodMap[hosp];var resolvedCustId=h.custId||custIdMap[hosp]||'';var masterHospName=hosp;
      var fc=resolvedCustId?custById[resolvedCustId]:null;if(fc)masterHospName=String(fc.hospital_name||'').trim();
      var plan=planMap[masterHospName]||planMap[hosp]||'';var csAlert=(resolvedCustId&&csAlertMap[resolvedCustId])||null;
      var counts12=recent12.map(function(ym){return h.months[ym]||0;});var counts6=recent6.map(function(ym){return h.months[ym]||0;});
      var nonZero12=counts12.filter(function(v){return v>0;});var nonZero6=counts6.filter(function(v){return v>0;});
      var allCountsArr=Object.keys(h.months).sort().map(function(ym){return h.months[ym]||0;});var nonZeroAll=allCountsArr.filter(function(v){return v>0;});
      var latestCount=h.months[latestYm]||0;var avg12=uMean(counts12);var avg6Val=uMean(nonZero6.length>0?counts6:counts12);
      var sdBase=nonZeroAll.length>=3?nonZeroAll:(nonZero12.length>=2?nonZero12:counts12);var sd=uStddev(sdBase,uMean(sdBase));
      var upper=avg6Val+1.5*sd;var lower=Math.max(0,avg6Val-1.5*sd);
      var activeRatio=counts12.filter(function(v){return v>0;}).length/12;
      var firstHalf=recent12.slice(0,6).map(function(ym){return h.months[ym]||0;});var secondHalf=recent12.slice(6).map(function(ym){return h.months[ym]||0;});
      var firstAvg=uMean(firstHalf);var secondAvg=uMean(secondHalf);var growthRate=firstAvg>0?(secondAvg-firstAvg)/firstAvg*100:0;
      var cvAvg=uMean(nonZero12.length>0?nonZero12:[0]);var cv=cvAvg>0?sd/cvAvg:0;var allAvg=uMean(allCountsArr);
      var type='불규칙';
      if(nonZero6.length===0)type='비활성';
      else if(allAvg>=50&&latestCount>0&&latestCount<allAvg*0.2)type='피크대비소멸';
      else if(growthRate>70)type='성장형';
      else if(activeRatio>=0.5&&cv<=0.6)type='안정형';
      else if(activeRatio>=0.5&&cv>0.6)type='변동형';
      else type='불규칙';
      summary[type]=(summary[type]||0)+1;
      // 최근 6개월 평균 vs 이전 6개월 평균 비교 (±20% 기준)
      // 이전 6개월 평균이 너무 낮으면(<3건) 노이즈로 판정 제외
      var alert=null;
      if(firstAvg>=3){
        if(growthRate>=20)alert='up';
        else if(growthRate<=-20)alert='down';
      }
      var movingAvgData=recent12.map(function(ym,i){var win=recent12.slice(Math.max(0,i-5),i+1).map(function(m){return h.months[m]||0;});var wAvg=uMean(win);var wSd=uStddev(win,wAvg);return {ym:ym,avg:Math.round(wAvg),upper:Math.round(wAvg+1.5*wSd),lower:Math.round(Math.max(0,wAvg-1.5*wSd)),count:h.months[ym]||0};});
      var curQ=[],prevQ=[];for(var qi=0;qi<3;qi++){var m=mo-qi,y=yr;while(m<=0){m+=12;y--;}curQ.push(y+uPad2(m));}
      for(var qi2=3;qi2<6;qi2++){var m2=mo-qi2,y2=yr;while(m2<=0){m2+=12;y2--;}prevQ.push(y2+uPad2(m2));}
      var curQSum=curQ.reduce(function(s,m){return s+(h.months[m]||0);},0);var prevQSum=prevQ.reduce(function(s,m){return s+(h.months[m]||0);},0);
      var qChangeRate=prevQSum>0?(curQSum-prevQSum)/prevQSum*100:null;
      hospitals.push({hospName:masterHospName,custId:resolvedCustId,plan:plan,type:type,hospType:uNormHospType(fc?String(fc.hospital_type||'미확인').trim():'미확인'),latestCount:latestCount,avg6:Math.round(avg6Val),avg12:Math.round(avg12),upperBand:Math.round(upper),lowerBand:Math.round(lower),qChangeRate:qChangeRate!==null?Math.round(qChangeRate):null,growthRate:Math.round(growthRate),firstAvg:Math.round(firstAvg),secondAvg:Math.round(secondAvg),alert:alert,csAlert:csAlert,movingAvgData:movingAvgData,months:h.months});
    });
    hospitals.sort(function(a,b){if(a.alert&&!b.alert)return -1;if(!a.alert&&b.alert)return 1;return b.latestCount-a.latestCount;});
    return {hospitals:hospitals,summary:summary};
  }
  return {ba:analyzeProduct(map.BA),oa:analyzeProduct(map.OA),latestYm:latestYm};
}

// 분석건수 이상감지 상세 (병원 클릭 시 인라인)
// 전년 비교 (월별 데이터 + 기준월 → 전년동월·전년동기·전년대비 누적, 막대 표시)
function YoYCompare({months,latestYm,monthly,typeColor}){
  const M=months||{};
  const pad2=n=>n<10?'0'+n:String(n);
  const ly=String(latestYm||'');const yr=parseInt(ly.slice(0,4))||0;const mo=parseInt(ly.slice(4,6))||0;
  if(!yr||!mo)return null;
  const sumMonths=(y,mList)=>mList.reduce((s,m)=>s+(M[y+pad2(m)]||0),0);
  const curM=M[yr+pad2(mo)]||0,prevM=M[(yr-1)+pad2(mo)]||0;
  const cmpMoM={cur:curM,prev:prevM,rate:prevM>0?Math.round((curM-prevM)/prevM*1000)/10:null};
  const mList=[];for(let m=1;m<=mo;m++)mList.push(m);
  const curY=sumMonths(yr,mList),prevY=sumMonths(yr-1,mList);
  const cmpYoY={cur:curY,prev:prevY,rate:prevY>0?Math.round((curY-prevY)/prevY*1000)/10:null};
  const qMonths=[];for(let i=0;i<3;i++){let m=mo-i,y=yr;while(m<=0){m+=12;y--;}qMonths.push({y,m});}
  const curQ=qMonths.reduce((s,x)=>s+(M[x.y+pad2(x.m)]||0),0);
  const prevQ=qMonths.reduce((s,x)=>s+(M[(x.y-1)+pad2(x.m)]||0),0);
  const cmpQoQ={cur:curQ,prev:prevQ,rate:prevQ>0?Math.round((curQ-prevQ)/prevQ*1000)/10:null};
  const cmpColor=r=>r==null?'var(--t3)':r>0?'#4ade80':r<0?'#f87171':'var(--t2)';
  const cmpTxt=r=>r==null?'—':(r>0?'+':'')+r+'%';
  const yearVals=[];for(let m=1;m<=12;m++)yearVals.push(M[yr+pad2(m)]||0);
  const showLine=!!monthly;
  const LW=160,LH=64,lmax=Math.max(...yearVals,1);
  const pts=yearVals.map((v,i)=>{const x=6+(i*(LW-12)/11);const y=LH-6-(v/lmax)*(LH-12);return {x:Math.round(x*10)/10,y:Math.round(y*10)/10,v,m:i+1};});
  const polyPts=pts.map(p=>p.x+','+p.y).join(' ');
  const areaPts=polyPts+' '+pts[pts.length-1].x+','+LH+' '+pts[0].x+','+LH;
  return (<div>
    <div style={{fontSize:11,fontWeight:700,color:'#85B7EB',marginBottom:6}}>전년 비교 <span style={{fontSize:9,color:'var(--t3)',fontWeight:400}}>기준 {ly.slice(0,4)}년 {ly.slice(4)}월</span></div>
    <div className="grid-auto-mob" style={{display:'grid',gridTemplateColumns:showLine?'repeat(4,1fr)':'repeat(3,1fr)',gap:8}}>
      {showLine&&<div style={{background:'rgba(255,255,255,.03)',borderRadius:8,padding:'10px 11px'}}>
        <div style={{fontSize:9,color:'var(--t3)',marginBottom:6}}>{yr}년 월별</div>
        <svg viewBox={'0 0 '+LW+' '+LH} style={{width:'100%',height:64,display:'block'}} preserveAspectRatio="none">
          <polygon fill="rgba(239,159,39,0.18)" points={areaPts}/>
          <polyline fill="none" stroke="#EF9F27" strokeWidth="2" points={polyPts}/>
          {pts.map((p,i)=>i+1===mo?<circle key={i} cx={p.x} cy={p.y} r="3" fill="#EF9F27"/>:null)}
        </svg>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:7,color:'var(--t3)',marginTop:3}}><span>1</span><span>3</span><span>5</span><span>7</span><span>9</span><span>11</span></div>
        <div style={{fontSize:8,color:'var(--t3)',marginTop:5,textAlign:'center'}}>1월~12월 추이</div>
      </div>}
      {[['전년대비 누적',cmpYoY,'올해누적 vs 작년동기누적'],['전년동기 대비',cmpQoQ,'최근 3개월 vs 작년 동분기'],['전년동월 대비',cmpMoM,'이번달 vs 작년 같은달']].map(([l,d,sub])=>{
        const barMax=Math.max(d.cur,d.prev,1);
        const curH=Math.max(3,Math.round(d.cur/barMax*46));
        const prevH=Math.max(3,Math.round(d.prev/barMax*46));
        const curColor=d.rate!=null&&d.rate<0?'#f87171':'#4ade80';
        return (
        <div key={l} style={{background:'rgba(255,255,255,.03)',borderRadius:8,padding:'10px 11px'}}>
          <div style={{fontSize:9,color:'var(--t3)',marginBottom:6}}>{l}</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:8,height:64,marginBottom:6}}>
            <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',height:'100%'}}>
              <span style={{fontSize:10,fontWeight:700,color:curColor,marginBottom:2}}>{d.cur.toLocaleString()}</span>
              <div style={{width:'100%',maxWidth:26,height:curH+'px',background:curColor,borderRadius:'3px 3px 0 0'}}/>
              <span style={{fontSize:8,color:'var(--t3)',marginTop:3}}>올해</span>
            </div>
            <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',height:'100%'}}>
              <span style={{fontSize:10,fontWeight:700,color:'var(--t2)',marginBottom:2}}>{d.prev.toLocaleString()}</span>
              <div style={{width:'100%',maxWidth:26,height:prevH+'px',background:'rgba(255,255,255,.25)',borderRadius:'3px 3px 0 0'}}/>
              <span style={{fontSize:8,color:'var(--t3)',marginTop:3}}>작년</span>
            </div>
          </div>
          <div style={{fontSize:16,fontWeight:700,color:cmpColor(d.rate),textAlign:'center'}}>{cmpTxt(d.rate)}</div>
          <div style={{fontSize:8,color:'var(--t3)',marginTop:3,textAlign:'center'}}>{sub}</div>
        </div>);
      })}
    </div>
  </div>);
}

    </div>
    <div style={{marginTop:4}}><YoYCompare months={h.months} latestYm={latestYm} monthly={h.movingAvgData} typeColor={c}/></div>
    {h.csAlert&&<div style={{marginTop:10,padding:'8px 12px',borderRadius:7,background:h.csAlert.hasBad?'rgba(220,38,38,0.1)':'rgba(251,191,36,0.1)',border:'0.5px solid '+(h.csAlert.hasBad?'rgba(220,38,38,0.3)':'rgba(251,191,36,0.3)'),fontSize:10,color:h.csAlert.hasBad?'#f87171':'#fbbf24'}}>⚠️ 최근 CS 이력 {h.csAlert.count}건{h.csAlert.hasBad?' (불만 포함)':''}</div>}
    {h.csAlert&&<div style={{marginTop:10,padding:'8px 12px',borderRadius:7,background:h.csAlert.hasBad?'rgba(220,38,38,0.1)':'rgba(251,191,36,0.1)',border:'0.5px solid '+(h.csAlert.hasBad?'rgba(220,38,38,0.3)':'rgba(251,191,36,0.3)'),fontSize:10,color:h.csAlert.hasBad?'#f87171':'#fbbf24'}}>⚠️ 최근 CS 이력 {h.csAlert.count}건{h.csAlert.hasBad?' (불만 포함)':''}</div>}
    <div style={{marginTop:12}}>
      <div style={{fontSize:11,fontWeight:700,color:'#fb923c',marginBottom:6}}>CS 이력 <span style={{color:'var(--t3)',fontWeight:400}}>· {(csList||[]).length}건</span></div>
      {!h.custId?<div style={{fontSize:10,color:'var(--t3)'}}>고객ID가 없어 CS 내역을 조회할 수 없습니다.</div>:
       (csList||[]).length===0?<div style={{fontSize:10,color:'var(--t3)'}}>CS 이력이 없습니다.</div>:
       <div style={{maxHeight:180,overflowY:'auto'}}>{csList.slice(0,50).map((cs,i)=>{const sel=csSel===i;const bad=cs.receipt==='불만';return (
         <div key={i} onClick={()=>setCsSel(sel?null:i)} style={{padding:'6px 8px',borderRadius:6,cursor:'pointer',marginBottom:2,background:sel?'rgba(234,88,12,0.12)':'rgba(255,255,255,.02)',border:'0.5px solid '+(sel?'rgba(234,88,12,0.4)':'var(--border)')}}>
           <div style={{display:'flex',alignItems:'center',gap:6}}>
             <span style={{fontSize:9,padding:'1px 6px',borderRadius:8,background:cs.src==='VOC'?'rgba(248,113,113,.12)':'rgba(56,189,248,.12)',color:cs.src==='VOC'?'#f87171':'#38BDF8',fontWeight:700,flexShrink:0}}>{cs.src}</span>
             <span style={{fontSize:11,fontWeight:600,flex:1,minWidth:0,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{cs.type||'(유형 미지정)'}</span>
             {bad&&<span style={{fontSize:9,color:'#f87171',fontWeight:700,flexShrink:0}}>불만</span>}
             <span style={{fontSize:10,color:'var(--t3)',flexShrink:0}}>{String(cs.date||'').slice(0,10)}</span>
             <span style={{fontSize:10,color:'var(--t3)',flexShrink:0}}>{sel?'▴':'▾'}</span>
           </div>
           {sel&&<div style={{marginTop:6,paddingTop:6,borderTop:'0.5px solid var(--border)',fontSize:10,color:'var(--t2)',lineHeight:1.6}}>
             <div>접수일: {String(cs.date||'-').slice(0,10)}</div>
             <div>유형: {cs.type||'-'}</div>
             <div>상담자: {cs.counselor||'-'}</div>
             <div>처리: {cs.done==='Y'?'완료':cs.done||'-'}{cs.receipt?' · 접수유형 '+cs.receipt:''}</div>
           </div>}
         </div>);})}</div>}
    </div>
  </div>);
}

function UsageUploadModal({custs,existingRows,onClose,onSaved}){
  const [step,setStep]=useState(1);
  const [ym,setYm]=useState('');
  const [product,setProduct]=useState('BA');
  const [fileName,setFileName]=useState('');
  const [parsed,setParsed]=useState([]);
  const [manual,setManual]=useState({});
  const [excluded,setExcluded]=useState({});
  const [searchOpen,setSearchOpen]=useState(null);
  const [searchQ,setSearchQ]=useState('');
  const [saving,setSaving]=useState(false);
  const [result,setResult]=useState(null);
  const [err,setErr]=useState('');
  const [aliasMap,setAliasMap]=useState({});
  useEffect(()=>{(async()=>{try{let a=[],f=0;while(true){const {data}=await sb.from('usage_name_alias').select('alias_name,cust_id').range(f,f+999);if(!data||!data.length)break;a=a.concat(data);if(data.length<1000)break;f+=1000;}const m={};a.forEach(x=>{m[x.alias_name]=x.cust_id;});setAliasMap(m);}catch(e){setAliasMap({});}})();},[]);
  const norm=s=>String(s||'').replace(/\s+/g,'').replace(/[()\-.]/g,'').toLowerCase();
  const custByName=useMemo(()=>{const m={};(custs||[]).forEach(c=>{const k=norm(c.hospital_name);if(k&&!m[k])m[k]=c;});return m;},[custs]);
  const custById=useMemo(()=>{const m={};(custs||[]).forEach(c=>{if(c.cust_id)m[c.cust_id]=c;});return m;},[custs]);
  function onFile(e){
    setErr('');const f=e.target.files&&e.target.files[0];if(!f)return;
    setFileName(f.name);
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const text=String(ev.target.result||'').replace(/\r/g,'');
        const lines=text.split('\n').filter(l=>l.trim());
        if(lines.length<2){setErr('데이터 행이 없습니다.');return;}
        const rows=[];
        for(let i=1;i<lines.length;i++){
          const parts=lines[i].split(',');
          if(parts.length<2)continue;
          const name=parts[0].trim();
          const cnt=parseInt(String(parts[parts.length-1]).replace(/[^0-9-]/g,''))||0;
          if(!name)continue;
          const hit=custByName[norm(name)];
          if(hit){rows.push({name,cnt,cust_id:hit.cust_id,matchedName:hit.hospital_name,fromAlias:false});continue;}
          const aliasCid=aliasMap[name];
          if(aliasCid){const cc=custById[aliasCid];rows.push({name,cnt,cust_id:aliasCid,matchedName:cc?cc.hospital_name:name,fromAlias:true});continue;}
          rows.push({name,cnt,cust_id:null,matchedName:null,fromAlias:false});
        }
        setParsed(rows);setStep(2);
      }catch(ex){setErr('파일을 읽는 중 오류가 발생했습니다.');}
    };
    r.readAsText(f,'utf-8');
  }
  const resolved=parsed.map((r,i)=>{
    if(excluded[i])return {...r,idx:i,state:'excluded',finalCid:null};
    const mc=manual[i];
    if(r.cust_id)return {...r,idx:i,state:'matched',finalCid:r.cust_id,finalName:r.matchedName};
    if(mc)return {...r,idx:i,state:'manual',finalCid:mc.cust_id,finalName:mc.hospital_name};
    return {...r,idx:i,state:'unmatched',finalCid:null};
  });
  const matchedList=resolved.filter(r=>r.state==='matched'||r.state==='manual');
  const unmatchedList=resolved.filter(r=>r.state==='unmatched');
  const excludedList=resolved.filter(r=>r.state==='excluded');
  const totalCnt=matchedList.reduce((s,r)=>s+r.cnt,0);
  const existingSameKey=(existingRows||[]).filter(r=>r.year_month===ym.replace('-','')&&r.product===product);
  const ymOk=/^\d{4}-\d{2}$/.test(ym);
  const searchResults=useMemo(()=>{
    const q=norm(searchQ);if(!q)return [];
    return (custs||[]).filter(c=>norm(c.hospital_name).includes(q)||String(c.cust_id||'').toLowerCase().includes(searchQ.trim().toLowerCase())).slice(0,20);
  },[searchQ,custs]);
  async function save(){
    if(!ym||!/^\d{4}-\d{2}$/.test(ym)){setErr('연도와 월을 모두 선택해 주세요.');return;}
    if(matchedList.length===0){setErr('저장할 매칭된 데이터가 없습니다.');return;}
    setSaving(true);setErr('');
    const ymKey=ym.replace('-','');
    try{
      const {data:delData,error:delErr}=await sb.from('usage_monthly').delete().eq('year_month',ymKey).eq('product',product).select('cust_id,hospital_name,cnt');
      if(delErr){setErr('기존 데이터 삭제 중 오류: '+delErr.message);setSaving(false);return;}
      const deletedRows=delData||[];
      // 같은 cust_id(+제품)로 매칭된 병원이 여러 개면 건수를 합산해 한 줄로 (유니크 제약 대응)
      const mergeMap={};
      matchedList.forEach(r=>{
        const cid=r.finalCid;if(!cid)return;
        if(!mergeMap[cid]){mergeMap[cid]={year_month:ymKey,cust_id:cid,hospital_name:r.finalName||r.name,product,cnt:Number(r.cnt)||0};}
        else{mergeMap[cid].cnt+=Number(r.cnt)||0;}
      });
      const insertRows=Object.values(mergeMap);
      const mergedCount=matchedList.length-insertRows.length; // 합쳐진 병원 수
      let inserted=0;
      for(let i=0;i<insertRows.length;i+=500){
        const slice=insertRows.slice(i,i+500);
        const {error}=await sb.from('usage_monthly').insert(slice);
        if(error){setErr('저장 중 오류: '+error.message);setSaving(false);return;}
        inserted+=slice.length;
      }
      // 이번에 수동으로 연결한 병원명 → cust_id 를 별칭 테이블에 저장(다음 달 자동 적용)
      let aliasSaved=0;const aliasErrList=[];
      const manualRows=matchedList.filter(r=>r.state==='manual');
      if(manualRows.length){
        const aliasRows=manualRows.map(r=>({alias_name:r.name,cust_id:r.finalCid}));
        try{
          const {error:aErr}=await sb.from('usage_name_alias').upsert(aliasRows,{onConflict:'alias_name'});
          if(aErr){aliasErrList.push(aErr.message);}else{aliasSaved=aliasRows.length;}
        }catch(ae){aliasErrList.push(ae.message);}
      }
      setResult({inserted,deleted:deletedRows.length,deletedRows,ymKey,aliasSaved,aliasErr:aliasErrList.join('; '),merged:mergedCount});
      setStep(3);
    }catch(ex){setErr('저장 실패: '+ex.message);}
    setSaving(false);
  }
  return (<div className="ov" onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{background:'#0F172A',border:'0.5px solid var(--border)',borderRadius:12,width:640,maxWidth:'94vw',maxHeight:'calc(100dvh - 32px)',overflow:'auto',boxShadow:'0 14px 44px rgba(0,0,0,.6)'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'14px 18px',borderBottom:'0.5px solid var(--border)',position:'sticky',top:0,background:'#0F172A',zIndex:2}}>
        <span style={{fontSize:15,fontWeight:700,color:'#38BDF8'}}>분석건수 데이터 추가</span>
        <span style={{fontSize:10,color:'var(--t3)'}}>{step===1?'① 파일 선택':step===2?'② 매칭 확인 & 저장':'③ 완료'}</span>
        <span onClick={onClose} style={{marginLeft:'auto',cursor:'pointer',fontSize:18,color:'var(--t3)'}}>✕</span>
      </div>
      <div style={{padding:'16px 18px'}}>
        {err&&<div style={{fontSize:11,color:'#f87171',background:'rgba(248,113,113,.1)',border:'0.5px solid rgba(248,113,113,.3)',borderRadius:7,padding:'8px 11px',marginBottom:12}}>{err}</div>}

        {step===1&&<div>
          <div style={{fontSize:12,color:'var(--t2)',marginBottom:12,lineHeight:1.7}}>
            병원명·건수 2개 열로 된 CSV 파일을 선택하세요. 첫 줄은 제목 줄로 처리합니다.<br/>
            <span style={{color:'var(--t3)',fontSize:11}}>예: affiliation, Record Count</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
            <label style={{display:'inline-block',padding:'10px 18px',borderRadius:8,background:'rgba(56,189,248,.12)',border:'0.5px solid #38BDF8',color:'#38BDF8',fontSize:12,fontWeight:600,cursor:'pointer',flexShrink:0}}>
              CSV 파일 선택
              <input type="file" accept=".csv,text/csv" onChange={onFile} style={{display:'none'}}/>
            </label>
            {(()=>{const yv=ym?ym.split('-')[0]:'';const mv=ym?ym.split('-')[1]:'';const now=new Date().getFullYear();const years=[];for(let y=now+1;y>=now-4;y--)years.push(String(y));
              const setYm2=(ny,nm)=>{if(ny&&nm)setYm(ny+'-'+nm);else if(ny&&!nm)setYm(ny+'-');else if(!ny&&nm)setYm('-'+nm);else setYm('');};
              return (<>
              <select value={yv} onChange={e=>setYm2(e.target.value,mv)} style={{fontSize:13,padding:'9px 12px',borderRadius:8,background:'#13202f',border:'0.5px solid '+(yv?'#38BDF8':'var(--border)'),color:yv?'#fff':'var(--t3)'}}>
                <option value="">연도</option>{years.map(y=><option key={y} value={y}>{y}년</option>)}
              </select>
              <select value={mv} onChange={e=>setYm2(yv,e.target.value)} style={{fontSize:13,padding:'9px 12px',borderRadius:8,background:'#13202f',border:'0.5px solid '+(mv?'#38BDF8':'var(--border)'),color:mv?'#fff':'var(--t3)'}}>
                <option value="">월</option>{Array.from({length:12},(_,i)=>{const m=String(i+1).padStart(2,'0');return <option key={m} value={m}>{i+1}월</option>;})}
              </select>
            </>);})()}
          </div>
          {fileName&&<div style={{marginTop:10,fontSize:11,color:'var(--t2)'}}>{fileName}</div>}
          <div style={{marginTop:10,fontSize:10,color:'var(--t3)'}}>연도·월은 지금 선택하거나 다음 단계에서 지정할 수 있습니다.</div>
        </div>}

        {step===2&&<div>
          <div style={{display:'flex',gap:12,marginBottom:14,flexWrap:'wrap',alignItems:'flex-end'}}>
            <div>
              <div style={{fontSize:10,color:'var(--t3)',marginBottom:4}}>연월 <span style={{color:'#f87171'}}>*</span></div>
              {(()=>{const yv=ym?ym.split('-')[0]:'';const mv=ym?ym.split('-')[1]:'';const now=new Date().getFullYear();const years=[];for(let y=now+1;y>=now-4;y--)years.push(String(y));
                const setYm2=(ny,nm)=>{if(ny&&nm)setYm(ny+'-'+nm);else if(ny&&!nm)setYm(ny+'-');else if(!ny&&nm)setYm('-'+nm);else setYm('');};
                return (<div style={{display:'flex',gap:6}}>
                  <select value={yv} onChange={e=>setYm2(e.target.value,mv)} style={{fontSize:13,padding:'7px 10px',borderRadius:7,background:'#13202f',border:'0.5px solid '+(yv?'#38BDF8':'var(--border)'),color:yv?'#fff':'var(--t3)'}}>
                    <option value="">연도</option>{years.map(y=><option key={y} value={y}>{y}년</option>)}
                  </select>
                  <select value={mv} onChange={e=>setYm2(yv,e.target.value)} style={{fontSize:13,padding:'7px 10px',borderRadius:7,background:'#13202f',border:'0.5px solid '+(mv?'#38BDF8':'var(--border)'),color:mv?'#fff':'var(--t3)'}}>
                    <option value="">월</option>{Array.from({length:12},(_,i)=>{const m=String(i+1).padStart(2,'0');return <option key={m} value={m}>{i+1}월</option>;})}
                  </select>
                </div>);})()}
            </div>
            <div>
              <div style={{fontSize:10,color:'var(--t3)',marginBottom:4}}>제품</div>
              <select value={product} onChange={e=>setProduct(e.target.value)} style={{fontSize:13,padding:'7px 10px',borderRadius:7,background:'#13202f',border:'0.5px solid var(--border)',color:'#fff'}}>
                <option value="BA">BA</option><option value="OA">OA</option><option value="SC">SC</option><option value="SG">SG</option><option value="SS">SS</option><option value="FX">FX</option><option value="AS">AS</option><option value="CA">CA</option>
              </select>
            </div>
            <div style={{marginLeft:'auto',fontSize:11,color:'var(--t2)',textAlign:'right'}}>
              <div>매칭 <b style={{color:'#22C55E'}}>{matchedList.length}</b> · 미매칭 <b style={{color:'#f87171'}}>{unmatchedList.length}</b> · 제외 <b style={{color:'var(--t3)'}}>{excludedList.length}</b></div>
              <div style={{marginTop:2}}>저장 대상 건수 합계 <b style={{color:'#38BDF8'}}>{totalCnt.toLocaleString()}</b></div>
            </div>
          </div>

          {ym&&existingSameKey.length>0&&<div style={{fontSize:11,color:'#fbbf24',background:'rgba(251,191,36,.1)',border:'0.5px solid rgba(251,191,36,.3)',borderRadius:7,padding:'8px 11px',marginBottom:12}}>
            이미 {ym} · {product} 데이터 {existingSameKey.length.toLocaleString()}건이 있습니다. 저장하면 기존 데이터를 삭제하고 새 파일로 덮어씁니다.
          </div>}

          {unmatchedList.length>0&&<div style={{marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:'#f87171',marginBottom:6}}>미매칭 병원 {unmatchedList.length}곳 <span style={{fontSize:10,color:'var(--t3)',fontWeight:400}}>· CRM 고객을 찾아 연결하거나 제외하세요</span></div>
            <div style={{maxHeight:180,overflow:'auto',border:'0.5px solid var(--border)',borderRadius:8}}>
              {unmatchedList.map(r=>(
                <div key={r.idx} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 11px',borderBottom:'0.5px solid var(--border)'}}>
                  <span style={{fontSize:12,fontWeight:600,flex:1,minWidth:0,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.name}</span>
                  <span style={{fontSize:11,color:'var(--t3)',width:52,textAlign:'right'}}>{r.cnt.toLocaleString()}건</span>
                  <button onClick={()=>{setSearchOpen(r.idx);setSearchQ(r.name);}} style={{fontSize:11,padding:'4px 10px',borderRadius:6,border:'0.5px solid #38BDF8',background:'rgba(56,189,248,.1)',color:'#38BDF8',cursor:'pointer'}}>CRM 검색</button>
                  <button onClick={()=>setExcluded(x=>({...x,[r.idx]:true}))} style={{fontSize:11,padding:'4px 10px',borderRadius:6,border:'0.5px solid var(--border)',background:'transparent',color:'var(--t3)',cursor:'pointer'}}>제외</button>
                </div>
              ))}
            </div>
          </div>}

          {matchedList.length>0&&<div style={{marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:700,color:'#22C55E',marginBottom:6}}>매칭 완료 {matchedList.length}곳</div>
            <div style={{maxHeight:160,overflow:'auto',border:'0.5px solid var(--border)',borderRadius:8}}>
              {matchedList.map(r=>(
                <div key={r.idx} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 11px',borderBottom:'0.5px solid var(--border)'}}>
                  <span style={{fontSize:12,flex:1,minWidth:0,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.name}{r.state==='manual'&&<span style={{fontSize:9,color:'#AFA9EC',marginLeft:5}}>수동연결</span>}{r.fromAlias&&<span style={{fontSize:9,color:'#5DCAA5',marginLeft:5}}>저장된 매칭</span>}</span>
                  <span style={{fontSize:10,color:'#38BDF8',width:80,textAlign:'right'}}>{r.finalCid}</span>
                  <span style={{fontSize:11,color:'var(--t2)',width:52,textAlign:'right'}}>{r.cnt.toLocaleString()}건</span>
                </div>
              ))}
            </div>
          </div>}

          {excludedList.length>0&&<div style={{fontSize:11,color:'var(--t3)',marginTop:6}}>제외됨: {excludedList.map(r=>r.name).join(', ')}</div>}

          <div style={{display:'flex',gap:8,marginTop:16,paddingTop:12,borderTop:'0.5px solid var(--border)'}}>
            <button onClick={()=>{setStep(1);setParsed([]);setManual({});setExcluded({});}} style={{fontSize:12,padding:'9px 16px',borderRadius:8,border:'0.5px solid var(--border)',background:'transparent',color:'var(--t2)',cursor:'pointer'}}>← 다시 선택</button>
            <button disabled={saving||!ymOk||matchedList.length===0} onClick={save} style={{marginLeft:'auto',fontSize:12,fontWeight:700,padding:'9px 20px',borderRadius:8,border:'none',background:(saving||!ymOk||matchedList.length===0)?'#334155':'#38BDF8',color:(saving||!ymOk||matchedList.length===0)?'var(--t3)':'#0d1620',cursor:(saving||!ymOk||matchedList.length===0)?'default':'pointer'}}>{saving?'저장 중...':'저장 (덮어쓰기)'}</button>
          </div>
        </div>}

        {step===3&&result&&<div>
          <div style={{fontSize:14,fontWeight:700,color:'#22C55E',marginBottom:10}}>저장 완료</div>
          <div style={{fontSize:12,color:'var(--t2)',lineHeight:1.8,marginBottom:14}}>
            {result.ymKey.slice(0,4)}년 {result.ymKey.slice(4)}월 · {product}<br/>
            새로 저장 <b style={{color:'#38BDF8'}}>{result.inserted.toLocaleString()}건</b>
            {result.deleted>0&&<> · 덮어쓴(삭제된) 기존 <b style={{color:'#fbbf24'}}>{result.deleted.toLocaleString()}건</b></>}
            {result.aliasSaved>0&&<><br/><span style={{color:'#5DCAA5'}}>수동 매칭 <b>{result.aliasSaved}건</b>을 저장했습니다. 다음 달부터 같은 병원명은 자동으로 연결됩니다.</span></>}
            {result.merged>0&&<><br/><span style={{color:'#5DCAA5'}}>같은 병원(고객ID)으로 매칭된 <b>{result.merged}건</b>은 건수를 합산해 한 줄로 저장했습니다.</span></>}

// 분석건수 추이 (연도/반기/분기/월 + 전년도 점선) — 월별 합계값 기반
function UsageTrendChart({byMonth}){
  const now=new Date();
  const yrs=Object.keys(byMonth||{}).map(k=>Number(String(k).replace(/[^0-9]/g,'').slice(0,4))).filter(y=>y>2000);
  const maxY=yrs.length?Math.max.apply(null,yrs):now.getFullYear();
  const [year,setYear]=useState(maxY);
  const [gran,setGran]=useState('month');
  const [selHalf,setSelHalf]=useState(0);
  const [selQ,setSelQ]=useState(0);
  const aggYear=(y)=>{const m={};Object.keys(byMonth||{}).forEach(k=>{const d=String(k).replace(/[^0-9]/g,'');if(d.length<6)return;if(Number(d.slice(0,4))!==y)return;const mm=Number(d.slice(4,6));m[mm]=(m[mm]||0)+(Number(byMonth[k])||0);});return m;};
  const cur=aggYear(year),prev=aggYear(year-1);
  let labels=[],curArr=[],prevArr=[];
  if(gran==='month'){labels=Array.from({length:12},(_,i)=>(i+1)+'월');for(let mm=1;mm<=12;mm++){curArr.push(cur[mm]||0);prevArr.push(prev[mm]||0);}}
  else if(gran==='half'){if(selHalf>=1&&selHalf<=2){const h=selHalf-1;let a=0,pv=0;for(let k=1;k<=6;k++){const mm=h*6+k;a+=cur[mm]||0;pv+=prev[mm]||0;}labels=[selHalf===1?'상반기':'하반기'];curArr=[a];prevArr=[pv];}else{labels=['상반기','하반기'];for(let h=0;h<2;h++){let a=0,pv=0;for(let k=1;k<=6;k++){const mm=h*6+k;a+=cur[mm]||0;pv+=prev[mm]||0;}curArr.push(a);prevArr.push(pv);}}}
  else if(gran==='quarter'){if(selQ>=1&&selQ<=4){const q=selQ-1;let a=0,pv=0;for(let k=1;k<=3;k++){const mm=q*3+k;a+=cur[mm]||0;pv+=prev[mm]||0;}labels=[selQ+'분기'];curArr=[a];prevArr=[pv];}else{labels=['1분기','2분기','3분기','4분기'];for(let q=0;q<4;q++){let a=0,pv=0;for(let k=1;k<=3;k++){const mm=q*3+k;a+=cur[mm]||0;pv+=prev[mm]||0;}curArr.push(a);prevArr.push(pv);}}}
  else{const years=[year-3,year-2,year-1,year];labels=years.map(y=>y+'년');years.forEach(y=>{const g=aggYear(y);let a=0;for(let mm=1;mm<=12;mm++)a+=g[mm]||0;curArr.push(a);});prevArr=[];}
  const total=curArr.reduce((a,b)=>a+b,0);
  const datasets=[{type:'bar',label:String(year),data:curArr,backgroundColor:'#38BDF8',borderRadius:5,order:2}];
  if(gran!=='year')datasets.push({type:'line',label:'전년('+(year-1)+')',data:prevArr,borderColor:'#EF9F27',borderWidth:2,borderDash:[5,4],pointRadius:3,pointBackgroundColor:'#EF9F27',fill:false,tension:.3,order:1});
  const cfg={data:{labels,datasets},options:{plugins:{legend:{display:true,labels:{boxWidth:10,font:{size:10}}}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}};
  const yearsOpt=[];for(let y=maxY;y>=maxY-4;y--)yearsOpt.push(y);
  const selStyle=on=>({fontSize:11,padding:'4px 7px',width:'auto',background:'#13202f',border:'0.5px solid '+(on?'#EF9F27':'var(--border)'),borderRadius:7,color:on?'#EF9F27':'#c8d3e0'});
  const tabBtn=(k,lb)=>{const on=gran===k;return <span onClick={()=>{setGran(k);setSelHalf(0);setSelQ(0);}} style={{fontSize:11,padding:'4px 9px',borderRadius:7,cursor:'pointer',background:on?'#2563EB':'#1E293B',border:'0.5px solid '+(on?'#2563EB':'var(--border)'),color:on?'#fff':'var(--t3)'}}>{lb}</span>;};
  return (<div>
    <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:8,flexWrap:'wrap'}}>
      <span style={{fontSize:11,color:'var(--t3)',marginRight:'auto'}}>{year}년 {total.toLocaleString()}건</span>
      <select value={year} onChange={e=>setYear(Number(e.target.value))} style={selStyle(false)}>{yearsOpt.map(y=><option key={y} value={y}>{y}</option>)}</select>
      {gran==='half'&&<select value={selHalf} onChange={e=>setSelHalf(Number(e.target.value))} style={selStyle(!!selHalf)}><option value={0}>전체</option><option value={1}>상반기</option><option value={2}>하반기</option></select>}
      {gran==='quarter'&&<select value={selQ} onChange={e=>setSelQ(Number(e.target.value))} style={selStyle(!!selQ)}><option value={0}>전체</option>{[1,2,3,4].map(q=><option key={q} value={q}>Q{q}</option>)}</select>}
      {tabBtn('year','연도')}{tabBtn('half','반기')}{tabBtn('quarter','분기')}{tabBtn('month','월별')}
    </div>
    {total===0?<Empty msg="데이터 없음"/>:<ChartBox cfg={cfg} height={180}/>}
  </div>);
}

  const prodKeys=Object.keys(byProduct).sort((a,b)=>byProduct[b]-byProduct[a]);

function InsightView(){
  const [leads,setLeads]=useState([]);const [deals,setDeals]=useState([]);const [orders,setOrders]=useState([]);const [rates,setRates]=useState([]);const [loading,setLoading]=useState(true);
  async function load(){
    setLoading(true);
    let ld=[],f=0;while(true){const {data}=await sb.from('leads').select('stage,funnel_type,lead_source,expected_revenue,cust_id').range(f,f+999);if(!data||!data.length)break;ld=ld.concat(data);if(data.length<1000)break;f+=1000;}
    let od=[],f2=0;while(true){const {data}=await sb.from('orders').select('delivered_at,supply_amount,cust_id').range(f2,f2+999);if(!data||!data.length)break;od=od.concat(data);if(data.length<1000)break;f2+=1000;if(f2>40000)break;}
    const [dl,rt]=await Promise.all([sb.from('overseas_deals').select('stage,funnel_type,amount,currency'),sb.from('exchange_rates').select('usd_krw').order('rate_date',{ascending:false}).limit(1)]);
    setLeads(ld);setDeals(dl.data||[]);setOrders(od);setRates(rt.data||[]);setLoading(false);
  }
  useEffect(()=>{load();},[]);
  const rate=rates.length?Number(rates[0].usd_krw):null;
  // 전환율
  const domWon=leads.filter(l=>l.stage==='계약완료'||l.stage==='업셀링').length;
  const ovsWon=deals.filter(d=>d.stage==='Sales'||d.stage==='계약').length;
  const totalLD=leads.length+deals.length;
  const convRate=totalLD?Math.round((domWon+ovsWon)/totalLD*100):0;
  const linkedN=leads.filter(l=>l.cust_id).length;
  // 가중 예상매출
  let pipe=0;leads.forEach(l=>{pipe+=(Number(l.expected_revenue)||0)*((l.funnel_type==='B2B'?W_B2B:W_GEN)[l.stage]||0);});
  deals.forEach(d=>{if(!d.amount)return;const w=(d.funnel_type==='B2B'?W_B2B:W_GEN)[d.stage]||0;const krw=d.currency==='KRW'?Number(d.amount):(toKRW(d.amount,rate)||0);pipe+=krw*w;});
  // 매출 추이 (orders supply_amount by month)
  const rev={};orders.forEach(o=>{if(!o.delivered_at)return;const dt=new Date(o.delivered_at);if(isNaN(dt))return;const k=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');rev[k]=(rev[k]||0)+(Number(o.supply_amount)||0);});
  const revMonths=Object.keys(rev).sort().slice(-12);
  const thisYear=new Date().getFullYear();
  const yearRev=orders.reduce((s,o)=>{if(!o.delivered_at)return s;const dt=new Date(o.delivered_at);return (!isNaN(dt)&&dt.getFullYear()===thisYear)?s+(Number(o.supply_amount)||0):s;},0);
  // 단계별 전환 퍼널 (국내 일반, 보류 제외, 누적 도달)
  const FUN=STAGES_GEN.slice(0,7);
  const idx=s=>STAGES_GEN.indexOf(s);
  const gen=leads.filter(l=>(l.funnel_type||'일반')==='일반'&&l.stage!=='보류');
  const reached=FUN.map((s,i)=>gen.filter(l=>idx(l.stage)>=i&&idx(l.stage)<8).length);
  const fmax=Math.max(1,...reached);
  // 리드 소스
  const src={};leads.forEach(l=>{const s=l.lead_source||'(미지정)';src[s]=(src[s]||0)+1;});
  const srcKeys=Object.keys(src).sort((a,b)=>src[b]-src[a]).slice(0,8);
  const PC=['#5DCAA5','#85B7EB','#AFA9EC','#EF9F27','#F472B6','#2DD4BF','#FBBF24','#94a3b8'];
  // 해외 단계
  const ovsBars=STAGES_B2B.slice(0,7).map(s=>deals.filter(d=>d.funnel_type==='B2B'&&d.stage===s).length);
  const revLine={type:'line',data:{labels:revMonths,datasets:[{data:revMonths.map(m=>Math.round(rev[m]/1e4)),borderColor:'#5DCAA5',backgroundColor:'rgba(93,202,165,.16)',fill:true,tension:.35,pointRadius:2}]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{}}},scales:{y:{beginAtZero:true,title:{display:true,text:'만원'}}}}};
  const srcDonut={type:'doughnut',data:{labels:srcKeys,datasets:[{data:srcKeys.map(k=>src[k]),backgroundColor:srcKeys.map((k,i)=>PC[i%PC.length]),borderWidth:0}]},options:{cutout:'62%',plugins:{legend:{display:false}}}};
  const ovsBar={type:'bar',data:{labels:STAGES_B2B.slice(0,7),datasets:[{data:ovsBars,backgroundColor:'#534AB7',borderRadius:5}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}};
  return (
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <div className="hd" style={{color:'#F472B6'}}>전환·매출 인사이트</div>
      {loading?<LoadingBear/>:
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <div className="grid-auto-mob" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
          <Kpi l="전환율" v={convRate+'%'} c="#F472B6" sub={'계약완료+ '+(domWon+ovsWon)+' / '+totalLD}/>
          <Kpi l="고객 연결" v={linkedN} c="#22C55E" sub={leads.length?Math.round(linkedN/leads.length*100)+'% 연결':''}/>
          <Kpi l="가중 예상매출" v={eok(pipe)} c="#85B7EB" sub="국내+해외"/>
          <Kpi l={thisYear+' 매출'} v={eok(yearRev)} c="#5DCAA5" sub="납품일 기준 공급가액"/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1.3fr 1fr',gap:12}}>
          <div className="panel">
            <div style={{fontSize:13,fontWeight:600,color:'#85B7EB',marginBottom:8}}>국내 단계별 전환 퍼널 <span style={{fontSize:10,color:'var(--t3)',fontWeight:400}}>· 보류 제외, 누적 도달</span></div>
            {gen.length===0?<Empty msg="데이터 없음"/>:
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {FUN.map((s,i)=>{const w=Math.round(reached[i]/fmax*100);const cv=i>0&&reached[i-1]?Math.round(reached[i]/reached[i-1]*100):null;return (
                <div key={s} style={{display:'flex',alignItems:'center',gap:9}}>
                  <div style={{width:74,fontSize:11,color:'var(--t2)'}}>{s}</div>
                  <div style={{flex:1,height:18,background:'#13202f',borderRadius:5,overflow:'hidden'}}><div style={{height:'100%',width:Math.max(w,reached[i]?5:0)+'%',background:STAGE_C[s]||'#185FA5',borderRadius:5}}/></div>
                  <div style={{width:34,textAlign:'right',fontSize:12,fontWeight:600}}>{reached[i]}</div>
                  <div style={{width:42,textAlign:'right',fontSize:10,color:cv!=null?(cv>=50?'#5DCAA5':'#EF9F27'):'var(--t3)'}}>{cv!=null?cv+'%':''}</div>
                </div>
              );})}
            </div>}
          </div>
          <div className="panel">
            <div style={{fontSize:13,fontWeight:600,color:'#85B7EB',marginBottom:8}}>리드 유입경로</div>
            {srcKeys.length===0?<Empty msg="데이터 없음"/>:
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:120}}><ChartBox cfg={srcDonut} height={120}/></div>
              <div style={{flex:1,maxHeight:150,overflow:'auto'}}>{srcKeys.map((k,i)=><div key={k} style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}><span style={{width:8,height:8,borderRadius:2,background:PC[i%PC.length]}}/><span style={{fontSize:11,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{k}</span><span style={{fontSize:11,color:'var(--t2)'}}>{src[k]}</span></div>)}</div>
            </div>}
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1.6fr 1fr',gap:12}}>
          <div className="panel">
            <div style={{fontSize:13,fontWeight:600,color:'#85B7EB',marginBottom:8}}>매출 추이 <span style={{fontSize:10,color:'var(--t3)',fontWeight:400}}>· 최근 12개월 · CRM 주문 공급가액(만원)</span></div>
            {revMonths.length===0?<Empty msg="주문 매출 데이터 없음"/>:<ChartBox cfg={revLine} height={170}/>}
          </div>
          <div className="panel">
            <div style={{fontSize:13,fontWeight:600,color:'#85B7EB',marginBottom:8}}>해외 BD 단계 분포</div>
            {deals.length===0?<Empty msg="해외 딜 없음"/>:<ChartBox cfg={ovsBar} height={170}/>}
          </div>
        </div>
      </div>}
    </div>
  );
}

function NewLeadModal({lead:editLead,editContact,onClose,onSaved}){
  const isEdit=!!(editLead&&editLead.lead_id);
  const [type,setType]=useState(editLead&&editLead.funnel_type==='B2B'?'b2x':'hospital');
  const [sols,setSols]=useState([]);
  const [f,setF]=useState({});
  const [saving,setSaving]=useState(false);
  const [loading,setLoading]=useState(isEdit);
  const isH=type==='hospital';
  const g=k=>f[k]||'';
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const PACS_OPTS=['인피니티','태영','메디컬스탠다드','테크하임','동은'];
  const ADOPT_OPTS=['미정',...(()=>{const a=[];for(let y=2026;y<=2035;y++)for(let q=1;q<=4;q++)a.push(y+'년 '+q+'분기');return a;})()];
  const AIWILL_OPTS=['높음','중간','낮음','의지없음'];
  const PERF_OPTS=['100건 이상','50건~100건','20건~50건','20건 이하'];
  const [pacsDirect,setPacsDirect]=useState(false);
  const [mcDirect,setMcDirect]=useState(false);
  // 기존 병원 불러오기 (같은 병원에 새 의료진 = 새 리드, 병원정보만 자동채움)
  const [loadQ,setLoadQ]=useState('');
  const [loadRes,setLoadRes]=useState([]);
  const [loadedName,setLoadedName]=useState('');
  async function searchExisting(q){
    setLoadQ(q);setLoadedName('');
    if(!q.trim()){setLoadRes([]);return;}
    const {data}=await sb.from('leads').select('lead_id,hospital_name,hospital_type,address,website,lead_source,target_solution,interest_solution,funnel_type,biz_area,org_scale').ilike('hospital_name','%'+q.trim()+'%').limit(8);
    setLoadRes(data||[]);
  }
  function applyExisting(L){
    const isHosp=L.funnel_type!=='B2B';
    setType(isHosp?'hospital':'b2x');
    const solStr=L.target_solution||L.interest_solution||'';
    setSols(String(solStr).split(/[,/·]/).map(x=>x.trim()).filter(Boolean));
    setF(p=>({...p,
      // 병원(기관) 식별·기본 정보만 자동 채움
      name:L.hospital_name||'',source:L.lead_source||'',addr:L.address||'',web:L.website||'',
      htype:isHosp?(L.hospital_type||''):'',orgtype:isHosp?'':(L.hospital_type||''),
      biz:L.biz_area||'',
      // 담당 의료진·사전조사·상세 고객정보는 의료진이 바뀌었으므로 모두 비움 (새로 입력)
      contact:'',pos:'',dept:'',dept2:'',spec:'',phone:'',email:'',rnotes:'',train:'',
      needs:'',comp:'',collab:'',nda:'',mou:'',poc:'',scale:'',
      tcd:'',dm:'',pacs:'',airead:'',aiuse:'',mc:'',emc:'',reject:'',er:'',
      _contactId:null
    }));
    setPacsDirect(false);setMcDirect(false);
    setLoadedName(L.hospital_name||'');setLoadRes([]);setLoadQ('');
  }
  const toggleSol=x=>setSols(p=>p.includes(x)?p.filter(y=>y!==x):[...p,x]);
  const commafy=v=>{v=String(v).replace(/[^0-9]/g,'');return v?Number(v).toLocaleString():'';};
  // 수정 모드: 기존 leads + 첫 담당자(lead_contacts) 불러와 폼 채우기
  React.useEffect(()=>{
    if(!isEdit)return;
    (async()=>{
      try{
        const L=editLead;
        let C={};
        if(editContact&&editContact.id){
          // 상세페이지에서 선택한 컨택을 그대로 사용
          C=editContact;
        }else{
          const {data:c1}=await sb.from('lead_contacts').select('*').eq('lead_id',L.lead_id).order('contact_seq',{ascending:true}).limit(1);
          C=(c1&&c1[0])||{};
        }
        const isHosp=L.funnel_type!=='B2B';
        const solStr=L.target_solution||L.interest_solution||'';
        setSols(String(solStr).split(/[,/·]/).map(x=>x.trim()).filter(Boolean));
        setF({
          name:L.hospital_name||'',source:L.lead_source||'',addr:L.address||'',web:L.website||'',
          tcd:L.adopt_timing||'',dm:L.decision_maker||'',comp:L.competitor||'',
          needs:L.needs||'',remark:L.remark||'',owner:L.owner||'',
          htype:isHosp?(L.hospital_type||''):'',orgtype:isHosp?'':(L.hospital_type||''),
          pacs:L.pacs||'',airead:L.ai_will||'',aiuse:L.ai_usage||'',mc:L.est_monthly_cases||'',emc:L.demand_grade||'',reject:L.reject_reason||'',
          biz:L.biz_area||'',scale:L.org_scale||'',collab:L.collab||'',nda:L.nda_status||'',mou:L.mou_status||'',poc:L.poc_status||'',
          er:L.expected_revenue?Number(L.expected_revenue).toLocaleString():'',
          contact:C.contact_name||'',pos:C.position||'',dept:isHosp?(C.department||''):'',dept2:isHosp?'':(C.department||''),
          spec:C.specialty||'',phone:C.phone||'',email:C.email||'',rnotes:C.research_notes||'',train:C.training_hospital||'',
          _contactId:C.id||null
        });
        setPacsDirect(!!(L.pacs&&!PACS_OPTS.includes(L.pacs)));
        setMcDirect(!!(L.est_monthly_cases&&!PERF_OPTS.includes(L.est_monthly_cases)));
      }catch(e){console.warn('수정 데이터 로드 실패',e);}
      setLoading(false);
    })();
  },[]);
  async function save(){
    if(!g('name').trim()||!g('contact').trim()){alert(isH?'병원명과 담당자는 필수입니다':'기관명과 담당자는 필수입니다');return;}
    setSaving(true);
    try{
      const today=new Date().toISOString().slice(0,10);
      const er=g('er').replace(/[^0-9]/g,'');const sj=sols.join(', ');
      const leadFields={hospital_name:g('name'),lead_source:g('source')||null,address:g('addr')||null,website:g('web')||null,
        interest_solution:sj||null,target_solution:sj||null,expected_revenue:er?Number(er):null,
        adopt_timing:g('tcd')||null,decision_maker:g('dm')||null,competitor:g('comp')||null,
        needs:g('needs')||null,remark:g('remark')||null,owner:g('owner')||null,
        hospital_type:isH?(g('htype')||null):(g('orgtype')||null),updated_at:new Date().toISOString()};
      if(isH)Object.assign(leadFields,{pacs:g('pacs')||null,ai_will:g('airead')||null,ai_usage:g('aiuse')||null,est_monthly_cases:g('mc')||null,demand_grade:g('emc')||null,reject_reason:g('reject')||null});
      else Object.assign(leadFields,{biz_area:g('biz')||null,org_scale:g('scale')||null,collab:g('collab')||null,nda_status:g('nda')||null,mou_status:g('mou')||null,poc_status:g('poc')||null});
      const contactFields={contact_name:g('contact'),position:g('pos')||null,department:isH?(g('dept')||null):(g('dept2')||null),
        specialty:isH?(g('spec')||null):null,phone:g('phone')||null,email:g('email')||null,
        pre_meeting_interest:sj||null,research_notes:g('rnotes')||null,training_hospital:isH?(g('train')||null):null};
      if(isEdit){
        // 수정: leads UPDATE + 첫 담당자 UPDATE/INSERT
        const newFunnel=isH?'일반':'B2B';
        if((editLead.funnel_type||'일반')!==newFunnel){leadFields.funnel_type=newFunnel;leadFields.stage=isH?'리드':'Lead';}
        const r1=await sb.from('leads').update(leadFields).eq('lead_id',editLead.lead_id);
        if(r1.error)throw r1.error;
        if(f._contactId){
          const r2=await sb.from('lead_contacts').update(contactFields).eq('id',f._contactId);
          if(r2.error)throw r2.error;
        }else{
          const r2=await sb.from('lead_contacts').insert({lead_id:editLead.lead_id,contact_seq:1,...contactFields});
          if(r2.error)throw r2.error;
        }
        onSaved();
      }else{
        // 신규: lead_id 생성 후 INSERT
        const {data}=await sb.from('leads').select('lead_id').order('lead_id',{ascending:false}).limit(1);
        let n=1;if(data&&data[0]){const m=String(data[0].lead_id).match(/(\d+)/);if(m)n=parseInt(m[1])+1;}
        const lead_id='L_'+String(n).padStart(4,'0');
        const lead={lead_id,funnel_type:isH?'일반':'B2B',stage:isH?'리드':'Lead',lead_status:'리드',lead_created_date:today,...leadFields};
        const r1=await sb.from('leads').insert(lead);
        if(r1.error)throw r1.error;
        const r2=await sb.from('lead_contacts').insert({lead_id,contact_seq:1,...contactFields});
        if(r2.error)throw r2.error;

        </div>}

  return <div className="ov"><div className="modal" style={{width:360}}>
    <div className="mhd" style={{fontSize:14,fontWeight:600,marginBottom:3,display:'flex',alignItems:'center',gap:8}}><span>단계 이동</span><button className="tbtn" style={{marginLeft:'auto',background:'rgba(255,255,255,.06)'}} onClick={onClose}>✕</button></div>

      {stages.map(st=><div key={st} onClick={()=>pick(st)} style={{display:'flex',alignItems:'center',gap:8,padding:'9px 11px',borderRadius:8,cursor:'pointer',background:lead.stage===st?'#13314f':'rgba(255,255,255,.03)',border:'0.5px solid '+(lead.stage===st?(STAGE_C[st]||'#185FA5'):'var(--border)')}}><span style={{width:8,height:8,borderRadius:2,background:STAGE_C[st]||'#185FA5'}}/><span style={{fontSize:12,fontWeight:lead.stage===st?700:400}}>{st}</span>{lead.stage===st&&<span style={{marginLeft:'auto',fontSize:10,color:'var(--t3)'}}>현재</span>}</div>)}

  </div></div>;
}

function ResignModal({repList,leads,onClose,onSaved}){
  const parse=s=>String(s||'').split(/[,/·]/).map(x=>x.trim()).filter(Boolean);
  const [dep,setDep]=useState('');
  const [tgt,setTgt]=useState('');
  const [busy,setBusy]=useState(false);
  const depLeads=dep?(leads||[]).filter(l=>parse(l.owner).includes(dep)):[];
  async function run(){
    if(!dep){alert('퇴사한 영업사원을 선택하세요.');return;}
    if(!tgt){alert('이관받을 담당자를 선택하세요.');return;}
    if(dep===tgt){alert('퇴사자와 이관 담당자가 같습니다.');return;}
    if(!confirm(dep+' 퇴사 처리\n\n담당 리드 '+depLeads.length+'건을 '+tgt+'(으)로 이관하고,\n'+dep+'을(를) 퇴사자 명단에 추가합니다.\n\n계속하시겠습니까?'))return;
    setBusy(true);
    try{
      const u=(await sb.auth.getUser()).data.user;
      for(const l of depLeads){
        const nx=[...new Set(parse(l.owner).map(o=>o===dep?tgt:o))];
        const res=await sb.from('leads').update({owner:nx.join(', ')||null,prev_owner:dep,updated_at:new Date().toISOString()}).eq('lead_id',l.lead_id);
        if(res.error)throw res.error;
      }
      const r2=await sb.from('former_reps').upsert({name:dep,resigned_at:new Date().toISOString().slice(0,10),reassigned_to:tgt,created_by:u?u.email:null},{onConflict:'name'});
      if(r2.error)throw r2.error;
      if(!FORMER_REPS.includes(dep))FORMER_REPS.push(dep);
      alert('처리 완료\n\n'+dep+' 퇴사 · 리드 '+depLeads.length+'건 → '+tgt+' 이관');
      onSaved();
    }catch(e){alert('오류: '+(e.message||e));setBusy(false);}
  }
  return <div className="ov"><div className="modal" style={{width:420}}>
    <div className="mhd" style={{fontSize:14,fontWeight:600,marginBottom:10,display:'flex',alignItems:'center',gap:8}}><span>🚪 영업사원 퇴사 처리</span><button className="tbtn" style={{marginLeft:'auto',background:'rgba(255,255,255,.06)'}} onClick={onClose}>✕</button></div>
    <div style={{fontSize:11,color:'var(--t3)',marginBottom:12,lineHeight:1.6}}>퇴사한 영업사원의 담당 리드를 다른 담당자로 일괄 이관하고 퇴사자 명단에 등록합니다. 퇴사자는 담당자 선택 목록에서 자동 제외되며(과거 활동 이력은 그대로 보존), 대시보드 "퇴사자 이관 이력"에 기록됩니다.</div>
    <label className="lbl">퇴사한 영업사원</label>
    <select value={dep} onChange={e=>setDep(e.target.value)} style={{marginBottom:10}}><option value="">(선택)</option>{repList.map(r=><option key={r} value={r}>{r}</option>)}</select>
    {dep&&<div style={{fontSize:11,color:'var(--t2)',marginBottom:10}}>담당 리드 <b style={{color:'#EF9F27'}}>{depLeads.length}건</b>이 이관됩니다.</div>}
    <label className="lbl">이관받을 담당자</label>
    <select value={tgt} onChange={e=>setTgt(e.target.value)} style={{marginBottom:14}}><option value="">(선택)</option>{repList.filter(r=>r!==dep).map(r=><option key={r} value={r}>{r}</option>)}</select>
    <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}><button className="btn-ghost" onClick={onClose}>취소</button><button className="btn" disabled={busy} onClick={run}>{busy?'처리 중...':'퇴사 처리'}</button></div>
  </div></div>;
}
function OwnerModal({lead,owners,onClose,onSaved}){
  // 담당자 여러 명 선택 가능 (쉼표로 저장 → OwnerBadges가 자동 분리 표시)
  const parse=s=>String(s||'').split(/[,/·]/).map(x=>x.trim()).filter(Boolean);
  const [sel,setSel]=useState(parse(lead.owner));      // 선택된 담당자 배열
  const [extra,setExtra]=useState('');                 // 목록에 없는 이름 직접 입력
  function toggle(o){setSel(cur=>cur.includes(o)?cur.filter(x=>x!==o):[...cur,o]);}
  function addExtra(){const nm=extra.trim();if(nm&&!sel.includes(nm)){setSel([...sel,nm]);}setExtra('');}
  async function save(){
    const val=sel.join(', ');
    await sb.from('leads').update({owner:val||null,updated_at:new Date().toISOString()}).eq('lead_id',lead.lead_id);
    onSaved();
  }
  return <div className="ov"><div className="modal" style={{width:400}}>
    <div className="mhd" style={{fontSize:14,fontWeight:600,marginBottom:3,display:'flex',alignItems:'center',gap:8}}><span>담당자 변경</span><button className="tbtn" style={{marginLeft:'auto',background:'rgba(255,255,255,.06)'}} onClick={onClose}>✕</button></div>
    <div style={{fontSize:11,color:'var(--t3)',marginBottom:12}}>{lead.hospital_name}</div>
    <label className="lbl">담당자 <span style={{color:'var(--t3)',fontWeight:400}}>(여러 명 선택 가능)</span></label>
    {/* 선택된 담당자 표시 */}
    <div style={{display:'flex',flexWrap:'wrap',gap:6,minHeight:34,alignItems:'center',padding:'6px 8px',borderRadius:8,background:'rgba(255,255,255,.03)',border:'0.5px solid var(--border)',marginBottom:8}}>
      {sel.length===0?<span style={{fontSize:11,color:'var(--t3)'}}>선택된 담당자가 없습니다</span>:sel.map((n,i)=>(
        <span key={i} style={{fontSize:11,fontWeight:700,padding:'3px 8px 3px 10px',borderRadius:20,background:'#13314f',border:'0.5px solid #185FA5',display:'inline-flex',alignItems:'center',gap:6}}>{n}<span onClick={()=>toggle(n)} style={{cursor:'pointer',color:'#7fb2e8',fontWeight:700}}>✕</span></span>
      ))}
    </div>
    {/* 담당자 후보 버튼 (눌러서 추가/해제) */}
    {owners.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>{owners.map(o=><span key={o} onClick={()=>toggle(o)} style={{fontSize:11,padding:'4px 10px',borderRadius:20,cursor:'pointer',background:sel.includes(o)?'#185FA5':'rgba(255,255,255,.04)',border:'0.5px solid '+(sel.includes(o)?'#185FA5':'var(--border)'),color:sel.includes(o)?'#fff':'inherit',fontWeight:sel.includes(o)?700:400}}>{sel.includes(o)?'✓ ':''}{o}</span>)}</div>}
    {/* 목록에 없는 이름 직접 추가 */}
    <div style={{display:'flex',gap:6,marginBottom:8}}>
      <input value={extra} onChange={e=>setExtra(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')addExtra();}} placeholder="목록에 없는 담당자 직접 입력" style={{flex:1}}/>
      <button className="btn-ghost" style={{whiteSpace:'nowrap'}} onClick={addExtra}>추가</button>
    </div>
    <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:8}}><button className="btn-ghost" onClick={onClose}>취소</button><button className="btn" onClick={save}>저장</button></div>
  </div></div>;
}

function ContactMergeModal({lead,contacts,onClose,onSaved}){
  // 병원 측 컨택(lead_contacts) 중복을 하나로 통합. 활동(lead_activities)은 남길 컨택으로 이동 후 삭제.
  const [rows,setRows]=useState((contacts||[]).map(c=>({...c})));
  const [keepId,setKeepId]=useState((contacts&&contacts[0]&&contacts[0].id)||null);
  const [selMerge,setSelMerge]=useState(new Set()); // 합칠(삭제될) 컨택 id
  const [actCnt,setActCnt]=useState({}); // id -> 활동수
  const [busy,setBusy]=useState(false);
  const [done,setDone]=useState(false);
  const [undo,setUndo]=useState(null);
  React.useEffect(()=>{(async()=>{
    // 각 컨택의 활동수 조회
    const m={};
    for(const c of (contacts||[])){
      const {count}=await sb.from('lead_activities').select('id',{count:'exact',head:true}).eq('lead_id',lead.lead_id).eq('contact_seq',c.contact_seq);
      m[c.id]=count||0;
    }
    setActCnt(m);
  })();},[]);
  function toggleMerge(id){setSelMerge(cur=>{const n=new Set(cur);if(n.has(id))n.delete(id);else n.add(id);return n;});}
  const keep=rows.find(r=>r.id===keepId);
  const info=c=>[c.position,c.department,c.specialty,c.phone,c.email].filter(Boolean).join(' · ')||'(정보 없음)';
  async function doMerge(){
    if(!keep){alert('남길 컨택을 선택하세요.');return;}
    const targets=rows.filter(r=>selMerge.has(r.id)&&r.id!==keepId);
    if(targets.length===0){alert('통합할(합칠) 컨택을 1개 이상 선택하세요.');return;}
    const totalAct=targets.reduce((s,t)=>s+(actCnt[t.id]||0),0);
    if(!confirm('【'+keep.contact_name+'】(으)로 '+targets.length+'개 컨택을 통합합니다.\n\n합쳐질 컨택: '+targets.map(t=>t.contact_name+(t.department?'('+t.department+')':'')).join(', ')+'\n이동될 활동: '+totalAct+'건\n\n합쳐진 컨택은 삭제되며, 활동은 '+keep.contact_name+'(으)로 이동합니다. 계속하시겠습니까?'))return;
    setBusy(true);
    try{
      // 되돌리기용 스냅샷: 이동될 활동 id와 원래 contact_seq
      const movedActs=[];
      for(const t of targets){
        const {data:acts}=await sb.from('lead_activities').select('id').eq('lead_id',lead.lead_id).eq('contact_seq',t.contact_seq);
        (acts||[]).forEach(a=>movedActs.push({id:a.id,orig_seq:t.contact_seq}));
      }
      // 1) 활동 이동: 각 target의 활동을 keep.contact_seq로 변경
      for(const t of targets){
        const {error:ae}=await sb.from('lead_activities').update({contact_seq:keep.contact_seq}).eq('lead_id',lead.lead_id).eq('contact_seq',t.contact_seq);
        if(ae)throw ae;
      }
      // 2) keep에 빈 정보 채우기 (keep이 비었고 target에 값이 있으면 보완)
      const fill={};['position','department','specialty','phone','email','research_notes','training_hospital','pre_meeting_interest'].forEach(k=>{
        if(!keep[k]){const t=targets.find(x=>x[k]);if(t)fill[k]=t[k];}
      });
      if(Object.keys(fill).length){const {error:ue}=await sb.from('lead_contacts').update(fill).eq('id',keep.id);if(ue)throw ue;}
      // 3) target 컨택 삭제
      const delIds=targets.map(t=>t.id);
      const {error:de}=await sb.from('lead_contacts').delete().in('id',delIds);
      if(de)throw de;
      // 되돌리기 스냅샷 보관 (직후 1회 실행취소용)
      setUndo({targets:targets.map(t=>{const {id,...rest}=t;return rest;}),movedActs,fillKeys:Object.keys(fill),keepId:keep.id});
      setDone(true);setBusy(false);
    }catch(e){alert('통합 오류: '+(e.message||e));setBusy(false);}
  }
  async function doUndo(){
    if(!undo)return;
    setBusy(true);
    try{
      // 1) 이동한 활동을 원래 컨택(contact_seq)으로 복원
      for(const a of undo.movedActs){await sb.from('lead_activities').update({contact_seq:a.orig_seq}).eq('id',a.id);}
      // 2) keep에 보완했던 필드 원복(비움)
      if(undo.fillKeys.length){const clr={};undo.fillKeys.forEach(k=>clr[k]=null);await sb.from('lead_contacts').update(clr).eq('id',undo.keepId);}
      // 3) 삭제된 컨택 재생성
      for(const t of undo.targets){const {error}=await sb.from('lead_contacts').insert(t);if(error)throw error;}
      alert('통합을 되돌렸습니다.');
      onSaved();
    }catch(e){alert('되돌리기 오류: '+(e.message||e)+'\n일부만 복원됐을 수 있습니다. 화면을 새로고침해 확인해주세요.');setBusy(false);}
  }
  return <div className="ov"><div className="modal" style={{width:560,maxWidth:'100%',maxHeight:'calc(100dvh - 32px)',overflow:'auto'}}>
    <div className="mhd" style={{fontSize:14,fontWeight:600,marginBottom:3,display:'flex',alignItems:'center',gap:8}}><span>컨택 통합</span><button className="tbtn" style={{marginLeft:'auto',background:'rgba(255,255,255,.06)'}} onClick={onClose}>✕</button></div>
    <div style={{fontSize:11,color:'var(--t3)',marginBottom:12}}>{lead.hospital_name} · 같은 인물이 여러 번 등록된 경우 하나로 합칩니다. 활동 이력은 유지됩니다.</div>
    {done?(
      <div style={{textAlign:'center',padding:'18px 0'}}>
        <div style={{fontSize:15,fontWeight:700,color:'#5DCAA5',marginBottom:8}}>✅ 컨택 통합 완료</div>
        <div style={{fontSize:12,color:'var(--t2)',marginBottom:6}}>선택한 컨택이 하나로 통합되었습니다.</div>
        <div style={{fontSize:11,color:'#fbbf24',marginBottom:18,lineHeight:1.6}}>⚠️ 이 창을 닫으면 되돌릴 수 없습니다.<br/>잘못했다면 지금 <b>실행 취소</b>를 눌러주세요.</div>
        <div style={{display:'flex',gap:8,justifyContent:'center'}}>
          <button className="btn-ghost" disabled={busy} onClick={doUndo} style={{border:'0.5px solid rgba(240,149,149,.5)',color:'#F09595'}}>{busy?'되돌리는 중...':'↩ 실행 취소'}</button>
          <button className="btn" disabled={busy} onClick={onSaved}>확인 (완료)</button>
        </div>
      </div>
    ):(<>
    <div style={{fontSize:11,fontWeight:700,color:'#5DCAA5',marginBottom:6}}>① 남길 컨택 (기준)</div>
    <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:14}}>
      {rows.map(c=>(
        <label key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:8,cursor:'pointer',textAlign:'left',background:keepId===c.id?'#13314f':'rgba(255,255,255,.03)',border:'0.5px solid '+(keepId===c.id?'#185FA5':'var(--border)')}}>
          <input type="radio" name="keep" checked={keepId===c.id} onChange={()=>{setKeepId(c.id);setSelMerge(cur=>{const n=new Set(cur);n.delete(c.id);return n;});}} style={{width:16,height:16,flexShrink:0,margin:0}}/>
          <div style={{flex:1,minWidth:0,textAlign:'left'}}><div style={{fontSize:12,fontWeight:700}}>{c.contact_name||'(이름없음)'}<span style={{fontSize:10,color:'var(--t3)',fontWeight:400,marginLeft:6}}>순번{c.contact_seq}</span></div><div style={{fontSize:10,color:'var(--t3)',marginTop:2}}>{info(c)}</div></div>
          <span style={{fontSize:10,color:'#85B7EB',flexShrink:0,whiteSpace:'nowrap'}}>활동 {actCnt[c.id]??'…'}건</span>
        </label>
      ))}
    </div>
    <div style={{fontSize:11,fontWeight:700,color:'#fbbf24',marginBottom:6}}>② 합칠 컨택 (선택한 것들이 ①로 흡수되고 삭제됨)</div>
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      {rows.filter(c=>c.id!==keepId).map(c=>(
        <label key={c.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:8,cursor:'pointer',textAlign:'left',background:selMerge.has(c.id)?'rgba(251,191,36,.12)':'rgba(255,255,255,.03)',border:'0.5px solid '+(selMerge.has(c.id)?'rgba(251,191,36,.5)':'var(--border)')}}>
          <input type="checkbox" checked={selMerge.has(c.id)} onChange={()=>toggleMerge(c.id)} style={{width:16,height:16,flexShrink:0,margin:0}}/>
          <div style={{flex:1,minWidth:0,textAlign:'left'}}><div style={{fontSize:12,fontWeight:700}}>{c.contact_name||'(이름없음)'}<span style={{fontSize:10,color:'var(--t3)',fontWeight:400,marginLeft:6}}>순번{c.contact_seq}</span></div><div style={{fontSize:10,color:'var(--t3)',marginTop:2}}>{info(c)}</div></div>
          <span style={{fontSize:10,color:'#85B7EB',flexShrink:0,whiteSpace:'nowrap'}}>활동 {actCnt[c.id]??'…'}건</span>
        </label>
      ))}
    </div>
    <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}><button className="btn-ghost" onClick={onClose}>취소</button><button className="btn" onClick={doMerge} disabled={busy}>{busy?'통합 중...':'선택 통합'}</button></div>
    </>)}
  </div></div>;
}

function MergeLeadModal({lead,leads,onClose,onSaved}){
  // lead = 남길 리드(기준), 선택한 다른 리드의 데이터를 이관 후 그 리드를 삭제
  const [q,setQ]=useState('');
  const [src,setSrc]=useState(null);       // 합칠(삭제될) 리드
  const [rows,setRows]=useState(null);     // {cons,acts,pre}
  const [selCon,setSelCon]=useState(new Set());
  const [selAct,setSelAct]=useState(new Set());
  const [selPre,setSelPre]=useState(true);
  const [busy,setBusy]=useState(false);
  const [done,setDone]=useState(false);
  const [undo,setUndo]=useState(null);
  const cands=(leads||[]).filter(l=>l.lead_id!==lead.lead_id&&(q.trim()===''||String(l.hospital_name||'').toLowerCase().includes(q.trim().toLowerCase())||String(l.lead_id||'').toLowerCase().includes(q.trim().toLowerCase()))).slice(0,8);
  async function pick(l){
    setSrc(l);setRows(null);
    const [c1,c2,c3]=await Promise.all([
      sb.from('lead_contacts').select('id,contact_seq,contact_name,position,department').eq('lead_id',l.lead_id).order('contact_seq',{ascending:true}),
      sb.from('lead_activities').select('id,contact_seq,activity_date,type,content').eq('lead_id',l.lead_id).order('activity_date',{ascending:false}),
      sb.from('lead_presurvey').select('lead_id').eq('lead_id',l.lead_id).maybeSingle()
    ]);
    const r={cons:c1.data||[],acts:c2.data||[],pre:!!c3.data};
    setRows(r);
    // 기본: 전체 선택
    setSelCon(new Set(r.cons.map(c=>c.id)));
    setSelAct(new Set(r.acts.map(a=>a.id)));
    setSelPre(r.pre);
  }
  function toggleKey(cur,setter,key){const n=new Set(cur);if(n.has(key))n.delete(key);else n.add(key);setter(n);}
  function toggleAllKeys(cur,setter,keys){if(cur.size>=keys.length&&keys.every(k=>cur.has(k)))setter(new Set());else setter(new Set(keys));}
  async function doMerge(){
    if(!src||!rows)return;
    const totalSel=selCon.size+selAct.size+(selPre&&rows.pre?1:0);
    const unselCon=rows.cons.length-selCon.size, unselAct=rows.acts.length-selAct.size;
    if(!confirm('【'+src.hospital_name+' ('+src.lead_id+')】에서 선택한 항목을\n【'+lead.hospital_name+' ('+lead.lead_id+')】(으)로 옮깁니다.\n\n선택: 컨택 '+selCon.size+'명 · 활동 '+selAct.size+'건 · 사전조사 '+(selPre&&rows.pre?'있음':'없음')+'\n선택 안 함: 컨택 '+unselCon+'명 · 활동 '+unselAct+'건 (원래 리드와 함께 삭제됩니다)\n\n계속하시겠습니까?'))return;
    if(!confirm('한 번 더 확인합니다.\n\n【'+src.hospital_name+' ('+src.lead_id+')】 리드는 병합 후 삭제되며, 선택하지 않은 항목도 함께 사라집니다. 되돌릴 수 없습니다.'))return;
    setBusy(true);
    try{
      // 되돌리기용 전체 스냅샷 (src 리드의 모든 하위 데이터)
      const [snapC,snapA,snapP]=await Promise.all([
        sb.from('lead_contacts').select('*').eq('lead_id',src.lead_id),
        sb.from('lead_activities').select('*').eq('lead_id',src.lead_id),
        sb.from('lead_presurvey').select('*').eq('lead_id',src.lead_id).maybeSingle()
      ]);
      let tgtPreExists=false;
      {const {data:tp}=await sb.from('lead_presurvey').select('lead_id').eq('lead_id',lead.lead_id).maybeSingle();tgtPreExists=!!tp;}
      const preMovedToKeep=!!(selPre&&rows.pre&&!tgtPreExists);
      const undoSnap={
        srcLead:{...src},
        cons:snapC.data||[], acts:snapA.data||[], pre:snapP.data||null,
        selConIds:[...selCon], selActIds:[...selAct],
        preMovedToKeep,
        linkedCust:(!lead.cust_id&&src.cust_id)?src.cust_id:null,
        keepLeadId:lead.lead_id
      };
      // 1) 선택 컨택 이관 — 남길 리드 순번 뒤로 재부여
      const {data:tgtCons,error:e2}=await sb.from('lead_contacts').select('contact_seq').eq('lead_id',lead.lead_id);
      if(e2)throw e2;
      let maxSeq=0;(tgtCons||[]).forEach(c=>{const n=Number(c.contact_seq)||0;if(n>maxSeq)maxSeq=n;});
      const seqMap={};
      for(const c of rows.cons){
        if(!selCon.has(c.id))continue;
        const newSeq=++maxSeq;
        if(c.contact_seq!=null)seqMap[String(c.contact_seq)]=newSeq;
        const {error}=await sb.from('lead_contacts').update({lead_id:lead.lead_id,contact_seq:newSeq}).eq('id',c.id);
        if(error)throw error;
      }
      // 2) 선택 활동 이관 — 연결 컨택이 선택됐으면 순번 재매핑, 아니면 컨택 연결 비움
      for(const a of rows.acts){
        if(!selAct.has(a.id))continue;
        const upd={lead_id:lead.lead_id};
        if(a.contact_seq!=null&&seqMap[String(a.contact_seq)]!=null)upd.contact_seq=seqMap[String(a.contact_seq)];
        else upd.contact_seq=null;
        const {error}=await sb.from('lead_activities').update(upd).eq('id',a.id);
        if(error)throw error;
      }
      // 3) 사전조사 — 선택했고 남길 리드에 없을 때만 이관 (있으면 아래 정리에서 src꺼 삭제)
      if(selPre&&rows.pre){
        const {data:tgtPre}=await sb.from('lead_presurvey').select('lead_id').eq('lead_id',lead.lead_id).maybeSingle();
        if(!tgtPre){const {error}=await sb.from('lead_presurvey').update({lead_id:lead.lead_id}).eq('lead_id',src.lead_id);if(error)throw error;}
      }
      // 4) CRM 연결 — 남길 리드에 없으면 가져오기
      if(!lead.cust_id&&src.cust_id){
        const {error}=await sb.from('leads').update({cust_id:src.cust_id,updated_at:new Date().toISOString()}).eq('lead_id',lead.lead_id);
        if(error)throw error;
      }
      // 5) 안 옮긴(선택 안 한) 잔여 데이터 정리 — src에 남은 것 삭제
      await sb.from('lead_activities').delete().eq('lead_id',src.lead_id);
      await sb.from('lead_contacts').delete().eq('lead_id',src.lead_id);
      await sb.from('lead_presurvey').delete().eq('lead_id',src.lead_id);
      // 6) 삭제 로그 기록 후 중복 리드 삭제
      try{
        const u=(await sb.auth.getUser()).data.user;
        const laSorted=(rows.acts||[]).slice().sort((a,b)=>String(b.activity_date||'').localeCompare(String(a.activity_date||'')));
        const lastAct=laSorted[0];
        const lastActStr=lastAct?((lastAct.activity_date||'')+(lastAct.type?(' ['+lastAct.type+']'):'')+(lastAct.content?(' '+lastAct.content):'')).trim():'';
        await sb.from('lead_delete_logs').insert({lead_id:src.lead_id,hospital_name:src.hospital_name||null,owner:src.owner||null,stage:src.stage||null,lead_snapshot:src,last_activity:lastActStr||null,deleted_by:u?u.email:null,delete_reason:'[리드 병합] → '+(lead.hospital_name||'')+' ('+lead.lead_id+')로 통합 (선택 '+totalSel+'개 이관)'});
      }catch(logE){console.warn('병합 로그 기록 실패',logE);}
      const {error:delErr}=await sb.from('leads').delete().eq('lead_id',src.lead_id);
      if(delErr)throw delErr;
      setUndo(undoSnap);setDone(true);setBusy(false);
    }catch(e){alert('병합 오류: '+(e.message||e));setBusy(false);}
  }
  async function doUndo(){
    if(!undo)return;
    setBusy(true);
    try{
      const u=undo;
      // 1) 남길 리드에서 이번에 이관된 컨택/활동 제거
      if(u.selConIds.length)await sb.from('lead_contacts').delete().in('id',u.selConIds);
      if(u.selActIds.length)await sb.from('lead_activities').delete().in('id',u.selActIds);
      // 2) 남길 리드로 이관된 사전조사 제거 (이번에 넣은 경우만)
      if(u.preMovedToKeep)await sb.from('lead_presurvey').delete().eq('lead_id',u.keepLeadId);
      // 3) CRM 연결 원복 (이번에 가져온 경우만)
      if(u.linkedCust)await sb.from('leads').update({cust_id:null}).eq('lead_id',u.keepLeadId);
      // 4) 삭제된 src 리드 재생성
      const {error:le}=await sb.from('leads').insert(u.srcLead);
      if(le)throw le;
      // 5) src 컨택/활동/사전조사 스냅샷대로 재구성
      for(const c of u.cons){const {id,...rest}=c;const {error}=await sb.from('lead_contacts').insert(rest);if(error)throw error;}
      for(const a of u.acts){const {id,...rest}=a;const {error}=await sb.from('lead_activities').insert(rest);if(error)throw error;}
      if(u.pre){const {id,...rest}=u.pre;await sb.from('lead_presurvey').insert(rest);}

const DEFAULT_PS_WEIGHTS={confirmed_item:10,confirmed_max:15,expected_needs:10,special_clinics:5,clinic_hours:3,visit_timeslot:3,coordi_name:2,coordi_phone:2,reservation:3,visit_caution:2,precontact_done:10,meeting_possible:15,reservation_at:5,expected_cases:25};
function calcPresurveyScore(f,W){
  W=Object.assign({},DEFAULT_PS_WEIGHTS,W||{});
  let s=0;
  const items=(f.confirmed_items||'').split(',').map(x=>x.trim()).filter(Boolean);
  s+=Math.min(W.confirmed_max,items.length*W.confirmed_item);
  if((f.expected_needs||'').trim())s+=W.expected_needs;
  const sc=(f.special_clinics||'').split(',').map(x=>x.trim()).filter(Boolean);
  if(sc.length>0)s+=W.special_clinics;
  if((f.clinic_hours||'').trim())s+=W.clinic_hours;
  if(f.visit_timeslot&&f.visit_timeslot!=='미확인')s+=W.visit_timeslot;
  if((f.coordi_name||'').trim())s+=W.coordi_name;
  if((f.coordi_phone||'').trim())s+=W.coordi_phone;
  if(f.reservation&&f.reservation!=='미확인')s+=W.reservation;
  if((f.visit_caution||'').trim())s+=W.visit_caution;
  if(f.precontact_done)s+=W.precontact_done;
  if(f.meeting_possible&&/가능|응답|예/.test(f.meeting_possible)&&!/미응답|불가/.test(f.meeting_possible))s+=W.meeting_possible;
  if((f.reservation_at||'').trim())s+=W.reservation_at;
  const ecMap={'100건 이상':1,'50건~100건':0.7,'20건~50건':0.45,'20건 이하':0.2};
  if(f.expected_monthly_cases&&ecMap[f.expected_monthly_cases]!=null)s+=Math.round((W.expected_cases||0)*ecMap[f.expected_monthly_cases]);
  s=Math.min(100,s);
  const grade=s>=80?'A':s>=60?'B':s>=40?'C':'D';
  return {score:s,grade};
}
