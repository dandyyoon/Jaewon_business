function DemoModal({lead,onClose,onSaved}){
  const [f,setF]=useState({demo_start:'',demo_end:'',demo_provided_cnt:'',demo_used_cnt:'',demo_extended_at:'',demo_extend_reason:'',demo_feedback:''});
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [notLinked,setNotLinked]=useState(false);
  useEffect(()=>{
    if(!lead.cust_id){setNotLinked(true);setLoading(false);return;}
    (async()=>{
      const {data}=await sb.from('customers').select('demo_start,demo_end,demo_provided_cnt,demo_used_cnt,demo_extended_at,demo_extend_reason,demo_feedback').eq('cust_id',lead.cust_id).maybeSingle();
      if(data)setF({demo_start:data.demo_start||'',demo_end:data.demo_end||'',demo_provided_cnt:data.demo_provided_cnt!=null?String(data.demo_provided_cnt):'',demo_used_cnt:data.demo_used_cnt!=null?String(data.demo_used_cnt):'',demo_extended_at:data.demo_extended_at||'',demo_extend_reason:data.demo_extend_reason||'',demo_feedback:data.demo_feedback||''});
      setLoading(false);
    })();
  },[]);
  function set(k,v){setF(p=>({...p,[k]:v}));}
  async function save(){
    if(!lead.cust_id||saving)return;setSaving(true);
    const row={demo_start:f.demo_start||null,demo_end:f.demo_end||null,demo_provided_cnt:f.demo_provided_cnt!==''?Number(f.demo_provided_cnt):null,demo_used_cnt:f.demo_used_cnt!==''?Number(f.demo_used_cnt):null,demo_extended_at:f.demo_extended_at||null,demo_extend_reason:f.demo_extend_reason||null,demo_feedback:f.demo_feedback||null,updated_at:new Date().toISOString()};
    const res=await sb.from('customers').update(row).eq('cust_id',lead.cust_id);
    setSaving(false);
    if(res.error){alert('저장 오류: '+res.error.message);return;}
    onSaved();
  }
  return <div className="ov"><div className="modal" style={{width:480}}>
    <div className="mhd" style={{fontSize:14,fontWeight:600,marginBottom:3,display:'flex',alignItems:'center',gap:8}}><span>데모 트래킹</span><button className="tbtn" style={{marginLeft:'auto',background:'rgba(255,255,255,.06)'}} onClick={onClose}>✕</button></div>
    <div style={{fontSize:11,color:'var(--t3)',marginBottom:12}}>{lead.hospital_name}{lead.cust_id?' · 고객마스터(CRM) '+lead.cust_id:''}</div>
    {loading?<div style={{fontSize:12,color:'var(--t3)',padding:'24px 0',textAlign:'center'}}>불러오는 중…</div>:
     notLinked?
      <div style={{padding:'16px 0'}}>
        <div style={{fontSize:12,color:'var(--t2)',lineHeight:1.6,marginBottom:6}}>이 리드는 아직 CRM 고객과 연결되지 않았습니다.</div>
        <div style={{fontSize:11,color:'var(--t3)',lineHeight:1.6}}>데모 정보는 CRM 고객마스터에 저장되므로, 먼저 리드를 CRM 고객과 연결해야 입력할 수 있습니다. 아래 데모 트래킹 영역의 <b style={{color:'var(--t2)'}}>🔗 CRM 고객 연결</b> 버튼으로 연결해 주세요.</div>
      </div>
     :
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div><label className="lbl">DEMO 시작일</label><input type="date" value={f.demo_start} onChange={ev=>set('demo_start',ev.target.value)}/></div>
        <div><label className="lbl">DEMO 종료일</label><input type="date" value={f.demo_end} onChange={ev=>set('demo_end',ev.target.value)}/></div>
        <div><label className="lbl">제공 건수</label><input value={f.demo_provided_cnt} onChange={ev=>set('demo_provided_cnt',ev.target.value)} placeholder="숫자"/></div>
        <div><label className="lbl">사용 건수</label><input value={f.demo_used_cnt} onChange={ev=>set('demo_used_cnt',ev.target.value)} placeholder="숫자"/></div>
        <div><label className="lbl">연장일</label><input type="date" value={f.demo_extended_at} onChange={ev=>set('demo_extended_at',ev.target.value)}/></div>
        <div><label className="lbl">연장 사유</label><input value={f.demo_extend_reason} onChange={ev=>set('demo_extend_reason',ev.target.value)}/></div>
        <div style={{gridColumn:'1 / 3'}}><label className="lbl">피드백</label><textarea rows="3" value={f.demo_feedback} onChange={ev=>set('demo_feedback',ev.target.value)}/></div>
      </div>}
    <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}><button className="btn-ghost" onClick={onClose}>{notLinked?'닫기':'취소'}</button>{!notLinked&&!loading&&<button className="btn" onClick={save} disabled={saving}>{saving?'저장 중…':'저장'}</button>}</div>
  </div></div>;
}

// 리드 카드에서 CRM 고객 바로 연결
function LinkCustModal({lead,onClose,onLinked}){
  const [custs,setCusts]=useState([]);const [loading,setLoading]=useState(true);const [cq,setCq]=useState('');const [saving,setSaving]=useState(false);
  useEffect(()=>{
    (async()=>{let cs=[],f=0;while(true){const {data}=await sb.from('customers').select('cust_id,hospital_name,region,ceo_name,phone,business_address').range(f,f+999);if(!data||!data.length)break;cs=cs.concat(data);if(data.length<1000)break;f+=1000;if(f>40000)break;}setCusts(cs);setLoading(false);})();
  },[]);
  const norm=s=>String(s||'').replace(/\s+/g,'').toLowerCase();
  const ln=norm(lead.hospital_name);
  const suggest=!ln?[]:(()=>{
    const exact=custs.filter(c=>norm(c.hospital_name)===ln);
    const partial=custs.filter(c=>{const cn=norm(c.hospital_name);return cn&&cn!==ln&&(cn.includes(ln)||ln.includes(cn));});
    const seen=new Set();const merged=[];
    [...exact,...partial].forEach(c=>{if(!seen.has(c.cust_id)){seen.add(c.cust_id);merged.push(c);}});
    return merged.slice(0,8);
  })();
  const searchCust=cq.trim()?custs.filter(c=>{const s=cq.trim().toLowerCase();return [c.hospital_name,c.region,c.ceo_name,c.phone,c.cust_id].some(v=>v&&String(v).toLowerCase().includes(s));}).slice(0,20):[];
  const listShow=cq.trim()?searchCust:suggest;
  async function doLink(cust){
    if(saving)return;setSaving(true);
    const upd={cust_id:cust.cust_id,updated_at:new Date().toISOString()};
    // 리드 주소가 비어있고 CRM 고객에 사업장주소가 있으면 자동 채우기
    let filledAddr=false;
    if(!String(lead.address||'').trim()&&String(cust.business_address||'').trim()){
      upd.address=cust.business_address;filledAddr=true;
    }
    const r=await sb.from('leads').update(upd).eq('lead_id',lead.lead_id);
    setSaving(false);
    if(r.error){alert('오류: '+r.error.message);return;}
    if(filledAddr){lead.address=cust.business_address;}
    onLinked(cust.cust_id);
  }
  return (<div className="ov" style={{alignItems:'flex-start',padding:'40px 16px'}}>
    <div className="modal" style={{width:520,maxWidth:'100%'}}>
      <div className="mhd" style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
        <span style={{fontSize:15,fontWeight:700,color:'#22C55E'}}>CRM 고객 연결</span>
        <button className="tbtn" style={{marginLeft:'auto',background:'rgba(255,255,255,.06)'}} onClick={onClose}>✕</button>
      </div>
      <div style={{fontSize:11,color:'var(--t2)',marginBottom:10}}>리드 <b>{lead.hospital_name||lead.lead_id}</b>를 연결할 CRM 고객을 선택하세요.</div>
      <input value={cq} onChange={e=>setCq(e.target.value)} placeholder="병원명·지역·원장·전화·고객ID 검색" style={{marginBottom:10}}/>
      {loading?<div style={{fontSize:12,color:'var(--t3)',padding:'20px 0',textAlign:'center'}}>CRM 고객 불러오는 중…</div>:
       <div style={{maxHeight:340,overflowY:'auto'}}>
         {!cq.trim()&&suggest.length>0&&<div style={{fontSize:10,color:'#EF9F27',marginBottom:6}}>병원명이 비슷한 추천 고객 {suggest.length}곳{suggest.length>1?' · 이름이 유사한 여러 곳이 있으니 고객ID·지역을 확인하고 연결하세요':''}</div>}
         {listShow.length===0?<div style={{fontSize:12,color:'var(--t3)',padding:'16px 0',textAlign:'center'}}>{cq.trim()?'검색 결과가 없습니다.':'병원명으로 검색해 주세요.'}</div>:
          listShow.map(c=>(
           <div key={c.cust_id} onClick={()=>doLink(c)} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderRadius:7,cursor:'pointer',marginBottom:3,background:'rgba(255,255,255,.02)',border:'0.5px solid var(--border)'}}>

}

function DemoIssueModal({lead,contacts,onClose,onSaved}){
  const PRODUCTS=['BA','OA','SG','SC'];
  const PRODUCT_LABEL={BA:'MediAI-BA',OA:'MediAI-OA',SG:'MediAI-SG',SC:'MediAI-SC'};
  const PACS_VENDORS=['인피니티','태영','메디컬스탠다드','테크하임','동은'];
  const dow=(d)=>{if(!d)return '';const dt=new Date(d+'T00:00:00');if(isNaN(dt))return '';return '('+['일','월','화','수','목','금','토'][dt.getDay()]+')';};
  const today=new Date().toISOString().slice(0,10);
  const cs=(contacts||[]);
  const [f,setF]=useState({contact_seq:(cs[0]&&cs[0].contact_seq!=null)?String(cs[0].contact_seq):'',product:'BA',is_pacs:false,pacs_vendor:'',pacsDirect:false,demo_start:today,demo_end:''});
  const [busy,setBusy]=useState(false);
  function set(k,v){setF(p=>({...p,[k]:v}));}
  async function issueCode(startDate){
    const yr=(startDate||today).slice(0,4);
    const prefix='DEMO-'+yr+'-';
    const {data}=await sb.from('demos').select('demo_code').like('demo_code',prefix+'%').order('demo_code',{ascending:false}).limit(1);
    let next=1;
    if(data&&data[0]){const m=String(data[0].demo_code).match(/(\d+)$/);if(m)next=parseInt(m[1])+1;}
    return prefix+String(next).padStart(4,'0');
  }
  async function save(){
    if(!f.demo_start){alert('데모 시작일을 입력하세요.');return;}
    if(f.is_pacs&&!f.pacs_vendor.trim()){alert('PACS 데모는 공급사를 입력하세요.');return;}
    setBusy(true);
    try{
      const sel=cs.find(c=>String(c.contact_seq)===String(f.contact_seq));
      let code=await issueCode(f.demo_start);
      const row={demo_code:code,lead_id:lead.lead_id,contact_seq:f.contact_seq===''?null:Number(f.contact_seq),doctor_name:sel?sel.contact_name:null,cust_id:lead.cust_id||null,product:f.product,is_pacs:!!f.is_pacs,pacs_vendor:f.is_pacs?(f.pacs_vendor||null):null,demo_start:f.demo_start,demo_end:f.demo_end||null,status:'진행중',owner:lead.owner||null};
      let {error}=await sb.from('demos').insert(row);
      // 코드 중복(동시 발급) 시 1회 재시도
      if(error&&/duplicate|unique|already exists/i.test(error.message||'')){code=await issueCode(f.demo_start);row.demo_code=code;({error}=await sb.from('demos').insert(row));}
      if(error)throw error;
      alert('데모가 발급되었습니다.\n\n데모 코드: '+code+'\n제품: '+PRODUCT_LABEL[f.product]+(sel?('\n교수: '+sel.contact_name):'')+(lead.cust_id?'':'\n\n※ 아직 CRM 고객과 연결되지 않았습니다. 계정 활성화(CRM 고객 등록/연결) 후 자동 연결됩니다.'));
      onSaved();
    }catch(e){alert('발급 오류: '+(e.message||e));setBusy(false);}
  }
  return <div className="ov" style={{zIndex:170}}><div className="modal" style={{width:480,maxWidth:'100%'}}>
    <div className="mhd" style={{fontSize:14,fontWeight:600,display:'flex',alignItems:'center',gap:8}}><span>🧪 데모 시작 (코드 발급)</span><button className="tbtn" style={{marginLeft:'auto',background:'rgba(255,255,255,.06)'}} onClick={onClose}>✕</button></div>
    <div style={{fontSize:11,color:'var(--t3)',marginBottom:12,marginTop:2}}>{lead.hospital_name} · 교수·제품별로 데모를 발급합니다. 코드는 시작일 연도 기준 자동 부여됩니다.</div>
    {!lead.cust_id&&<div style={{background:'rgba(251,191,36,.1)',border:'0.5px solid rgba(251,191,36,.4)',borderRadius:8,padding:'8px 11px',marginBottom:12,fontSize:11,color:'#fbbf24',lineHeight:1.5}}>⚠️ 이 리드는 아직 CRM 고객과 연결되지 않았습니다. 계정 활성화(CRM 고객 등록/연결)를 먼저 하는 것을 권장합니다.</div>}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      <div><label className="lbl">교수 (컨택)</label>
        <select value={f.contact_seq} onChange={e=>set('contact_seq',e.target.value)}>
          <option value="">(병원 전체)</option>
          {cs.map(c=><option key={c.id} value={c.contact_seq}>{c.contact_name} {c.position||''}</option>)}
        </select>
      </div>
      <div><label className="lbl">제품</label>
        <select value={f.product} onChange={e=>set('product',e.target.value)}>
          {PRODUCTS.map(p=><option key={p} value={p}>{PRODUCT_LABEL[p]}</option>)}
        </select>
      </div>
      <div><label className="lbl">데모 시작일 *</label>
        <div style={{position:'relative'}}>
          <div style={{fontSize:12,background:'#13202f',border:'0.5px solid var(--border-md)',borderRadius:7,color:'var(--t)',padding:'8px 10px',width:'100%',display:'flex',alignItems:'center',boxSizing:'border-box'}}>
            <span>{f.demo_start||'날짜 선택'}</span>{f.demo_start&&<span style={{color:'#5EEAD4',fontWeight:700,marginLeft:6}}>{dow(f.demo_start)}</span>}<span style={{marginLeft:'auto',opacity:.6}}>📅</span>
          </div>
          <input type="date" value={f.demo_start} onChange={e=>set('demo_start',e.target.value)} style={{position:'absolute',inset:0,width:'100%',height:'100%',opacity:0,cursor:'pointer',margin:0}}/>
        </div>
      </div>
      <div><label className="lbl">데모 종료(예정)일</label>
        <div style={{position:'relative'}}>
          <div style={{fontSize:12,background:'#13202f',border:'0.5px solid var(--border-md)',borderRadius:7,color:'var(--t)',padding:'8px 10px',width:'100%',display:'flex',alignItems:'center',boxSizing:'border-box'}}>
            <span>{f.demo_end||'날짜 선택'}</span>{f.demo_end&&<span style={{color:'#5EEAD4',fontWeight:700,marginLeft:6}}>{dow(f.demo_end)}</span>}<span style={{marginLeft:'auto',opacity:.6}}>📅</span>
          </div>
          <input type="date" value={f.demo_end} onChange={e=>set('demo_end',e.target.value)} style={{position:'absolute',inset:0,width:'100%',height:'100%',opacity:0,cursor:'pointer',margin:0}}/>
        </div>
      </div>
    </div>
    <div style={{marginTop:12,padding:'10px 12px',background:'rgba(255,255,255,.03)',border:'0.5px solid var(--border)',borderRadius:8}}>
      <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:12,fontWeight:600}}>
        <input type="checkbox" checked={f.is_pacs} onChange={e=>set('is_pacs',e.target.checked)} style={{width:16,height:16,margin:0}}/>
        PACS 경유 데모 (병원명 옆 PACS 라벨 표시)
      </label>
      {f.is_pacs&&<div style={{marginTop:8}}>
        <label className="lbl">PACS 공급사</label>
        <select value={f.pacsDirect?'직접입력':f.pacs_vendor} onChange={e=>{const v=e.target.value;if(v==='직접입력'){set('pacsDirect',true);set('pacs_vendor','');}else{set('pacsDirect',false);set('pacs_vendor',v);}}}>
          <option value="">선택</option>
          {PACS_VENDORS.map(o=><option key={o} value={o}>{o}</option>)}
          <option value="직접입력">직접입력</option>
        </select>
        {f.pacsDirect&&<input style={{marginTop:6}} placeholder="공급사 직접 입력" value={f.pacs_vendor} onChange={e=>set('pacs_vendor',e.target.value)}/>}
      </div>}
    </div>
    <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}>
      <button className="btn-ghost" onClick={onClose}>취소</button>
      <button className="btn" disabled={busy} onClick={save}>{busy?'발급 중...':'🧪 데모 발급'}</button>
    </div>
  </div></div>;
}

function LeadDetail({lead,contacts,acts,onClose,setModal,onRefresh}){
  const cs=contacts.filter(c=>c.lead_id===lead.lead_id).sort((a,b)=>(a.contact_seq||0)-(b.contact_seq||0));
  const [cid,setCid]=useState(cs.length?cs[0].id:null);
  const PRODUCT_LABEL={BA:'MediAI-BA',OA:'MediAI-OA',SG:'MediAI-SG',SC:'MediAI-SC'};
  const DEMO_SC={'진행중':['#3a2f1a','#EF9F27'],'계약전환':['#1d3b32','#5DCAA5'],'종료':['rgba(255,255,255,.06)','var(--t3)'],'실패':['rgba(220,38,38,.15)','#F87171']};
  const [demoRows,setDemoRows]=useState([]);const [demoExts,setDemoExts]=useState([]);const [crmLoad,setCrmLoad]=useState(false);const [linkOpen,setLinkOpen]=useState(false);
  async function loadDemos(){
    setCrmLoad(true);
    try{
      let q=sb.from('demos').select('*');
      if(lead.cust_id)q=q.or('cust_id.eq.'+lead.cust_id+',lead_id.eq.'+lead.lead_id);
      else q=q.eq('lead_id',lead.lead_id);
      const {data}=await q.order('demo_start',{ascending:false});
      const rows=data||[];setDemoRows(rows);
      const codes=rows.map(r=>r.demo_code);
      if(codes.length){const {data:ex}=await sb.from('demo_extensions').select('*').in('demo_code',codes).order('extended_at',{ascending:true});setDemoExts(ex||[]);}
      else setDemoExts([]);
    }catch(e){console.warn('데모 로딩 실패',e);setDemoRows([]);setDemoExts([]);}
    setCrmLoad(false);
  }
  useEffect(()=>{loadDemos();},[lead.cust_id,lead.lead_id]);
  const c=cs.find(x=>x.id===cid)||cs[0]||{};
  const la=acts.filter(a=>a.lead_id===lead.lead_id);
  const cacts=cid?la.filter(a=>a.contact_seq===c.contact_seq):la;
  async function delAct(a){
    if(!confirm('이 활동을 삭제하시겠습니까?\n\n삭제 내용: '+(a.content||'(내용 없음)')+'\n\n삭제 기록은 로그에 남습니다.'))return;
    try{
      const u=(await sb.auth.getUser()).data.user;
      await sb.from('activity_delete_logs').insert({activity_id:a.id,lead_id:a.lead_id,activity_date:a.activity_date||null,type:a.type||null,content:a.content||null,insight:a.insight||null,next_step:a.next_step||null,solutions:a.solutions||null,priority:a.priority||null,owner:a.owner||null,deleted_by:u?u.email:null});
      const {error}=await sb.from('lead_activities').delete().eq('id',a.id);
      if(error)throw error;
      alert('삭제되었습니다.');
      if(onRefresh)onRefresh();
    }catch(e){alert('삭제 오류: '+(e.message||e));}
  }
  async function unlinkCust(){
    if(!lead.cust_id)return;
    if(!confirm('이 리드와 CRM 고객('+lead.cust_id+')의 연결을 해제할까요?\n\n※ CRM 고객 데이터(데모 정보 등)는 삭제되지 않고, 리드와의 연결만 끊깁니다.\n다시 연결하려면 🔗 CRM 고객 연결 버튼으로 다시 연결할 수 있습니다.'))return;
    const res=await sb.from('leads').update({cust_id:null,updated_at:new Date().toISOString()}).eq('lead_id',lead.lead_id);
    if(res.error){alert('연결 해제 오류: '+res.error.message);return;}
    lead.cust_id=null;loadDemos();
    if(onRefresh)onRefresh();
  }
  const stages=lead.funnel_type==='B2B'?STAGES_B2B:STAGES_GEN;
  async function delLead(){
    const reason=window.prompt('【'+lead.hospital_name+'】 리드 삭제 사유를 입력하세요.\n(로그에 기록되며, 연결된 연락처·활동·사전조사는 유지됩니다)');
    if(reason===null)return; // 취소
    if(!reason.trim()){alert('삭제 사유를 입력해야 합니다.');return;}
    if(!confirm('【'+lead.hospital_name+'】 리드를 삭제합니다.\n\n사유: '+reason.trim()+'\n\n연결된 연락처·활동·사전조사는 유지됩니다.\n이 작업은 되돌리기 어렵습니다. 계속하시겠습니까?'))return;
    try{
      const u=(await sb.auth.getUser()).data.user;
      const laSorted=la.slice().sort((a,b)=>String(b.activity_date||'').localeCompare(String(a.activity_date||'')));
      const lastAct=laSorted[0];
      const lastActStr=lastAct?((lastAct.activity_date||'')+(lastAct.type?(' ['+lastAct.type+']'):'')+(lastAct.content?(' '+lastAct.content):'')).trim():'';
      const {error:logErr}=await sb.from('lead_delete_logs').insert({lead_id:lead.lead_id,hospital_name:lead.hospital_name||null,owner:lead.owner||null,stage:lead.stage||null,lead_snapshot:lead,last_activity:lastActStr||null,deleted_by:u?u.email:null,delete_reason:reason.trim()});
      if(logErr)throw new Error('로그 기록 실패: '+logErr.message);
      const {error}=await sb.from('leads').delete().eq('lead_id',lead.lead_id);
      if(error)throw error;
      alert('리드가 삭제되었습니다. (삭제 로그에 기록됨)');
      onClose&&onClose();
      if(onRefresh)onRefresh();
    }catch(e){alert('삭제 오류: '+(e.message||e));}
  }
  const ci=stages.indexOf(lead.stage);
  const [openAct,setOpenAct]=useState(null);
  const F=(k,v)=><div className="fbox"><div className="k">{k}</div><div className="v">{v||'-'}</div></div>;

// 영업사원 관리 (sales_reps 테이블 · 코드 수정 없이 추가/수정/제외)
function RepManageModal({onClose,onSaved}){
  const [rows,setRows]=useState([]);const [nm,setNm]=useState('');const [em,setEm]=useState('');const [busy,setBusy]=useState(false);const [loading,setLoading]=useState(true);
  const [editKey,setEditKey]=useState(null);const [eNm,setENm]=useState('');const [eEm,setEEm]=useState('');
  async function load(){setLoading(true);try{const {data}=await sb.from('sales_reps').select('name,email,active').order('name');setRows(data||[]);}catch(e){}setLoading(false);}
  useEffect(()=>{load();},[]);
  function memAdd(n){if(n&&!SALES_REPS.includes(n))SALES_REPS.push(n);}
  function memDel(n){const i=SALES_REPS.indexOf(n);if(i>=0)SALES_REPS.splice(i,1);}
  async function add(){const n=nm.trim();if(!n)return;setBusy(true);const {error}=await sb.from('sales_reps').upsert({name:n,email:em.trim()||null,active:true},{onConflict:'name'});setBusy(false);if(error){alert('추가 오류: '+error.message+'\n\n(sales_reps 테이블이 없으면 안내된 SQL을 먼저 실행하세요)');return;}memAdd(n);setNm('');setEm('');load();onSaved&&onSaved();}
  function startEdit(r){setEditKey(r.name);setENm(r.name);setEEm(r.email||'');}
  async function saveEdit(r){
    const nn=eNm.trim();if(!nn){alert('이름을 입력하세요.');return;}
    if(nn!==r.name&&!window.confirm('이름을 "'+r.name+'" → "'+nn+'"(으)로 변경합니다.\n\n※ 과거 활동·리드에 이미 기록된 담당자 표기는 자동으로 바뀌지 않습니다. 오타 수정 용도로만 사용하세요.\n계속할까요?'))return;
    setBusy(true);const {error}=await sb.from('sales_reps').update({name:nn,email:eEm.trim()||null}).eq('name',r.name);setBusy(false);
    if(error){alert('수정 오류: '+error.message);return;}
    if(nn!==r.name){memDel(r.name);memAdd(nn);}
    setEditKey(null);load();onSaved&&onSaved();
  }
  async function toggleActive(r){
    const currentlyActive=r.active!==false;const newActive=!currentlyActive;
    if(currentlyActive&&!window.confirm('"'+r.name+'"을(를) 담당자 목록에서 제외할까요?\n\n· 데이터는 보존되며 언제든 "복귀"할 수 있습니다.\n· 실제 퇴사(담당 리드 이관 포함)는 상단 "퇴사 처리"를 사용하세요.'))return;
    setBusy(true);const {error}=await sb.from('sales_reps').update({active:newActive}).eq('name',r.name);setBusy(false);
    if(error){alert('오류: '+error.message);return;}
    if(newActive)memAdd(r.name);else memDel(r.name);
    load();onSaved&&onSaved();
  }
  return (<div className="ov" style={{zIndex:170}}><div className="modal" style={{width:540,maxWidth:'100%'}}>
    <div className="mhd" style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}><span style={{fontSize:15,fontWeight:700}}>👥 영업사원 관리</span><button className="tbtn" style={{marginLeft:'auto',background:'rgba(255,255,255,.06)'}} onClick={onClose}>✕</button></div>
    <div style={{fontSize:11,color:'var(--t3)',marginBottom:10,lineHeight:1.5}}>등록한 영업사원이 담당자 선택·목표입력·주간보고 등에 자동으로 나타납니다. <b style={{color:'var(--t2)'}}>실제 퇴사(리드 이관 포함)는 "퇴사 처리"</b>를, 잠깐 빼둘 땐 "제외"를 사용하세요.</div>
    <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>
      <input value={nm} onChange={e=>setNm(e.target.value)} placeholder="이름" style={{flex:'1 1 110px'}}/>
      <input value={em} onChange={e=>setEm(e.target.value)} placeholder="이메일(선택)" style={{flex:'1 1 150px'}}/>
      <button className="btn" disabled={busy||!nm.trim()} onClick={add}>+ 추가</button>
    </div>
    <div style={{border:'0.5px solid var(--border)',borderRadius:8,maxHeight:340,overflow:'auto'}}>
      {loading?<div style={{padding:14,textAlign:'center',color:'var(--t3)',fontSize:12}}>불러오는 중…</div>:
       rows.length===0?<div style={{padding:14,textAlign:'center',color:'var(--t3)',fontSize:12}}>등록된 영업사원이 없습니다. 위에서 이름을 추가하세요.</div>:
       rows.map(r=>{const inactive=r.active===false;const editing=editKey===r.name;return (
        <div key={r.name} style={{padding:'8px 11px',borderTop:'0.5px solid var(--border)',opacity:inactive?0.5:1}}>
          {editing?
          <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
            <input value={eNm} onChange={e=>setENm(e.target.value)} placeholder="이름" style={{flex:'1 1 100px'}}/>
            <input value={eEm} onChange={e=>setEEm(e.target.value)} placeholder="이메일" style={{flex:'1 1 140px'}}/>
            <button className="btn" disabled={busy} onClick={()=>saveEdit(r)}>저장</button>
            <button className="btn-ghost" onClick={()=>setEditKey(null)}>취소</button>
          </div>
          :
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:13,fontWeight:600}}>{r.name}</span>
            {r.email&&<span style={{fontSize:11,color:'var(--t3)'}}>{r.email}</span>}
            {inactive&&<span style={{fontSize:10,color:'#F5C36B'}}>제외됨</span>}
            <span style={{marginLeft:'auto',display:'flex',gap:6}}>
              <button className="tbtn" style={{background:'rgba(133,183,235,.15)',color:'#85B7EB'}} disabled={busy} onClick={()=>startEdit(r)}>수정</button>
              <button className="tbtn" style={{background:inactive?'rgba(95,202,165,.15)':'rgba(245,195,107,.15)',color:inactive?'#5DCAA5':'#F5C36B'}} disabled={busy} onClick={()=>toggleActive(r)}>{inactive?'복귀':'제외'}</button>
            </span>
          </div>}
        </div>);})}
    </div>
  </div></div>);
}

function Shell({user,onLogout}){

  const [hov,setHov]=useState(null);
  const [mobOpen,setMobOpen]=useState(false);
  const [histStack,setHistStack]=useState(['dashboard']);
  const mainRef=useRef(null);
  const [,setFrk]=useState(0);
  useEffect(()=>{(async()=>{try{const {data}=await sb.from('former_reps').select('name');let ch=false;(data||[]).forEach(r=>{if(r.name&&!FORMER_REPS.includes(r.name)){FORMER_REPS.push(r.name);ch=true;}});if(ch)setFrk(x=>x+1);}catch(e){}})();},[]);
  useEffect(()=>{(async()=>{try{const {data}=await sb.from('sales_reps').select('name,active').order('sort_order',{nullsFirst:false});let ch=false;(data||[]).forEach(r=>{if(r.name&&r.active!==false&&!SALES_REPS.includes(r.name)){SALES_REPS.push(r.name);ch=true;}});if(ch)setFrk(x=>x+1);}catch(e){}})();},[]);
  const G1=[{id:'dashboard',label:'대시보드',c:'#5DCAA5'},{id:'domestic',label:'국내리드',c:'#185FA5'},{id:'overseas',label:'해외리드',c:'#534AB7'},{id:'expo',label:'학회·부스·전시회',c:'#BA7517'}];
  const G2=[{id:'link',label:'리드↔고객 연결',c:'#22C55E'},{id:'usage',label:'분석건수',c:'#38BDF8'},{id:'insight',label:'전환·매출 인사이트',c:'#F472B6'}];
  const ALL_VIEWS=[...G1,...G2];
  const viewLabel=id=>{const v=ALL_VIEWS.find(x=>x.id===id);return v?v.label:'';};
  const scrollTop=()=>{setTimeout(()=>{if(mainRef.current)mainRef.current.scrollTo({top:0,behavior:'smooth'});},20);};
  const go=id=>{
    if(id!==view){
      setHistStack(s=>[...s,id]);
      try{window.history.pushState({shView:id},'');}catch(e){}
    }

    setMobOpen(false);
    scrollTop();
  };
  const goBack=()=>{
    setHistStack(s=>{
      if(s.length<=1)return s;
      const ns=s.slice(0,-1);
      setView(ns[ns.length-1]);
      setMobOpen(false);
      scrollTop();
      return ns;
    });
  };
  // 폰 뒤로가기(popstate) → 이전 화면
  useEffect(()=>{
    try{window.history.pushState({shBase:true},'');}catch(e){}
    const onPop=()=>{ setHistStack(s=>{
      if(s.length<=1){ // 더 갈 곳 없으면 기준점 다시 심어 이탈 방지

    }); };

  },[]);

  const Item=n=>{const on=view===n.id;const hv=hov===n.id&&!on;return <div key={n.id} className="nav" onClick={()=>go(n.id)} onMouseEnter={()=>setHov(n.id)} onMouseLeave={()=>setHov(h=>h===n.id?null:h)} style={{color:on||hv?'#fff':'var(--t2)',background:on?'linear-gradient(135deg,'+n.c+'dd,'+n.c+'88)':hv?'linear-gradient(135deg,'+n.c+'55,'+n.c+'18)':'linear-gradient(135deg,'+n.c+'22,'+n.c+'0a)',border:on?'2px solid #EF9F27':hv?'1.5px solid #EF9F27aa':'0.5px solid '+n.c+'33',boxShadow:on?'0 0 0 1px #EF9F2755, 0 6px 18px rgba(239,159,39,.35), inset 0 1px 0 rgba(255,255,255,.2)':hv?'0 4px 12px rgba(239,159,39,.22), inset 0 1px 0 rgba(255,255,255,.1)':'inset 0 1px 0 rgba(255,255,255,.04)',transform:hv?'translateX(3px)':'none'}}><span className="dot" style={{background:on||hv?'#fff':n.c,color:n.c}}/>{n.label}</div>;};

      <div ref={mainRef} className="app-main" style={{flex:1,minWidth:0,overflow:'auto'}}>
        <div className="mob-topbar" style={{alignItems:'center',gap:10,padding:'10px 14px',borderBottom:'0.5px solid var(--border)',position:'sticky',top:0,background:'#141d29',zIndex:100}}>
          <button onClick={()=>setMobOpen(true)} aria-label="메뉴 열기" style={{width:34,height:34,borderRadius:8,border:'0.5px solid var(--border)',background:'rgba(255,255,255,.06)',color:'#fff',fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>☰</button>
          {canBack&&<button onClick={goBack} aria-label="뒤로" style={{height:34,padding:'0 12px',borderRadius:8,border:'0.5px solid var(--border)',background:'rgba(255,255,255,.06)',color:'#fff',fontSize:13,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4,flexShrink:0}}>‹ 뒤로</button>}
          <span style={{fontSize:14,fontWeight:700,color:'#fff'}}>Sales Hub</span>
          {view!=='dashboard'&&<span style={{fontSize:12,color:'var(--t3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>· {viewLabel(view)}</span>}
        </div>
        <div className="app-main-inner" style={{padding:'18px 24px'}}>
          {view==='dashboard'&&<DashboardView go={go}/>}
          {view==='domestic'&&<DomesticView/>}
          {view==='overseas'&&<OverseasView/>}
          {view==='expo'&&<EventsView/>}
          {view==='link'&&<LinkView/>}
          {view==='usage'&&<UsageView/>}
          {view==='insight'&&<InsightView/>}
        </div>
      </div>
    </div>
  );
}
function App(){
  const [user,setUser]=useState(undefined);
  const [wReady,setWReady]=useState(false);
  useEffect(()=>{
    sb.auth.getSession().then(({data})=>setUser(data.session?.user||null));
    const {data:sub}=sb.auth.onAuthStateChange((_e,s)=>setUser(s?.user||null));
    loadFunnelWeights().finally(()=>setWReady(true));
    return ()=>sub.subscription.unsubscribe();
  },[]);
  if(user===undefined)return <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--t3)'}}>로딩 중...</div>;
  if(!user)return <Login/>;
  if(!wReady)return <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--t3)'}}>로딩 중...</div>;
  return <Shell user={user} onLogout={async()=>{await sb.auth.signOut();}}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
