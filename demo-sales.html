*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{height:100%;}
html{scrollbar-gutter:stable;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;color:rgba(255,255,255,0.9);background:radial-gradient(1200px 600px at 20% -10%, #1f3a4d 0%, #162032 55%, #121a28 100%);background-attachment:fixed;word-break:keep-all;overflow-wrap:break-word;}
:root{--brand:#0F6E56;--blue:#185FA5;--purple:#534AB7;--amber:#BA7517;--coral:#D85A30;--bg:#1e2d40;--bg2:#162032;--surface:#1a2738;--border:rgba(255,255,255,.08);--border-md:rgba(255,255,255,.14);--t:rgba(255,255,255,0.95);--t2:rgba(255,255,255,0.72);--t3:rgba(255,255,255,0.46);}
input,select,textarea{font-family:inherit;font-size:12px;background:#13202f;border:0.5px solid var(--border-md);border-radius:7px;color:var(--t);padding:8px 10px;width:100%;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);}
button{font-family:inherit;cursor:pointer;border:none;border-radius:7px;}
.btn{background:linear-gradient(135deg,#2472c8,#185FA5);color:#fff;padding:8px 14px;font-size:12px;font-weight:600;box-shadow:0 4px 12px rgba(24,95,165,.4);}
.btn-ghost{background:rgba(255,255,255,.04);border:0.5px solid var(--border-md);color:var(--t2);padding:7px 12px;}
.card{background:linear-gradient(160deg,#20303f 0%,#172331 100%);border:0.5px solid var(--border);border-radius:14px;padding:15px;box-shadow:0 8px 24px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.05);transition:transform .12s ease,box-shadow .12s ease;scroll-margin-top:12px;}
.lbl{font-size:11px;color:var(--t2);margin-bottom:4px;display:block;}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:150;padding:16px;overflow-y:auto;}
.modal{background:linear-gradient(160deg,#22323f,#172230);border:0.5px solid var(--border-md);border-radius:16px;padding:0 18px 18px;width:480px;max-width:100%;max-height:calc(100dvh - 32px);overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);position:relative;}
.mhd{position:sticky;top:0;background:#22323f;margin:0 -18px 14px;padding:14px 18px 11px;z-index:6;border-radius:16px 16px 0 0;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;}
.pill{font-size:10px;padding:2px 8px;border-radius:20px;}
.nav{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t2);margin-bottom:5px;border:0.5px solid transparent;transition:all .12s;}
.nav:hover{transform:translateX(2px);}
.nav .dot{width:9px;height:9px;border-radius:3px;flex-shrink:0;box-shadow:0 0 8px currentColor;}
.kpi3d{border-radius:14px;padding:14px 15px;box-shadow:0 8px 22px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.10);position:relative;overflow:hidden;transition:transform .12s ease,box-shadow .12s ease;}
.hd{font-size:18px;font-weight:700;color:#fff;}
.panel{background:linear-gradient(160deg,#20303f,#172331);border:0.5px solid var(--border);border-radius:14px;padding:14px;box-shadow:0 8px 24px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.05);transition:transform .12s,box-shadow .12s;scroll-margin-top:12px;}
.panel.click{cursor:pointer;}
.card:hover,.panel:hover,.kpi3d:hover{transform:translateY(-3px);box-shadow:0 14px 34px rgba(0,0,0,.45),0 0 0 1.5px rgba(239,159,39,.55),inset 0 1px 0 rgba(255,255,255,.08);}
/* 모달(.ov)이 카드/패널 안에서 열려 있을 땐 hover 떠오름을 끔 → 오버레이 깜빡임 방지 */
.card:has(.ov):hover,.panel:has(.ov):hover,.kpi3d:has(.ov):hover{transform:none;}
.card:has(.ov),.panel:has(.ov),.kpi3d:has(.ov){transform:none!important;transition:none;}
.tbtn{font-size:12px;font-weight:600;padding:7px 13px;border-radius:9px;color:#fff;border:0.5px solid rgba(255,255,255,.16);box-shadow:0 3px 9px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.18);transition:transform .1s;}
.tbtn:hover{transform:translateY(-1px);}
@keyframes blink{0%,100%{box-shadow:0 0 0 0 rgba(239,159,39,.7),0 3px 9px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.18);}50%{box-shadow:0 0 0 7px rgba(239,159,39,0),0 3px 9px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.18);}}
.tbtn.blink{animation:blink 1.3s ease-out infinite;}
.fbox{background:rgba(255,255,255,.03);border:0.5px solid var(--border);border-radius:8px;padding:8px 11px;}
.fbox .k{font-size:10px;color:var(--t3);margin-bottom:3px;}
.fbox .v{font-size:13px;color:var(--t);font-weight:500;word-break:break-all;}
::-webkit-scrollbar{width:8px;height:8px;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:4px;}
.ldwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;}
@keyframes barwave{0%,100%{transform:scaleY(0.35);}50%{transform:scaleY(1);}}
.ldbar{width:8px;height:40px;border-radius:3px;transform-origin:bottom;animation:barwave 1.1s ease-in-out infinite;}
@keyframes hbpulse{0%{text-shadow:0 0 0 rgba(255,255,255,0);}15%{text-shadow:0 0 14px rgba(255,255,255,.9);}30%,100%{text-shadow:0 0 0 rgba(255,255,255,0);}}
@keyframes shpulse{0%,100%{box-shadow:0 0 0 rgba(239,159,39,0);border-color:#1D9E75;}50%{box-shadow:0 0 16px rgba(239,159,39,.9);border-color:#EF9F27;}}
@keyframes crmpulse{0%,100%{box-shadow:0 0 0 rgba(29,158,117,0);border-color:#1D9E75;}50%{box-shadow:0 0 16px rgba(29,158,117,.9);border-color:#2fe0a8;}}
.wk-grid{display:grid;grid-template-columns:170px 1fr 1fr;gap:12px;}
.wk-lbl{display:none;font-weight:600;color:var(--t3);}
.rep-lbl{display:none;color:var(--t3);}
.card-hd{background:linear-gradient(90deg,rgba(133,183,235,.10),rgba(133,183,235,.02));border-radius:8px;padding:5px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:background .15s ease;border-left:3px solid rgba(133,183,235,.4);}
.card-hd:hover{background:linear-gradient(90deg,rgba(133,183,235,.22),rgba(133,183,235,.06));border-left-color:#EF9F27;}
.card-hd .up{font-size:10px;color:var(--t3);opacity:.55;transition:opacity .15s;}
.card-hd:hover .up{opacity:1;color:#EF9F27;}
.mob-topbar{display:none;}
.mob-backdrop{display:none;}
/* 모바일 탭 시 기본 회색 하이라이트(깜빡임) 제거 */
*{-webkit-tap-highlight-color:transparent;}
/* 출장 관리 캘린더: 날짜 칸 hover 주황 테두리 · 병원 칩 hover/선택 표시 (마우스 기기에서만 — 터치 깜빡임 방지) */
@media (hover:hover) and (pointer:fine){
  .trip-day{transition:border-color .15s ease,box-shadow .15s ease;}
  .trip-day:hover{border-color:#EF9F27 !important;box-shadow:0 0 10px rgba(239,159,39,.25);}
  .trip-visit{transition:border-color .15s ease,box-shadow .15s ease;}
  .trip-visit:hover{border-color:#EF9F27 !important;}
}
@media (max-width:768px){
  .wk-grid{grid-template-columns:1fr;gap:4px;}
  .wk-head{display:none !important;}
  .wk-lbl{display:inline;}
  .rep-head{display:none !important;}
  .rep-lbl{display:inline;}
  .mob-topbar{display:flex !important;padding-top:calc(10px + env(safe-area-inset-top)) !important;}
  .app-side{position:fixed;top:0;left:0;height:100%;z-index:120;transform:translateX(-100%);transition:transform .25s ease;width:240px !important;}
  .app-side.open{transform:translateX(0);}
  .mob-backdrop.open{display:block !important;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:110;}
  .app-main{padding-top:0 !important;}
  .app-main-inner{padding:14px 14px !important;}
  .grid-auto-mob{grid-template-columns:1fr 1fr !important;}
  div[style*="grid-template-columns"]:not(.grid-auto-mob):not(.tbl-grid){grid-template-columns:1fr !important;}
  .tbtn,.btn,.btn-ghost{white-space:nowrap;}
  .card,.panel{scroll-margin-top:70px;}
  .ov{padding:12px 10px !important;align-items:flex-start !important;}
  .modal{max-height:calc(100dvh - 24px) !important;max-width:100% !important;}
  .rep-head.tbl-grid,.tbl-grid[style*=".7fr .7fr .7fr"]{grid-template-columns:1.3fr .8fr .7fr .7fr !important;gap:3px !important;}
  /* 리드 상세: 교수(컨택) 선택을 제목 우측 상단 대신 아래 줄 전체 폭으로 (아이폰 터치 편의) */
  .ld-contact-sel{order:9;flex:1 1 100%;width:100% !important;min-width:0 !important;margin-top:6px;}
}
@media (max-width:480px){
  .grid-auto-mob{grid-template-columns:1fr !important;}
}
</style>

};
function tripCountryGrade(c){for(const[g,arr]of Object.entries(TRIP_COUNTRY_GRADE)){if(arr.some(x=>c&&c.includes(x)))return g;}return '다';}

// 국내 출장비 계산. f: {grade,region(sinai/geun/jung),days,nights,time(under4/mid/over9),meal(none/one/all),over40,nonPublic,multiVisits,transitActual,lodgingActual,carKm,toll}
function calcDomesticCost(f){
  const g=f.grade||'제5호';const region=f.region||'geun';const days=Number(f.days)||1;const nights=Number(f.nights)||0;
  const time=f.time||'mid';const meal=f.meal||'none';
  const over40=!!f.over40;const nonPublic=!!f.nonPublic;const multiVisits=!!f.multiVisits;
  const transitActual=Number(f.transitActual)||0;const lodgingActual=Number(f.lodgingActual)||0;const carKm=Number(f.carKm)||0;const toll=Number(f.toll)||0;
  let ilbiUnit=0,ilbi=0,sikUnit=0,sik=0,gyo=0,suk=0;

  // 일비
  if(region==='sinai'){ilbiUnit=TRIP_RATES.sinai[g].ilbi;ilbi=(time==='under4')?0:ilbiUnit*days;}
  else if(region==='geun'){ilbiUnit=TRIP_RATES.geun[g].ilbi;let m=1;if(time==='under4')m=0.5;if(nonPublic)m=Math.min(m,0.5);ilbi=Math.round(ilbiUnit*m)*days;}
  else{ilbiUnit=TRIP_RATES.jung[g].ilbi;let m=1;if(time==='under4')m=0.5;ilbi=Math.round(ilbiUnit*m)*days;}

  // 식비
  if(region==='sinai'){sik=0;}
  else if(region==='geun'){
    if(time==='under4')sik=0;
    else{sikUnit=over40?TRIP_RATES.geun[g].sik40:TRIP_RATES.geun[g].sik;sik=sikUnit*days;if(time==='over9')sik+=Math.round(sikUnit*0.5)*days;}
  } else {sikUnit=(time==='under4')?0:TRIP_RATES.jung[g].sik;sik=sikUnit*days;}
  if(meal==='one'&&sikUnit){sik=Math.max(0,sik-Math.round(sikUnit/2)*days);}
  else if(meal==='all'||meal==='noclaim'){sik=0;} // noclaim = 식대 미신청(식비만 제외)

  // 교통비
  if(region==='sinai'||(region==='geun'&&!over40)){
    const flat=TRIP_RATES.sinai[g].gyo;
    if(nonPublic&&transitActual>0)gyo=transitActual;
    else gyo=flat*days;
    if(multiVisits)gyo+=Math.round(flat*0.5)*days;
  } else {
    let actual=transitActual;
    if(carKm>0)actual+=Math.round((carKm/TRIP_RATES.car.yeonbi)*TRIP_RATES.car.yuryubi)+toll;
    gyo=actual;
  }

  // 숙박비
  if(nights===0)suk=0;
  else if(region==='sinai'||(region==='geun'&&!over40))suk=0;
  else{const limit=TRIP_RATES.jung[g].sukMax;const each=Math.min(lodgingActual,limit);suk=(lodgingActual===0)?0:each*nights;}
  if(meal==='all')suk=0;

  const lines=[
    {sub:'교통비',amount:gyo},
    {sub:'일비',amount:ilbi},
    {sub:'식비',amount:sik},
    {sub:'숙박비',amount:suk},
  ];
  const total=lines.reduce((s,l)=>s+l.amount,0);
  return {type:'domestic',grade:g,region,days,nights,lines,total};
}

// 국외 출장비. f:{grade,country,days,nights,fx,meal,nonPublic,lodgingUSD,airKRW,localTransitUSD,krAirportKRW}
function calcOverseasCost(f){
  const g=f.grade||'제5호';const country=f.country||'';const days=Number(f.days)||1;const nights=Number(f.nights)||0;
  const fx=Number(f.fx)||1380;const meal=f.meal||'none';const nonPublic=!!f.nonPublic;
  const lodgingUSD=Number(f.lodgingUSD)||0;const airKRW=Number(f.airKRW)||0;const localTransitUSD=Number(f.localTransitUSD)||0;const krAirportKRW=Number(f.krAirportKRW)||0;
  const cg=tripCountryGrade(country);
  const rate=TRIP_RATES.overseas[g][cg];
  let ilbiUSD=rate.ilbi;if(nonPublic)ilbiUSD*=0.5;
  const ilbiKRW=Math.round(ilbiUSD*days*fx);
  let sikUSD=rate.sik;if(meal==='one')sikUSD=sikUSD-(sikUSD/3);else if(meal==='all'||meal==='noclaim')sikUSD=0;
  const sikKRW=Math.round(sikUSD*days*fx);
  let sukUSD=0;if(nights>0&&meal!=='all'){const each=Math.min(lodgingUSD,rate.suk);sukUSD=(lodgingUSD===0)?0:each*nights;}
  const sukKRW=Math.round(sukUSD*fx);
  const localKRW=Math.round(localTransitUSD*fx);
  const gyo=airKRW+krAirportKRW+localKRW;
  const lines=[
    {sub:'교통비',amount:gyo},
    {sub:'일비',amount:ilbiKRW},
    {sub:'식비',amount:sikKRW},
    {sub:'숙박비',amount:sukKRW},
  ];
  const total=lines.reduce((s,l)=>s+l.amount,0);
  return {type:'overseas',grade:g,country,countryGrade:cg,days,nights,fx,lines,total};
}

                <input type="checkbox" checked={!!checked[id]} onChange={()=>toggleCheck(id)} onClick={e=>e.stopPropagation()} style={{width:'auto'}}/>
                <span style={{fontWeight:600,display:'flex',alignItems:'center',gap:6}}>{getName(x)}{dd&&<span style={{fontSize:9,fontWeight:700,padding:'1px 6px',borderRadius:5,background:dd[1]+'22',color:dd[1]}}>{dd[0]}</span>}</span>
                <span style={{color:'var(--t2)'}}>{getDoctor(x)}</span>
                <span style={{color:'var(--t2)'}}>{getRegion(x)?getRegion(x).trim().slice(0,8):'-'}</span>
                <span style={{color:'var(--t3)',fontSize:11}}>{getLastAct(x)}</span>
                <span><SolBadges text={getSol(x)}/></span>
              </div>);})}
          </div>
          </div>
        </div>

        {/* 진행 순서 안내 */}
        <div style={{marginTop:14,marginBottom:8,fontSize:11,color:'var(--t3)',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',background:'rgba(255,255,255,.03)',border:'0.5px solid var(--border)',borderRadius:8,padding:'8px 12px'}}>
          <b style={{color:accent,fontSize:12}}>진행 순서</b>
          <span><b style={{color:accent}}>①</b> 아래 목록에서 후보 체크</span>
          <span style={{color:'var(--border-md)'}}>›</span>
          <span><b style={{color:accent}}>②</b> 담기</span>
          <span style={{color:'var(--border-md)'}}>›</span>
          <span><b style={{color:accent}}>③</b> 출장 신청서 작성</span>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:12,color:'var(--t3)'}}>{checkedIds.length}개 선택됨</span>
          <button className="tbtn" disabled={busy||checkedIds.length===0} style={{background:accent+'2e',color:accent}} onClick={addChecked}>② 선택 항목 담기</button>
          <div style={{marginLeft:'auto',display:'flex',gap:8}}>
            <button className="btn-ghost" onClick={onClose}>닫기</button>
            <button className="btn" disabled={cart.length===0} onClick={()=>setShowForm(true)}>③ 담긴 후보로 출장 신청서 작성 →</button>
          </div>
        </div>
      </div>}
    </div>
  </div>);
}

function TripFormModal({kind,cartItems,leadMap,contacts,onClose,onSaved}){
  // cartItems: [{lead_id, name, region, doctor, sol}], leadMap 참고용
  const isDom=kind==='domestic';
  const today=new Date().toISOString().slice(0,10);
  const GRADES=['제1호','제2호','제3호','제4호','제5호'];
  const [f,setF]=useState({
    applicant:'',department:isDom?'국내영업팀':'해외영업팀',apply_date:today,
    purpose:'병원 영업',start_date:today,end_date:today,
    region_label:'',plan:'',grade:'제5호',trip_type:'시내근거리',kol_review:false,
  });
  // 방문 일정 (장바구니에서 초기화)
  const [visits,setVisits]=useState(()=>(cartItems||[]).map((c,i)=>({
    seq:i+1,visit_date:today,lead_id:c.lead_id,hospital_name:c.name,doctor:c.doctor||'',visit_purpose:'병원 방문 및 미팅',note:''
  })));
  // 비용 입력 (간단형: 직급+지역구분+일수+박수+옵션)
  const [cost,setCost]=useState({
    region:isDom?'geun':'',country:'',days:1,nights:0,time:'mid',meal:'none',
    over40:false,nonPublic:false,multiVisits:false,
    transitActual:0,lodgingActual:0,carKm:0,toll:0,
    fx:1380,lodgingUSD:0,airKRW:0,localTransitUSD:0,krAirportKRW:0,
  });
  const [saving,setSaving]=useState(false);
  function set(k,v){setF(p=>({...p,[k]:v}));}
  function setC(k,v){setCost(p=>({...p,[k]:v}));}
  function setVisit(i,k,v){setVisits(p=>p.map((x,idx)=>idx===i?{...x,[k]:v}:x));}
  function removeVisit(i){setVisits(p=>p.filter((_,idx)=>idx!==i).map((x,idx)=>({...x,seq:idx+1})));}

  const calc=isDom?calcDomesticCost({...cost,grade:f.grade}):calcOverseasCost({...cost,grade:f.grade});
  const won=n=>(n==null||isNaN(n))?'-':Math.round(n).toLocaleString('ko-KR');

  async function save(){
    if(!f.applicant.trim()){alert('신청자를 입력해주세요.');return;}
    setSaving(true);
    const _u=(await sb.auth.getUser()).data.user;
    const row={
      applicant:f.applicant,department:f.department,apply_date:f.apply_date||null,
      purpose:f.purpose,start_date:f.start_date||null,end_date:f.end_date||null,
      region:f.region_label||(isDom?'국내':'해외'),plan:f.plan,status:'예정',
      trip_type:f.trip_type||null,kol_review:!!f.kol_review,applicant_email:_u?_u.email:null,approval_status:(f.trip_type==='시내근거리'?'대기':'품의시스템'),
      cost_json:{grade:f.grade,kind,input:cost,result:calc},updated_at:new Date().toISOString()
    };
    const r1=await sb.from('business_trips').insert(row).select().single();
    if(r1.error){alert('신청서 저장 오류: '+r1.error.message);setSaving(false);return;}
    const tripId=r1.data.id;
    if(visits.length>0){
      const vrows=visits.map(v=>({trip_id:tripId,seq:v.seq,visit_date:v.visit_date||null,lead_id:String(v.lead_id||''),hospital_name:v.hospital_name,doctor:v.doctor,visit_purpose:v.visit_purpose,note:v.note}));
      const r2=await sb.from('trip_visits').insert(vrows);
      if(r2.error){alert('방문일정 저장 오류: '+r2.error.message);setSaving(false);return;}
    }
    // 장바구니 비우기 (담겼던 항목 제거)
    for(const c of (cartItems||[])){await removeFromCart(c.lead_id,kind);}
    if(window.confirm('출장 신청서가 저장되었습니다.\n\n지금 신청서를 PDF로 보시겠어요?\n(나중에 "출장 관리"에서도 출력할 수 있습니다)')){try{printTripPDF({...row,id:tripId},visits);}catch(e){}}
    onSaved&&onSaved();
  }

  const SEC=({n,t,s})=>(<div style={{display:'flex',alignItems:'center',gap:7,margin:'18px 0 10px',paddingBottom:6,borderBottom:'0.5px solid rgba(133,183,235,.35)',flexWrap:'wrap'}}><span style={{width:18,height:18,borderRadius:'50%',background:'#185FA5',color:'#fff',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{n}</span><span style={{fontSize:13,fontWeight:700,color:'#85B7EB'}}>{t}</span>{s&&<span style={{fontSize:11,fontWeight:400,color:'var(--t3)'}}>{s}</span>}</div>);

  return (<div className="ov" style={{zIndex:165,alignItems:'flex-start',padding:'24px 16px'}}>
    <div className="modal" style={{width:780,maxWidth:'100%'}}>
      <div className="mhd" style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
        <span style={{fontSize:16,fontWeight:700}}>📝 출장 신청서 {isDom?'(국내)':'(해외)'}</span>
        <div style={{marginLeft:'auto',textAlign:'right'}}>
          <div style={{fontSize:10,color:'var(--t3)'}}>예상 비용 합계</div>

        </div>
        <button className="tbtn" style={{background:'rgba(255,255,255,.06)'}} onClick={onClose}>✕</button>
      </div>

      <SEC n="1" t="기본 정보"/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
        <div><label className="lbl">신청자 *</label><input value={f.applicant} onChange={e=>set('applicant',e.target.value)} placeholder="성명"/></div>
        <div><label className="lbl">부서</label><input value={f.department} onChange={e=>set('department',e.target.value)}/></div>
        <div><label className="lbl">신청일</label><input type="date" value={f.apply_date} onChange={e=>set('apply_date',e.target.value)}/></div>
        <div><label className="lbl">출장 목적 *</label><input value={f.purpose} onChange={e=>set('purpose',e.target.value)}/></div>
        <div><label className="lbl">출장 시작일</label><input type="date" value={f.start_date} onChange={e=>set('start_date',e.target.value)}/></div>
        <div><label className="lbl">출장 종료일</label><input type="date" value={f.end_date} onChange={e=>set('end_date',e.target.value)}/></div>
        <div style={{gridColumn:'1 / 4'}}><label className="lbl">출장 지역</label><input value={f.region_label} onChange={e=>set('region_label',e.target.value)} placeholder="예: 서울, 경기"/></div>
        <div style={{gridColumn:'1 / 4'}}><label className="lbl">출장 유형 *</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
            {['시내근거리','중장거리·학회'].map(t=>{const on=f.trip_type===t;return <span key={t} onClick={()=>set('trip_type',t)} style={{fontSize:12,padding:'6px 14px',borderRadius:8,cursor:'pointer',fontWeight:on?700:400,background:on?'#185FA5':'rgba(255,255,255,.05)',color:on?'#fff':'var(--t3)',border:'0.5px solid '+(on?'#185FA5':'var(--border)')}}>{t}</span>;})}
            <label style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer',fontSize:12,marginLeft:8,color:'var(--t2)'}}><input type="checkbox" checked={!!f.kol_review} onChange={e=>set('kol_review',e.target.checked)} style={{width:'auto'}}/>주요 KOL — 대표 사전조율</label>
          </div>
          <div style={{fontSize:10,color:f.trip_type==='시내근거리'?'#5DCAA5':'#EF9F27',marginTop:5,lineHeight:1.5}}>{f.trip_type==='시내근거리'?'✓ 본부장 전결 승인 — Sales Hub에서 본부장(전결권자) 승인 후 출장 · 사후 주 1건 통합 보고':'⚠ 사전 승인은 회사 품의 시스템에서 진행 — Sales Hub는 신청·보고 기록만 (여기서 승인하지 않음)'}</div>
        </div>
      </div>

      <SEC n="2" t="방문 병원과 일정"/>
      {visits.length===0?<div style={{padding:'12px',textAlign:'center',color:'var(--t3)',fontSize:12,background:'rgba(255,255,255,.03)',borderRadius:8}}>담긴 후보가 없습니다.</div>:
      <div style={{border:'0.5px solid var(--border)',borderRadius:8,overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
        <div style={{minWidth:560}}>
        <div className="tbl-grid" style={{display:'grid',gridTemplateColumns:'34px 1fr 1.3fr 1fr 1.3fr 30px',padding:'7px 8px',background:'rgba(255,255,255,.04)',fontSize:11,fontWeight:700,color:'var(--t2)',gap:6}}>
          <span>순번</span><span>방문일</span><span>병원명</span><span>담당 의료진</span><span>방문 목적</span><span></span>
        </div>
        {visits.map((v,i)=>(<div key={i} className="tbl-grid" style={{display:'grid',gridTemplateColumns:'34px 1fr 1.3fr 1fr 1.3fr 30px',padding:'6px 8px',borderTop:'0.5px solid var(--border)',gap:6,alignItems:'center'}}>
          <span style={{fontSize:12,textAlign:'center'}}>{v.seq}</span>
          <input type="date" value={v.visit_date} onChange={e=>setVisit(i,'visit_date',e.target.value)} style={{fontSize:11,padding:'5px 6px'}}/>
          <input value={v.hospital_name} onChange={e=>setVisit(i,'hospital_name',e.target.value)} style={{fontSize:11,padding:'5px 6px'}}/>
          {(()=>{
            const cons=(contacts||[]).filter(c=>String(c.lead_id)===String(v.lead_id||'')).slice().sort((a,b)=>(a.contact_seq||0)-(b.contact_seq||0));
            if(!cons.length)return <input value={v.doctor} onChange={e=>setVisit(i,'doctor',e.target.value)} placeholder="의료진" style={{fontSize:11,padding:'5px 6px'}}/>;
            const inList=cons.some(c=>(c.contact_name||'')===(v.doctor||''));
            return (<select value={inList?(v.doctor||''):(v.doctor?'__cur':'')}
              onChange={e=>{const val=e.target.value;if(val==='__direct'){const nm=window.prompt('의료진(교수) 이름을 직접 입력하세요.',v.doctor||'');if(nm===null)return;setVisit(i,'doctor',nm.trim());}else if(val!=='__cur'){setVisit(i,'doctor',val);}}}
              style={{fontSize:11,padding:'5px 6px'}}>
              <option value="">(선택)</option>
              {v.doctor&&!inList&&<option value="__cur">{v.doctor}</option>}
              {cons.map((c,ci)=><option key={ci} value={c.contact_name||''}>{(c.contact_name||'(이름없음)')+(c.position?' '+c.position:'')}</option>)}
              <option value="__direct">직접 입력…</option>
            </select>);
          })()}
          <input value={v.visit_purpose} onChange={e=>setVisit(i,'visit_purpose',e.target.value)} style={{fontSize:11,padding:'5px 6px'}}/>
          <span style={{cursor:'pointer',color:'#F472B6',textAlign:'center',fontWeight:700}} onClick={()=>removeVisit(i)}>✕</span>
        </div>))}
        </div>
      </div>}

      <SEC n="3" t="예상비용 산출" s="※ 직위·지역·일수 등에 따라 출장비 규정으로 자동 산출됩니다"/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:10}}>
        <div><label className="lbl">직위 (출장비 등급) *</label><select value={f.grade} onChange={e=>set('grade',e.target.value)}>{GRADES.map(g=><option key={g} value={g}>{g} · {TRIP_RATES.grades[g].desc}</option>)}</select></div>
        {isDom?<>
          <div><label className="lbl">지역 구분</label><select value={cost.region} onChange={e=>setC('region',e.target.value)}><option value="sinai">시내(성남)</option><option value="geun">근거리(서울·경인)</option><option value="jung">기타지역(중장거리)</option></select></div>
          <div><label className="lbl">체류 시간</label><select value={cost.time} onChange={e=>setC('time',e.target.value)}><option value="under4">4시간 이내</option><option value="mid">4시간 초과</option><option value="over9">9시간 초과(근거리)</option></select></div>
        </>:<>
          <div><label className="lbl">방문 국가</label><input value={cost.country} onChange={e=>setC('country',e.target.value)} placeholder="예: 일본, 미국"/></div>
          <div><label className="lbl">환율(1USD=KRW)</label><input type="number" value={cost.fx} onChange={e=>setC('fx',e.target.value)}/></div>
        </>}
        <div><label className="lbl">출장 일수</label><input type="number" min="1" value={cost.days} onChange={e=>setC('days',e.target.value)}/></div>
        <div><label className="lbl">숙박 일수</label><input type="number" min="0" value={cost.nights} onChange={e=>setC('nights',e.target.value)}/></div>
        <div><label className="lbl">식대</label><select value={cost.meal} onChange={e=>setC('meal',e.target.value)}><option value="none">식대 신청 (규정 지급)</option><option value="noclaim">식대 미신청 (식비 제외)</option><option value="one">1식 제공받음 (반액 차감)</option><option value="all">식사·숙박 모두 제공받음</option></select></div>
      </div>

      {isDom?<div style={{display:'flex',gap:14,flexWrap:'wrap',padding:'9px 12px',background:'rgba(255,255,255,.03)',border:'0.5px solid var(--border)',borderRadius:8,marginBottom:10,fontSize:12}}>
        <label style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer'}}><input type="checkbox" checked={cost.over40} onChange={e=>setC('over40',e.target.checked)} style={{width:'auto'}}/>40km↑(중장거리 교통비)</label>
        <label style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer'}}><input type="checkbox" checked={cost.nonPublic} onChange={e=>setC('nonPublic',e.target.checked)} style={{width:'auto'}}/>비대중교통(일비 1/2)</label>
        <label style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer'}}><input type="checkbox" checked={cost.multiVisits} onChange={e=>setC('multiVisits',e.target.checked)} style={{width:'auto'}}/>4곳↑ 방문(교통비 1/2 추가)</label>
      </div>:null}

      {/* 실비 입력 */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:10}}>
        {isDom?<>
          <div><label className="lbl">교통비 실비(원)</label><input type="number" value={cost.transitActual} onChange={e=>setC('transitActual',e.target.value)}/></div>
          <div><label className="lbl">숙박 실비/박(원)</label><input type="number" value={cost.lodgingActual} onChange={e=>setC('lodgingActual',e.target.value)}/></div>
          <div><label className="lbl">차량 운행거리(km,왕복)</label><input type="number" value={cost.carKm} onChange={e=>setC('carKm',e.target.value)}/></div>
          <div><label className="lbl">통행료(원)</label><input type="number" value={cost.toll} onChange={e=>setC('toll',e.target.value)}/></div>
        </>:<>
          <div><label className="lbl">국제선 항공(원)</label><input type="number" value={cost.airKRW} onChange={e=>setC('airKRW',e.target.value)}/></div>
          <div><label className="lbl">숙박 실비/박(USD)</label><input type="number" value={cost.lodgingUSD} onChange={e=>setC('lodgingUSD',e.target.value)}/></div>
          <div><label className="lbl">현지교통(USD)</label><input type="number" value={cost.localTransitUSD} onChange={e=>setC('localTransitUSD',e.target.value)}/></div>
          <div><label className="lbl">국내 공항이동(원)</label><input type="number" value={cost.krAirportKRW} onChange={e=>setC('krAirportKRW',e.target.value)}/></div>
        </>}
      </div>

      {/* 비용 산출 결과 */}
      <div style={{border:'0.5px solid rgba(239,159,39,.3)',borderRadius:8,overflow:'hidden',marginBottom:12}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',padding:'7px 12px',background:'rgba(239,159,39,.08)',fontSize:11,fontWeight:700,color:'#EF9F27'}}><span>구분 (여비)</span><span style={{textAlign:'right'}}>신청액</span></div>
        {calc.lines.map((l,i)=>(<div key={i} style={{display:'grid',gridTemplateColumns:'1fr 1fr',padding:'7px 12px',borderTop:'0.5px solid var(--border)',fontSize:12}}><span>{l.sub}</span><span style={{textAlign:'right'}}>{won(l.amount)}</span></div>))}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',padding:'9px 12px',borderTop:'0.5px solid rgba(239,159,39,.3)',background:'rgba(239,159,39,.06)',fontSize:13,fontWeight:700}}><span>총계</span><span style={{textAlign:'right',color:'#EF9F27'}}>{won(calc.total)}</span></div>
      </div>

      <SEC n="4" t="출장 계획 및 목표"/>
      <textarea rows="3" value={f.plan} onChange={e=>set('plan',e.target.value)} placeholder="이번 출장의 계획 및 목표를 입력하세요."/>

      <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}>
        <button className="btn-ghost" onClick={onClose}>취소</button>
        <button className="btn" disabled={saving} onClick={save}>{saving?'저장 중...':'✓ 신청서 저장'}</button>
      </div>
    </div>
  </div>);
}

// 출장비 규정(TRIP_RATES) 기반으로 산출내역·비고를 자동 생성하는 공용 비용표
// 6열(구분대/구분소/기준금액/산출내역/신청액/비고) — 합계·총계 정렬, 신청액 우측정렬, 0/빈값 숨김
function tripCostTableHTML(cj){
  cj=cj||{};
  var res=cj.result||{};var inp=cj.input||{};
  var grade=cj.grade||res.grade||'제5호';
  var region=res.region||'geun';
  var days=Number(res.days)||1;var nights=Number(res.nights)||0;
  var RL={sinai:'시내',geun:'근거리',jung:'중장거리'}[region]||'근거리';
  var rateSet=region==='sinai'?TRIP_RATES.sinai:(region==='jung'?TRIP_RATES.jung:TRIP_RATES.geun);
  var gr=rateSet[grade]||{};
  var lineMap={};(res.lines||[]).forEach(function(l){lineMap[l.sub]=l.amount;});

    const {error}=await sb.from('trip_visits').insert({trip_id:t.id,seq:maxSeq+1,visit_date:t.start_date||null,lead_id:String(l.lead_id||''),hospital_name:l.hospital_name,doctor:'',visit_purpose:'추가 방문',note:'출장 중 추가 방문'});
    setBusy(false);
    if(error){alert('방문 병원 추가 오류: '+error.message);return;}
    setAvq('');setAvRes([]);await load();await loadRepCons(t);
  }
  async function delVisit(v){if(!window.confirm('방문 병원 "'+v.hospital_name+'"을(를) 이 출장에서 제거할까요?'))return;setBusy(true);await sb.from('trip_visits').delete().eq('id',v.id);setBusy(false);await load();}
  // 이 출장의 방문 병원(리드)에서 출장 기간에 등록된 활동 사진을 모아 보고서 사진에 병합
  async function importActPhotos(t){
    const tv=visits.filter(v=>v.trip_id===t.id);
    const lids=[...new Set(tv.map(v=>String(v.lead_id||'')).filter(Boolean))];
    if(!lids.length){alert('연결된 방문 병원(리드)이 없어 가져올 활동 사진이 없습니다.');return;}
    setBusy(true);
    let q=sb.from('lead_activities').select('photos,activity_date,lead_id').in('lead_id',lids);
    if(t.start_date)q=q.gte('activity_date',t.start_date);
    if(t.end_date)q=q.lte('activity_date',t.end_date);
    const {data,error}=await q;
    setBusy(false);
    if(error){alert('활동 사진을 불러오지 못했습니다: '+error.message);return;}
    let urls=[];(data||[]).forEach(a=>{try{const ps=JSON.parse(a.photos||'[]');if(Array.isArray(ps))urls=urls.concat(ps);}catch(e){}});
    urls=urls.filter(Boolean);
    if(!urls.length){alert('해당 병원·출장 기간('+(t.start_date||'')+'~'+(t.end_date||'')+')에 등록된 활동 사진이 없습니다.');return;}
    let cur=[];try{cur=JSON.parse(rep.photos||'[]');}catch(e){}
    const merged=[...new Set(cur.concat(urls))];
    setRep(p=>({...p,photos:JSON.stringify(merged)}));
    alert('활동 사진 '+urls.length+'장을 불러왔습니다. (중복 제외 후 총 '+merged.length+'장)\n\n확인 후 "저장"을 눌러주세요.');
  }
  const APPROVAL_C={'대기':['#3a2f1a','#EF9F27'],'승인':['#1d3b32','#5DCAA5'],'반려':['#3a2230','#F87171'],'생략':['#2a2a28','#B4B2A9'],'품의시스템':['#13314f','#85B7EB']};
  const isApprover=!!me&&approvers.some(a=>a.email===me);
  const meName=(approvers.find(a=>a.email===me)||{}).name||me;
  async function approve(t,ok){
    if(!ok){const rr=window.prompt('반려 사유를 입력하세요.');if(rr===null)return;setBusy(true);await sb.from('business_trips').update({approval_status:'반려',reject_reason:rr||null,approver:meName,approved_at:new Date().toISOString(),updated_at:new Date().toISOString()}).eq('id',t.id);}
    else{setBusy(true);await sb.from('business_trips').update({approval_status:'승인',reject_reason:null,approver:meName,approved_at:new Date().toISOString(),updated_at:new Date().toISOString()}).eq('id',t.id);}
    await load();setBusy(false);
  }
  async function loadRepCons(t){
    try{
      const {data:tv}=await sb.from('trip_visits').select('lead_id').eq('trip_id',t.id);
      const lids=[...new Set((tv||[]).map(v=>String(v.lead_id||'')).filter(Boolean))];
      if(!lids.length){setRepCons([]);return;}
      const {data}=await sb.from('lead_contacts').select('lead_id,contact_name,position,contact_seq').in('lead_id',lids).order('contact_seq',{ascending:true});
      setRepCons(data||[]);
    }catch(e){setRepCons([]);}
  }
  function openReport(t){
    const cj=t.cost_json||{};const inMeal=(cj.input&&cj.input.meal)||'none';
    setRep({content:t.report_content||'',evidence:t.report_evidence||'',leadRef:!!t.report_lead_ref,photos:t.report_photos||'',purpose:t.purpose||'',doc:'report',time:t.report_time||'',plan:t.plan||'',start:t.start_date||'',end:t.end_date||'',meal:inMeal});
    setOpenRep(t.id);loadRepCons(t);
  }
  // 보고 패널에서 수정한 날짜·식대를 반영한 trip 객체 (저장·출력 공용)
  function repCostPatch(t){
    const cj=t.cost_json||{};
    if(!cj.input||!rep.meal||rep.meal===(cj.input.meal||'none'))return null;
    const ninput={...cj.input,meal:rep.meal};
    const ncalc=(cj.kind==='overseas')?calcOverseasCost({...ninput,grade:cj.grade}):calcDomesticCost({...ninput,grade:cj.grade});
    return {...cj,input:ninput,result:ncalc};
  }
  function repApply(t){
    const ncj=repCostPatch(t);
    return {...t,purpose:rep.purpose,plan:rep.plan,start_date:rep.start||t.start_date,end_date:rep.end||t.end_date,cost_json:ncj||t.cost_json,report_time:rep.time,report_content:rep.content,report_evidence:rep.evidence};
  }
  async function setVisitDoctor(v,name){
    setBusy(true);
    const {error}=await sb.from('trip_visits').update({doctor:name||''}).eq('id',v.id);
    setBusy(false);
    if(error){alert('의료진 변경 오류: '+error.message);return;}
    await load();
  }
  async function saveReport(t){
    setBusy(true);
    const patch={purpose:rep.purpose||null,plan:rep.plan||null,start_date:rep.start||null,end_date:rep.end||null,updated_at:new Date().toISOString()};
    const ncj=repCostPatch(t);if(ncj)patch.cost_json=ncj;
    if(rep.doc==='report'){patch.report_content=rep.content||null;patch.report_evidence=rep.evidence||null;patch.report_lead_ref=!!rep.leadRef;patch.report_photos=rep.photos||null;patch.report_time=rep.time||null;patch.report_at=new Date().toISOString();}
    const {error}=await sb.from('business_trips').update(patch).eq('id',t.id);
    if(error){alert('저장 실패: '+error.message+'\n\n(출장 시간 저장 시 report_time 컬럼이 필요합니다. 안내된 SQL을 먼저 실행해주세요.)');setBusy(false);return;}
    await load();setOpenRep(null);setBusy(false);
  }

  const weekLabel=days[0].getMonth()+1+'/'+days[0].getDate()+' ~ '+(days[6].getMonth()+1)+'/'+days[6].getDate();

  return (<div className="ov" style={{zIndex:162,alignItems:'flex-start',padding:'18px 12px'}}>
    <div className="modal" style={{width:980,maxWidth:'100%'}}>
      <div className="mhd" style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
        <span style={{fontSize:16,fontWeight:700}}>🗓 출장 관리</span>
        <span style={{fontSize:12,color:'var(--t3)'}}>주간 캘린더 · 신청 목록 · 출장신청서 출력</span>
        <button className="tbtn" style={{marginLeft:'auto',background:'rgba(255,255,255,.06)'}} onClick={onClose}>✕</button>
      </div>
      {loading?<LoadingBear/>:<div>

        {/* 주간 캘린더 */}
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,flexWrap:'wrap'}}>
          <button className="tbtn" style={{background:'rgba(255,255,255,.06)'}} onClick={()=>moveWeek(-1)}>‹ 이전주</button>
          <span onClick={openJump} title="클릭하면 달력에서 원하는 주로 바로 이동합니다" style={{fontSize:13,fontWeight:700,cursor:'pointer',borderBottom:'1px dashed var(--t3)',display:'inline-flex',alignItems:'center',gap:4}}>📅 {weekLabel}</span>
          <input ref={jumpRef} type="date" onChange={e=>jumpToDate(e.target.value)} style={{position:'absolute',width:1,height:1,opacity:0,pointerEvents:'none'}} tabIndex={-1} aria-hidden="true"/>
          <button className="tbtn" style={{background:'rgba(255,255,255,.06)'}} onClick={()=>moveWeek(1)}>다음주 ›</button>
          <button className="tbtn" style={{background:'rgba(255,255,255,.06)'}} onClick={()=>{const d=new Date();const dow=d.getDay();d.setDate(d.getDate()-dow);d.setHours(0,0,0,0);setWeekStart(d);}}>오늘</button>
        </div>
        <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch',marginBottom:8}}>
        <div className="tbl-grid" style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:6,minWidth:640}}>
          {days.map((d,i)=>{const ds=dstr(d);const list=visitsByDate[ds]||[];const isToday=ds===dstr(new Date());return (
            <div key={i} className="trip-day" style={{border:'0.5px solid '+(isToday?'#EF9F27':'var(--border)'),borderRadius:8,minHeight:110,background:isToday?'rgba(239,159,39,.06)':'rgba(255,255,255,.02)',overflow:'hidden'}}>
              <div onClick={()=>{if(list.length)jumpToTrip(list[0].trip_id);}} title={list.length?'클릭하면 아래 신청 목록으로 이동합니다':''} style={{padding:'5px 8px',fontSize:11,fontWeight:700,cursor:list.length?'pointer':'default',color:i===0?'#ED93B1':i===6?'#85B7EB':'var(--t2)',borderBottom:'0.5px solid var(--border)'}}>{(d.getMonth()+1)+'/'+d.getDate()+' ('+WD[i]+')'}{isToday&&<span style={{marginLeft:4,fontSize:9,color:'#EF9F27'}}>오늘</span>}</div>
              <div style={{padding:'5px',display:'flex',flexDirection:'column',gap:4}}>
                {list.map((v,j)=>{const t=tripMap[v.trip_id]||{};const sc=STATUS_C[t.status]||STATUS_C['예정'];const on=selVisit===v.id;return (
                  <div key={j} className="trip-visit" onClick={()=>{setSelVisit(v.id);jumpToTrip(v.trip_id);}} title="클릭하면 선택되고 아래 신청 목록으로 이동합니다" style={{padding:'4px 6px',borderRadius:5,background:sc[0],fontSize:10,lineHeight:1.3,cursor:'pointer',border:'1px solid '+(on?'#EF9F27':'transparent'),boxShadow:on?'0 0 8px rgba(239,159,39,.4)':'none'}}>
                    <div style={{fontWeight:700,color:sc[1]}}>{v.hospital_name}</div>
                    {v.doctor&&<div style={{color:'var(--t3)',fontSize:9}}>{v.doctor}</div>}
                  </div>);})}
              </div>
            </div>);})}
        </div>
        </div>
        {/* 상태 범례 */}
        <div style={{display:'flex',gap:12,fontSize:11,marginBottom:16,flexWrap:'wrap'}}>
          {STATUSES.map(s=>{const sc=STATUS_C[s];return <span key={s} style={{display:'inline-flex',alignItems:'center',gap:5}}><span style={{width:9,height:9,borderRadius:'50%',background:sc[1]}}></span>{s}</span>;})}
        </div>

        {/* 신청 목록 */}
        <div style={{fontSize:13,fontWeight:700,color:'#85B7EB',marginBottom:8}}>출장 신청 목록 ({trips.length})</div>
        {trips.length===0?<div style={{padding:'14px',textAlign:'center',color:'var(--t3)',fontSize:12,background:'rgba(255,255,255,.03)',borderRadius:8}}>저장된 출장 신청서가 없습니다.</div>:
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {trips.map(t=>{const tv=visits.filter(v=>v.trip_id===t.id);const sc=STATUS_C[t.status]||STATUS_C['예정'];const cost=(t.cost_json&&t.cost_json.result)?t.cost_json.result.total:null;const acS=t.approval_status||(t.trip_type==='시내근거리'?'대기':'품의시스템');const ac=APPROVAL_C[acS]||APPROVAL_C['대기'];return (
            <div key={t.id} id={'trip-card-'+t.id} style={{border:(selTrip===t.id?'1.5px solid #EF9F27':'0.5px solid var(--border)'),borderRadius:10,padding:'12px 14px',background:selTrip===t.id?'rgba(239,159,39,.08)':'rgba(255,255,255,.02)',boxShadow:selTrip===t.id?'0 0 16px rgba(239,159,39,.35)':'none',transition:'all .3s ease'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6,flexWrap:'wrap'}}>
                <span style={{fontSize:14,fontWeight:700}}>{t.applicant} · {t.purpose}</span>
                {t.trip_type&&<span style={{fontSize:10,padding:'2px 8px',borderRadius:6,background:'rgba(133,183,235,.15)',color:'#85B7EB'}}>{t.trip_type}</span>}
                {t.kol_review&&<span style={{fontSize:10,padding:'2px 8px',borderRadius:6,background:'rgba(239,159,39,.15)',color:'#EF9F27'}}>KOL·대표조율</span>}
                <span style={{fontSize:11,fontWeight:700,padding:'2px 9px',borderRadius:20,background:sc[0],color:sc[1]}}>{t.status}</span>
                <span style={{fontSize:11,fontWeight:700,padding:'2px 9px',borderRadius:20,background:ac[0],color:ac[1]}}>{acS==='품의시스템'?'품의 시스템 승인':'결재 '+acS}</span>
                <span style={{fontSize:11,color:'var(--t3)'}}>{t.start_date} ~ {t.end_date}</span>
                {cost!=null&&<span style={{fontSize:11,color:'#EF9F27',fontWeight:600}}>예상 {won(cost)}</span>}
                <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                  {t.trip_type==='시내근거리'&&isApprover&&(acS==='대기')&&<React.Fragment>
                    <button className="tbtn" style={{background:'linear-gradient(135deg,#1D9E75,#0F6E56)'}} disabled={busy} onClick={()=>approve(t,true)}>✔ 승인</button>
                    <button className="tbtn" style={{background:'rgba(220,38,38,.18)',color:'#F87171'}} disabled={busy} onClick={()=>approve(t,false)}>✖ 반려</button>
                  </React.Fragment>}
                  <select value={t.status} disabled={busy} onChange={e=>setStatus(t.id,e.target.value)} style={{fontSize:11,padding:'4px 6px',width:90}}>{STATUSES.map(s=><option key={s}>{s}</option>)}</select>
                  <button className="tbtn" style={{background:'rgba(133,183,235,.15)',color:'#85B7EB'}} onClick={()=>openRep===t.id?setOpenRep(null):openReport(t)}>📋 출장 보고{t.report_at?' ✓':''}</button>
                  <button className="tbtn" style={{background:'linear-gradient(135deg,#185FA5,#0C447C)'}} onClick={()=>doPrint(t)}>🖨 신청서 출력</button>
                  <button className="tbtn" style={{background:'linear-gradient(135deg,#1D9E75,#0F6E56)'}} onClick={()=>doReport(t)}>🖨 보고서 출력</button>
                  <button className="tbtn" style={{background:'rgba(244,114,182,.15)',color:'#F472B6'}} disabled={busy} onClick={()=>delTrip(t.id)}>삭제</button>
                </div>
              </div>
              {acS==='반려'&&t.reject_reason&&<div style={{fontSize:11,color:'#F87171',marginBottom:6}}>반려 사유: {t.reject_reason}{t.approver?(' · '+t.approver):''}</div>}
              {acS==='승인'&&t.approver&&<div style={{fontSize:11,color:'#5DCAA5',marginBottom:6}}>승인: {t.approver}{t.approved_at?(' · '+String(t.approved_at).slice(0,10)):''}</div>}
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {tv.map((v,i)=>(<span key={i} style={{fontSize:11,padding:'3px 9px',borderRadius:6,background:'rgba(133,183,235,.12)',color:'#85B7EB'}}>{(v.visit_date||'')+' · '+(v.hospital_name||'')+(v.doctor?(' '+v.doctor):'')}</span>))}
              </div>
              {t.report_at&&openRep!==t.id&&<div style={{marginTop:8,padding:'8px 10px',borderRadius:8,background:'rgba(29,158,117,.08)',border:'0.5px solid rgba(29,158,117,.3)',fontSize:11,color:'var(--t2)'}}><b style={{color:'#5DCAA5'}}>출장 보고</b>{t.report_lead_ref&&<span style={{color:'#85B7EB',marginLeft:6}}>· 리드통합시스템 입력 참고</span>}<div style={{marginTop:3,whiteSpace:'pre-wrap'}}>{t.report_content||'-'}</div>{t.report_evidence&&<div style={{marginTop:3,color:'var(--t3)'}}>증빙: {t.report_evidence}</div>}{t.report_photos&&(()=>{let ps=[];try{ps=JSON.parse(t.report_photos);}catch(e){}return ps.length?<div style={{display:'flex',gap:6,marginTop:4,flexWrap:'wrap'}}>{ps.map((u,i)=>(<a key={i} href={u} target="_blank" rel="noreferrer"><img src={u} alt="" style={{width:48,height:48,objectFit:'cover',borderRadius:5}}/></a>))}</div>:null;})()}</div>}
              {openRep===t.id&&<div style={{marginTop:8,padding:'10px 12px',borderRadius:8,background:'rgba(255,255,255,.03)',border:'0.5px solid var(--border)'}}>
                {/* 문서 선택 */}
                <div style={{display:'flex',gap:6,marginBottom:10}}>
                  {[['apply','📄 출장신청서'],['report','📋 출장보고서']].map(([k,lb])=>(
                    <button key={k} className="tbtn" onClick={()=>setRep(p=>({...p,doc:k}))} style={{flex:1,fontWeight:700,background:rep.doc===k?'linear-gradient(135deg,#1D9E75,#0F6E56)':'rgba(255,255,255,.06)',color:rep.doc===k?'#fff':'var(--t2)'}}>{lb}</button>))}
                </div>
                <div style={{fontSize:11,color:'var(--t3)',marginBottom:10}}>{rep.doc==='apply'?'※ 출장 전 신청용. 예상 비용은 신청 시 계산기로 입력한 값이 자동 반영됩니다.':'※ 출장 후 보고용. 실제 방문 시간·업무 결과·증빙을 입력하세요.'}</div>
                <label className="lbl">출장 목적 (신청서·보고서 공통 · 수정 가능)</label>
                <input value={rep.purpose} onChange={e=>setRep(p=>({...p,purpose:e.target.value}))} placeholder="예: AEGIS AI SW/CDSS(소아골절) 연구과제 수행" style={{marginBottom:8}}/>
                <div className="grid-auto-mob" style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:8}}>
                  <div><label className="lbl">출장 시작일 (수정 가능)</label><input type="date" value={rep.start} onChange={e=>setRep(p=>({...p,start:e.target.value}))}/></div>
                  <div><label className="lbl">출장 종료일 (수정 가능)</label><input type="date" value={rep.end} onChange={e=>setRep(p=>({...p,end:e.target.value}))}/></div>
                  <div><label className="lbl">식대 <span style={{fontSize:10,color:'var(--t3)'}}>미신청 시 식비 제외</span></label><select value={rep.meal} onChange={e=>setRep(p=>({...p,meal:e.target.value}))}><option value="none">식대 신청 (규정 지급)</option><option value="noclaim">식대 미신청 (식비 제외)</option><option value="one">1식 제공받음 (반액 차감)</option><option value="all">식사·숙박 모두 제공받음</option></select></div>
                </div>
                {rep.doc==='report'&&<React.Fragment>
                  <label className="lbl">출장 시간 (보고서 · 예: 11:00 ~ 17:00)</label>
                  <input value={rep.time} onChange={e=>setRep(p=>({...p,time:e.target.value}))} placeholder="11:00 ~ 17:00" style={{marginBottom:8}}/>
                  <label className="lbl">방문 병원(출장지) <span style={{fontSize:10,color:'var(--t3)'}}>· 신청에 없던 병원을 도중 방문했으면 추가하세요 (활동 사진도 함께 딸려옵니다) · 병원별로 교수(의료진)를 선택할 수 있습니다</span></label>
                  <div style={{marginBottom:6,display:'flex',flexWrap:'wrap',gap:6}}>
                    {visits.filter(v=>v.trip_id===t.id).map(v=>{
                      const cons=repCons.filter(c=>String(c.lead_id)===String(v.lead_id||''));
                      const inList=cons.some(c=>(c.contact_name||'')===(v.doctor||''));
                      return (<span key={v.id} style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:11,padding:'3px 8px',borderRadius:6,background:'rgba(133,183,235,.12)',color:'#85B7EB'}}>
                        {(v.visit_date||'')+' · '+(v.hospital_name||'')}
                        {v.visit_purpose==='추가 방문'&&<span style={{fontSize:9,color:'#EF9F27'}}>추가</span>}
                        <select value={inList?(v.doctor||''):(v.doctor?'__cur':'')} disabled={busy}
                          onChange={e=>{const val=e.target.value;if(val==='__direct'){const nm=window.prompt('의료진(교수) 이름을 직접 입력하세요.',v.doctor||'');if(nm===null)return;setVisitDoctor(v,nm.trim());}else if(val!=='__cur'){setVisitDoctor(v,val);}}}
                          style={{fontSize:10,padding:'2px 4px',width:'auto',maxWidth:120,background:'rgba(0,0,0,.25)',color:'#85B7EB',border:'0.5px solid var(--border)',borderRadius:5}}>
                          <option value="">(의료진 선택)</option>
                          {v.doctor&&!inList&&<option value="__cur">{v.doctor}</option>}
                          {cons.map((c,ci)=><option key={ci} value={c.contact_name||''}>{(c.contact_name||'(이름없음)')+(c.position?' '+c.position:'')}</option>)}

async function fetchAll(table,columns){
  let all=[];let from=0;const size=1000;
  while(true){const {data,error}=await sb.from(table).select(columns).range(from,from+size-1);if(error)throw error;all=all.concat(data);if(data.length<size)break;from+=size;}
  return all;
}

function Pager({page,setPage,total,pageSize}){
  const totalPages=Math.max(1,Math.ceil(total/pageSize));
  if(totalPages<=1)return null;
  const nums=[];const start=Math.max(1,page-2);const end=Math.min(totalPages,start+4);
  for(let i=Math.max(1,end-4);i<=end;i++)nums.push(i);
  const from=total===0?0:(page-1)*pageSize+1;const to=Math.min(total,page*pageSize);
  const btn=(active)=>({fontSize:11,padding:'5px 10px',borderRadius:6,border:'0.5px solid '+(active?'#38BDF8':'var(--border)'),background:active?'rgba(56,189,248,.18)':'transparent',color:active?'#38BDF8':'var(--t2)',cursor:'pointer'});
  return (<div style={{display:'flex',alignItems:'center',gap:6,marginTop:10,paddingTop:10,borderTop:'0.5px solid var(--border)',flexWrap:'wrap'}}>
    <span style={{fontSize:11,color:'var(--t3)',marginRight:6}}>{from}-{to} / {total.toLocaleString()}개</span>
    <span onClick={()=>setPage(p=>Math.max(1,p-1))} style={btn(false)}>‹ 이전</span>
    {nums[0]>1&&<><span onClick={()=>setPage(1)} style={btn(false)}>1</span>{nums[0]>2&&<span style={{color:'var(--t3)',fontSize:11}}>…</span>}</>}
    {nums.map(n=><span key={n} onClick={()=>setPage(n)} style={btn(n===page)}>{n}</span>)}
    {nums[nums.length-1]<totalPages&&<>{nums[nums.length-1]<totalPages-1&&<span style={{color:'var(--t3)',fontSize:11}}>…</span>}<span onClick={()=>setPage(totalPages)} style={btn(false)}>{totalPages}</span></>}
    <span onClick={()=>setPage(p=>Math.min(totalPages,p+1))} style={btn(false)}>다음 ›</span>
  </div>);
}

}

// 데모 상세 모달 (전환/미전환/진행중 목록)

function DemoStatusPanel({salesHistory,newThisMonth,won2paid}){
  const now=new Date();
  const [gran,setGran]=useState('all'); // all | year | half | quarter
  const [selYear,setSelYear]=useState(now.getFullYear());
  const [selQ,setSelQ]=useState(Math.ceil((now.getMonth()+1)/3));
  const [selH,setSelH]=useState(now.getMonth()<6?1:2);
  const [modal,setModal]=useState(null);
  const sh=salesHistory||[];
  // 원본 집계
  const custDemo={},custBiz={},custHosp={};
  sh.forEach(r=>{const cid=String(r.cust_id||'').trim();const type=String(r.history_type||'').trim();const date=r.history_date;if(!cid||!date)return;if(r.hospital_name)custHosp[cid]=r.hospital_name;if(type==='DEMO시작'){if(!custDemo[cid]||date<custDemo[cid])custDemo[cid]=date;}if(type==='약정시작'){if(!custBiz[cid]||date<custBiz[cid])custBiz[cid]=date;}});
  // 기간 필터: DEMO 시작일 기준
  const inSel=(cid)=>{const s=String(custDemo[cid]||'');if(!s)return false;if(gran==='all')return true;const yy=parseInt(s.slice(0,4))||0;if(gran==='year')return yy===selYear;const mm=parseInt(s.slice(5,7))||0;if(gran==='half')return yy===selYear&&(selH===1?mm<=6:mm>=7);if(gran==='quarter'){return yy===selYear&&Math.ceil(mm/3)===selQ;}return true;};
  const todayMs=Date.now();
  const demoConverted=[],demoNotConv=[];
  Object.keys(custDemo).forEach(cid=>{if(!inSel(cid))return;const hosp=custHosp[cid]||cid;const startMs=new Date(custDemo[cid]).getTime();const diffDays=isNaN(startMs)?null:Math.round((todayMs-startMs)/86400000);const yy=parseInt(String(custDemo[cid]||'').slice(0,4))||0;const demoYear=yy?String(yy):'미확인';const row={cust_id:cid,hospital_name:hosp,demoStart:custDemo[cid],diffDays,demoYear};if(custBiz[cid]){demoConverted.push({...row,bizStart:custBiz[cid]});}else{if(diffDays===null||diffDays>=0)demoNotConv.push(row);}});
  demoNotConv.sort((a,b)=>(b.diffDays||0)-(a.diffDays||0));
  demoConverted.sort((a,b)=>String(b.bizStart||'').localeCompare(String(a.bizStart||'')));
  const demoTotal=demoConverted.length+demoNotConv.length;
  const demoConvRate=demoTotal?Math.round(demoConverted.length/demoTotal*100):0;
  const convDays=[];demoConverted.forEach(r=>{if(r.demoStart&&r.bizStart){const diff=Math.round((new Date(r.bizStart)-new Date(r.demoStart))/86400000);if(diff>=0)convDays.push(diff);}});
  const avgConvertDays=convDays.length?Math.round(convDays.reduce((a,b)=>a+b,0)/convDays.length):0;
  const demoOngoing=demoNotConv.filter(x=>x.diffDays!==null&&x.diffDays<=90);
  // 연도별/분기별 통계 (전체 기준 - 모달 표용)
  const yMap={};Object.keys(custDemo).forEach(cid=>{const yy=parseInt(String(custDemo[cid]||'').slice(0,4))||0;if(!yy)return;const yk=yy<=2022?'2022이전':String(yy);if(!yMap[yk])yMap[yk]={demo:0,convert:0};yMap[yk].demo++;if(custBiz[cid])yMap[yk].convert++;});
  const demoYearly=['2026','2025','2024','2023','2022이전'].map(yy=>{const x=yMap[yy]||{demo:0,convert:0};return {period:yy==='2022이전'?'2022 이전':yy,demo:x.demo,convert:x.convert,rate:x.demo>0?Math.round(x.convert/x.demo*1000)/10:0};}).filter(r=>r.demo>0);
  const qMap={};Object.keys(custDemo).forEach(cid=>{const s=String(custDemo[cid]||'');const yy=parseInt(s.slice(0,4))||0;const mm=parseInt(s.slice(5,7))||0;if(!yy||!mm)return;const qk=yy+'-Q'+Math.ceil(mm/3);if(!qMap[qk])qMap[qk]={demo:0,convert:0};qMap[qk].demo++;if(custBiz[cid])qMap[qk].convert++;});
  const demoQuarterly=Object.entries(qMap).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,8).map(([key,x])=>({period:key.replace('-',' '),demo:x.demo,convert:x.convert,rate:x.demo>0?Math.round(x.convert/x.demo*1000)/10:0}));

  const years=[];for(let y=now.getFullYear();y>=now.getFullYear()-4;y--)years.push(y);
  const tabBtn=(k,lb)=>{const on=gran===k;return <span onClick={()=>setGran(k)} style={{fontSize:10,padding:'4px 9px',borderRadius:7,cursor:'pointer',background:on?'#2563EB':'#1E293B',border:'0.5px solid '+(on?'#2563EB':'var(--border)'),color:on?'#fff':'var(--t3)'}}>{lb}</span>;};

  return (<div className="panel">
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,flexWrap:'wrap'}}>

      <span style={{fontSize:11,color:'var(--t3)'}}>{periodLbl}</span>
      <div style={{marginLeft:'auto',display:'flex',gap:5,alignItems:'center'}}>

        {gran==='half'&&<select value={selH} onChange={e=>setSelH(Number(e.target.value))} style={{fontSize:11,padding:'4px 7px',width:'auto',background:'#13202f',border:'0.5px solid var(--border)',borderRadius:7,color:'#c8d3e0'}}><option value={1}>상반기</option><option value={2}>하반기</option></select>}
        {gran==='quarter'&&<select value={selQ} onChange={e=>setSelQ(Number(e.target.value))} style={{fontSize:11,padding:'4px 7px',width:'auto',background:'#13202f',border:'0.5px solid var(--border)',borderRadius:7,color:'#c8d3e0'}}>{[1,2,3,4].map(q=><option key={q} value={q}>{q}분기</option>)}</select>}
        {tabBtn('all','전체')}{tabBtn('year','연도')}{tabBtn('half','반기')}{tabBtn('quarter','분기')}

    </div>

        <div style={{fontSize:10,fontWeight:700,color:'#fb923c',marginBottom:3}}>DEMO 전환율 <span style={{color:'var(--t3)'}}>{modal==='converted'?'▾':'▸'}</span></div>
        <div style={{fontSize:22,fontWeight:700,color:'#fb923c',lineHeight:1}}>{demoConvRate}%</div>
        <div style={{fontSize:10,color:'#fbbf24',marginTop:5}}>전환 {demoConverted.length}건 / 데모 {demoTotal}건</div>
        <div style={{marginTop:6,height:4,borderRadius:2,background:'rgba(255,255,255,.08)'}}><div style={{width:demoConvRate+'%',height:'100%',borderRadius:2,background:'linear-gradient(90deg,#ea580c,#fb923c)'}}/></div>

        <div style={{fontSize:22,fontWeight:700,color:'#f87171',lineHeight:1}}>{demoNotConv.length}건</div>

// 월별 데모/계약 목표 입력 (count_targets · 연도 선택 → 12개월 그리드)
function CountTargetModal({onClose,onSaved}){
  const [year,setYear]=useState(new Date().getFullYear());
  const [vals,setVals]=useState({}); // {1:{d,c},...}
  const [busy,setBusy]=useState(false);
  useEffect(()=>{(async()=>{
    const {data}=await sb.from('count_targets').select('year_month,demo_target,contract_target');
    const m={};(data||[]).forEach(r=>{const ym=String(r.year_month||'');if(!ym.startsWith(year+'-'))return;const mm=Number(ym.slice(5));m[mm]={d:String(r.demo_target||''),c:String(r.contract_target||'')};});
    setVals(m);
  })();},[year]);
  function setV(mm,key,v){const nv=v.replace(/[^\d]/g,'');setVals(p=>({...p,[mm]:{...(p[mm]||{}),[key]:nv}}));}
  async function save(){
    setBusy(true);
    try{
      const rows=[];
      for(let mm=1;mm<=12;mm++){
        const v=vals[mm]||{};const d=Number(v.d)||0,c=Number(v.c)||0;
        if(d===0&&c===0)continue;
        rows.push({year_month:year+'-'+String(mm).padStart(2,'0'),demo_target:d,contract_target:c});
      }
      if(rows.length>0){const {error}=await sb.from('count_targets').upsert(rows,{onConflict:'year_month'});if(error)throw error;}
      setBusy(false);onSaved();
    }catch(e){alert('저장 오류: '+(e.message||e));setBusy(false);}
  }
  const years=[];for(let y=new Date().getFullYear()+1;y>=new Date().getFullYear()-3;y--)years.push(y);
  return (<div className="ov" onClick={e=>{if(e.target===e.currentTarget)return;}}>
    <div className="modal" style={{width:440,maxHeight:'85dvh',display:'flex',flexDirection:'column'}}>
      <div className="mhd" style={{fontSize:15,fontWeight:700}}><span>월별 데모·계약 목표 입력</span><button className="tbtn" style={{marginLeft:'auto',background:'rgba(255,255,255,.06)'}} onClick={onClose}>✕</button></div>
      <div style={{fontSize:11,color:'var(--t3)',marginBottom:10}}>월 단위로 입력하면 반기·분기·연도는 자동 합산됩니다 (단위: 건)</div>
      <label className="lbl">대상 연도</label>
      <select value={year} onChange={e=>setYear(Number(e.target.value))} style={{marginBottom:12}}>{years.map(y=><option key={y} value={y}>{y}년</option>)}</select>
      <div style={{overflowY:'auto',flex:1,minHeight:0}}>
        <div className="tbl-grid" style={{display:'grid',gridTemplateColumns:'44px 1fr 1fr',gap:6,alignItems:'center',marginBottom:6,fontSize:10,color:'var(--t3)'}}>
          <div>월</div><div style={{color:'#85B7EB'}}>데모 목표</div><div style={{color:'#5DCAA5'}}>계약 목표</div>
        </div>
        {Array.from({length:12},(_,i)=>i+1).map(mm=>(
          <div key={mm} className="tbl-grid" style={{display:'grid',gridTemplateColumns:'44px 1fr 1fr',gap:6,alignItems:'center',marginBottom:6}}>
            <div style={{fontSize:12,fontWeight:600,color:'var(--t2)'}}>{mm}월</div>
            <input type="text" inputMode="numeric" value={(vals[mm]&&vals[mm].d)||''} placeholder="0" onChange={e=>setV(mm,'d',e.target.value)}/>
            <input type="text" inputMode="numeric" value={(vals[mm]&&vals[mm].c)||''} placeholder="0" onChange={e=>setV(mm,'c',e.target.value)}/>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:14,flexShrink:0}}>
        <button className="btn-ghost" onClick={onClose}>취소</button>
        <button className="btn" disabled={busy} onClick={save}>{busy?'저장 중...':'저장'}</button>
      </div>
    </div>
  </div>);
}

// 데모 목표·현황 패널 (목표 대비 KPI + 기간 추이 + 영업 퍼널 + 클릭 시 병원 목록)
function DemoTargetPanel({salesHistory,countTargets,demos,customers,onTargetSaved,ctrl}){
  // ctrl 전달 시 상단 통합 기간설정을 따르고 자체 기간 컨트롤 숨김 (목표입력·제품필터는 유지)
  const now=new Date();
  const [gran0,setGran]=useState('quarter'); // year|half|quarter|month
  const [selYear0,setSelYear]=useState(now.getFullYear());
  const [selHalf0,setSelHalf]=useState(0); // 0=전체
  const [selQ0,setSelQ]=useState(0);
  const [selMonth0,setSelMonth]=useState(0);
  const gran=ctrl?ctrl.gran:gran0;
  const selYear=ctrl?ctrl.year:selYear0;
  const selHalf=ctrl?(ctrl.selHalf||0):selHalf0;
  const selQ=ctrl?(ctrl.selQ||0):selQ0;
  const selMonth=ctrl?(ctrl.selMonth||0):selMonth0;
  const [prodFilter,setProdFilter]=useState('ALL'); // 제품 필터
  const [tgtModal,setTgtModal]=useState(false);
  const [drill,setDrill]=useState(null); // {label, rows}
  const [popup,setPopup]=useState(null);
  const [notYear,setNotYear]=useState('전체');

  const STAGES=['DEMO시작','견적서발송','이용신청서발송','이용신청서계약','약정시작'];
  const STAGE_LBL={'DEMO시작':'DEMO 시작','견적서발송':'견적서','이용신청서발송':'이용신청서','이용신청서계약':'계약 체결','약정시작':'약정 시작'};

  // 단계별 고객 최초 도달일 수집
  const firstByStage={};STAGES.forEach(s=>firstByStage[s]={});
  (salesHistory||[]).forEach(r=>{
    const s=String(r.history_type||'').trim();if(STAGES.indexOf(s)<0)return;
    const d=String(r.history_date||'').slice(0,10);if(!/^\d{4}-\d{2}-\d{2}$/.test(d))return;
    const cid=String(r.cust_id||'').trim();if(!cid)return;
    const cur=firstByStage[s][cid];
    if(!cur||d<cur.date)firstByStage[s][cid]={date:d,hospital_name:r.hospital_name||cid,cust_id:cid};
  });
  function stageRows(stage,year,months){
    const out=[];
    Object.keys(firstByStage[stage]).forEach(cid=>{const v=firstByStage[stage][cid];const yy=Number(v.date.slice(0,4)),mm=Number(v.date.slice(5,7));if(yy!==year)return;if(months&&months.indexOf(mm)<0)return;out.push(v);});
    return out.sort((a,b)=>b.date.localeCompare(a.date));
  }
  function tgtSum(year,months){
    let d=0,c=0;(countTargets||[]).forEach(t=>{const ym=String(t.year_month||'');const yy=Number(ym.slice(0,4)),mm=Number(ym.slice(5,7));if(yy!==year)return;if(months&&months.indexOf(mm)<0)return;d+=Number(t.demo_target)||0;c+=Number(t.contract_target)||0;});
    return {demo:d,con:c};
  }
  // 현재 선택 기간의 월 범위 (null=연도전체)
  function scopeMonths(){
    if(gran==='year')return null;
    if(gran==='half')return selHalf===1?[1,2,3,4,5,6]:selHalf===2?[7,8,9,10,11,12]:null;
    if(gran==='quarter')return selQ?[selQ*3-2,selQ*3-1,selQ*3]:null;
    if(gran==='month')return selMonth?[selMonth]:null;
    return null;
  }
  const scope=scopeMonths();
  const scopeLbl=(()=>{
    if(gran==='year')return selYear+'년';
    if(gran==='half')return selYear+'년 '+(selHalf===1?'상반기':selHalf===2?'하반기':'전체');
    if(gran==='quarter')return selYear+'년 '+(selQ?selQ+'분기':'전체');
    return selYear+'년 '+(selMonth?selMonth+'월':'전체');
  })();

  const PRODUCTS=['BA','OA','SG','SC'];
  const PRODUCT_LABEL={BA:'MediAI-BA',OA:'MediAI-OA',SG:'MediAI-SG',SC:'MediAI-SC'};
  // ── 계약 도달: 고객별 첫 계약일 (이용신청서계약 or 약정시작 중 이른 것) ──
  const contractByCust={};
  (salesHistory||[]).forEach(r=>{const s=String(r.history_type||'').trim();if(s!=='이용신청서계약'&&s!=='약정시작')return;const d=String(r.history_date||'').slice(0,10);if(!/^\d{4}-\d{2}-\d{2}$/.test(d))return;const cid=String(r.cust_id||'').trim();if(!cid)return;if(!contractByCust[cid]||d<contractByCust[cid])contractByCust[cid]=d;});
  const hospByCust={};(customers||[]).forEach(c=>{const cid=String(c.cust_id||'').trim();if(cid&&c.hospital_name)hospByCust[cid]=c.hospital_name;});(salesHistory||[]).forEach(r=>{const cid=String(r.cust_id||'').trim();if(cid&&r.hospital_name&&!hospByCust[cid])hospByCust[cid]=r.hospital_name;});
  // ── 데모 시작: 고객별 첫 데모 시작일 (demos 테이블, 제품 필터 적용) ──
  const demoByCust={};
  (demos||[]).forEach(dm=>{if(prodFilter!=='ALL'&&dm.product!==prodFilter)return;const cid=String(dm.cust_id||'').trim();if(!cid)return;const d=String(dm.demo_start||'').slice(0,10);if(!/^\d{4}-\d{2}-\d{2}$/.test(d))return;if(!demoByCust[cid]||d<demoByCust[cid])demoByCust[cid]=d;});
  const demoEndByCust={};
  (demos||[]).forEach(dm=>{if(prodFilter!=='ALL'&&dm.product!==prodFilter)return;const cid=String(dm.cust_id||'').trim();if(!cid)return;const e=String(dm.demo_end||'').slice(0,10);if(!/^\d{4}-\d{2}-\d{2}$/.test(e))return;if(!demoEndByCust[cid]||e>demoEndByCust[cid])demoEndByCust[cid]=e;});
  function demoCohortRows(year,months){const out=[];Object.keys(demoByCust).forEach(cid=>{const d=demoByCust[cid];const yy=Number(d.slice(0,4)),mm=Number(d.slice(5,7));if(yy!==year)return;if(months&&months.indexOf(mm)<0)return;out.push({cust_id:cid,date:d,hospital_name:hospByCust[cid]||cid});});return out.sort((a,b)=>b.date.localeCompare(a.date));}
  function contractRows2(year,months){const out=[];Object.keys(contractByCust).forEach(cid=>{const d=contractByCust[cid];const yy=Number(d.slice(0,4)),mm=Number(d.slice(5,7));if(yy!==year)return;if(months&&months.indexOf(mm)<0)return;out.push({cust_id:cid,date:d,hospital_name:hospByCust[cid]||cid});});return out.sort((a,b)=>b.date.localeCompare(a.date));}

  const demoRows=demoCohortRows(selYear,scope);   // 코호트: 선택 기간 데모 시작 고객
  const conRows=contractRows2(selYear,scope);     // 선택 기간 계약 고객
  const t=tgtSum(selYear,scope);
  const demoAct=demoRows.length,conAct=conRows.length;
  const demoAch=t.demo?Math.round(demoAct/t.demo*100):0;
  const conAch=t.con?Math.round(conAct/t.con*100):0;

  // 코호트 전환 (코호트 중 계약 도달)
  const cohortConverted=demoRows.filter(r=>contractByCust[r.cust_id]);
  // 퍼널 (코호트 고정)
  const funnel=[
    {stage:'DEMO시작',rows:demoRows},
    {stage:'견적서발송',rows:demoRows.filter(r=>firstByStage['견적서발송'][r.cust_id])},
    {stage:'이용신청서발송',rows:demoRows.filter(r=>firstByStage['이용신청서발송'][r.cust_id])},
    {stage:'이용신청서계약',rows:demoRows.filter(r=>firstByStage['이용신청서계약'][r.cust_id])},
    {stage:'약정시작',rows:demoRows.filter(r=>firstByStage['약정시작'][r.cust_id])},
  ];
  const funnelMax=Math.max(1,...funnel.map(f=>f.rows.length));

  // 추이 차트 버킷
  function buckets(){
    if(gran==='year'){const ys=[selYear-3,selYear-2,selYear-1,selYear];return ys.map(y=>({label:String(y),year:y,months:null}));}
    if(gran==='half')return [{label:'상반기',year:selYear,months:[1,2,3,4,5,6]},{label:'하반기',year:selYear,months:[7,8,9,10,11,12]}];
    if(gran==='quarter')return [1,2,3,4].map(q=>({label:'Q'+q,year:selYear,months:[q*3-2,q*3-1,q*3]}));
    return Array.from({length:12},(_,i)=>({label:(i+1)+'월',year:selYear,months:[i+1]}));
  }
  const bks=buckets();
  const demoCfg={
    data:{labels:bks.map(b=>b.label),datasets:[
      {type:'bar',label:'데모 실적',data:bks.map(b=>demoCohortRows(b.year,b.months).length),backgroundColor:'#2563EB',borderRadius:3,order:2},
      {type:'line',label:'데모 목표',data:bks.map(b=>tgtSum(b.year,b.months).demo),borderColor:'#93c5fd',borderWidth:2,borderDash:[5,4],pointRadius:0,fill:false,tension:0,order:1}
    ]},
    options:{plugins:{legend:{display:false}},scales:{x:{ticks:{autoSkip:false,font:{size:9}}},y:{beginAtZero:true,ticks:{precision:0}}}}
  };
  const conCfg={
    data:{labels:bks.map(b=>b.label),datasets:[
      {type:'bar',label:'계약 실적',data:bks.map(b=>contractRows2(b.year,b.months).length),backgroundColor:'#22C55E',borderRadius:3,order:2},
      {type:'line',label:'계약 목표',data:bks.map(b=>tgtSum(b.year,b.months).con),borderColor:'#86efac',borderWidth:2,borderDash:[5,4],pointRadius:0,fill:false,tension:0,order:1}
    ]},
    options:{plugins:{legend:{display:false}},scales:{x:{ticks:{autoSkip:false,font:{size:9}}},y:{beginAtZero:true,ticks:{precision:0}}}}
  };
  // 코호트 최종 전환율 · 평균 전환 소요일
  const finalConv=demoRows.length?Math.round(cohortConverted.length/demoRows.length*100):0;
  const convDays=[];cohortConverted.forEach(r=>{const cd=contractByCust[r.cust_id];const diff=Math.round((new Date(cd)-new Date(r.date))/86400000);if(diff>=0)convDays.push(diff);});
  const avgDays=convDays.length?Math.round(convDays.reduce((a,b)=>a+b,0)/convDays.length):0;
  // 데모 효과 비교: 선택 기간 계약 고객을 데모 O/X로
  const demoOset=new Set(Object.keys(demoByCust));
  const conWithDemo=conRows.filter(r=>demoOset.has(r.cust_id)).length;
  const conWithoutDemo=conRows.length-conWithDemo;

  // 미전환: 코호트 중 계약 없는 고객
  const _todayStr=new Date().toISOString().slice(0,10);
  const notConv=demoRows.filter(r=>!contractByCust[r.cust_id]&&demoEndByCust[r.cust_id]&&demoEndByCust[r.cust_id]<_todayStr).map(r=>{const _e=demoEndByCust[r.cust_id];return {cust_id:r.cust_id,hospital_name:r.hospital_name,date:_e,diffDays:Math.round((Date.now()-new Date(_e).getTime())/86400000),year:_e.slice(0,4)};}).filter(x=>x.diffDays>=0);
  notConv.sort((a,b)=>b.diffDays-a.diffDays);
  const notYears=['전체',...[...new Set(notConv.map(x=>x.year))].sort().reverse()];
  const notFiltered=notYear==='전체'?notConv:notConv.filter(x=>x.year===notYear);
  const n30=notFiltered.filter(x=>x.diffDays<=30).length,n3190=notFiltered.filter(x=>x.diffDays>30&&x.diffDays<=90).length,n90=notFiltered.filter(x=>x.diffDays>90).length;

  const years=[];for(let y=now.getFullYear();y>=now.getFullYear()-4;y--)years.push(y);
  const tabBtn=(k,lb)=>{const on=gran===k;return <span onClick={()=>{setGran(k);setSelHalf(0);setSelQ(0);setSelMonth(0);setDrill(null);}} style={{fontSize:11,padding:'5px 10px',borderRadius:7,cursor:'pointer',background:on?'#2563EB':'#1E293B',border:'0.5px solid '+(on?'#2563EB':'var(--border)'),color:on?'#fff':'var(--t3)'}}>{lb}</span>;};

  return (<div className="panel">
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,flexWrap:'wrap'}}>
      <span className="card-hd" onClick={scrollCardTop} style={{fontSize:14,fontWeight:600,color:'#AFA9EC'}}>데모·계약 목표 현황<span className="up">⤒</span></span>
      <span style={{fontSize:11,color:'var(--t3)'}}>{scopeLbl}</span>
      <div style={{marginLeft:'auto',display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
        <button onClick={()=>setTgtModal(true)} style={{fontSize:11,padding:'5px 10px',borderRadius:7,cursor:'pointer',background:'rgba(175,169,236,.15)',border:'0.5px solid #AFA9EC66',color:'#AFA9EC',fontWeight:600}}>＋ 목표 입력</button>
        <select value={prodFilter} onChange={e=>{setProdFilter(e.target.value);setDrill(null);}} style={{fontSize:11,padding:'4px 7px',width:'auto',background:'#13202f',border:'0.5px solid '+(prodFilter!=='ALL'?'#EF9F27':'var(--border)'),borderRadius:7,color:prodFilter!=='ALL'?'#EF9F27':'#c8d3e0'}}><option value="ALL">전 제품</option>{PRODUCTS.map(p=><option key={p} value={p}>{PRODUCT_LABEL[p]}</option>)}</select>
        {!ctrl&&<React.Fragment>
        <select value={selYear} onChange={e=>setSelYear(Number(e.target.value))} style={{fontSize:11,padding:'4px 7px',width:'auto',background:'#13202f',border:'0.5px solid var(--border)',borderRadius:7,color:'#c8d3e0'}}>{years.map(y=><option key={y} value={y}>{y}</option>)}</select>
        {gran==='half'&&<select value={selHalf} onChange={e=>{setSelHalf(Number(e.target.value));setDrill(null);}} style={{fontSize:11,padding:'4px 7px',width:'auto',background:'#13202f',border:'0.5px solid '+(selHalf?'#EF9F27':'var(--border)'),borderRadius:7,color:selHalf?'#EF9F27':'#c8d3e0'}}><option value={0}>전체</option><option value={1}>상반기</option><option value={2}>하반기</option></select>}
        {gran==='quarter'&&<select value={selQ} onChange={e=>{setSelQ(Number(e.target.value));setDrill(null);}} style={{fontSize:11,padding:'4px 7px',width:'auto',background:'#13202f',border:'0.5px solid '+(selQ?'#EF9F27':'var(--border)'),borderRadius:7,color:selQ?'#EF9F27':'#c8d3e0'}}><option value={0}>전체</option>{[1,2,3,4].map(q=><option key={q} value={q}>Q{q}</option>)}</select>}
        {gran==='month'&&<select value={selMonth} onChange={e=>{setSelMonth(Number(e.target.value));setDrill(null);}} style={{fontSize:11,padding:'4px 7px',width:'auto',background:'#13202f',border:'0.5px solid '+(selMonth?'#EF9F27':'var(--border)'),borderRadius:7,color:selMonth?'#EF9F27':'#c8d3e0'}}><option value={0}>전체</option>{Array.from({length:12},(_,i)=>i+1).map(m=><option key={m} value={m}>{m}월</option>)}</select>}
        {tabBtn('year','연도')}{tabBtn('half','반기')}{tabBtn('quarter','분기')}{tabBtn('month','월별')}
        </React.Fragment>}
      </div>
    </div>

    {/* 목표 대비 KPI + 추이 차트 (데모 왼쪽 / 계약 오른쪽 2단) */}
    <div className="grid-auto-mob" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
      <div>
        <div onClick={()=>setDrill({label:STAGE_LBL['DEMO시작']+' · '+scopeLbl,rows:demoRows})} style={{background:'rgba(55,138,221,.12)',border:'0.5px solid rgba(55,138,221,.4)',borderRadius:12,padding:'13px 15px',cursor:'pointer',marginBottom:10}}>
          <div style={{fontSize:12,color:'#85B7EB',marginBottom:7}}>DEMO 진행 <span style={{color:'var(--t3)'}}>▸</span></div>
          <div style={{display:'flex',alignItems:'baseline',gap:7}}><span style={{fontSize:24,fontWeight:700}}>{demoAct}</span><span style={{fontSize:12,color:'var(--t2)'}}>/ 목표 {t.demo}건</span></div>
          <div style={{marginTop:7,height:6,borderRadius:3,background:'rgba(0,0,0,.3)',overflow:'hidden'}}><div style={{width:Math.min(demoAch,100)+'%',height:'100%',background:'#2563EB'}}/></div>
          <div style={{fontSize:11,color:'#85B7EB',marginTop:4}}>달성률 {demoAch}%</div>
        </div>
        <div style={{fontSize:11,color:'#85B7EB',marginBottom:5}}>데모 — 실적(막대) vs 목표(점선)</div>
        <ChartBox cfg={demoCfg} height={140}/>
      </div>
      <div>
        <div onClick={()=>setDrill({label:STAGE_LBL['이용신청서계약']+' · '+scopeLbl,rows:conRows})} style={{background:'rgba(29,158,117,.12)',border:'0.5px solid rgba(29,158,117,.4)',borderRadius:12,padding:'13px 15px',cursor:'pointer',marginBottom:10}}>
          <div style={{fontSize:12,color:'#5DCAA5',marginBottom:7}}>계약 체결 <span style={{color:'var(--t3)'}}>▸</span></div>
          <div style={{display:'flex',alignItems:'baseline',gap:7}}><span style={{fontSize:24,fontWeight:700}}>{conAct}</span><span style={{fontSize:12,color:'var(--t2)'}}>/ 목표 {t.con}건</span></div>
          <div style={{marginTop:7,height:6,borderRadius:3,background:'rgba(0,0,0,.3)',overflow:'hidden'}}><div style={{width:Math.min(conAch,100)+'%',height:'100%',background:'#22C55E'}}/></div>
          <div style={{fontSize:11,color:'#5DCAA5',marginTop:4}}>달성률 {conAch}%</div>
        </div>
        <div style={{fontSize:11,color:'#5DCAA5',marginBottom:5}}>계약 — 실적(막대) vs 목표(점선)</div>
        <ChartBox cfg={conCfg} height={140}/>
      </div>
    </div>

    {/* 영업 퍼널 (가로 스텝 흐름) */}
    <div style={{fontSize:11,color:'var(--t3)',marginBottom:8}}>영업 퍼널 · {scopeLbl} <span style={{color:'var(--t3)'}}>(단계 클릭 시 병원 목록)</span></div>
    <div style={{display:'flex',alignItems:'stretch',gap:0,overflowX:'auto',paddingBottom:4}}>
      {funnel.map((f,i)=>{
        const cnt=f.rows.length;
        const prev=i>0?funnel[i-1].rows.length:0;const conv=i>0&&prev>0?Math.round(cnt/prev*100):null;
        const isLast=i===STAGES.length-1;
        return (<React.Fragment key={f.stage}>
          {i>0&&<div style={{display:'flex',alignItems:'center',padding:'0 3px',fontSize:10,color:(conv!=null&&conv>=100)?'#4ade80':'var(--t3)',whiteSpace:'nowrap',flexShrink:0}}>{conv!=null?conv+'%':''}<span style={{color:'var(--t3)',marginLeft:2}}>›</span></div>}
          <div onClick={()=>setDrill({label:STAGE_LBL[f.stage]+' · '+scopeLbl,rows:f.rows})} style={{flex:1,minWidth:62,textAlign:'center',cursor:'pointer'}}>
            <div style={{background:isLast?'rgba(34,197,94,.10)':'rgba(37,99,235,.10)',border:'1px solid '+(isLast?'#22C55E':'#2563EB'),borderRadius:8,padding:'10px 4px'}}>
              <div style={{fontSize:20,fontWeight:700}}>{cnt}</div>
              <div style={{fontSize:10,color:isLast?'#4ade80':'#93c5fd',whiteSpace:'nowrap'}}>{STAGE_LBL[f.stage]}</div>
            </div>
          </div>
        </React.Fragment>);
      })}
    </div>
    <div style={{display:'flex',gap:20,marginTop:12,paddingTop:10,borderTop:'0.5px solid var(--border)',fontSize:12,flexWrap:'wrap'}}>
      <span style={{color:'var(--t2)'}}>DEMO→계약 전환율 <b style={{color:'#fb923c'}}>{finalConv}%</b> <span style={{fontSize:10,color:'var(--t3)'}}>({scopeLbl} 데모 {demoRows.length}곳 중 {cohortConverted.length}곳 계약)</span></span>
      <span style={{color:'var(--t2)'}}>평균 전환 소요 <b style={{color:'var(--t1,#fff)'}}>{avgDays}일</b></span>
      <span style={{color:'var(--t2)'}}>데모 거친 계약 <b style={{color:'#4ade80'}}>{conWithDemo}</b> · 데모 없이 계약 <b style={{color:'#fbbf24'}}>{conWithoutDemo}</b></span>
    </div>

    {/* 드릴다운: 병원 목록 */}
    {drill&&<div style={{marginTop:14,border:'0.5px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'9px 12px',background:'rgba(37,99,235,.12)',borderBottom:'0.5px solid var(--border)'}}>
        <span style={{fontSize:12,fontWeight:600,color:'#85B7EB'}}>{drill.label}</span>
        <span style={{fontSize:11,color:'var(--t3)'}}>{drill.rows.length}건</span>
        <button className="tbtn" style={{marginLeft:'auto',background:'rgba(255,255,255,.06)',fontSize:11,padding:'3px 9px'}} onClick={()=>setDrill(null)}>✕ 닫기</button>
      </div>
      <div style={{maxHeight:220,overflowY:'auto'}}>
        {drill.rows.length===0?<div style={{fontSize:11,color:'var(--t3)',textAlign:'center',padding:'20px 0'}}>해당 기간 병원이 없습니다.</div>:
        drill.rows.map((r,i)=>(
          <div key={i} onClick={()=>setPopup({cid:r.cust_id,name:r.hospital_name})} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',borderBottom:'0.5px solid var(--border)',cursor:'pointer'}}>
            <span style={{fontSize:12,fontWeight:600}}>{r.hospital_name}</span>
            <span style={{fontSize:10,color:'var(--t3)'}}>{r.cust_id}</span>
            <span style={{marginLeft:'auto',fontSize:10,color:'var(--t2)'}}>{r.date}</span>
          </div>
        ))}
      </div>
    </div>}

    {/* DEMO 종료 후 미전환 고객 */}
    <div style={{marginTop:14,paddingTop:12,borderTop:'0.5px solid var(--border)'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,flexWrap:'wrap'}}>
        <span style={{fontSize:13,fontWeight:600,color:'#f87171'}}>DEMO 종료 후 미전환 고객</span>
        <span style={{fontSize:11,color:'var(--t3)'}}>계약·약정 없이 남은 DEMO 고객 · follow-up 대상</span>
        <select value={notYear} onChange={e=>setNotYear(e.target.value)} style={{marginLeft:'auto',fontSize:11,padding:'4px 7px',width:'auto',background:'#13202f',border:'0.5px solid '+(notYear!=='전체'?'#EF9F27':'var(--border)'),borderRadius:7,color:notYear!=='전체'?'#EF9F27':'#c8d3e0'}}>{notYears.map(y=><option key={y} value={y}>{y==='전체'?'전체':y+'년'}</option>)}</select>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:10}}>
        <div style={{flex:1,background:'#13202f',borderRadius:8,padding:'8px 10px',textAlign:'center',border:'0.5px solid var(--border)'}}><div style={{fontSize:10,color:'var(--t3)'}}>30일 이내</div><div style={{fontSize:15,fontWeight:700,color:'#fbbf24'}}>{n30}건</div></div>
        <div style={{flex:1,background:'#13202f',borderRadius:8,padding:'8px 10px',textAlign:'center',border:'0.5px solid var(--border)'}}><div style={{fontSize:10,color:'var(--t3)'}}>31~90일</div><div style={{fontSize:15,fontWeight:700,color:'#fb923c'}}>{n3190}건</div></div>
        <div style={{flex:1,background:'#13202f',borderRadius:8,padding:'8px 10px',textAlign:'center',border:'0.5px solid var(--border)'}}><div style={{fontSize:10,color:'var(--t3)'}}>90일 초과</div><div style={{fontSize:15,fontWeight:700,color:'#f87171'}}>{n90}건</div></div>
      </div>
      <div style={{maxHeight:220,overflowY:'auto',border:'0.5px solid var(--border)',borderRadius:8}}>
        {notFiltered.length===0?<div style={{fontSize:11,color:'var(--t3)',textAlign:'center',padding:'20px 0'}}>미전환 고객 없음</div>:notFiltered.map((x,i)=>(
          <div key={i} onClick={()=>setPopup({cid:x.cust_id,name:x.hospital_name})} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',borderBottom:'0.5px solid var(--border)',cursor:'pointer'}}>
            <span style={{fontSize:12,fontWeight:600,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{x.hospital_name}</span>
            <span style={{fontSize:10,color:'var(--t3)'}}>{x.date}</span>
            <span style={{fontSize:11,fontWeight:700,color:x.diffDays>90?'#f87171':x.diffDays>30?'#fb923c':'#fbbf24',flexShrink:0}}>+{x.diffDays}일</span>
          </div>
        ))}
      </div>
    </div>

    {tgtModal&&<CountTargetModal onClose={()=>setTgtModal(false)} onSaved={()=>{setTgtModal(false);if(onTargetSaved)onTargetSaved();}}/>}
    {popup&&<CrmCustPopup custId={popup.cid} fallbackName={popup.name} onClose={()=>setPopup(null)}/>}
  </div>);
}

function ChartBox({cfg,height}){
  const ref=useRef(null);const inst=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.Chart)return;
    if(inst.current){inst.current.destroy();}
    const merged={...cfg,options:{responsive:true,maintainAspectRatio:false,...(cfg.options||{})}};
    inst.current=new window.Chart(ref.current,merged);
    return ()=>{if(inst.current){inst.current.destroy();inst.current=null;}};
  },[JSON.stringify(cfg)]);
  return <div style={{position:'relative',height:height||168,width:'100%'}}><canvas ref={ref}/></div>;
}

// 미니 단계 막대 (막대 위 건수 + 아래 색 뱃지 라벨, 폭 고정·자간 자동)
function MiniStageBars({stages,counts,colorMap}){

            <span style={{fontSize:9,fontWeight:700,color:'#c8d3e0'}}>{n}</span>
