  .btn-brand:hover{background:var(--brand-dark)}
  .btn-brand:disabled{opacity:.6;cursor:default}
  .btn-ghost{background:var(--card);border:1px solid var(--border);color:var(--text-sub)}
  .btn-ghost:hover{background:var(--row-hover)}
  .btn-sm{padding:6px 10px;font-size:12px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;

    position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.25)}

  .tbl{width:100%;border-collapse:collapse;font-size:13px}
  .tbl th{padding:10px 14px;text-align:left;color:var(--text-sub);border-bottom:1px solid var(--border);
    font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;background:var(--card-2);
    white-space:nowrap;cursor:pointer;user-select:none}
  .tbl th:hover{color:var(--brand)}
  .tbl td{padding:12px 14px;border-bottom:1px solid #2e3a4f;color:var(--text)}
  .tbl tr:hover td{background:var(--row-hover)}
  .row-click{cursor:pointer}
  .badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px}
  .b-준비{background:rgba(148,163,184,.20);color:#cbd5e1}
  .b-신청{background:rgba(96,165,250,.22);color:#93c5fd}
  .b-수행{background:rgba(52,211,153,.22);color:#6ee7b7}
  .b-완료{background:rgba(129,140,248,.24);color:#a5b4fc}
  .b-탈락{background:rgba(248,113,113,.22);color:#fca5a5}
  .form-label{font-size:12px;font-weight:600;color:var(--text-sub);margin-bottom:5px;display:block}
  .modal-bg{position:fixed;inset:0;background:rgba(6,10,18,.72);display:flex;align-items:flex-start;

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:2000;

    box-shadow:0 6px 24px rgba(0,0,0,.25);animation:pop .2s ease}
  @keyframes pop{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
  .ptab{padding:12px 4px;font-size:14px;font-weight:600;color:var(--text-muted);cursor:pointer;

  .ptab:hover{color:var(--text-sub)}
  .tbl-sticky thead th{position:sticky;top:0;z-index:5;background:var(--card-2)}
  .mob-topbar{display:none;}
  .mob-backdrop{display:none;}

    .mob-backdrop.open{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:110;}
    .app-main{padding:16px !important;}

    .modal-bg{padding:16px 10px;}

    range(){ return qb; },
    single(){ return Promise.resolve({data:rows[0]||null,error:null}); },
    maybeSingle(){ return Promise.resolve({data:rows[0]||null,error:null}); },
    then(res){ res({data:rows,error:null}); },
  };
  return qb;
}
const sb = {
  from: _qb,
  auth: {
    getSession(){ return Promise.resolve({data:{session:{user:DEMO_USER}},error:null}); },
    getUser(){ return Promise.resolve({data:{user:DEMO_USER},error:null}); },
    signInWithPassword(){ return Promise.resolve({data:{session:{user:DEMO_USER},user:DEMO_USER},error:null}); },
    signOut(){ return Promise.resolve({error:null}); },
    onAuthStateChange(){ return {data:{subscription:{unsubscribe(){}}}}; },
  },
};

const n = v => Number(String(v??'').replace(/,/g,''))||0;

async function audit(user, action, recordId, detail){

function useToast(){
  const [toast,setToast] = useState(null);
  const show = (msg,type='ok') => { setToast({msg,type}); setTimeout(()=>setToast(null),2600); };
  const node = toast ? (
    <div className="toast" style={{background:toast.type==='ok'?'#10b981':'#ef4444'}}>{toast.msg}</div>
  ) : null;
  return [node, show];
}

function ProjectModal({user,editItem,onClose,onSaved,showToast}){
  const isNew = !editItem;
  const [f,setF] = useState({
    project_code: editItem?.project_code||'', name: editItem?.name||'',
    program: editItem?.program||'', agency: editItem?.agency||'',
    status: editItem?.status||'준비',
    period_start: editItem?.period_start||'', period_end: editItem?.period_end||'',
    govt_budget: editItem?.govt_budget||'', cash_budget: editItem?.cash_budget||'',
    kind_budget: editItem?.kind_budget||'',
    manage_folder_url: editItem?.manage_folder_url||'', evidence_folder_url: editItem?.evidence_folder_url||'',
    owner: editItem?.owner||'', note: editItem?.note||'',
  });
  const [busy,setBusy]=useState(false); const [err,setErr]=useState('');
  const set = (k,v)=>setF(p=>({...p,[k]:v}));
  const total = n(f.govt_budget)+n(f.cash_budget)+n(f.kind_budget);

  async function save(){
    if(!f.name.trim()){ setErr('사업명은 필수입니다.'); return; }
    setBusy(true); setErr('');
    const payload = {
      project_code:f.project_code.trim()||null, name:f.name.trim(),
      program:f.program.trim()||null, agency:f.agency.trim()||null, status:f.status,
      period_start:f.period_start||null, period_end:f.period_end||null,
      govt_budget:n(f.govt_budget), cash_budget:n(f.cash_budget), kind_budget:n(f.kind_budget),
      total_budget:total, manage_folder_url:f.manage_folder_url.trim()||null,
      evidence_folder_url:f.evidence_folder_url.trim()||null,
      owner:f.owner.trim()||null, note:f.note.trim()||null,
    };
    let res;
    if(isNew) res = await sb.from('projects').insert(payload).select().single();
    else{ payload.updated_at=new Date().toISOString();
          res = await sb.from('projects').update(payload).eq('id',editItem.id).select().single(); }
    setBusy(false);
    if(res.error){ setErr('저장 실패: '+res.error.message); return; }
    audit(user, isNew?'INSERT':'UPDATE', res.data.id, res.data.name);
    showToast(isNew?'과제가 등록되었습니다':'수정되었습니다');
    onSaved(res.data);
  }

  return (
    <div className="modal-bg" onMouseDown={onClose}>
      <div className="card" style={{width:'100%',maxWidth:720,padding:26}}
        onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontSize:18,fontWeight:800}}>{isNew?'신규 과제 등록':'과제 수정'}</div>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'var(--text-muted)'}}>×</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:14}}>
          <div><label className="form-label">사업명 * (지원사업명)</label>
            <input value={f.name} onChange={e=>set('name',e.target.value)} placeholder="예: 2026 첨단 AI 지원사업"/></div>
          <div><label className="form-label">과제명 (선정된 과제 제목)</label>
            <input value={f.program} onChange={e=>set('program',e.target.value)} placeholder="예: 병원 주도형 AI 플랫폼"/></div>
          <div><label className="form-label">주관기관</label>
            <input value={f.agency} onChange={e=>set('agency',e.target.value)} placeholder="예: 한국의료기기안전정보원"/></div>
          <div><label className="form-label">과제 고유번호</label>
            <input value={f.project_code} onChange={e=>set('project_code',e.target.value)} placeholder="예: P-AX-2026"/></div>
          <div><label className="form-label">상태</label>
            <select value={f.status} onChange={e=>set('status',e.target.value)}>
              {STATUS.map(s=><option key={s} value={s}>{s}</option>)}
            </select></div>
          <div><label className="form-label">담당자</label>
            <input value={f.owner} onChange={e=>set('owner',e.target.value)} placeholder="담당자명"/></div>
          <div><label className="form-label">협약 시작일</label>
            <input type="date" value={f.period_start} onChange={e=>set('period_start',e.target.value)}/></div>
          <div><label className="form-label">협약 종료일</label>
            <input type="date" value={f.period_end} onChange={e=>set('period_end',e.target.value)}/></div>
          <div><label className="form-label">정부지원금</label>
            <MoneyInput value={f.govt_budget} onChange={v=>set('govt_budget',v)} placeholder="0"/></div>
          <div><label className="form-label">자부담 현금</label>
            <MoneyInput value={f.cash_budget} onChange={v=>set('cash_budget',v)} placeholder="0"/></div>
          <div><label className="form-label">자부담 현물</label>
            <MoneyInput value={f.kind_budget} onChange={v=>set('kind_budget',v)} placeholder="0"/></div>
          <div><label className="form-label">총사업비 (자동)</label>
            <div style={{padding:'9px 12px',background:'rgba(249,115,22,.08)',borderRadius:8,
              border:'1px solid rgba(249,115,22,.2)',fontWeight:800,color:'var(--brand)'}}>{fmt(total)}원</div></div>
          <div style={{gridColumn:'1 / span 2'}}><label className="form-label">과제 관리 폴더 URL</label>
            <input value={f.manage_folder_url} onChange={e=>set('manage_folder_url',e.target.value)} placeholder="https://drive.google.com/drive/folders/..."/></div>
          <div style={{gridColumn:'1 / span 2'}}><label className="form-label">증빙 폴더 URL</label>
            <input value={f.evidence_folder_url} onChange={e=>set('evidence_folder_url',e.target.value)} placeholder="https://drive.google.com/drive/folders/..."/></div>
          <div style={{gridColumn:'1 / span 2'}}><label className="form-label">비고</label>
            <textarea value={f.note} onChange={e=>set('note',e.target.value)} rows={2} placeholder="특이사항"/></div>
        </div>
        {err && <div style={{marginTop:14,padding:'10px 14px',borderRadius:8,fontSize:13,
          background:'rgba(239,68,68,.1)',color:'#ef4444'}}>{err}</div>}
        <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:20}}>
          <button className="btn btn-ghost" onClick={onClose} disabled={busy}>취소</button>
          <button className="btn btn-brand" onClick={save} disabled={busy}>
            {busy?'저장 중...':(isNew?'등록':'저장')}
          </button>
        </div>
      </div>
    </div>
  );
}

function Dashboard({user,showToast,onOpen}){
  const [rows,setRows] = useState(null);
  const [err,setErr]   = useState('');
  const [modal,setModal] = useState(null);
  const [sort,setSort] = useState({key:'created_at',dir:'desc'});
  const [view,setView] = useState('table'); // table | card

  async function load(){
    setErr('');
    const {data,error} = await sb.from('projects').select('*');
    if(error){ setErr(error.message); setRows([]); return; }
    setRows(data||[]);
  }
  useEffect(()=>{ load(); },[]);

  const sorted = useMemo(()=>{
    if(!rows) return [];
    const arr=[...rows]; const {key,dir}=sort; const m = dir==='asc'?1:-1;
    arr.sort((a,b)=>{
      let va=a[key], vb=b[key];
      if(['govt_budget','cash_budget','kind_budget','total_budget'].includes(key)){ va=n(va); vb=n(vb); }
      else { va=String(va??''); vb=String(vb??''); }
      if(va<vb) return -1*m; if(va>vb) return 1*m; return 0;
    });
    return arr;
  },[rows,sort]);

  const kpi = useMemo(()=>{
    const list=rows||[];
    return { count:list.length, active:list.filter(p=>p.status==='수행').length,
      budget:list.reduce((s,p)=>s+n(p.total_budget),0) };
  },[rows]);

  function toggleSort(key){ setSort(s=> s.key===key ? {key,dir:s.dir==='asc'?'desc':'asc'} : {key,dir:'asc'}); }
  const sortIcon = key => sort.key!==key ? '' : (sort.dir==='asc'?' ▲':' ▼');

  async function del(p){
    if(!confirm(`과제 "${p.name}"을(를) 삭제하시겠습니까?\n연결된 데이터(연차·비목·집행 등)도 함께 삭제됩니다.`)) return;
    const {error} = await sb.from('projects').delete().eq('id',p.id);
    if(error){ showToast('삭제 실패: '+error.message,'err'); return; }
    audit(user,'DELETE',p.id,p.name); showToast('삭제되었습니다'); load();
  }

  const Th = ({k,children,style}) => (<th onClick={()=>toggleSort(k)} style={style}>{children}{sortIcon(k)}</th>);

  return (
    <main className="app-main" style={{flex:1,padding:32,overflow:'auto'}}>

              style={{padding:'8px 12px',border:'none',cursor:'pointer',fontSize:13,
                background:view==='table'?'var(--brand)':'transparent',color:view==='table'?'#fff':'var(--text-sub)'}}>
              <i className="ti ti-list"/></button>
            <button onClick={()=>setView('card')} title="카드 보기"
              style={{padding:'8px 12px',border:'none',cursor:'pointer',fontSize:13,
                background:view==='card'?'var(--brand)':'transparent',color:view==='card'?'#fff':'var(--text-sub)'}}>
              <i className="ti ti-layout-grid"/></button>
          </div>
          <button className="btn btn-brand" onClick={()=>setModal('new')}><i className="ti ti-plus"/> 신규 과제 등록</button>
        </div>

        <div className="kpi"><div style={{fontSize:12,color:'var(--text-sub)',fontWeight:600,marginBottom:8}}>총 과제 수</div>
          <div style={{fontSize:26,fontWeight:800}}>{kpi.count}건</div></div>
        <div className="kpi"><div style={{fontSize:12,color:'var(--text-sub)',fontWeight:600,marginBottom:8}}>수행 중</div>
          <div style={{fontSize:26,fontWeight:800}}>{kpi.active}건</div></div>
        <div className="kpi"><div style={{fontSize:12,color:'var(--text-sub)',fontWeight:600,marginBottom:8}}>총 사업비</div>
          <div style={{fontSize:26,fontWeight:800}}>{fmt(kpi.budget)}<span style={{fontSize:15}}>원</span></div></div>

                      {p.project_code && <span className="badge b-준비" style={{marginTop:4,marginLeft:19,fontSize:10}}>{p.project_code}</span>}
                    </td>
                    <td style={{fontSize:12,color:'var(--text-sub)'}}>{p.agency||'—'}</td>
                    <td style={{fontSize:12,color:'var(--text-sub)',whiteSpace:'nowrap'}}>
                      {p.period_start||'—'}<br/>~ {p.period_end||'—'}</td>
                    <td style={{textAlign:'right',fontWeight:700}}>{p.total_budget?fmt(p.total_budget)+'원':'—'}</td>
                    <td style={{textAlign:'center'}}><span className={"badge b-"+(p.status||'준비')}>{p.status||'준비'}</span></td>
                    <td style={{textAlign:'center',whiteSpace:'nowrap'}}>
                      {p.evidence_folder_url ? <a href={p.evidence_folder_url} target="_blank" title="증빙 폴더"
                        style={{color:'var(--brand)',marginRight:8}}><i className="ti ti-folder"/></a> : null}
                      {p.manage_folder_url ? <a href={p.manage_folder_url} target="_blank" title="과제 관리 폴더"
                        style={{color:'#3b82f6'}}><i className="ti ti-folder-cog"/></a> : null}
                      {!p.evidence_folder_url && !p.manage_folder_url ? <span style={{color:'#cbd5e1'}}>—</span> : null}
                    </td>
                    <td style={{textAlign:'center',whiteSpace:'nowrap'}}>
                      <button className="btn btn-ghost btn-sm" style={{marginRight:5}} onClick={()=>setModal(p)}><i className="ti ti-pencil"/></button>
                      <button className="btn btn-ghost btn-sm" onClick={()=>del(p)} style={{color:'#ef4444'}}><i className="ti ti-trash"/></button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {modal && (
        <ProjectModal user={user} editItem={modal==='new'?null:modal}
          onClose={()=>setModal(null)} onSaved={()=>{ setModal(null); load(); }} showToast={showToast}/>
      )}
    </main>
  );
}

/* ================= 연차 수정/추가 모달 ================= */
function YearModal({year,onClose,onSave}){
  const isNew = !year;
  const [f,setF] = useState({
    year_label: year?.year_label||'',
    start_date: year?.start_date||'',
    end_date:   year?.end_date||'',
    govt_budget: year?.govt_budget||'',
    cash_budget: year?.cash_budget||'',
    kind_budget: year?.kind_budget||'',
    carry_over:  year?.carry_over||'',
    note:        year?.note||'',
  });
  const [busy,setBusy]=useState(false); const [err,setErr]=useState('');
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const total = n(f.govt_budget)+n(f.cash_budget)+n(f.kind_budget);

  async function go(){
    if(!f.year_label.trim()){ setErr('연차명을 입력하세요.'); return; }
    setBusy(true); setErr('');
    await onSave({
      year_label:f.year_label.trim(),
      start_date:f.start_date||null, end_date:f.end_date||null,
      govt_budget:n(f.govt_budget), cash_budget:n(f.cash_budget), kind_budget:n(f.kind_budget),
      total_budget:total, carry_over:n(f.carry_over), note:f.note.trim()||null,
    });
    setBusy(false);
  }

  return (
    <div className="modal-bg" onMouseDown={onClose}>
      <div className="card" style={{width:'100%',maxWidth:560,padding:24}}
        onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div style={{fontSize:17,fontWeight:800}}>{isNew?'연차 추가':'연차 수정'}</div>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'var(--text-muted)'}}>×</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:13}}>
          <div style={{gridColumn:'1 / span 2'}}><label className="form-label">연차명</label>
            <input value={f.year_label} onChange={e=>set('year_label',e.target.value)} placeholder="예: 1차년도"/></div>
          <div><label className="form-label">시작일</label>
            <input type="date" value={f.start_date} onChange={e=>set('start_date',e.target.value)}/></div>
          <div><label className="form-label">종료일</label>
            <input type="date" value={f.end_date} onChange={e=>set('end_date',e.target.value)}/></div>
          <div><label className="form-label">정부출연금</label>
            <MoneyInput value={f.govt_budget} onChange={v=>set('govt_budget',v)} placeholder="0"/></div>
          <div><label className="form-label">자부담 현금</label>
            <MoneyInput value={f.cash_budget} onChange={v=>set('cash_budget',v)} placeholder="0"/></div>
          <div><label className="form-label">자부담 현물</label>
            <MoneyInput value={f.kind_budget} onChange={v=>set('kind_budget',v)} placeholder="0"/></div>
          <div><label className="form-label">예산합계 (자동)</label>
            <div style={{padding:'9px 12px',background:'rgba(249,115,22,.08)',borderRadius:8,
              border:'1px solid rgba(249,115,22,.2)',fontWeight:800,color:'var(--brand)'}}>{fmt(total)}원</div></div>
          <div style={{gridColumn:'1 / span 2'}}><label className="form-label">이월금</label>
            <MoneyInput value={f.carry_over} onChange={v=>set('carry_over',v)} placeholder="전 연차에서 이월된 금액 (없으면 0)"/></div>
          <div style={{gridColumn:'1 / span 2'}}><label className="form-label">비고</label>
            <textarea value={f.note} onChange={e=>set('note',e.target.value)} rows={2} placeholder="특이사항"/></div>
        </div>
        {err && <div style={{marginTop:14,padding:'10px 14px',borderRadius:8,fontSize:13,background:'rgba(239,68,68,.1)',color:'#ef4444'}}>{err}</div>}
        <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:18}}>
          <button className="btn btn-ghost" onClick={onClose} disabled={busy}>취소</button>
          <button className="btn btn-brand" onClick={go} disabled={busy}>{busy?'저장 중...':'저장'}</button>
        </div>
      </div>
    </div>
  );
}

/* ================= 연차 관리 (등록·설정 탭 내용 1) ================= */
function YearManager({user,proj,showToast}){
  const [rows,setRows] = useState(null);
  const [modal,setModal] = useState(null); // null | 'new' | 연차객체

  async function load(){
    const {data} = await sb.from('project_years').select('*').eq('project_id',proj.id);
    const arr = (data||[]).sort((a,b)=>(a.year_no||0)-(b.year_no||0)
      || String(a.start_date||'').localeCompare(String(b.start_date||'')));
    setRows(arr);
  }
  useEffect(()=>{ load(); },[proj.id]);

  // 협약기간 기준 12개월 단위 연차 계산
  function genYears(){
    const s = proj.period_start, e = proj.period_end;
    if(!s||!e){ showToast('먼저 협약 시작일/종료일을 입력하세요','err'); return null; }
    const iso = d => d.toISOString().slice(0,10);
    const sd=new Date(s), ed=new Date(e);
    if(sd>ed){ showToast('협약 종료일이 시작일보다 빠릅니다','err'); return null; }
    const out=[]; let cur=new Date(sd); let no=1;
    while(cur<=ed && no<=15){
      let ye=new Date(cur); ye.setFullYear(ye.getFullYear()+1); ye.setDate(ye.getDate()-1);
      if(ye>ed) ye=new Date(ed);
      out.push({ project_id:proj.id, year_no:no, year_label:no+'차년도',
        start_date:iso(cur), end_date:iso(ye),
        govt_budget:0, cash_budget:0, kind_budget:0, total_budget:0, carry_over:0 });
      let nx=new Date(ye); nx.setDate(nx.getDate()+1); cur=nx; no++;
    }
    return out;
  }

  async function autoGen(){
    const gen = genYears();
    if(!gen) return;
    if(rows && rows.length>0){
      if(!confirm(`이미 연차가 ${rows.length}개 있습니다.\n모두 삭제하고 협약기간 기준으로 다시 생성할까요?`)) return;
      await sb.from('project_years').delete().eq('project_id',proj.id);
    }
    const {error} = await sb.from('project_years').insert(gen);
    if(error){ showToast('생성 실패: '+error.message,'err'); return; }
    audit(user,'GEN_YEARS',proj.id, gen.length+'개 연차 생성');
    showToast(gen.length+'개 연차가 생성되었습니다'); load();
  }

  async function saveYear(payload){
    if(modal==='new'){
      const year_no = (rows?.length||0)+1;
      const {error} = await sb.from('project_years').insert({...payload, project_id:proj.id, year_no});
      if(error){ showToast('저장 실패: '+error.message,'err'); return; }
      showToast('연차가 추가되었습니다');
    }else{
      const {error} = await sb.from('project_years').update(payload).eq('id',modal.id);
      if(error){ showToast('저장 실패: '+error.message,'err'); return; }
      showToast('수정되었습니다');
    }
    setModal(null); load();
  }

  async function delYear(y){
    if(!confirm(`"${y.year_label}"을(를) 삭제하시겠습니까?`)) return;
    const {error} = await sb.from('project_years').delete().eq('id',y.id);
    if(error){ showToast('삭제 실패: '+error.message,'err'); return; }
    showToast('삭제되었습니다'); load();
  }

  const sum = useMemo(()=>{
    const list=rows||[];
    return {
      govt:list.reduce((s,y)=>s+n(y.govt_budget),0),
      cash:list.reduce((s,y)=>s+n(y.cash_budget),0),
      kind:list.reduce((s,y)=>s+n(y.kind_budget),0),
    };
  },[rows]);

  return (
    <div>
      {/* 안내 + 액션 */}
      <div className="card" style={{padding:'14px 18px',marginBottom:16,display:'flex',
        justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
        <div style={{fontSize:13,color:'var(--text-sub)'}}>
          <i className="ti ti-info-circle" style={{color:'var(--brand)',marginRight:6}}/>
          협약기간 <b>{proj.period_start||'—'} ~ {proj.period_end||'—'}</b> 기준으로 연차를 자동 생성할 수 있습니다.
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost btn-sm" onClick={autoGen}><i className="ti ti-wand"/> 연차 자동 생성</button>
          <button className="btn btn-brand btn-sm" onClick={()=>setModal('new')}><i className="ti ti-plus"/> 연차 추가</button>
        </div>
      </div>

      {/* 연차별 합계 */}
      {rows && rows.length>0 && (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:12,marginBottom:16}}>
          <div className="card" style={{padding:'14px 16px'}}>
            <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4}}>정부출연금 합계</div>
            <div style={{fontSize:17,fontWeight:800}}>{fmt(sum.govt)}원</div></div>
          <div className="card" style={{padding:'14px 16px'}}>
            <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4}}>자부담 현금 합계</div>
            <div style={{fontSize:17,fontWeight:800}}>{fmt(sum.cash)}원</div></div>
          <div className="card" style={{padding:'14px 16px'}}>
            <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4}}>자부담 현물 합계</div>
            <div style={{fontSize:17,fontWeight:800}}>{fmt(sum.kind)}원</div></div>
        </div>
      )}

      {/* 연차 표 */}
      <div className="card" style={{overflow:'hidden'}}>
        {rows===null ? (
          <div style={{padding:40,display:'flex',justifyContent:'center'}}><div className="spinner"/></div>
        ) : rows.length===0 ? (
          <div style={{padding:'44px 24px',textAlign:'center'}}>
            <i className="ti ti-calendar-off" style={{fontSize:36,color:'#cbd5e1'}}/>
            <div style={{fontWeight:700,marginTop:12}}>등록된 연차가 없습니다</div>
            <div style={{fontSize:13,color:'var(--text-muted)',marginTop:6}}>"연차 자동 생성" 또는 "연차 추가"로 시작하세요.</div>
          </div>
        ) : (
          <div style={{overflowX:'auto'}}>
            <table className="tbl">
              <thead><tr>
                <th>연차</th><th>기간</th>
                <th style={{textAlign:'right'}}>정부출연금</th>
                <th style={{textAlign:'right'}}>자부담현금</th>
                <th style={{textAlign:'right'}}>자부담현물</th>
                <th style={{textAlign:'right'}}>예산합계</th>
                <th style={{textAlign:'right'}}>이월금</th>
                <th style={{textAlign:'center'}}>관리</th>
              </tr></thead>
              <tbody>
                {rows.map(y=>(
                  <tr key={y.id}>
                    <td><span className="badge b-준비" style={{fontWeight:700}}>{y.year_label}</span></td>
                    <td style={{fontSize:12,color:'var(--text-sub)',whiteSpace:'nowrap'}}>{y.start_date||'—'} ~ {y.end_date||'—'}</td>
                    <td style={{textAlign:'right'}}>{fmt(y.govt_budget)}</td>
                    <td style={{textAlign:'right'}}>{fmt(y.cash_budget)}</td>
                    <td style={{textAlign:'right'}}>{fmt(y.kind_budget)}</td>
                    <td style={{textAlign:'right',fontWeight:700}}>{fmt(y.total_budget)}</td>
                    <td style={{textAlign:'right',color:'var(--text-sub)'}}>{fmt(y.carry_over)}</td>
                    <td style={{textAlign:'center',whiteSpace:'nowrap'}}>
                      <button className="btn btn-ghost btn-sm" style={{marginRight:5}} onClick={()=>setModal(y)}><i className="ti ti-pencil"/></button>
                      <button className="btn btn-ghost btn-sm" onClick={()=>delYear(y)} style={{color:'#ef4444'}}><i className="ti ti-trash"/></button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {modal && (
        <YearModal year={modal==='new'?null:modal}
          onClose={()=>setModal(null)} onSave={saveYear}/>
      )}
    </div>
  );
}

/* ================= 금액 입력칸 (콤마 자동 표시) ================= */
function MoneyInput({value,onChange,placeholder,style}){
  const comma = v => { const raw=String(v??'').replace(/[^0-9]/g,''); return raw?Number(raw).toLocaleString('ko-KR'):''; };
  return <input inputMode="numeric" style={style} value={comma(value)}
    onChange={e=>onChange(e.target.value.replace(/[^0-9]/g,''))} placeholder={placeholder}/>;
}

/* ================= 사업비 계산기 (등록·설정 탭 내용 2) — 원본 GAS 로직과 동일 ================= */
function BudgetCalculator({user,proj,onSaved,showToast}){
  // 콤마 유틸
  const toNum   = s => Number(String(s).replace(/,/g,''))||0;
  const toComma = v => { if(v===''||v==null) return ''; const num=Number(String(v).replace(/,/g,'')); if(isNaN(num)||num===0) return ''; return num.toLocaleString('ko-KR'); };

  const [govt,setGovt]       = useState('');
  const [cashPct,setCashPct] = useState('');
  const [kindPct,setKindPct] = useState('');
  const [cashAmt,setCashAmt] = useState('');
  const [kindAmt,setKindAmt] = useState('');
  const [saving,setSaving]   = useState(false);

  // 진입 시 과제의 기존 예산 불러오기 → 비율 역산 (총사업비 기준)
  useEffect(()=>{
    const g=Number(proj.govt_budget)||0, c=Number(proj.cash_budget)||0, k=Number(proj.kind_budget)||0;
    const total=g+c+k;
    setGovt(toComma(g)); setCashAmt(toComma(c)); setKindAmt(toComma(k));
    if(total>0){ setCashPct((c/total*100).toFixed(1)); setKindPct((k/total*100).toFixed(1)); }
    else { setCashPct(''); setKindPct(''); }
  },[proj.id]);

  // 비율 입력 → 금액 자동 (총사업비 = 정부지원금 / (1 - 자부담비율합))
  const calcFromPct = (field,val) => {
    const cp = field==='cash' ? (parseFloat(val)||0) : (parseFloat(cashPct)||0);
    const kp = field==='kind' ? (parseFloat(val)||0) : (parseFloat(kindPct)||0);
    if(field==='cash') setCashPct(val);
    if(field==='kind') setKindPct(val);
    const g = toNum(govt); if(!g) return;
    const instPct = (cp+kp)/100;
    if(instPct>=1){ setCashAmt(''); setKindAmt(''); return; }
    const total = g/(1-instPct);
    setCashAmt(toComma(Math.round(total*cp/100)));
    setKindAmt(toComma(Math.round(total*kp/100)));
  };

  // 금액 입력 → 비율 자동 (총사업비 대비)
  const calcFromAmt = (field,val) => {
    const formatted = val ? Number(val.replace(/[^0-9]/g,'')).toLocaleString('ko-KR') : '';
    if(field==='cash') setCashAmt(formatted);
    if(field==='kind') setKindAmt(formatted);
    const g = toNum(govt);
    const c = field==='cash' ? toNum(formatted) : toNum(cashAmt);
    const k = field==='kind' ? toNum(formatted) : toNum(kindAmt);
    const total = g+c+k;
    if(total>0){ setCashPct((c/total*100).toFixed(1)); setKindPct((k/total*100).toFixed(1)); }
  };

  // 정부지원금 변경 → 비율 유지하며 금액 재계산
  const handleGovtChange = (val) => {
    const formatted = val ? Number(val.replace(/[^0-9]/g,'')).toLocaleString('ko-KR') : '';
    setGovt(formatted);
    const g = toNum(formatted);
    const cp = parseFloat(cashPct)||0, kp = parseFloat(kindPct)||0;
    if(!g||!(cp+kp)) return;
    const instPct=(cp+kp)/100; if(instPct>=1) return;
    const total=g/(1-instPct);
    setCashAmt(toComma(Math.round(total*cp/100)));
    setKindAmt(toComma(Math.round(total*kp/100)));
  };

  // 결과
  const g=toNum(govt), c=toNum(cashAmt), k=toNum(kindAmt);
  const total=g+c+k;
  const govtPct = total>0 ? g/total*100 : 0;
  const cPct    = total>0 ? c/total*100 : 0;
  const kPct    = total>0 ? k/total*100 : 0;
  const instPct = cPct+kPct;
  const isOverInst = instPct>=100;
  const fmt2 = num => Math.round(num).toLocaleString('ko-KR');

  async function apply(){
    if(!g){ showToast('정부지원금을 입력하세요','err'); return; }
    if(isOverInst){ showToast('자부담 비율 합계가 100% 이상입니다','err'); return; }
    setSaving(true);
    const {error} = await sb.from('projects').update({
      govt_budget:g, cash_budget:c, kind_budget:k, total_budget:total,
      updated_at:new Date().toISOString() }).eq('id',proj.id);
    setSaving(false);
    if(error){ showToast('저장 실패: '+error.message,'err'); return; }
    audit(user,'BUDGET_CALC',proj.id,`총 ${fmt(total)} / 자부담 ${fmt(c+k)}`);
    showToast('사업비가 저장되었습니다'); onSaved();
  }

  const Result = ({label,value,pct,strong}) => (
    <div style={{padding:'12px 14px',background:strong?'rgba(249,115,22,.10)':'var(--card-2)',
      borderRadius:8,border:'1px solid '+(strong?'rgba(249,115,22,.2)':'var(--border)')}}>
      <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4}}>{label}{pct!=null?` · ${pct.toFixed(1)}%`:''}</div>
      <div style={{fontSize:16,fontWeight:800,color:strong?'var(--brand)':'var(--text)'}}>{fmt2(value)}원</div>
    </div>
  );

  return (
    <div>
      <div className="card" style={{padding:22,marginBottom:16}}>
        <div style={{fontSize:15,fontWeight:800,marginBottom:4}}>사업비 계산기</div>
        <div style={{fontSize:12,color:'var(--text-sub)',marginBottom:18}}>
          자부담현금·현물 비율은 <b>총사업비 기준</b>입니다. 비율을 넣으면 금액이, 금액을 넣으면 비율이 자동 계산됩니다. (총사업비 = 정부지원금 ÷ (1 − 자부담비율합))
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:14}}>
          <div><label className="form-label">정부지원금</label>
            <input inputMode="numeric" value={govt} onChange={e=>handleGovtChange(e.target.value)} placeholder="0"/></div>
          <div><label className="form-label">자부담현금 비율 (%)</label>
            <input inputMode="numeric" value={cashPct} onChange={e=>calcFromPct('cash',e.target.value)} placeholder="예: 15"/></div>

    if(modal==='new'){

    const {error} = await sb.from('categories').delete().eq('id',c.id);

          <div style={{fontSize:16,fontWeight:800}}>{fmt(sum.govt)}원</div></div>
        <div className="card" style={{padding:'14px 16px'}}>
          <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4}}>자부담현금 합계</div>
          <div style={{fontSize:16,fontWeight:800}}>{fmt(sum.cash)}원</div></div>
        <div className="card" style={{padding:'14px 16px'}}>
          <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4}}>자부담현물 합계</div>
          <div style={{fontSize:16,fontWeight:800}}>{fmt(sum.kind)}원</div></div>
        <div className="card" style={{padding:'14px 16px'}}>
          <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4}}>비목 총합계</div>

          {projTotal>0 && (
            <div style={{fontSize:11,marginTop:4,color:diff===0?'#10b981':(diff>0?'#f59e0b':'#ef4444')}}>
              {diff===0?'총사업비와 일치 ✓':(diff>0?`${fmt(diff)}원 남음`:`${fmt(-diff)}원 초과`)}
            </div>

      </div>

      <div className="card" style={{overflow:'hidden'}}>
        {rows===null ? (

        ) : rows.length===0 ? (

/* ================= 유틸: 과제 협약기간의 연-월 목록 ================= */
function ymList(start,end){
  if(!start||!end) return [];
  const out=[]; let d=new Date(start.slice(0,7)+'-01'); const e=new Date(end.slice(0,7)+'-01');
  let guard=0;
  while(d<=e && guard<120){ out.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')); d.setMonth(d.getMonth()+1); guard++; }
  return out;
}

    const o={}; (months||[]).forEach(m=>{ o[m]= initRates && initRates[m]!=null ? String(Math.round(initRates[m]*100)) : ''; });

  });

  const months = useMemo(()=>ymList(proj.period_start,proj.period_end),[proj.id]);

  async function load(){
    const [{data:e},{data:a}] = await Promise.all([
      sb.from('employees').select('*').order('name'),
      sb.from('staff_allocations').select('*').eq('project_id',proj.id).order('id'),
    ]);
    setEmps(e||[]); setAllocs(a||[]);
    const ids=(a||[]).map(x=>x.id);
    if(ids.length){
      const {data:r} = await sb.from('staff_rates').select('*').in('allocation_id',ids);
      const map={}; (r||[]).forEach(row=>{ (map[row.allocation_id]=map[row.allocation_id]||{})[row.ym]=Number(row.rate)||0; });
      setRatesMap(map);
    } else setRatesMap({});
  }
  useEffect(()=>{ load(); },[proj.id]);

  const empById = id => (emps||[]).find(e=>String(e.id)===String(id));

  async function saveAlloc({alloc,rates,allocId}){
    let id = allocId;
    if(!id){
      const {data,error} = await sb.from('staff_allocations').insert(alloc).select().single();
      if(error){ showToast('저장 실패: '+error.message,'err'); return; }
      id = data.id;
    }else{
      const {error} = await sb.from('staff_allocations').update(alloc).eq('id',id);
      if(error){ showToast('저장 실패: '+error.message,'err'); return; }
    }
    // 참여율 재저장 (기존 삭제 후 삽입)
    await sb.from('staff_rates').delete().eq('allocation_id',id);
    if(rates.length){
      const ins = rates.map(r=>({allocation_id:id, ym:r.ym, rate:r.rate}));
      const {error:er2} = await sb.from('staff_rates').insert(ins);
      if(er2){ showToast('참여율 저장 실패: '+er2.message,'err'); return; }
    }
    showToast(allocId?'수정되었습니다':'인력이 배정되었습니다');
    setModal(null); load();
  }

  async function delAlloc(a){
    const emp=empById(a.employee_id);
    if(!confirm(`"${emp?emp.name:'해당 직원'}"의 배정을 삭제하시겠습니까?`)) return;
    await sb.from('staff_rates').delete().eq('allocation_id',a.id);
    const {error} = await sb.from('staff_allocations').delete().eq('id',a.id);
    if(error){ showToast('삭제 실패: '+error.message,'err'); return; }
    showToast('삭제되었습니다'); load();
  }

  // 배정별 연간 인건비 계산
  const calcAnnual = a => {
    const emp=empById(a.employee_id); const sal=emp?Number(emp.monthly_salary)||0:0;
    const rm=ratesMap[a.id]||{};
    return months.reduce((s,m)=>s+Math.round(sal*(rm[m]||0)),0);
  };
  const totalLabor = (allocs||[]).reduce((s,a)=>s+calcAnnual(a),0);

  return (
    <div>
      <div className="card" style={{padding:'14px 18px',marginBottom:16,display:'flex',
        justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
        <div style={{fontSize:13,color:'var(--text-sub)'}}>
          <i className="ti ti-info-circle" style={{color:'var(--brand)',marginRight:6}}/>
          직원을 선택해 배정하고 월별 참여율을 입력합니다. 인건비 = 직원 월급 × 참여율.
        </div>
        <button className="btn btn-brand btn-sm" onClick={()=>setModal('new')}><i className="ti ti-user-plus"/> 인력 배정</button>
      </div>

      {allocs && allocs.length>0 && (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:12,marginBottom:16}}>
          <div className="card" style={{padding:'14px 16px'}}>
            <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4}}>배정 인원</div>
            <div style={{fontSize:17,fontWeight:800}}>{allocs.length}명</div></div>
          <div className="card" style={{padding:'14px 16px'}}>
            <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4}}>연간 인건비 합계 (참여율 반영)</div>
            <div style={{fontSize:17,fontWeight:800,color:'var(--brand)'}}>{fmt(totalLabor)}원</div></div>
        </div>
      )}

      <div className="card" style={{overflow:'hidden'}}>
        {(emps===null||allocs===null) ? (
          <div style={{padding:40,display:'flex',justifyContent:'center'}}><div className="spinner"/></div>
        ) : allocs.length===0 ? (
          <div style={{padding:'44px 24px',textAlign:'center'}}>
            <i className="ti ti-users" style={{fontSize:36,color:'#cbd5e1'}}/>
            <div style={{fontWeight:700,marginTop:12}}>배정된 인력이 없습니다</div>
            <div style={{fontSize:13,color:'var(--text-muted)',marginTop:6}}>
              "인력 배정"으로 직원을 추가하세요. {emps.length===0 && '(먼저 "직원 관리"에서 직원을 등록해야 합니다.)'}
            </div>
          </div>
        ) : (
          <div style={{overflowX:'auto'}}>
            <table className="tbl">
              <thead><tr>
                <th>직원</th><th style={{textAlign:'center'}}>구분</th>
                <th style={{textAlign:'right'}}>월 인건비</th>
                <th style={{textAlign:'center'}}>참여기간</th>
                <th style={{textAlign:'center'}}>참여 개월</th>
                <th style={{textAlign:'right'}}>연간 인건비</th>
                <th style={{textAlign:'center'}}>관리</th>
              </tr></thead>
              <tbody>
                {allocs.map(a=>{
                  const emp=empById(a.employee_id);
                  const rm=ratesMap[a.id]||{};
                  const activeMonths=months.filter(m=>(rm[m]||0)>0).length;
                  return (
                    <tr key={a.id}>
                      <td style={{fontWeight:700}}>{emp?emp.name:'(삭제된 직원)'}
                        {emp?.position && <span style={{fontSize:11,color:'var(--text-muted)',fontWeight:400,marginLeft:6}}>{emp.position}</span>}</td>
                      <td style={{textAlign:'center'}}><span className="badge b-신청">{FUND_LABEL[a.fund_type]||a.fund_type}</span></td>
                      <td style={{textAlign:'right'}}>{emp?fmt(emp.monthly_salary)+'원':'—'}</td>
                      <td style={{textAlign:'center',fontSize:12,color:'var(--text-sub)',whiteSpace:'nowrap'}}>
                        {a.start_month||'—'} ~ {a.end_month||'—'}</td>
                      <td style={{textAlign:'center'}}>{activeMonths}/{months.length}</td>
                      <td style={{textAlign:'right',fontWeight:700}}>{fmt(calcAnnual(a))}원</td>
                      <td style={{textAlign:'center',whiteSpace:'nowrap'}}>
                        <button className="btn btn-ghost btn-sm" style={{marginRight:5}} onClick={()=>setModal(a)}><i className="ti ti-pencil"/></button>
                        <button className="btn btn-ghost btn-sm" onClick={()=>delAlloc(a)} style={{color:'#ef4444'}}><i className="ti ti-trash"/></button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {modal && emps && (
        <StaffAllocModal proj={proj} employees={emps}
          alloc={modal==='new'?null:modal}
          initRates={modal==='new'?null:(ratesMap[modal.id]||{})}
          onClose={()=>setModal(null)} onSave={saveAlloc}/>
      )}
    </div>
  );
}

/* ================= 집행 입력 모달 ================= */
const PAY_METHODS = ['법인카드','계좌이체','세금계산서','현금영수증','기타'];
function TxModal({proj,tx,onClose,onSave}){
  const isNew = !tx;
  const [f,setF] = useState({
    spent_date: tx?.spent_date||'', category: tx?.category||'인건비', sub_category: tx?.sub_category||'',
    amount_excl: tx?.amount_excl||'', amount_vat: tx?.amount_vat||'',
    fund_type: tx?.fund_type||'gov_support', payment_method: tx?.payment_method||'법인카드',
    vendor: tx?.vendor||'', purpose: tx?.purpose||'', evidence_url: tx?.evidence_url||'',
  });
  const [busy,setBusy]=useState(false); const [err,setErr]=useState('');
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const total = n(f.amount_excl)+n(f.amount_vat);

  async function go(){
    if(!f.spent_date){ setErr('지출일을 입력하세요.'); return; }
    if(!f.purpose.trim()){ setErr('집행 목적을 입력하세요.'); return; }
    setBusy(true); setErr('');
    await onSave({
      spent_date:f.spent_date, category:f.category, sub_category:f.sub_category.trim()||null,
      amount_excl:n(f.amount_excl), amount_vat:n(f.amount_vat), amount_total:total,
      fund_type:f.fund_type, payment_method:f.payment_method, vendor:f.vendor.trim()||null,
      purpose:f.purpose.trim(), evidence_url:f.evidence_url.trim()||null, source:'manual',
    });
    setBusy(false);
  }

  return (
    <div className="modal-bg" onMouseDown={onClose}>
      <div className="card" style={{width:'100%',maxWidth:720,padding:24}}
        onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div style={{fontSize:17,fontWeight:800}}>{isNew?'집행 입력':'집행 수정'}</div>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'var(--text-muted)'}}>×</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:13}}>
          <div><label className="form-label">지출일 *</label>
            <input type="date" value={f.spent_date} onChange={e=>set('spent_date',e.target.value)}/></div>
          <div><label className="form-label">재원구분</label>
            <select value={f.fund_type} onChange={e=>set('fund_type',e.target.value)}>
              <option value="gov_support">정부지원금</option>
              <option value="self_cash">자부담현금</option>
              <option value="self_kind">자부담현물</option>
            </select></div>
          <div><label className="form-label">비목 *</label>
            <select value={f.category} onChange={e=>set('category',e.target.value)}>
              {CAT_OPTIONS.map(c=><option key={c} value={c}>{c}</option>)}
            </select></div>
          <div><label className="form-label">세목</label>
            <input value={f.sub_category} onChange={e=>set('sub_category',e.target.value)} placeholder="예: 소모품비"/></div>
          <div><label className="form-label">공급가액 (부가세 제외) *</label>
            <MoneyInput value={f.amount_excl} onChange={v=>set('amount_excl',v)} placeholder="0"/></div>
          <div><label className="form-label">부가세</label>
            <MoneyInput value={f.amount_vat} onChange={v=>set('amount_vat',v)} placeholder="0"/></div>
          <div><label className="form-label">합계금액 (자동)</label>
            <div style={{padding:'9px 12px',background:'rgba(249,115,22,.08)',borderRadius:8,
              border:'1px solid rgba(249,115,22,.2)',fontWeight:800,color:'var(--brand)'}}>{fmt(total)}원</div></div>
          <div><label className="form-label">지급방법</label>
            <select value={f.payment_method} onChange={e=>set('payment_method',e.target.value)}>
              {PAY_METHODS.map(m=><option key={m} value={m}>{m}</option>)}
            </select></div>
          <div><label className="form-label">거래처</label>
            <input value={f.vendor} onChange={e=>set('vendor',e.target.value)} placeholder="거래처명"/></div>
          <div><label className="form-label">증빙 URL</label>
            <input value={f.evidence_url} onChange={e=>set('evidence_url',e.target.value)} placeholder="https://drive.google.com/file/..."/></div>
          <div style={{gridColumn:'1 / span 2'}}><label className="form-label">집행 목적 *</label>
            <textarea value={f.purpose} onChange={e=>set('purpose',e.target.value)} rows={2} placeholder="사업 진행에 필요한 OO 구입"/></div>
        </div>
        {proj.evidence_folder_url && (
          <div style={{marginTop:12,padding:'9px 14px',background:'rgba(59,130,246,.08)',border:'1px solid rgba(59,130,246,.2)',
            borderRadius:8,fontSize:12,display:'flex',alignItems:'center',gap:8}}>
            <i className="ti ti-folder" style={{color:'#3b82f6'}}/>
            <span style={{color:'var(--text-sub)'}}>증빙 저장 위치:</span>
            <a href={proj.evidence_folder_url} target="_blank" style={{color:'#3b82f6',fontWeight:600}}>증빙 폴더 열기 →</a>
          </div>
        )}
        {err && <div style={{marginTop:12,padding:'10px 14px',borderRadius:8,fontSize:13,background:'rgba(239,68,68,.1)',color:'#ef4444'}}>{err}</div>}
        <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:16}}>
          <button className="btn btn-ghost" onClick={onClose} disabled={busy}>취소</button>
          <button className="btn btn-brand" onClick={go} disabled={busy}>{busy?'저장 중...':'저장'}</button>
        </div>
      </div>
    </div>
  );
}

/* ================= 집행 입력 관리 (수행·집행 탭 내용 2) ================= */
function SpendManager({user,proj,showToast}){
  const [rows,setRows] = useState(null);
  const [modal,setModal] = useState(null);
  const [fFund,setFFund] = useState('all');

  async function load(){
    const {data} = await sb.from('transactions').select('*').eq('project_id',proj.id).order('spent_date',{ascending:false});
    setRows(data||[]);
  }
  useEffect(()=>{ load(); },[proj.id]);

  const filtered = useMemo(()=>{
    const list=rows||[];
    return fFund==='all' ? list : list.filter(t=>t.fund_type===fFund);
  },[rows,fFund]);

  const sum = useMemo(()=>{
    const list=rows||[];
    return { total:list.reduce((s,t)=>s+n(t.amount_total),0),
             gov:list.filter(t=>t.fund_type==='gov_support').reduce((s,t)=>s+n(t.amount_total),0),
             cash:list.filter(t=>t.fund_type==='self_cash').reduce((s,t)=>s+n(t.amount_total),0),
             kind:list.filter(t=>t.fund_type==='self_kind').reduce((s,t)=>s+n(t.amount_total),0) };
  },[rows]);

  async function saveTx(payload){
    if(modal==='new'){
      const {error} = await sb.from('transactions').insert({...payload, project_id:proj.id, created_by:user?.email||null});
      if(error){ showToast('저장 실패: '+error.message,'err'); return; }
      showToast('집행이 등록되었습니다');
    }else{
      const {error} = await sb.from('transactions').update(payload).eq('id',modal.id);
      if(error){ showToast('저장 실패: '+error.message,'err'); return; }
      showToast('수정되었습니다');
    }
    setModal(null); load();
  }
  async function delTx(t){
    if(!confirm(`집행 "${t.purpose||t.category}"을(를) 삭제하시겠습니까?`)) return;
    const {error} = await sb.from('transactions').delete().eq('id',t.id);
    if(error){ showToast('삭제 실패: '+error.message,'err'); return; }
    showToast('삭제되었습니다'); load();
  }

  const FundBadge = ({t}) => <span className={"badge b-"+(t==='gov_support'?'신청':t==='self_kind'?'완료':'준비')}>{FUND_LABEL[t]||t}</span>;

  return (
    <div>
      <div className="card" style={{padding:'14px 18px',marginBottom:16,display:'flex',
        justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
        <div style={{fontSize:13,color:'var(--text-sub)'}}>
          <i className="ti ti-info-circle" style={{color:'var(--brand)',marginRight:6}}/>
          실제 집행(지출) 내역을 등록합니다. 인건비는 다음 단계에서 참여율 기반 자동계상도 가능합니다.
        </div>
        <button className="btn btn-brand btn-sm" onClick={()=>setModal('new')}><i className="ti ti-plus"/> 집행 입력</button>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:12,marginBottom:16}}>
        <div className="card" style={{padding:'14px 16px'}}>
          <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4}}>총 집행액</div>
          <div style={{fontSize:16,fontWeight:800,color:'var(--brand)'}}>{fmt(sum.total)}원</div></div>
        <div className="card" style={{padding:'14px 16px'}}>
          <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4}}>정부지원금</div>
          <div style={{fontSize:16,fontWeight:800}}>{fmt(sum.gov)}원</div></div>
        <div className="card" style={{padding:'14px 16px'}}>
          <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4}}>자부담현금</div>
          <div style={{fontSize:16,fontWeight:800}}>{fmt(sum.cash)}원</div></div>
        <div className="card" style={{padding:'14px 16px'}}>
          <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4}}>자부담현물</div>
          <div style={{fontSize:16,fontWeight:800}}>{fmt(sum.kind)}원</div></div>
      </div>

      <div className="card" style={{overflow:'hidden'}}>
        <div style={{padding:'12px 18px',borderBottom:'1px solid var(--border)',display:'flex',
          justifyContent:'space-between',alignItems:'center',gap:12,flexWrap:'wrap'}}>
          <span style={{fontSize:14,fontWeight:700}}>집행 내역 · {(rows||[]).length}건</span>
          <select value={fFund} onChange={e=>setFFund(e.target.value)} style={{width:160}}>
            <option value="all">전체 재원</option>
            <option value="gov_support">정부지원금</option>
            <option value="self_cash">자부담현금</option>
            <option value="self_kind">자부담현물</option>
          </select>
        </div>

        {rows===null ? (
          <div style={{padding:40,display:'flex',justifyContent:'center'}}><div className="spinner"/></div>
        ) : filtered.length===0 ? (
          <div style={{padding:'44px 24px',textAlign:'center'}}>
            <i className="ti ti-receipt-off" style={{fontSize:36,color:'#cbd5e1'}}/>
            <div style={{fontWeight:700,marginTop:12}}>집행 내역이 없습니다</div>
            <div style={{fontSize:13,color:'var(--text-muted)',marginTop:6}}>"집행 입력"으로 등록하세요.</div>
          </div>
        ) : (
          <div style={{overflowX:'auto'}}>
            <table className="tbl" style={{minWidth:860}}>
              <thead><tr>
                <th>지출일</th><th>비목/세목</th><th style={{textAlign:'center'}}>재원</th>
                <th style={{textAlign:'right'}}>공급가액</th><th style={{textAlign:'right'}}>부가세</th>
                <th style={{textAlign:'right'}}>합계</th><th>거래처</th>
                <th style={{textAlign:'center'}}>증빙</th><th style={{textAlign:'center'}}>관리</th>
              </tr></thead>
              <tbody>
                {filtered.map(t=>(
                  <tr key={t.id}>
                    <td style={{fontSize:12,whiteSpace:'nowrap'}}>{t.spent_date||'—'}
                      {t.source==='auto_labor' && <span className="badge b-신청" style={{marginLeft:5,fontSize:9}}>자동</span>}</td>
                    <td><div style={{fontWeight:600,fontSize:13}}>{t.category}</div>
                      {t.sub_category && <div style={{fontSize:11,color:'var(--text-muted)'}}>{t.sub_category}</div>}
                      {t.purpose && <div style={{fontSize:11,color:'var(--text-sub)',marginTop:2}}>{t.purpose}</div>}</td>
                    <td style={{textAlign:'center'}}><FundBadge t={t.fund_type}/></td>
                    <td style={{textAlign:'right'}}>{fmt(t.amount_excl)}</td>
                    <td style={{textAlign:'right',color:'var(--text-sub)'}}>{fmt(t.amount_vat)}</td>
                    <td style={{textAlign:'right',fontWeight:700}}>{fmt(t.amount_total)}</td>
                    <td style={{fontSize:12,color:'var(--text-sub)'}}>{t.vendor||'—'}</td>
                    <td style={{textAlign:'center'}}>{t.evidence_url?<a href={t.evidence_url} target="_blank" style={{color:'var(--brand)'}}><i className="ti ti-file-text"/></a>:<span style={{color:'#cbd5e1'}}>—</span>}</td>
                    <td style={{textAlign:'center',whiteSpace:'nowrap'}}>
                      <button className="btn btn-ghost btn-sm" style={{marginRight:5}} onClick={()=>setModal(t)}><i className="ti ti-pencil"/></button>
                      <button className="btn btn-ghost btn-sm" onClick={()=>delTx(t)} style={{color:'#ef4444'}}><i className="ti ti-trash"/></button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {modal && <TxModal proj={proj} tx={modal==='new'?null:modal} onClose={()=>setModal(null)} onSave={saveTx}/>}
    </div>
  );
}

/* ================= 인건비 자동계상 (수행·집행 탭 내용 3) ================= */
function LaborAutoCalc({user,proj,showToast}){
  const months = useMemo(()=>ymList(proj.period_start,proj.period_end),[proj.id]);
  const [ym,setYm] = useState(months[0]||'');
  const [emps,setEmps] = useState([]);
  const [allocs,setAllocs] = useState([]);
  const [ratesByAlloc,setRatesByAlloc] = useState({});
  const [existing,setExisting] = useState([]); // 이미 계상된 auto_labor tx (해당 월)
  const [busy,setBusy] = useState(false);
  const [loading,setLoading] = useState(true);

  useEffect(()=>{ if(!ym && months.length) setYm(months[0]); },[months]);

  async function loadBase(){
    setLoading(true);
    const [{data:e},{data:a}] = await Promise.all([
      sb.from('employees').select('*'),
      sb.from('staff_allocations').select('*').eq('project_id',proj.id),
    ]);
    setEmps(e||[]); setAllocs(a||[]);
    const ids=(a||[]).map(x=>x.id);
    if(ids.length){
      const {data:r} = await sb.from('staff_rates').select('*').in('allocation_id',ids);
      const map={}; (r||[]).forEach(row=>{ (map[row.allocation_id]=map[row.allocation_id]||{})[row.ym]=Number(row.rate)||0; });
      setRatesByAlloc(map);
    } else setRatesByAlloc({});
    setLoading(false);
  }
  useEffect(()=>{ loadBase(); },[proj.id]);

  async function loadExisting(){
    if(!ym) return;
    const {data} = await sb.from('transactions').select('*')
      .eq('project_id',proj.id).eq('source','auto_labor').eq('spent_date',ym+'-27');
    setExisting(data||[]);
  }
  useEffect(()=>{ loadExisting(); },[ym,proj.id]);

  const empById = id => emps.find(e=>String(e.id)===String(id));

  // 선택 월 계상 대상
  const preview = useMemo(()=>{
    if(!ym) return [];
    return allocs.map(a=>{
      const emp=empById(a.employee_id); if(!emp) return null;
      const rate=(ratesByAlloc[a.id]||{})[ym]||0;
      if(rate<=0) return null;
      const salary=Number(emp.monthly_salary)||0;
      return { alloc:a, emp, rate, fund_type:a.fund_type, amount:Math.round(salary*rate) };
    }).filter(Boolean);
  },[allocs,ratesByAlloc,ym,emps]);

  const totalAmt = preview.reduce((s,r)=>s+r.amount,0);

  async function run(){
    if(!ym){ showToast('월을 선택하세요','err'); return; }
    if(preview.length===0){ showToast('이 달에 계상할 인력이 없습니다','err'); return; }
    if(existing.length>0 && !confirm(`${ym}에 이미 자동계상된 인건비 ${existing.length}건이 있습니다.\n기존 자동계상분을 지우고 다시 계상할까요?`)) return;
    setBusy(true);
    // 기존 auto_labor(해당 월) 삭제 후 재생성
    await sb.from('transactions').delete().eq('project_id',proj.id).eq('source','auto_labor').eq('spent_date',ym+'-27');
    const ins = preview.map(r=>({
      project_id:proj.id, employee_id:r.emp.id, spent_date:ym+'-27',
      category:'인건비', sub_category:r.emp.name,
      amount_excl:r.amount, amount_vat:0, amount_total:r.amount,
      fund_type:r.fund_type, payment_method:'계좌이체', vendor:null,
      purpose:`${r.emp.name} ${ym} 인건비 (${Math.round(r.rate*100)}%)`,
      source:'auto_labor', created_by:user?.email||null,
    }));
    const {error} = await sb.from('transactions').insert(ins);
    setBusy(false);
    if(error){ showToast('계상 실패: '+error.message,'err'); return; }
    audit(user,'AUTO_LABOR',proj.id,`${ym} 인건비 ${ins.length}건 / ${fmt(totalAmt)}`);
    showToast(`${ym} 인건비 ${ins.length}건이 집행에 반영되었습니다`);
    loadExisting();
  }

  return (
    <div>
      <div className="card" style={{padding:'14px 18px',marginBottom:16,display:'flex',
        justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
        <div style={{fontSize:13,color:'var(--text-sub)'}}>
          <i className="ti ti-info-circle" style={{color:'var(--brand)',marginRight:6}}/>
          인력 배정의 월별 참여율을 바탕으로 인건비를 집행 내역으로 자동 생성합니다. (금액 = 직원 월급 × 참여율)
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <select value={ym} onChange={e=>setYm(e.target.value)} style={{width:130}}>
            {months.length===0 && <option value="">협약기간 없음</option>}
            {months.map(m=><option key={m} value={m}>{m}</option>)}
          </select>
          <button className="btn btn-brand btn-sm" onClick={run} disabled={busy||!ym}>
            <i className="ti ti-calculator"/> {busy?'계상 중...':'이 달 인건비 계상'}
          </button>
        </div>
      </div>

      {existing.length>0 && (
        <div className="card" style={{padding:'10px 16px',marginBottom:16,fontSize:12,
          background:'rgba(16,185,129,.06)',borderLeft:'3px solid #10b981',color:'var(--text-sub)'}}>
          <i className="ti ti-circle-check" style={{color:'#10b981',marginRight:6}}/>
          {ym}은(는) 이미 <b>{existing.length}건</b> 계상되어 집행 내역에 있습니다. 다시 실행하면 갱신됩니다.
        </div>
      )}

      <div className="card" style={{overflow:'hidden'}}>
        <div style={{padding:'12px 18px',borderBottom:'1px solid var(--border)',display:'flex',
          justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:14,fontWeight:700}}>{ym||'—'} 계상 미리보기 · {preview.length}명</span>
          <span style={{fontSize:14,fontWeight:800,color:'var(--brand)'}}>합계 {fmt(totalAmt)}원</span>
        </div>
        {loading ? (
          <div style={{padding:40,display:'flex',justifyContent:'center'}}><div className="spinner"/></div>
        ) : preview.length===0 ? (
          <div style={{padding:'40px 24px',textAlign:'center'}}>
            <i className="ti ti-user-dollar" style={{fontSize:36,color:'#cbd5e1'}}/>
            <div style={{fontWeight:700,marginTop:12}}>이 달에 계상할 인력이 없습니다</div>
            <div style={{fontSize:13,color:'var(--text-muted)',marginTop:6}}>인력 배정에서 이 달 참여율을 입력했는지 확인하세요.</div>
          </div>
        ) : (
          <div style={{overflowX:'auto'}}>
            <table className="tbl">
              <thead><tr>
                <th>직원</th><th style={{textAlign:'center'}}>재원</th>
                <th style={{textAlign:'right'}}>월급</th>
                <th style={{textAlign:'center'}}>참여율</th>
                <th style={{textAlign:'right'}}>계상액</th>
              </tr></thead>
              <tbody>
                {preview.map((r,i)=>(
                  <tr key={i}>
                    <td style={{fontWeight:700}}>{r.emp.name}</td>
                    <td style={{textAlign:'center'}}><span className="badge b-신청">{FUND_LABEL[r.fund_type]||r.fund_type}</span></td>
                    <td style={{textAlign:'right',color:'var(--text-sub)'}}>{fmt(r.emp.monthly_salary)}</td>
                    <td style={{textAlign:'center'}}>{Math.round(r.rate*100)}%</td>
                    <td style={{textAlign:'right',fontWeight:700}}>{fmt(r.amount)}원</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
      <div style={{fontSize:11,color:'var(--text-muted)',marginTop:10}}>
        계상 실행 시 이 내역이 [집행 입력] 목록에 "자동" 표시로 추가됩니다. 같은 달을 다시 실행하면 기존 자동계상분을 갱신합니다(수동 입력분은 그대로).
      </div>
    </div>
  );
}

/* ================= 현물: 장비 모달 ================= */
function EquipmentModal({equip,onClose,onSave}){
  const isNew=!equip;
  const [f,setF]=useState({
    name:equip?.name||'', type:equip?.type||'', acquired_date:equip?.acquired_date||'',
    cost:equip?.cost||'', life_years:equip?.life_years||'5', ratio_pct:equip?.ratio_pct||'',
    use_months:equip?.use_months||'', expire_date:equip?.expire_date||'',
    dup_flag:equip?.dup_flag||'', evidence_note:equip?.evidence_note||'',
  });
  const [busy,setBusy]=useState(false); const [err,setErr]=useState('');
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const cost=n(f.cost), ratio=parseFloat(f.ratio_pct)||0, months=parseFloat(f.use_months)||0, life=parseFloat(f.life_years)||0;
  const amount=(cost>0&&ratio>0&&months>0&&life>0)?Math.round(cost*(ratio/100)*(months/(life*12))):0;

  async function go(){
    if(!f.name.trim()){ setErr('장비명을 입력하세요.'); return; }
    setBusy(true); setErr('');
    await onSave({
      name:f.name.trim(), type:f.type.trim()||null, acquired_date:f.acquired_date||null,
      cost:cost, life_years:parseInt(f.life_years)||null, ratio_pct:ratio, use_months:parseInt(f.use_months)||0,

  return (

        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:13}}>

          <div><label className="form-label">유형</label>
            <input value={f.type} onChange={e=>set('type',e.target.value)} placeholder="예: 서버, PC, 분석장비"/></div>
          <div><label className="form-label">취득일</label>
            <input type="date" value={f.acquired_date} onChange={e=>set('acquired_date',e.target.value)}/></div>
          <div><label className="form-label">취득가</label>
            <MoneyInput value={f.cost} onChange={v=>set('cost',v)} placeholder="0"/></div>
          <div><label className="form-label">내구연한(년)</label>
            <input inputMode="numeric" value={f.life_years} onChange={e=>set('life_years',e.target.value.replace(/[^0-9]/g,''))} placeholder="5"/></div>
          <div><label className="form-label">현물 비율(%)</label>
            <input inputMode="numeric" value={f.ratio_pct} onChange={e=>set('ratio_pct',e.target.value.replace(/[^0-9.]/g,''))} placeholder="0~100"/></div>
          <div><label className="form-label">사용 개월수</label>
            <input inputMode="numeric" value={f.use_months} onChange={e=>set('use_months',e.target.value.replace(/[^0-9]/g,''))} placeholder="과제 기간 중 사용"/></div>

          <div><label className="form-label">사용 만료일</label>

              <option value="">정상</option>
              <option value="중복">중복 (이전 사업 재계상)</option>
            </select></div>
          <div style={{gridColumn:'1 / span 2'}}><label className="form-label">증빙 메모</label>
            <input value={f.evidence_note} onChange={e=>set('evidence_note',e.target.value)} placeholder="구입증빙 위치 등"/></div>
        </div>
        <div style={{marginTop:12,padding:'10px 14px',background:'rgba(139,92,246,.05)',border:'1px solid rgba(139,92,246,.2)',
          borderRadius:8,fontSize:11,color:'#7c3aed'}}>
          <i className="ti ti-info-circle"/> 현물금액 = 취득가 × 현물비율 × (사용개월수 ÷ (내구연한×12))

          <button className="btn btn-brand" onClick={go} disabled={busy}>{busy?'저장 중...':'저장'}</button>

/* ================= 현물: 임차 모달 ================= */
function monthCount(s,e){ if(!s||!e) return 0; const sd=new Date(s+'-01'),ed=new Date(e+'-01'); if(sd>ed) return 0;
  return (ed.getFullYear()-sd.getFullYear())*12+(ed.getMonth()-sd.getMonth())+1; }
function LeaseModal({lease,onClose,onSave}){
  const isNew=!lease;
  const [f,setF]=useState({
    name:lease?.name||'', type:lease?.type||'', status:lease?.status||'active',
    monthly_cost:lease?.monthly_cost||'', alloc_ratio:lease?.alloc_ratio||'',
    start_month:lease?.start_month||'', end_month:lease?.end_month||'',
    budget:lease?.budget||'', alloc_basis:lease?.alloc_basis||'', note:lease?.note||'',
  });
  const [busy,setBusy]=useState(false); const [err,setErr]=useState('');
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const mc=n(f.monthly_cost), ratio=parseFloat(f.alloc_ratio)||0, months=monthCount(f.start_month,f.end_month);
  const amount=Math.round(mc*ratio*months);

  async function go(){
    if(!f.name.trim()){ setErr('임차 항목명을 입력하세요.'); return; }
    setBusy(true); setErr('');
    await onSave({

      monthly_cost:mc, alloc_ratio:ratio, start_month:f.start_month||null, end_month:f.end_month||null,
      total_amount:amount, budget:n(f.budget), alloc_basis:f.alloc_basis.trim()||null, note:f.note.trim()||null,
    });
    setBusy(false);
  }

  return (
    <div className="modal-bg" onMouseDown={onClose}>
      <div className="card" style={{width:'100%',maxWidth:700,padding:24}}
        onMouseDown={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div style={{fontSize:17,fontWeight:800}}>{isNew?'임차 현물 추가':'임차 현물 수정'}</div>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'var(--text-muted)'}}>×</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:13}}>

            <input value={f.name} onChange={e=>set('name',e.target.value)} placeholder="예: 연구실 임차료"/></div>
          <div><label className="form-label">유형</label>
            <input value={f.type} onChange={e=>set('type',e.target.value)} placeholder="예: 사무실, 장비 리스"/></div>
          <div><label className="form-label">월 단가</label>
            <MoneyInput value={f.monthly_cost} onChange={v=>set('monthly_cost',v)} placeholder="0"/></div>
          <div><label className="form-label">배분율 (0~1)</label>
            <input inputMode="decimal" value={f.alloc_ratio} onChange={e=>set('alloc_ratio',e.target.value.replace(/[^0-9.]/g,''))} placeholder="예: 0.3"/></div>
          <div><label className="form-label">시작월</label>
            <input type="month" value={f.start_month} onChange={e=>set('start_month',e.target.value)}/></div>
          <div><label className="form-label">종료월</label>
            <input type="month" value={f.end_month} onChange={e=>set('end_month',e.target.value)}/></div>
          <div><label className="form-label">현물합계 (자동) · {months}개월</label>
            <div style={{padding:'9px 12px',background:'rgba(20,184,166,.08)',borderRadius:8,
              border:'1px solid rgba(20,184,166,.2)',fontWeight:800,color:'#0d9488'}}>{fmt(amount)}원</div></div>
          <div><label className="form-label">예산</label>
            <MoneyInput value={f.budget} onChange={v=>set('budget',v)} placeholder="0"/></div>
          <div><label className="form-label">상태</label>
            <select value={f.status} onChange={e=>set('status',e.target.value)}>
              <option value="active">활성</option><option value="closed">종료</option>

          <button className="btn btn-brand" onClick={go} disabled={busy}>{busy?'저장 중...':'저장'}</button>
        </div>
      </div>
    </div>
  );
}

/* ================= 현물 관리 (수행·집행 탭 내용 4) ================= */
function InkindManager({user,proj,showToast,kind='equip'}){
  const [eqs,setEqs]   = useState(null);
  const [lss,setLss]   = useState(null);
  const [modal,setModal] = useState(null); // {type:'equip'|'lease', item} | {type, item:'new'}

  async function load(){
    const [{data:e},{data:l}] = await Promise.all([
      sb.from('equipment').select('*').eq('project_id',proj.id).order('id'),
      sb.from('leases').select('*').eq('project_id',proj.id).order('id'),
    ]);
    setEqs(e||[]); setLss(l||[]);
  }
  useEffect(()=>{ load(); },[proj.id]);

  const eqTotal=(eqs||[]).reduce((s,x)=>s+n(x.kind_amount),0);
  const lsTotal=(lss||[]).reduce((s,x)=>s+n(x.total_amount),0);

  async function saveEquip(payload){
    const isNew = modal.item==='new';
    const res = isNew
      ? await sb.from('equipment').insert({...payload,project_id:proj.id})
      : await sb.from('equipment').update(payload).eq('id',modal.item.id);
    if(res.error){ showToast('저장 실패: '+res.error.message,'err'); return; }
    showToast(isNew?'장비가 추가되었습니다':'수정되었습니다'); setModal(null); load();
  }
  async function saveLease(payload){
    const isNew = modal.item==='new';
    const res = isNew
      ? await sb.from('leases').insert({...payload,project_id:proj.id})
      : await sb.from('leases').update(payload).eq('id',modal.item.id);
    if(res.error){ showToast('저장 실패: '+res.error.message,'err'); return; }
    showToast(isNew?'임차가 추가되었습니다':'수정되었습니다'); setModal(null); load();
  }
  async function delItem(table,id){
    if(!confirm('삭제하시겠습니까?')) return;
    const {error} = await sb.from(table).delete().eq('id',id);
    if(error){ showToast('삭제 실패: '+error.message,'err'); return; }
    showToast('삭제되었습니다'); load();
  }

  return (
    <div>
      {kind==='equip' ? (
        <div>
          <div className="card" style={{padding:'14px 18px',marginBottom:16,display:'flex',
            justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>
            <div style={{fontSize:13,color:'var(--text-sub)'}}>
              장비 현물 합계: <b style={{color:'#7c3aed'}}>{fmt(eqTotal)}원</b>
            </div>
            <button className="btn btn-brand btn-sm" onClick={()=>setModal({type:'equip',item:'new'})}><i className="ti ti-plus"/> 장비 추가</button>
          </div>
          <div className="card" style={{overflow:'hidden'}}>
            {eqs===null ? <div style={{padding:40,display:'flex',justifyContent:'center'}}><div className="spinner"/></div>
            : eqs.length===0 ? (
              <div style={{padding:'44px 24px',textAlign:'center'}}>
                <i className="ti ti-device-desktop-off" style={{fontSize:36,color:'#cbd5e1'}}/>
                <div style={{fontWeight:700,marginTop:12}}>등록된 장비 현물이 없습니다</div>
              </div>
            ) : (

              <div style={{overflowX:'auto'}}>
                <table className="tbl" style={{minWidth:820}}>

                    <th style={{textAlign:'center'}}>배분율</th><th style={{textAlign:'center'}}>기간</th>
                    <th style={{textAlign:'right'}}>현물합계</th><th style={{textAlign:'center'}}>상태</th>

      {modal?.type==='equip' && <EquipmentModal equip={modal.item==='new'?null:modal.item} onClose={()=>setModal(null)} onSave={saveEquip}/>}
      {modal?.type==='lease' && <LeaseModal lease={modal.item==='new'?null:modal.item} onClose={()=>setModal(null)} onSave={saveLease}/>}
