function LoginScreen({onLogin}){
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');
  async function doLogin(){
    if(!email||!pw){setErr('이메일과 비밀번호를 입력하세요.');return;}
    setBusy(true);setErr('');
    try{
      const {data,error}=await sb.auth.signInWithPassword({email:email.trim(),password:pw});
      if(error)throw error;
      onLogin(data.user);
    }catch(e){
      setErr('로그인 실패: 이메일 또는 비밀번호를 확인하세요.');setBusy(false);
    }
  }
  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg-0,#0b1119)'}}>
      <div style={{width:'min(380px,92vw)',background:'#172332',border:'1px solid var(--border-md)',borderRadius:14,padding:'34px 30px',boxShadow:'0 12px 40px rgba(0,0,0,0.5)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6,justifyContent:'center'}}>
          {LOGO_SRC?<img src={LOGO_SRC} style={{height:34,width:'auto',objectFit:'contain',borderRadius:4}}/>:<span style={{fontSize:26}}>🔷</span>}
          <span style={{fontSize:18,fontWeight:800,color:'#fff'}}>DEMO CRM</span>
        </div>
        <div style={{textAlign:'center',fontSize:12,color:'var(--text-3)',marginBottom:24}}>회사 계정으로 로그인하세요</div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div>
            <div style={{fontSize:11,color:'var(--text-2)',marginBottom:5,fontWeight:600}}>이메일</div>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doLogin()} placeholder="회사이메일ID@demo.ai" style={{width:'100%',boxSizing:'border-box',padding:'11px 13px',fontSize:13}}/>
          </div>
          <div>
            <div style={{fontSize:11,color:'var(--text-2)',marginBottom:5,fontWeight:600}}>비밀번호</div>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doLogin()} placeholder="비밀번호" style={{width:'100%',boxSizing:'border-box',padding:'11px 13px',fontSize:13}}/>
          </div>
          {err&&<div style={{fontSize:11,color:'#f87171',background:'rgba(220,38,38,0.1)',border:'0.5px solid rgba(220,38,38,0.3)',borderRadius:7,padding:'8px 11px'}}>{err}</div>}
          <button className="btn btn-t" onClick={doLogin} disabled={busy} style={{width:'100%',padding:'12px 0',fontSize:14,fontWeight:700,marginTop:4,textAlign:'center',display:'flex',alignItems:'center',justifyContent:'center'}}>{busy?'로그인 중...':'로그인'}</button>
        </div>
      </div>
    </div>
  );
}

function UsageUpload(){
  const [rows,setRows]=useState([]);      // 파싱된 행
  const [fileName,setFileName]=useState('');
  const [parsing,setParsing]=useState(false);
  const [uploading,setUploading]=useState(false);
  const [result,setResult]=useState(null); // {ok, total, msg}
  const [err,setErr]=useState('');
  const fileRef=useRef(null);

  // 컬럼 후보 (한글/영문 모두 허용)
  function pick(obj,cands){for(const c of cands){for(const k of Object.keys(obj)){if(String(k).trim()===c)return obj[k];}}return undefined;}

  function handleFile(file){
    if(!file)return;
    setErr('');setResult(null);setRows([]);setFileName(file.name);setParsing(true);
    const reader=new FileReader();
    reader.onload=(e)=>{
      try{
        const data=new Uint8Array(e.target.result);
        const wb=XLSX.read(data,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const json=XLSX.utils.sheet_to_json(ws,{defval:''});
        const parsed=[];const errs=[];
        json.forEach((r,idx)=>{
          const ym=String(pick(r,['날짜','year_month','연월','ym'])||'').trim().replace(/[^0-9]/g,'');
          const hosp=String(pick(r,['병원명','hospital_name','병원'])||'').trim();
          const cid=String(pick(r,['고객ID','cust_id','고객id','customerid'])||'').trim();
          const prod=String(pick(r,['제품','product','상품'])||'').trim().toUpperCase();
          const cntRaw=pick(r,['건수','cnt','count','분석건수']);
          const cnt=Number(String(cntRaw).replace(/[^0-9.-]/g,''));
          if(!ym&&!hosp&&!cid)return; // 빈 행 스킵
          if(ym.length!==6){errs.push((idx+2)+'행: 날짜 형식 오류('+ym+')');return;}
          if(!cid){errs.push((idx+2)+'행: 고객ID 없음('+hosp+')');return;}
          if(!prod){errs.push((idx+2)+'행: 제품 없음');return;}
          if(isNaN(cnt)){errs.push((idx+2)+'행: 건수 숫자 아님');return;}
          parsed.push({year_month:ym,hospital_name:hosp,cust_id:cid,product:prod,cnt:cnt});
        });
        setRows(parsed);setParsing(false);
        if(errs.length>0)setErr('일부 행 건너뜀 ('+errs.length+'개):\n'+errs.slice(0,8).join('\n')+(errs.length>8?'\n...':''));
      }catch(e2){setParsing(false);setErr('파일 읽기 오류: '+(e2.message||e2));}
    };
    reader.onerror=()=>{setParsing(false);setErr('파일을 읽을 수 없습니다.');};
    reader.readAsArrayBuffer(file);
  }

  async function doUpload(){
    if(rows.length===0)return;
    if(!confirm(rows.length+'건을 업로드합니다.\n같은 연월+고객ID+제품은 갱신, 없는 건은 추가됩니다. 진행할까요?'))return;
    setUploading(true);setErr('');setResult(null);
    try{
      // 1000건씩 나눠 upsert (year_month+cust_id+product 충돌 시 갱신)
      const chunk=500;let done=0;
      for(let i=0;i<rows.length;i+=chunk){
        const slice=rows.slice(i,i+chunk);
        const {error}=await sb.from('usage_monthly').upsert(slice,{onConflict:'year_month,cust_id,product'});
        if(error)throw error;
        done+=slice.length;
      }
      setUploading(false);
      setResult({ok:true,total:done,msg:done+'건이 반영되었습니다.'});
      setRows([]);setFileName('');if(fileRef.current)fileRef.current.value='';
    }catch(e){
      setUploading(false);
      setResult({ok:false,msg:'업로드 실패: '+(e.message||e)+'\n(유니크 제약이 없으면 SQL 설정이 필요할 수 있습니다.)'});
    }
  }

  const ymList=[...new Set(rows.map(r=>r.year_month))].sort();
  const prodList=[...new Set(rows.map(r=>r.product))];

  return(
    <div style={{padding:18,height:'100vh',overflowY:'auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
        <span style={{fontSize:16}}>📊</span><span style={{fontSize:15,fontWeight:800}}>분석건수 업로드</span>
      </div>
      <div style={{fontSize:11,color:'var(--text-3)',marginBottom:16}}>매달 그 달의 분석건수 파일(엑셀/CSV)을 올리면 데이터에 반영됩니다. (같은 연월·고객·제품은 갱신, 나머지는 그대로 유지)</div>

      {/* 업로드 영역 */}
      <div style={{background:'#172332',border:'1.5px solid #1D9E75',borderRadius:12,padding:20,marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:700,color:'#7fe0c0',marginBottom:10}}>1단계 · 파일 선택</div>
        <div style={{fontSize:10,color:'var(--text-3)',marginBottom:12,lineHeight:1.7}}>
          파일 형식 (첫 행은 제목): <b style={{color:'var(--text-2)'}}>날짜(YYYYMM) · 병원명 · 고객ID · 제품(BA/OA) · 건수</b><br/>
          예: 202606 · EL hospital · C_00176 · BA · 7
        </div>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={e=>handleFile(e.target.files[0])} style={{fontSize:12}}/>
        {parsing&&<div style={{marginTop:10,fontSize:11,color:'var(--brand-100)'}}>파일 분석 중...</div>}
        {fileName&&!parsing&&<div style={{marginTop:10,fontSize:11,color:'var(--text-2)'}}>📄 {fileName} — <b style={{color:'#7fe0c0'}}>{rows.length}건</b> 인식됨</div>}
      </div>

      {err&&<div style={{background:'rgba(251,146,60,0.1)',border:'0.5px solid rgba(251,146,60,0.4)',borderRadius:8,padding:'10px 13px',fontSize:11,color:'#fbbf24',marginBottom:16,whiteSpace:'pre-wrap'}}>{err}</div>}

      {/* 미리보기 */}
      {rows.length>0&&(
        <div style={{background:'#172332',border:'1px solid var(--border-md)',borderRadius:12,padding:20,marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--text)',marginBottom:10}}>2단계 · 미리보기 <span style={{fontSize:10,fontWeight:400,color:'var(--text-3)'}}>(상위 20건 / 총 {rows.length}건)</span></div>
          <div style={{display:'flex',gap:14,marginBottom:12,flexWrap:'wrap',fontSize:11,color:'var(--text-2)'}}>
            <span>📅 연월: <b style={{color:'#7fe0c0'}}>{ymList.join(', ')}</b></span>
            <span>📦 제품: <b style={{color:'#60a5fa'}}>{prodList.join(', ')}</b></span>
            <span>🔢 총 건수합: <b style={{color:'var(--text)'}}>{rows.reduce((s,r)=>s+r.cnt,0).toLocaleString()}</b></span>
          </div>
          <div style={{maxHeight:280,overflowY:'auto',border:'0.5px solid var(--border)',borderRadius:8}}>
            <table className="tbl" style={{minWidth:560}}>
              <thead><tr><th>연월</th><th>병원명</th><th>고객ID</th><th>제품</th><th style={{textAlign:'right'}}>건수</th></tr></thead>
              <tbody>{rows.slice(0,20).map((r,i)=>(<tr key={i}><td>{r.year_month}</td><td>{r.hospital_name}</td><td style={{color:'#60a5fa'}}>{r.cust_id}</td><td>{r.product}</td><td style={{textAlign:'right',fontWeight:700}}>{r.cnt}</td></tr>))}</tbody>
            </table>
          </div>
          <div style={{marginTop:14,display:'flex',justifyContent:'flex-end'}}>
            <button className="btn btn-t" onClick={doUpload} disabled={uploading} style={{padding:'10px 22px',fontSize:13,fontWeight:700}}>{uploading?'업로드 중...':'⬆ Supabase에 반영 ('+rows.length+'건)'}</button>
          </div>
        </div>
      )}

      {/* 결과 */}
      {result&&(
        <div style={{background:result.ok?'rgba(74,222,128,0.1)':'rgba(220,38,38,0.1)',border:'0.5px solid '+(result.ok?'rgba(74,222,128,0.4)':'rgba(220,38,38,0.4)'),borderRadius:10,padding:'14px 16px',fontSize:12,color:result.ok?'#4ade80':'#f87171',whiteSpace:'pre-wrap'}}>
          {result.ok?'✅ ':'⚠️ '}{result.msg}
        </div>
      )}
    </div>
  );
}

function App(){
  const [tab,setTab]=useState('dashboard');
  const [hov,setHov]=useState(null);
  const [openCustId,setOpenCustId]=useState(null);
  const [mobOpen,setMobOpen]=useState(false);
  function gotoCust(cid){if(!cid)return;setOpenCustId(cid);setTab('customers');}
  const [refreshKey,setRefreshKey]=useState(0);
  const [authChecked,setAuthChecked]=useState(false);
  const [user,setUser]=useState(null);

  useEffect(()=>{
    sb.auth.getSession().then(({data})=>{
      setUser(data.session?.user||null);setAuthChecked(true);
    });
    const {data:sub}=sb.auth.onAuthStateChange((_e,session)=>{setUser(session?.user||null);});
    return ()=>{sub.subscription.unsubscribe();};
  },[]);

  async function logout(){await sb.auth.signOut();setUser(null);}

  if(!authChecked)return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}><Spin/></div>;
  if(!user)return <LoginScreen onLogin={setUser}/>;

  return(
    <div className="shell">
      <div className={"mob-backdrop-crm"+(mobOpen?' open':'')} onClick={()=>setMobOpen(false)}/>
      <div className={"sidebar"+(mobOpen?' open':'')}>
        <div className="sb-logo" style={{padding:'6px 6px 16px',borderBottom:'0.5px solid var(--border)'}}>
          <img src={SH_LOGO} alt="DEMO" style={{width:130,display:'block',marginBottom:6}}/>
          <div style={{fontSize:17,color:'#fff',fontWeight:800,letterSpacing:.5,marginLeft:36}}>CRM</div>
        </div>
        <div style={{fontSize:13,color:'#EF9F27',fontWeight:800,padding:'8px 8px 5px',letterSpacing:.3}}>Menu</div>
        {MENU.map(m=>{
          const on=tab===m.id;const hv=hov===m.id&&!on;
          return(
            <div key={m.id} onClick={()=>{setTab(m.id);setMobOpen(false);}} onMouseEnter={()=>setHov(m.id)} onMouseLeave={()=>setHov(h=>h===m.id?null:h)}
              style={{display:'flex',alignItems:'center',gap:9,padding:'10px 12px',borderRadius:10,cursor:'pointer',fontSize:12,fontWeight:on?700:600,marginBottom:4,
                color:on||hv?'#fff':'var(--text-2)',
                background:on?'linear-gradient(135deg,'+m.clr+'dd,'+m.clr+'88)':hv?'linear-gradient(135deg,'+m.clr+'55,'+m.clr+'18)':'linear-gradient(135deg,'+m.clr+'22,'+m.clr+'0a)',
                border:on?'2px solid #EF9F27':hv?'1.5px solid #EF9F27aa':'0.5px solid '+m.clr+'33',
                boxShadow:on?'0 0 0 1px #EF9F2755, 0 6px 18px rgba(239,159,39,.35), inset 0 1px 0 rgba(255,255,255,.2)':hv?'0 4px 12px rgba(239,159,39,.22)':'inset 0 1px 0 rgba(255,255,255,.04)',
                transform:hv?'translateX(3px)':'none',transition:'all .12s ease'}}>
              <span style={{width:8,height:8,borderRadius:'50%',background:on||hv?'#fff':m.clr,flexShrink:0}}/>
              <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.lb}</span>
              {on&&<span style={{fontSize:12,fontWeight:700,color:'#fff',flexShrink:0}}>✓</span>}
            </div>
          );
        })}
        <div style={{fontSize:13,color:'#EF9F27',fontWeight:800,padding:'14px 8px 5px',letterSpacing:.3}}>Sales Hub</div>
        <div onClick={()=>window.open('/app.html','_blank')} title="영업 리드허브를 새 탭으로 엽니다"
          style={{display:'flex',alignItems:'center',gap:9,padding:'10px 12px',borderRadius:10,cursor:'pointer',fontSize:11,fontWeight:800,color:'#fff',background:'linear-gradient(135deg,#185FA5,#0C447C)',border:'1px solid #2472c8',animation:'shbluepulse 1.5s ease-in-out infinite'}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:'#fff',flexShrink:0}}/><span style={{flex:1,fontWeight:800}}>Sales Hub (리드현황)</span><span style={{fontSize:11}}>↗</span>
        </div>
        <div style={{marginTop:'auto',padding:'10px 11px',borderTop:'0.5px solid var(--border)',display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:26,height:26,borderRadius:'50%',background:'var(--brand)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>{(user.email||'C')[0].toUpperCase()}</div>
          <span style={{fontSize:10,color:'var(--text-2)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={user.email}>{user.email||'사용자'}</span>
          <button onClick={logout} title="로그아웃" style={{fontSize:10,padding:'4px 8px',background:'rgba(255,255,255,0.07)',border:'0.5px solid var(--border-md)',borderRadius:6,color:'var(--text-2)',cursor:'pointer',flexShrink:0}}>로그아웃</button>
        </div>
      </div>
      <div className="main">
        <div className="mob-topbar-crm" style={{alignItems:'center',gap:10,padding:'10px 14px',borderBottom:'0.5px solid var(--border)',flexShrink:0,background:'#15233a'}}>
          <button onClick={()=>setMobOpen(true)} aria-label="메뉴 열기" style={{width:34,height:34,borderRadius:8,border:'0.5px solid var(--border-md)',background:'rgba(255,255,255,.06)',color:'#fff',fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>☰</button>
          <span style={{fontSize:14,fontWeight:700,color:'#fff'}}>CRM</span>
        </div>
        <div className="pane">
          {tab==='dashboard'&&<Dashboard key={'d'+refreshKey} onOpenCust={gotoCust}/>}
          {tab==='customers'&&<CustomerMaster key={'c'+refreshKey} openCustId={openCustId} onConsumeOpen={()=>setOpenCustId(null)}/>}
          {tab==='orders'&&<OrderManagement key={'o'+refreshKey}/>}
          {tab==='invoices'&&<InvoiceManagement key={'i'+refreshKey}/>}
          {tab==='cs'&&<CSManagement key={'s'+refreshKey}/>}
          {tab==='revenue'&&<RevenueInsight key={'r'+refreshKey}/>}
          {tab==='usage_upload'&&<UsageUpload key={'u'+refreshKey}/>}
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>

</script>
</body>
