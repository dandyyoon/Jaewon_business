*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;background:#162032;color:rgba(255,255,255,0.85);word-break:keep-all;overflow-wrap:break-word;}
:root{
  --brand:#0F6E56;--brand-50:rgba(16,110,86,0.15);--brand-100:#5DCAA5;--brand-800:#5DCAA5;
  --blue:#2563eb;--blue-50:rgba(37,99,235,0.15);--red:#dc2626;--red-50:rgba(220,38,38,0.15);
  --amber:#fb923c;--amber-50:rgba(251,146,60,0.15);--amber-100:rgba(251,146,60,0.3);
  --bg:#1e2d40;--bg-2:#162032;--surface-2:#1a2738;--r:10px;--r-lg:12px;
  --border:rgba(255,255,255,.06);--border-md:rgba(255,255,255,.1);
  --text:rgba(255,255,255,0.95);--text-2:rgba(255,255,255,0.75);--text-3:rgba(255,255,255,0.5);
}
.spin{display:inline-block;width:24px;height:24px;border:3px solid var(--border-md);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
input,select,textarea{font-size:12px;padding:6px 9px;background:var(--bg-2);border:0.5px solid var(--border-md);border-radius:7px;color:#fff;outline:none;width:100%;font-family:inherit;}
input:focus,select:focus,textarea:focus{border-color:var(--brand);}
input.ai{background:#f0f9f6;border-color:#9FE1CB;color:#085041;}
input.ci{background:#fff7ed;border-color:#fed7aa;color:#ea580c;}
select option{background:#1e2d40;}
.btn{font-size:11px;padding:6px 13px;border-radius:8px;border:0.5px solid var(--border-md);background:var(--bg-2);color:var(--text);cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:5px;}
.btn:hover{filter:brightness(1.15);}
.btn-a,.btn-t,.btn-tem{background:var(--brand);border-color:var(--brand);color:#fff;}
.btn-b{background:var(--blue);border-color:var(--blue);color:#fff;}
.btn-r{background:var(--red);border-color:var(--red);color:#fff;}
.tbl{width:100%;border-collapse:collapse;}
.tbl thead tr{background:var(--bg-2);border-bottom:0.5px solid var(--border);}
.tbl th{padding:7px 10px;font-size:10px;font-weight:700;color:var(--text-2);text-align:left;white-space:nowrap;}
.tbl tbody tr{border-bottom:0.5px solid var(--border);cursor:pointer;}
.tbl tbody tr:hover{background:rgba(255,255,255,0.04);}
.tbl td{padding:7px 10px;font-size:11px;color:var(--text);}
.fb{background:var(--bg-2);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 13px;}
.fbl{font-size:10px;color:var(--text-2);margin-bottom:5px;}
.fbv{font-size:12px;color:var(--text);font-weight:600;}
.fbv.dim{color:var(--text-3);font-weight:400;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fi{display:flex;flex-direction:column;gap:4px;}
.fi.full,.fb.full{grid-column:1/-1;}
.fl{font-size:10px;color:var(--text-2);font-weight:600;}
.req{color:var(--red);}
.ah{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;background:#e8f5f0;border:0.5px solid #9FE1CB;border-radius:8px;cursor:pointer;margin-bottom:8px;margin-top:4px;}
.ahl{font-size:11px;font-weight:700;display:flex;align-items:center;gap:6px;color:#085041;}
.ah>span{color:#085041;}
.sh{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:#085041;background:#e8f5f0;border:0.5px solid #9FE1CB;border-radius:var(--r);padding:7px 12px;margin-bottom:4px;}
.bdg{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;display:inline-block;}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;white-space:nowrap;display:inline-block;}
.bb{background:var(--blue-50);color:#60a5fa;}
.pb{font-size:11px;padding:3px 8px;border-radius:6px;border:0.5px solid var(--border-md);background:var(--bg-2);color:var(--text-2);cursor:pointer;margin:0 1px;}
.pb.a{background:var(--brand);border-color:var(--brand);color:#fff;}
.errbox{margin:10px;padding:12px 14px;background:rgba(220,38,38,0.1);border:0.5px solid var(--red);border-radius:8px;font-size:12px;color:#f87171;}
.ic{border:0.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:10px;background:var(--bg);}
.ih{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg-2);border-bottom:0.5px solid var(--border);}
.ii{display:grid;grid-template-columns:92px 1fr;gap:3px;font-size:11px;margin-bottom:10px;}
.iil{color:var(--text-2);padding:2px 0;}
.iiv{padding:2px 0;color:var(--text);}
.iiv.dim{color:var(--text-3);}
.iif{display:flex;justify-content:space-between;align-items:center;padding-top:9px;border-top:0.5px solid var(--border);}
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.mo{background:#1a2738;border:0.5px solid var(--border-md);border-radius:14px;width:100%;max-width:920px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.mo.lg{max-width:960px;}
.mh{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.mh-em{background:linear-gradient(135deg,var(--brand) 0%,#1D9E75 100%);}
.mt{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;}
.mh-em .mt{color:#fff;}
.mb{padding:16px;overflow-y:auto;flex:1;}
.mf{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-top:0.5px solid var(--border);flex-shrink:0;gap:8px;}
.xb{cursor:pointer;font-size:18px;color:var(--text-2);border:none;background:none;line-height:1;}
.mh-em .xb{color:#fff;}
/* 사이드바 */
.shell{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:200px;flex-shrink:0;background:#15233a;border-right:0.5px solid var(--border);display:flex;flex-direction:column;padding:10px 8px;gap:3px;}
.sb-logo{font-size:13px;font-weight:800;color:#fff;padding:8px 10px 12px;letter-spacing:-.01em;}
.sb-sec{font-size:9px;color:var(--text-3);font-weight:700;padding:8px 10px 4px;text-transform:uppercase;letter-spacing:.05em;}
.ni{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text-2);}
.ni:hover{background:rgba(255,255,255,0.05);}
.ni.act{background:var(--brand);color:#fff;}
.ni-ico{font-size:15px;width:18px;text-align:center;flex-shrink:0;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.pane{flex:1;overflow:hidden;position:relative;}
.mob-topbar-crm{display:none;}
.mob-backdrop-crm{display:none;}
@media (max-width:768px){
  .mob-topbar-crm{display:flex !important;}
  .sidebar{position:fixed;top:0;left:0;height:100%;z-index:120;transform:translateX(-100%);transition:transform .25s ease;width:230px !important;}
  .sidebar.open{transform:translateX(0);}
  .mob-backdrop-crm.open{display:block !important;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:110;}
  div[style*="grid-template-columns"]:not(.grid-auto-mob):not(.tbl-grid){grid-template-columns:1fr !important;}
  .grid-auto-mob{grid-template-columns:1fr 1fr !important;}
}
@media (max-width:480px){
  .grid-auto-mob{grid-template-columns:1fr !important;}
}
.hbar{width:100%;height:7px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden;}
.hbf{height:100%;border-radius:4px;transition:width .3s ease;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:3px;}
@keyframes shpulse{0%,100%{box-shadow:0 0 0 rgba(239,159,39,0);border-color:#2472c8;}50%{box-shadow:0 0 16px rgba(239,159,39,.9);border-color:#EF9F27;}}

</style>

async function fetchAll(table,columns,orderCol){

  }

}

// 기간 필터 공용: 날짜가 [yFrom~yTo]연도 + 세부단위(unit: all/half/quarter/month, sel: 반기1~2/분기1~4/월1~12) 안인지
function inPeriod(dateStr,yFrom,yTo,unit,sel){
  if(!dateStr)return false;
  const s=String(dateStr);const y=parseInt(s.slice(0,4));const m=parseInt(s.slice(5,7));
  if(!y||isNaN(y))return false;
  if(y<yFrom||y>yTo)return false;
  if(!unit||unit==='all')return true;
  if(!Number(sel))return true; // 세부 선택이 '전체(0)'면 연간 전체
  if(!m||isNaN(m))return false;
  if(unit==='half')return Number(sel)===1?(m>=1&&m<=6):(m>=7&&m<=12);
  if(unit==='quarter')return Math.ceil(m/3)===Number(sel);
  if(unit==='month')return m===Number(sel);
  return true;
}

function periodLabel(yFrom,yTo,unit,sel){
  const yr=yFrom===yTo?String(yFrom):(yFrom+'-'+yTo);
  if(!unit||unit==='all'||!Number(sel))return yr;
  if(unit==='half')return yr+'_'+(Number(sel)===1?'상반기':'하반기');
  if(unit==='quarter')return yr+'_'+sel+'분기';
  if(unit==='month')return yr+'_'+sel+'월';
  return yr;
}

async function searchCustomersUnified(term){

  }catch(e){}
  return rows.slice(0,30);
}

  </div>);
}

// 주문 건수 (orders 납품 건수 · 세일즈허브 스타일 막대)
function OrderCountChart({monthlyOrderCount,ctrl}){
  const now=new Date();
  const [year0,setYear]=useState(now.getFullYear());
  const [gran0,setGran]=useState('month');
  const [selMonth0,setSelMonth]=useState(0);
  const [selHalf0,setSelHalf]=useState(0);
  const [selQ0,setSelQ]=useState(0);
  const year=ctrl?ctrl.year:year0;const gran=ctrl?ctrl.gran:gran0;
  const selMonth=ctrl?(ctrl.selMonth||0):selMonth0;const selHalf=ctrl?(ctrl.selHalf||0):selHalf0;const selQ=ctrl?(ctrl.selQ||0):selQ0;
  const aggYear=(y)=>{const c={};(monthlyOrderCount||[]).forEach(o=>{const ym=String(o.yearMonth||'');if(!ym.startsWith(y+'-'))return;const m=Number(ym.slice(5));c[m]=(c[m]||0)+Number(o.count||0);});return c;};
  const cur=aggYear(year),prev=aggYear(year-1);
  let labels=[],actArr=[],prevArr=[];
  if(gran==='month'){
    if(selMonth>=1&&selMonth<=12){labels=[selMonth+'월'];actArr=[cur[selMonth]||0];prevArr=[prev[selMonth]||0];}
    else{labels=Array.from({length:12},(_,i)=>(i+1)+'월');for(let m=1;m<=12;m++){actArr.push(cur[m]||0);prevArr.push(prev[m]||0);}}
  }else if(gran==='half'){
    if(selHalf>=1&&selHalf<=2){const h=selHalf-1;let a=0,pv=0;for(let mm=1;mm<=6;mm++){const m=h*6+mm;a+=cur[m]||0;pv+=prev[m]||0;}labels=[selHalf===1?'상반기':'하반기'];actArr=[a];prevArr=[pv];}
    else{labels=['상반기','하반기'];for(let h=0;h<2;h++){let a=0,pv=0;for(let mm=1;mm<=6;mm++){const m=h*6+mm;a+=cur[m]||0;pv+=prev[m]||0;}actArr.push(a);prevArr.push(pv);}}
  }else if(gran==='quarter'){
    if(selQ>=1&&selQ<=4){const q=selQ-1;let a=0,pv=0;for(let mm=1;mm<=3;mm++){const m=q*3+mm;a+=cur[m]||0;pv+=prev[m]||0;}labels=[selQ+'분기'];actArr=[a];prevArr=[pv];}
    else{labels=['1분기','2분기','3분기','4분기'];for(let q=0;q<4;q++){let a=0,pv=0;for(let mm=1;mm<=3;mm++){const m=q*3+mm;a+=cur[m]||0;pv+=prev[m]||0;}actArr.push(a);prevArr.push(pv);}}
  }else{const years=[year-3,year-2,year-1,year];labels=years.map(y=>y+'년');years.forEach(y=>{const g=aggYear(y);let a=0;for(let m=1;m<=12;m++)a+=g[m]||0;actArr.push(a);prevArr.push(0);});}
  const actSum=actArr.reduce((a,b)=>a+b,0);
  const datasets=[{type:'bar',label:'주문 건수',data:actArr,backgroundColor:'#185FA5',borderRadius:4,order:2}];
  if(gran!=='year')datasets.push({type:'line',label:'전년도',data:prevArr,borderColor:'#EF9F27',borderWidth:2,borderDash:[5,4],pointRadius:3,pointBackgroundColor:'#EF9F27',fill:false,tension:.3,order:1});
  const cfg={data:{labels,datasets},options:{plugins:{legend:{display:true,labels:{boxWidth:10,font:{size:10},color:'rgba(255,255,255,0.7)'}},tooltip:{callbacks:{label:(c)=>c.dataset.label+' '+c.raw+'건'}}},scales:{x:{ticks:{color:'rgba(255,255,255,0.5)',font:{size:10}},grid:{display:false}},y:{beginAtZero:true,ticks:{color:'rgba(255,255,255,0.5)',font:{size:10},precision:0},grid:{color:'rgba(255,255,255,0.05)'}}}}};
  const years=[];for(let y=now.getFullYear();y>=now.getFullYear()-4;y--)years.push(y);
  const tabBtn=(kk,lb)=>{const on=gran===kk;return <span onClick={()=>{setGran(kk);setSelMonth(0);setSelHalf(0);setSelQ(0);}} style={{fontSize:10,padding:'3px 9px',borderRadius:20,cursor:'pointer',background:on?'var(--blue)':'transparent',color:on?'#fff':'var(--text-2)',border:'0.5px solid '+(on?'var(--blue)':'var(--border-md)')}}>{lb}</span>;};
  const selStyle=active=>({fontSize:10,padding:'3px 8px',width:'auto',background:'var(--bg-2)',border:'0.5px solid '+(active?'#EF9F27':'var(--border-md)'),borderRadius:7,color:active?'#EF9F27':'var(--text-2)'});
  return (<div>
    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10,flexWrap:'wrap'}}>
      <span style={{fontSize:11,fontWeight:700}}>주문 건수 <span style={{fontSize:9,color:'var(--text-3)',fontWeight:400}}>납품 기준</span></span>
      {!ctrl&&<div style={{marginLeft:'auto',display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
        <select value={year} onChange={e=>setYear(Number(e.target.value))} style={selStyle(false)}>{years.map(y=><option key={y} value={y}>{y}</option>)}</select>
        {gran==='month'&&<select value={selMonth} onChange={e=>setSelMonth(Number(e.target.value))} style={selStyle(selMonth)}><option value={0}>전체</option>{Array.from({length:12},(_,i)=>i+1).map(m=><option key={m} value={m}>{m}월</option>)}</select>}
        {gran==='half'&&<select value={selHalf} onChange={e=>setSelHalf(Number(e.target.value))} style={selStyle(selHalf)}><option value={0}>전체</option><option value={1}>상반기</option><option value={2}>하반기</option></select>}
        {gran==='quarter'&&<select value={selQ} onChange={e=>setSelQ(Number(e.target.value))} style={selStyle(selQ)}><option value={0}>전체</option>{[1,2,3,4].map(q=><option key={q} value={q}>Q{q}</option>)}</select>}
        {tabBtn('year','연도')}{tabBtn('half','반기')}{tabBtn('quarter','분기')}{tabBtn('month','월별')}
      </div>}
    </div>
    <div style={{background:'rgba(24,95,165,.12)',border:'0.5px solid rgba(24,95,165,.4)',borderRadius:9,padding:'8px 11px',marginBottom:10}}><div style={{fontSize:10,color:'var(--text-2)'}}>총 주문 건수</div><div style={{fontSize:13,fontWeight:700,color:'#60a5fa'}}>{actSum.toLocaleString()}건</div></div>
    {actSum===0?<div style={{textAlign:'center',padding:'30px 0',color:'var(--text-3)',fontSize:11}}>주문 데이터 없음</div>:<ChartBox cfg={cfg} height={170}/>}
  </div>);
}

// 데모·계약 목표 현황 (sales_history=단계, count_targets=목표 · 세일즈허브 동일 + 미전환 고객)
function CrmDemoPanel({salesHistory,countTargets,demos,customers,onOpenCust,ctrl}){
  const now=new Date();
  const [gran0,setGran]=useState('quarter');
  const [selYear0,setSelYear]=useState(now.getFullYear());
  const [selHalf0,setSelHalf]=useState(0);
  const [selQ0,setSelQ]=useState(0);
  const [selMonth0,setSelMonth]=useState(0);
  const gran=ctrl?ctrl.gran:gran0;
  const selYear=ctrl?ctrl.year:selYear0;
  const selHalf=ctrl?(ctrl.selHalf||0):selHalf0;
  const selQ=ctrl?(ctrl.selQ||0):selQ0;
  const selMonth=ctrl?(ctrl.selMonth||0):selMonth0;
  const [prodFilter,setProdFilter]=useState('ALL'); // 제품 필터
  const [tgtModal,setTgtModal]=useState(false);
  const [drill,setDrill]=useState(null);
  const [notYear,setNotYear]=useState('전체');
  const [cts,setCts]=useState(countTargets||[]);
  useEffect(()=>{setCts(countTargets||[]);},[countTargets]);
  async function reloadCts(){try{const {data}=await sb.from('count_targets').select('year_month,demo_target,contract_target');setCts(data||[]);}catch(e){}}
  const STAGES=['DEMO시작','견적서발송','이용신청서발송','이용신청서계약','약정시작'];
  const STAGE_LBL={'DEMO시작':'DEMO 시작','견적서발송':'견적서','이용신청서발송':'이용신청서','이용신청서계약':'계약 체결','약정시작':'약정 시작'};
  const firstByStage={};STAGES.forEach(s=>firstByStage[s]={});
  (salesHistory||[]).forEach(r=>{const s=String(r.history_type||'').trim();if(STAGES.indexOf(s)<0)return;const d=String(r.history_date||'').slice(0,10);if(!/^\d{4}-\d{2}-\d{2}$/.test(d))return;const cid=String(r.cust_id||'').trim();if(!cid)return;const cur=firstByStage[s][cid];if(!cur||d<cur.date)firstByStage[s][cid]={date:d,hospital_name:r.hospital_name||cid,cust_id:cid};});
  function stageRows(stage,year,months){const out=[];Object.keys(firstByStage[stage]).forEach(cid=>{const v=firstByStage[stage][cid];const yy=Number(v.date.slice(0,4)),mm=Number(v.date.slice(5,7));if(yy!==year)return;if(months&&months.indexOf(mm)<0)return;out.push(v);});return out.sort((a,b)=>b.date.localeCompare(a.date));}
  function tgtSum(year,months){let d=0,c=0;(cts||[]).forEach(t=>{const ym=String(t.year_month||'');const yy=Number(ym.slice(0,4)),mm=Number(ym.slice(5,7));if(yy!==year)return;if(months&&months.indexOf(mm)<0)return;d+=Number(t.demo_target)||0;c+=Number(t.contract_target)||0;});return {demo:d,con:c};}
  function scopeMonths(){if(gran==='year')return null;if(gran==='half')return selHalf===1?[1,2,3,4,5,6]:selHalf===2?[7,8,9,10,11,12]:null;if(gran==='quarter')return selQ?[selQ*3-2,selQ*3-1,selQ*3]:null;if(gran==='month')return selMonth?[selMonth]:null;return null;}
  const scope=scopeMonths();
  const scopeLbl=(()=>{if(gran==='year')return selYear+'년';if(gran==='half')return selYear+'년 '+(selHalf===1?'상반기':selHalf===2?'하반기':'전체');if(gran==='quarter')return selYear+'년 '+(selQ?selQ+'분기':'전체');return selYear+'년 '+(selMonth?selMonth+'월':'전체');})();
  // ── 계약 도달: 고객별 첫 계약일 (이용신청서계약 or 약정시작 중 이른 것) ──
  const contractByCust={};
  (salesHistory||[]).forEach(r=>{const s=String(r.history_type||'').trim();if(s!=='이용신청서계약'&&s!=='약정시작')return;const d=String(r.history_date||'').slice(0,10);if(!/^\d{4}-\d{2}-\d{2}$/.test(d))return;const cid=String(r.cust_id||'').trim();if(!cid)return;if(!contractByCust[cid]||d<contractByCust[cid])contractByCust[cid]=d;});
  // ── 병원명 맵 (demos엔 병원명이 없어 sales_history에서 매핑) ──
  const hospByCust={};(customers||[]).forEach(c=>{const cid=String(c.cust_id||'').trim();if(cid&&c.hospital_name)hospByCust[cid]=c.hospital_name;});(salesHistory||[]).forEach(r=>{const cid=String(r.cust_id||'').trim();if(cid&&r.hospital_name&&!hospByCust[cid])hospByCust[cid]=r.hospital_name;});
  // ── 데모 시작: 고객별 첫 데모 시작일 (제품 필터 적용) ──
  const demoByCust={};
  (demos||[]).forEach(dm=>{if(prodFilter!=='ALL'&&dm.product!==prodFilter)return;const cid=String(dm.cust_id||'').trim();if(!cid)return;const d=String(dm.demo_start||'').slice(0,10);if(!/^\d{4}-\d{2}-\d{2}$/.test(d))return;if(!demoByCust[cid]||d<demoByCust[cid])demoByCust[cid]=d;});
  const demoEndByCust={};
  (demos||[]).forEach(dm=>{if(prodFilter!=='ALL'&&dm.product!==prodFilter)return;const cid=String(dm.cust_id||'').trim();if(!cid)return;const e=String(dm.demo_end||'').slice(0,10);if(!/^\d{4}-\d{2}-\d{2}$/.test(e))return;if(!demoEndByCust[cid]||e>demoEndByCust[cid])demoEndByCust[cid]=e;});
  function demoCohortRows(year,months){const out=[];Object.keys(demoByCust).forEach(cid=>{const d=demoByCust[cid];const yy=Number(d.slice(0,4)),mm=Number(d.slice(5,7));if(yy!==year)return;if(months&&months.indexOf(mm)<0)return;out.push({cust_id:cid,date:d,hospital_name:hospByCust[cid]||cid});});return out.sort((a,b)=>b.date.localeCompare(a.date));}
  function contractRows(year,months){const out=[];Object.keys(contractByCust).forEach(cid=>{const d=contractByCust[cid];const yy=Number(d.slice(0,4)),mm=Number(d.slice(5,7));if(yy!==year)return;if(months&&months.indexOf(mm)<0)return;out.push({cust_id:cid,date:d,hospital_name:hospByCust[cid]||cid});});return out.sort((a,b)=>b.date.localeCompare(a.date));}

  const demoRows=demoCohortRows(selYear,scope);   // 코호트: 선택 기간에 데모 시작한 고객
  const conRows=contractRows(selYear,scope);      // 선택 기간에 계약한 고객
  const t=tgtSum(selYear,scope);
  const demoAct=demoRows.length,conAct=conRows.length;
  const demoAch=t.demo?Math.round(demoAct/t.demo*100):0;
  const conAch=t.con?Math.round(conAct/t.con*100):0;
  // ── 코호트 전환: 코호트 고객 중 (연도 무관) 계약 도달한 고객 ──
  const cohortConverted=demoRows.filter(r=>contractByCust[r.cust_id]);
  const finalConv=demoRows.length?Math.round(cohortConverted.length/demoRows.length*100):0;
  // ── 퍼널(코호트 고정): 코호트가 각 단계에 도달한 수 (모두 코호트의 부분집합 → 100% 안 넘음) ──
  const funnel=[
    {stage:'DEMO시작',rows:demoRows},
    {stage:'견적서발송',rows:demoRows.filter(r=>firstByStage['견적서발송'][r.cust_id])},
    {stage:'이용신청서발송',rows:demoRows.filter(r=>firstByStage['이용신청서발송'][r.cust_id])},
    {stage:'이용신청서계약',rows:demoRows.filter(r=>firstByStage['이용신청서계약'][r.cust_id])},
    {stage:'약정시작',rows:demoRows.filter(r=>firstByStage['약정시작'][r.cust_id])},
  ];
  function buckets(){if(gran==='year'){const ys=[selYear-3,selYear-2,selYear-1,selYear];return ys.map(y=>({label:String(y),year:y,months:null}));}if(gran==='half')return [{label:'상반기',year:selYear,months:[1,2,3,4,5,6]},{label:'하반기',year:selYear,months:[7,8,9,10,11,12]}];if(gran==='quarter')return [1,2,3,4].map(q=>({label:'Q'+q,year:selYear,months:[q*3-2,q*3-1,q*3]}));return Array.from({length:12},(_,i)=>({label:(i+1)+'월',year:selYear,months:[i+1]}));}
  const bks=buckets();
  const axC='rgba(255,255,255,0.5)',gridC='rgba(255,255,255,0.05)';
  const demoCfg={data:{labels:bks.map(b=>b.label),datasets:[{type:'bar',label:'데모 실적',data:bks.map(b=>demoCohortRows(b.year,b.months).length),backgroundColor:'#2563EB',borderRadius:3,order:2},{type:'line',label:'데모 목표',data:bks.map(b=>tgtSum(b.year,b.months).demo),borderColor:'#93c5fd',borderWidth:2,borderDash:[5,4],pointRadius:0,fill:false,tension:0,order:1}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{autoSkip:false,font:{size:9},color:axC},grid:{display:false}},y:{beginAtZero:true,ticks:{precision:0,color:axC},grid:{color:gridC}}}}};
  const conCfg={data:{labels:bks.map(b=>b.label),datasets:[{type:'bar',label:'계약 실적',data:bks.map(b=>contractRows(b.year,b.months).length),backgroundColor:'#22C55E',borderRadius:3,order:2},{type:'line',label:'계약 목표',data:bks.map(b=>tgtSum(b.year,b.months).con),borderColor:'#86efac',borderWidth:2,borderDash:[5,4],pointRadius:0,fill:false,tension:0,order:1}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{autoSkip:false,font:{size:9},color:axC},grid:{display:false}},y:{beginAtZero:true,ticks:{precision:0,color:axC},grid:{color:gridC}}}}};
  // ── 평균 전환 소요일 (코호트 기준: 데모 시작 → 계약) ──
  const convDays=[];cohortConverted.forEach(r=>{const cd=contractByCust[r.cust_id];const diff=Math.round((new Date(cd)-new Date(r.date))/86400000);if(diff>=0)convDays.push(diff);});

        {!ctrl&&<React.Fragment>

    {drill&&<div style={{marginTop:12,border:'0.5px solid var(--border)',borderRadius:10,overflow:'hidden'}}><div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 11px',background:'rgba(37,99,235,0.12)',borderBottom:'0.5px solid var(--border)'}}><span style={{fontSize:11,fontWeight:600,color:'#85B7EB'}}>{drill.label}</span><span style={{fontSize:10,color:'var(--text-3)'}}>{drill.rows.length}건</span><button onClick={()=>setDrill(null)} style={{marginLeft:'auto',fontSize:10,padding:'3px 8px',background:'rgba(255,255,255,0.06)',border:'none',borderRadius:6,color:'var(--text-2)',cursor:'pointer'}}>✕ 닫기</button></div><div style={{maxHeight:200,overflowY:'auto'}}>{drill.rows.length===0?<div style={{fontSize:10,color:'var(--text-3)',textAlign:'center',padding:'16px 0'}}>해당 없음</div>:drill.rows.map((r,i)=>(<div key={i} onClick={()=>r.cust_id&&onOpenCust&&onOpenCust(r.cust_id)} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 11px',borderBottom:'0.5px solid var(--border)',cursor:'pointer'}}><span style={{fontSize:11,fontWeight:600,color:'#60a5fa'}}>{r.hospital_name}</span><span style={{fontSize:9,color:'var(--text-3)'}}>{r.cust_id}</span><span style={{marginLeft:'auto',fontSize:9,color:'var(--text-2)'}}>{r.date}</span></div>))}</div></div>}

      </div>
      <div style={{maxHeight:200,overflowY:'auto',border:'0.5px solid var(--border)',borderRadius:8}}>{notFiltered.length===0?<div style={{fontSize:10,color:'var(--text-3)',textAlign:'center',padding:'16px 0'}}>미전환 고객 없음</div>:notFiltered.map((x,i)=>(<div key={i} onClick={()=>x.cust_id&&onOpenCust&&onOpenCust(x.cust_id)} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 11px',borderBottom:'0.5px solid rgba(255,255,255,0.05)',cursor:'pointer'}}><span style={{fontSize:11,fontWeight:600,color:'#60a5fa',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{x.hospital_name}</span><span style={{fontSize:9,color:'var(--text-3)'}}>{x.date}</span><span style={{fontSize:10,fontWeight:700,color:x.diffDays>90?'#f87171':x.diffDays>30?'#fb923c':'#fbbf24',flexShrink:0}}>+{x.diffDays}일</span></div>))}</div>

  </div>);

// 매출 현황 선형차트 (목표=점선, 실적=실선) + 월별 주문건수 선형차트
function DashRevCharts({labels,revVals,tgtVals,ordVals}){
  const revRef=useRef(null);const cntRef=useRef(null);const revInst=useRef(null);const cntInst=useRef(null);
  useEffect(()=>{
    if(!window.Chart||!revRef.current||!cntRef.current)return;
    if(revInst.current)revInst.current.destroy();
    if(cntInst.current)cntInst.current.destroy();
    const commonScales={x:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'rgba(255,255,255,0.7)',font:{size:10},maxRotation:0,autoSkip:false},border:{display:false}},y:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'rgba(255,255,255,0.45)',font:{size:10}},border:{display:false}}};
    const hasTarget=tgtVals.some(v=>v>0);
    // 월별 달성률 라벨 플러그인 (실적/목표, 실적 점 위에 표시)
    const achLabelPlugin={
      id:'achLabel',
      afterDatasetsDraw(chart){
        if(!hasTarget)return;
        const ctx=chart.ctx;
        const meta=chart.getDatasetMeta(0); // 실적 데이터셋
        if(!meta||!meta.data)return;
        ctx.save();
        ctx.font='700 10px -apple-system,sans-serif';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        meta.data.forEach((pt,i)=>{
          const tgt=Number(tgtVals[i]||0);const act=Number(revVals[i]||0);
          if(tgt<=0)return; // 목표 없으면 생략
          const rate=Math.round(act/tgt*100);
          const ok=rate>=100;
          const color=ok?'#4ade80':'#f87171';
          const tri=ok?'▲':'▼';
          const y=pt.y-13; // 점보다 충분히 위로 띄워 선 겹침 방지
          // 삼각형 + 퍼센트를 한 덩어리로 중앙정렬
          const txt=tri+' '+rate+'%';
          // 가독성: 어두운 반투명 배경 박스
          const w=ctx.measureText(txt).width;
          ctx.fillStyle='rgba(22,32,50,0.78)';
          ctx.fillRect(pt.x-w/2-4,y-8,w+8,16);
          ctx.fillStyle=color;
          ctx.fillText(txt,pt.x,y);
        });
        ctx.restore();
      }
    };
    const datasets=[{label:'실적',data:revVals,borderColor:'#4ade80',borderWidth:2.5,backgroundColor:(ctx)=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,150);g.addColorStop(0,'rgba(74,222,128,0.35)');g.addColorStop(1,'rgba(74,222,128,0.02)');return g;},fill:true,tension:0.3,pointBackgroundColor:'#4ade80',pointRadius:3}];
    if(hasTarget)datasets.push({label:'목표',data:tgtVals,borderColor:'#fbbf24',borderWidth:2,borderDash:[6,4],fill:false,tension:0.3,pointBackgroundColor:'#fbbf24',pointRadius:2.5});
    revInst.current=new window.Chart(revRef.current,{type:'line',data:{labels,datasets},plugins:[achLabelPlugin],options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:20}},plugins:{legend:{display:true,position:'top',align:'end',labels:{color:'rgba(255,255,255,0.7)',font:{size:10},boxWidth:18,padding:8}},tooltip:{callbacks:{label:ctx=>{const base=ctx.dataset.label+': ₩'+Number(ctx.raw).toLocaleString();if(ctx.dataset.label==='실적'){const tgt=Number(tgtVals[ctx.dataIndex]||0);if(tgt>0)return base+' (달성률 '+Math.round(Number(ctx.raw)/tgt*100)+'%)';}return base;}}}},scales:{...commonScales,y:{...commonScales.y,ticks:{...commonScales.y.ticks,callback:v=>v>=100000000?(v/100000000).toFixed(1)+'억':v>=10000?Math.round(v/10000)+'만':v,maxTicksLimit:5}}}}});
    cntInst.current=new window.Chart(cntRef.current,{type:'line',data:{labels,datasets:[{data:ordVals,borderColor:'#60a5fa',borderWidth:2.5,backgroundColor:(ctx)=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,90);g.addColorStop(0,'rgba(96,165,250,0.3)');g.addColorStop(1,'rgba(96,165,250,0.02)');return g;},fill:true,tension:0.3,pointBackgroundColor:'#60a5fa',pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.raw+'건'}}},scales:commonScales}});
    return()=>{if(revInst.current)revInst.current.destroy();if(cntInst.current)cntInst.current.destroy();};
  },[labels.join(),revVals.join(),tgtVals.join(),ordVals.join()]);
  return(<div>
    <div style={{position:'relative',width:'100%',height:160}}><canvas ref={revRef}/></div>
    <div style={{height:'0.5px',background:'rgba(255,255,255,0.08)',margin:'10px 0'}}/>
    <div style={{fontSize:10,fontWeight:700,color:'rgba(255,255,255,0.7)',marginBottom:6}}>월별 주문건수</div>
    <div style={{position:'relative',width:'100%',height:90}}><canvas ref={cntRef}/></div>
  </div>);
}

// 매출 목표 설정 모달 (연간 균등분배 + 월별 개별입력)
function TargetModal({targets,onClose,onSaved}){
  const curYear=new Date().getFullYear();
  const [year,setYear]=useState(curYear);
  const [annual,setAnnual]=useState('');
  const [vals,setVals]=useState(()=>{const o={};for(let m=1;m<=12;m++){const ym=year+'-'+String(m).padStart(2,'0');o[m]=targets[ym]||'';}return o;});
  const [sv,setSv]=useState(false);

  function loadYear(y){setYear(y);const o={};for(let m=1;m<=12;m++){const ym=y+'-'+String(m).padStart(2,'0');o[m]=targets[ym]||'';}setVals(o);setAnnual('');}
  function applyAnnual(){
    const total=Number(annual);if(!total||total<=0){alert('연간 목표 금액을 입력하세요.');return;}
    const per=Math.round(total/12);const o={};for(let m=1;m<=12;m++)o[m]=per;setVals(o);
  }
  const sum=Object.values(vals).reduce((s,v)=>s+Number(v||0),0);
  async function save(){
    setSv(true);
    try{
      const rows=[];for(let m=1;m<=12;m++){const ym=year+'-'+String(m).padStart(2,'0');rows.push({year_month:ym,target_amount:Number(vals[m]||0),updated_at:new Date().toISOString()});}
      const {error}=await sb.from('revenue_targets').upsert(rows,{onConflict:'year_month'});if(error)throw error;
      setSv(false);alert(year+'년 목표가 저장되었습니다.');onSaved();
    }catch(e){alert('오류: '+(e.message||e));setSv(false);}
  }
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:20}}>
      <div style={{background:'#1a2738',border:'0.5px solid var(--border-md)',borderRadius:14,width:'100%',maxWidth:560,maxHeight:'92vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 16px',borderBottom:'0.5px solid var(--border)'}}>
          <div style={{fontSize:13,fontWeight:700,display:'flex',alignItems:'center',gap:7}}>🎯 매출 목표 설정</div>
          <button onClick={onClose} style={{cursor:'pointer',fontSize:18,color:'var(--text-2)',border:'none',background:'none'}}>✕</button>
        </div>
        <div style={{padding:16,overflowY:'auto',flex:1,display:'flex',flexDirection:'column',gap:12}}>
          {/* 연도 선택 */}
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:11,color:'var(--text-2)',fontWeight:600}}>연도</span>
            <select value={year} onChange={e=>loadYear(Number(e.target.value))} style={{width:120}}>
              {Array.from({length:curYear-2024+2},(_,i)=>2024+i).map(y=><option key={y} value={y}>{y}년</option>)}
            </select>
          </div>
          {/* 연간 목표 → 균등분배 */}
          <div style={{background:'rgba(74,222,128,0.08)',border:'0.5px solid rgba(74,222,128,0.3)',borderRadius:8,padding:'11px 13px'}}>

        </div>

    </div>
  );
}
function toDate(v){if(!v)return null;const d=new Date(v);return isNaN(d)?null:d;}
function dateToYM(v){
  if(!v)return '';
  const s=String(v);
  if(s.length>=7&&s[4]==='-')return s.slice(0,7);
  const d=new Date(s);
  if(!isNaN(d))return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  return '';
}
function pad2(n){return n<10?'0'+n:String(n);}
function mean(arr){if(!arr.length)return 0;return arr.reduce((s,v)=>s+v,0)/arr.length;}
function stddev(arr,avg){if(arr.length<2)return 0;const v=arr.reduce((s,x)=>s+Math.pow(x-avg,2),0)/arr.length;return Math.sqrt(v);}

// ════════════════════════════════════════════
//  데이터 가공: V1 getUsageStats_ 로직 그대로
// ════════════════════════════════════════════
function buildUsageStats(usageRows,customers,vocRows){
  var map={BA:{},OA:{}};
  usageRows.forEach(function(row){
    var ym=String(row.year_month||'').trim();
    var hosp=String(row.hospital_name||'').trim();
    var custId=String(row.cust_id||'').trim();
    var prod=String(row.product||'').trim().toUpperCase();
    var cnt=Number(row.cnt||0);
    if(!ym||!hosp||!cnt)return;
    if(prod!=='BA'&&prod!=='OA')return;
    if(!map[prod][hosp])map[prod][hosp]={custId:custId,months:{}};
    map[prod][hosp].months[ym]=(map[prod][hosp].months[ym]||0)+cnt;
  });
  var allYms=[];
  ['BA','OA'].forEach(function(p){Object.keys(map[p]).forEach(function(h){Object.keys(map[p][h].months).forEach(function(ym){allYms.push(ym);});});});
  if(allYms.length===0)return {ba:{hospitals:[],summary:{}},oa:{hospitals:[],summary:{}},latestYm:''};
  allYms.sort();
  var latestYm=allYms[allYms.length-1];
  var yr=parseInt(latestYm.slice(0,4));var mo=parseInt(latestYm.slice(4,6));
  function recentMonths(n){var r=[];for(var i=0;i<n;i++){var m=mo-i;var y=yr;while(m<=0){m+=12;y--;}r.unshift(y+pad2(m));}return r;}

  var planMap={},custIdMap={},typeMap={};
  customers.forEach(function(c){
    var nm=String(c.hospital_name||'').trim();
    if(nm){planMap[nm]=String(c.plan||'').trim();if(!custIdMap[nm])custIdMap[nm]=String(c.cust_id||'').trim();}
  });
  var custById={};
  customers.forEach(function(c){custById[String(c.cust_id||'').trim()]=c;});

  // CS 알림 (고객ID 기준, 최근 3개월 미해결/불만)
  var csAlertMap={};
  var now=new Date();var threeMonAgo=new Date(now.getFullYear(),now.getMonth()-3,1);
  vocRows.forEach(function(r){
    var cid=String(r.cust_id||'').trim();
    var done=String(r.done||'').trim();
    var rt=String(r.receipt_type||'').trim();
    var d=new Date(String(r.received_at||''));
    if(!cid||isNaN(d.getTime())||d<threeMonAgo)return;
    if(done!=='Y'||rt==='불만'){
      if(!csAlertMap[cid])csAlertMap[cid]={count:0,hasBad:false};
      csAlertMap[cid].count++;
      if(rt==='불만')csAlertMap[cid].hasBad=true;
    }
  });

  function normHospType(rawType){
    if(!rawType||rawType==='미확인')return '미확인';
    var t=rawType;
    if(t.indexOf('소아청소년과')>=0||t.indexOf('아동병원')>=0||t==='소아과'||t.indexOf('소아정형')>=0)return '소아청소년과';
    if(t.indexOf('정형외과')>=0||t==='정형회과')return '정형외과';
    if(t.indexOf('치과')>=0)return '치과';
    if(t.indexOf('대학병원')>=0||t.indexOf('종합병원')>=0)return '종합·대학병원';
    if(t.indexOf('한의원')>=0||t.indexOf('한방')>=0)return '한방';
    return '기타의원';
  }

  function analyzeProduct(prodMap){
    var hospitals=[];
    var summary={안정형:0,변동형:0,성장형:0,불규칙:0,비활성:0,피크대비소멸:0};
    var recent12=recentMonths(12);var recent6=recentMonths(6);
    Object.keys(prodMap).forEach(function(hosp){
      var h=prodMap[hosp];
      var resolvedCustId=h.custId||custIdMap[hosp]||'';
      var masterHospName=hosp;
      var fc=resolvedCustId?custById[resolvedCustId]:null;
      if(fc)masterHospName=String(fc.hospital_name||'').trim();
      var plan=planMap[masterHospName]||planMap[hosp]||'';
      var csAlert=(resolvedCustId&&csAlertMap[resolvedCustId])||null;

      var allMonths=Object.keys(h.months).sort();
      var monthData=allMonths.map(function(ym){return {ym:ym,count:h.months[ym]||0};});
      var counts12=recent12.map(function(ym){return h.months[ym]||0;});
      var counts6=recent6.map(function(ym){return h.months[ym]||0;});
      var nonZero12=counts12.filter(function(v){return v>0;});
      var nonZero6=counts6.filter(function(v){return v>0;});
      var allCountsArr=Object.keys(h.months).sort().map(function(ym){return h.months[ym]||0;});
      var nonZeroAll=allCountsArr.filter(function(v){return v>0;});
      var latestCount=h.months[latestYm]||0;
      var avg12=mean(counts12);
      var avg6Val=mean(nonZero6.length>0?counts6:counts12);
      var sdBase=nonZeroAll.length>=3?nonZeroAll:(nonZero12.length>=2?nonZero12:counts12);
      var sd=stddev(sdBase,mean(sdBase));
      var upper=avg6Val+1.5*sd;var lower=Math.max(0,avg6Val-1.5*sd);
      var activeRatio=counts12.filter(function(v){return v>0;}).length/12;
      var firstHalf=recent12.slice(0,6).map(function(ym){return h.months[ym]||0;});
      var secondHalf=recent12.slice(6).map(function(ym){return h.months[ym]||0;});
      var firstAvg=mean(firstHalf);var secondAvg=mean(secondHalf);
      var growthRate=firstAvg>0?(secondAvg-firstAvg)/firstAvg*100:0;
      var cvAvg=mean(nonZero12.length>0?nonZero12:[0]);
      var cv=cvAvg>0?sd/cvAvg:0;
      var allAvg=mean(allCountsArr);

      var type='불규칙';
      if(nonZero6.length===0)type='비활성';
      else if(allAvg>=50&&latestCount>0&&latestCount<allAvg*0.2)type='피크대비소멸';
      else if(growthRate>70)type='성장형';
      else if(activeRatio>=0.5&&cv<=0.6)type='안정형';
      else if(activeRatio>=0.5&&cv>0.6)type='변동형';
      else type='불규칙';
      summary[type]=(summary[type]||0)+1;

      var alert=null;
      if(latestCount>upper&&upper>0)alert='up';
      else if(latestCount<lower&&latestCount>0&&avg6Val>10)alert='down';

      var movingAvgData=recent12.map(function(ym,i){
        var win=recent12.slice(Math.max(0,i-5),i+1).map(function(m){return h.months[m]||0;});
        var wAvg=mean(win);var wSd=stddev(win,wAvg);
        return {ym:ym,avg:Math.round(wAvg),upper:Math.round(wAvg+1.5*wSd),lower:Math.round(Math.max(0,wAvg-1.5*wSd)),count:h.months[ym]||0};
      });

      // 분기 변화율
      var curQ=[],prevQ=[];
      for(var qi=0;qi<3;qi++){var m=mo-qi,y=yr;while(m<=0){m+=12;y--;}curQ.push(y+pad2(m));}
      for(var qi2=3;qi2<6;qi2++){var m2=mo-qi2,y2=yr;while(m2<=0){m2+=12;y2--;}prevQ.push(y2+pad2(m2));}
      var curQSum=curQ.reduce(function(s,m){return s+(h.months[m]||0);},0);
      var prevQSum=prevQ.reduce(function(s,m){return s+(h.months[m]||0);},0);
      var qChangeRate=prevQSum>0?(curQSum-prevQSum)/prevQSum*100:null;
      var isQDown=qChangeRate!==null&&qChangeRate<=-10;
      var isQUp=qChangeRate!==null&&qChangeRate>=10;
      var lowPlans=['P10','P20','P50','P100','M100','M200'];
      var isLowPlan=lowPlans.some(function(p){return plan.indexOf(p)>=0;});
      var recent3=[];for(var ri=0;ri<3;ri++){var rm=mo-ri,ry=yr;while(rm<=0){rm+=12;ry--;}recent3.push(ry+pad2(rm));}
      var recent3Sum=recent3.reduce(function(s,m){return s+(h.months[m]||0);},0);
      var isRecentInactive=recent3Sum===0&&avg12>0;

      var actionGroup='모니터링';
      if(isRecentInactive)actionGroup='재활성화';
      else if(isQDown&&(csAlert||type==='피크대비소멸'))actionGroup='즉시대응';
      else if(isQUp&&isLowPlan)actionGroup='업셀링';
      else if(isQDown)actionGroup='모니터링';
      else actionGroup='유지관찰';

      hospitals.push({
        hospName:hosp,custId:resolvedCustId,plan:plan,type:type,actionGroup:actionGroup,
        hospType:normHospType(fc?String(fc.hospital_type||'미확인').trim():'미확인'),
        latestCount:latestCount,avg6:Math.round(avg6Val),avg12:Math.round(avg12),
        upperBand:Math.round(upper),lowerBand:Math.round(lower),
        qChangeRate:qChangeRate!==null?Math.round(qChangeRate):null,
        alert:alert,csAlert:csAlert,movingAvgData:movingAvgData
      });
    });
    hospitals.sort(function(a,b){if(a.alert&&!b.alert)return -1;if(!a.alert&&b.alert)return 1;return b.latestCount-a.latestCount;});
    return {hospitals:hospitals,summary:summary};
  }
  return {ba:analyzeProduct(map.BA),oa:analyzeProduct(map.OA),latestYm:latestYm};
}

// ════════════════════════════════════════════
//  요금제 업셀링: V1 getPlanUsageStats_ 로직
// ════════════════════════════════════════════
function buildPlanUsageStats(usageRows,customers){
  var activeCusts=customers.filter(function(c){var st=String(c.contract_status||'').trim();return st==='활성'||st==='계약';});
  function parseLimit(plan){if(!plan)return null;var p=String(plan);if(p.indexOf('년')>=0)return null;var m=p.match(/[PM](\d+)/i);if(m)return parseInt(m[1]);var n=p.match(/^(\d+)$/);if(n)return parseInt(n[1]);return null;}
  var now=new Date();var yr=now.getFullYear();var mo=now.getMonth()+1;
  var recent6=[];for(var i=0;i<6;i++){var m2=mo-i,y2=yr;while(m2<=0){m2+=12;y2--;}recent6.push(y2+pad2(m2));}
  var latestYm=recent6[0];
  var usageMap={};
  usageRows.forEach(function(row){
    var ym=String(row.year_month||'').trim();var custId=String(row.cust_id||'').trim();
    var prod=String(row.product||'').trim().toUpperCase();var cnt=Number(row.cnt||0);
    if(!custId||prod!=='BA'||!cnt)return;
    if(!usageMap[custId])usageMap[custId]={};
    usageMap[custId][ym]=(usageMap[custId][ym]||0)+cnt;
  });
  function calcTrend(vals){var n=vals.length;if(n<2)return 0;var sx=0,sy=0,sxy=0,sx2=0;vals.forEach(function(v,i){sx+=i;sy+=v;sxy+=i*v;sx2+=i*i;});var d=n*sx2-sx*sx;if(d===0)return 0;return (n*sxy-sx*sy)/d;}
  var hospitals=[];var planSummary={};var planOrder=['P10','P20','P50','P100','P200','P300','P500','P1000'];
  activeCusts.forEach(function(c){
    var custId=String(c.cust_id||'').trim();var hospName=String(c.hospital_name||'').trim();
    var plan=String(c.plan||'').trim();var limit=parseLimit(plan);
    if(!custId||!plan||!limit)return;
    var months=usageMap[custId]||{};
    var vals6=recent6.slice().reverse().map(function(ym){return months[ym]||0;});
    var vals3=vals6.slice(3);var avg3=Math.round(vals3.reduce(function(s,v){return s+v;},0)/3);
    var latestCnt=months[latestYm]||0;var usagePct=limit>0?Math.round(avg3/limit*100):0;
    var trend=calcTrend(vals6);var nonZeroCnt=vals6.filter(function(v){return v>0;}).length;
    var curIdx=planOrder.indexOf(plan);var nextPlan=curIdx>=0&&curIdx<planOrder.length-1?planOrder[curIdx+1]:null;
    var vals3prev=vals6.slice(0,3);var avg3prev=Math.round(vals3prev.reduce(function(s,v){return s+v;},0)/3);
    var growthVs3=avg3prev>0?Math.round((avg3-avg3prev)/avg3prev*100):null;
    var status='적정';var statusDetail='';var upsellTier=null;
    if(nonZeroCnt===0){status='비활성';statusDetail='6개월 미사용';}
    else if(usagePct>100){status='업셀링';upsellTier=1;statusDetail='한도 초과 '+usagePct+'%';}
    else if(usagePct>=80){status='업셀링';upsellTier=1;statusDetail='한도 임박 '+usagePct+'%';}
    else if(growthVs3!==null&&growthVs3>=20&&usagePct>=40){status='업셀링';upsellTier=2;statusDetail='3개월 성장 +'+growthVs3+'%';}
    else if(nonZeroCnt>=5&&usagePct>=50){status='업셀링';upsellTier=3;statusDetail='꾸준한 사용 '+usagePct+'%';}
    else if(trend<-1&&usagePct<50){status='관리필요';statusDetail='감소 추세';}
    else if(usagePct<20&&nonZeroCnt<=3){status='관리필요';statusDetail='저활용';}
    hospitals.push({custId:custId,hospName:hospName,plan:plan,limit:limit,avg3:avg3,latestCnt:latestCnt,usagePct:usagePct,trend:Math.round(trend*10)/10,growthVs3:growthVs3,status:status,statusDetail:statusDetail,upsellTier:upsellTier,nextPlan:nextPlan});
    if(!planSummary[plan])planSummary[plan]={plan:plan,limit:limit,total:0,over:0,upsell:0,manage:0,inactive:0,ok:0,avgSum:0};
    planSummary[plan].total++;planSummary[plan].avgSum+=avg3;
    if(status==='업셀링')planSummary[plan].upsell++;
    else if(status==='관리필요')planSummary[plan].manage++;
    else if(status==='비활성')planSummary[plan].inactive++;
    else planSummary[plan].ok++;
  });
  var planList=Object.keys(planSummary).map(function(kk){return planSummary[kk];});
  planList.forEach(function(p){p.avg=p.total>0?Math.round(p.avgSum/p.total):0;p.avgPct=p.limit>0?Math.round(p.avg/p.limit*100):0;delete p.avgSum;});
  planList.sort(function(a,b){return planOrder.indexOf(a.plan)-planOrder.indexOf(b.plan);});
  var upsellList=hospitals.filter(function(h){return h.status==='업셀링';}).sort(function(a,b){if(a.upsellTier!==b.upsellTier)return a.upsellTier-b.upsellTier;return b.usagePct-a.usagePct;}).slice(0,20);
  var manageList=hospitals.filter(function(h){return h.status==='관리필요';}).sort(function(a,b){return a.trend-b.trend;}).slice(0,20);
  var inactiveList=hospitals.filter(function(h){return h.status==='비활성';}).slice(0,20);
  var kpi={total:hospitals.length,over:hospitals.filter(function(h){return h.usagePct>100;}).length,upsell:hospitals.filter(function(h){return h.status==='업셀링';}).length,manage:hospitals.filter(function(h){return h.status==='관리필요';}).length,inactive:hospitals.filter(function(h){return h.status==='비활성';}).length,ok:hospitals.filter(function(h){return h.status==='적정';}).length};
  return {kpi:kpi,planList:planList,upsellList:upsellList,manageList:manageList,inactiveList:inactiveList,latestYm:latestYm};
}

  function buildCycleRows(){

      else if(r.type==='이용신청서발송'||r.type==='거래명세서발송')g.send=r;
      else if(r.type==='이용신청서계약')g.sign=r;
      else if(r.type==='약정시작')g.start=r;
      if(r.date&&r.date>g.latestDate)g.latestDate=r.date;
    });
    const sortedCycles=Object.values(cycleGroups).sort((a,b)=>(b.latestDate||'').localeCompare(a.latestDate||''));
    const benefits=hisBtOrds.filter(o=>(o._product||'BA')===prod).map(o=>({orderId:o['주문ID']||'',isManual:String(o['주문ID']||'').indexOf('BENEFIT-')===0,date:fmtDate(o['추천혜택 지급일'])||'',count:o['추천혜택 건수']||'',_used:false})).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    const isWithin30=(d1,d2)=>{if(!d1||!d2)return false;const t1=new Date(d1).getTime(),t2=new Date(d2).getTime();if(isNaN(t1)||isNaN(t2))return false;return Math.abs(t1-t2)/86400000<=7;};
    const cycleRows=sortedCycles.map((g,i)=>{
      const s=g.start,q=g.quote,sn=g.send,sg=g.sign;
      const sendDisplay=sn?(sn.type==='거래명세서발송'?'거래명세서':sn.date||'-'):'-';
      const startDate=s?.date||'';

      if(startDate){const cands=benefits.filter(b=>!b._used&&b.date&&isWithin30(startDate,b.date));if(cands.length>0){cands.sort((a,b)=>{const aA=new Date(a.date)>=new Date(startDate)?0:1;const bA=new Date(b.date)>=new Date(startDate)?0:1;if(aA!==bA)return aA-bA;return Math.abs(new Date(a.date)-new Date(startDate))-Math.abs(new Date(b.date)-new Date(startDate));});matchedBenefit=cands[0];const ui=benefits.findIndex(b=>b.orderId===matchedBenefit.orderId);if(ui>=0)benefits[ui]._used=true;}}
      return{quote:q?.date||'-',send:sendDisplay,sign:sg?.date||'-',plan:s?.plan||'-',start:startDate||'-',benefit:matchedBenefit,_orphan:false,_cycleId:g.cycleId,_latest:g.latestDate||'',_s:s,_q:q,_sn:sn,_sg:sg};

  function genHistoryId(yearStr,offset){
    let maxNum=0;
    hisRaw.forEach(h=>{const m=String(h.history_id||'').match(/HIS-\d+-(\d+)/);if(m){const n=parseInt(m[1]);if(n>maxNum)maxNum=n;}});
    return 'HIS-'+yearStr+'-'+String(maxNum+1+offset).padStart(5,'0');
  }
  function genCycleId(offset){
    let maxNum=0;
    const pat=new RegExp('^CYCLE-'+id.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'-(\\d+)$');
    hisRaw.forEach(h=>{const m=String(h.cycle_id||'').match(pat);if(m){const n=parseInt(m[1]);if(n>maxNum)maxNum=n;}});
    return 'CYCLE-'+id+'-'+String(maxNum+1+offset).padStart(3,'0');
  }

        const sendType=isStatement?'거래명세서발송':'이용신청서발송';

        if(row._q)updates.push({historyId:row._q._historyId,type:'견적서발송',date:qv,plan:''});
        else if(qv&&cyc){inserts.push({history_id:newHisId(insOffset++),cust_id:id,hospital_name:c['병원명']||'',history_type:'견적서발송',history_date:qv||null,plan:'',cycle_id:cyc});}
        if(row._sn)updates.push({historyId:row._sn._historyId,type:sendType,date:isStatement?null:snv,plan:''});
        else if(snv&&cyc){inserts.push({history_id:newHisId(insOffset++),cust_id:id,hospital_name:c['병원명']||'',history_type:sendType,history_date:isStatement?null:(snv||null),plan:'',cycle_id:cyc});}
        if(row._sg)updates.push({historyId:row._sg._historyId,type:'이용신청서계약',date:sgv,plan:''});
        else if(sgv&&cyc){inserts.push({history_id:newHisId(insOffset++),cust_id:id,hospital_name:c['병원명']||'',history_type:'이용신청서계약',history_date:sgv||null,plan:'',cycle_id:cyc});}
      }
      addRows.filter(nr=>nr.quote||nr.send||nr.sign||nr.start||nr.plan).forEach(nr=>{

        const isStatement=sendVal&&/^[^0-9-]/.test(sendVal);
        const sendType=isStatement?'거래명세서발송':'이용신청서발송';
        const thisCyc='CYCLE-'+id+'-'+String((()=>{let mx=0;const pat=new RegExp('^CYCLE-'+id.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'-(\\d+)$');hisRaw.concat(inserts.map(x=>({cycle_id:x.cycle_id}))).forEach(h=>{const m=String(h.cycle_id||'').match(pat);if(m){const n=parseInt(m[1]);if(n>mx)mx=n;}});return mx+1;})()).padStart(3,'0');
        if(nr.quote)inserts.push({history_id:newHisId(insOffset++),cust_id:id,hospital_name:c['병원명']||'',history_type:'견적서발송',history_date:nr.quote||null,plan:'',cycle_id:thisCyc});

      for(const u of updates){

// 수기 추천혜택 모달 (2026-06-01 이전 과거데이터 보정용)
function ManualBenefitModal({data,onClose,onSave}){
  const [benefitDate,setBenefitDate]=useState(data.benefitDate||'');
  const [benefitCount,setBenefitCount]=useState(data.benefitCount||'');
  const [sv,setSv]=useState(false);
  const MAX_DATE='2026-05-31';
  async function doSave(){
    if(!benefitDate){alert('지급일을 입력하세요.');return;}
    if(!benefitCount||Number(benefitCount)<=0){alert('건수를 입력하세요.');return;}
    if(new Date(benefitDate)>=new Date('2026-06-01')){alert('2026-06-01 이후 날짜는 주문접수에서 등록해주세요.');return;}
    setSv(true);
    await onSave(data.mode,data.orderId,benefitDate,Number(benefitCount));
    setSv(false);
  }
  return(
    <div className="ov">
      <div className="mo" style={{maxWidth:440}}>
        <div className="mh"><div className="mt">🎁 {data.mode==='add'?'수기 추천혜택 추가':'수기 추천혜택 수정'}</div><button className="xb" onClick={onClose}>✕</button></div>
        <div className="mb" style={{display:'flex',flexDirection:'column',gap:10}}>
          <div style={{background:'rgba(251,146,60,0.1)',border:'0.5px solid rgba(251,146,60,0.3)',borderRadius:8,padding:'10px 12px',fontSize:11}}>
            <div style={{fontWeight:700,color:'#fb923c',marginBottom:4,fontSize:12}}>ℹ️ 마이그레이션 전용 기능</div>
            <div style={{color:'var(--text-2)',lineHeight:1.6}}><strong style={{color:'var(--text)'}}>2026-06-01 이전</strong> 추천혜택 데이터만 수기 입력 가능합니다.<br/>이후 데이터는 주문접수에서 자동 연동됩니다.</div>
          </div>
          <div className="fi"><div className="fl">추천혜택 지급일 <span className="req">*</span></div><input type="date" value={benefitDate} max={MAX_DATE} onChange={e=>setBenefitDate(e.target.value)}/></div>
          <div className="fi"><div className="fl">추천혜택 건수 <span className="req">*</span></div><input type="number" min="1" value={benefitCount} onChange={e=>setBenefitCount(e.target.value)} placeholder="예: 5"/></div>
        </div>
        <div className="mf"><span style={{fontSize:10,color:'var(--text-2)'}}>주문접수대장에 BENEFIT 행으로 저장됩니다</span><div style={{display:'flex',gap:7}}><button className="btn" onClick={onClose}>취소</button><button className="btn btn-a" onClick={doSave} disabled={sv}>{sv?'저장 중...':(data.mode==='add'?'추가':'수정')}</button></div></div>
      </div>
    </div>
  );
}

            {[...Array(10)].map((_,i)=>[
              <div key={'sep'+i} style={{gridColumn:'1/-1',borderTop:'0.5px solid var(--border)',marginTop:i===0?4:8,paddingTop:4,fontSize:10,fontWeight:700,color:'var(--text-3)'}}>계정 {i+1}</div>,
              <div key={'n'+i} className="fi"><div className="fl">계정{i+1} 사용자명</div><input value={fm['계정'+(i+1)+' 사용자명']||''} onChange={e=>s('계정'+(i+1)+' 사용자명',e.target.value)}/></div>,
              <div key={'e'+i} className="fi"><div className="fl">계정{i+1} 이메일</div><input type="email" value={fm['계정'+(i+1)+' 이메일']||''} onChange={e=>s('계정'+(i+1)+' 이메일',e.target.value)}/></div>,
              <div key={'p'+i} className="fi full"><div className="fl">계정{i+1} 연락처</div><input value={fm['계정'+(i+1)+' 연락처']||''} onChange={e=>s('계정'+(i+1)+' 연락처',e.target.value)} placeholder="010-0000-0000" style={{width:'50%'}}/></div>
            ]).flat()}

          <div className="ah" onClick={()=>tog(8)}><div className="ahl">⑨ 홍보물 정보</div><span>{op[8]?'▴':'▾'}</span></div>
          {op[8]&&<div className="fg" style={{marginBottom:12}}><div className="fi"><div className="fl">우편번호</div><input value={fm.우편번호||''} onChange={e=>s('우편번호',e.target.value)}/></div><div className="fi full"><div className="fl">배송주소</div><input value={fm.배송주소||''} onChange={e=>s('배송주소',e.target.value)}/></div></div>}
          <div className="ah" onClick={()=>tog(9)}><div className="ahl">⑩ 특이사항</div><span>{op[9]?'▴':'▾'}</span></div>
          {op[9]&&<div className="fg" style={{marginBottom:12}}><div className="fi full"><div className="fl">특이사항</div><textarea value={fm.특이사항||''} onChange={e=>s('특이사항',e.target.value)} style={{height:90,resize:'vertical'}}/></div></div>}
        </div>
        <div className="mf"><span style={{fontSize:10,color:'var(--red)'}}>* 필수 항목입니다</span><div style={{display:'flex',gap:7}}><button className="btn" onClick={onClose}>취소</button><button className="btn btn-a" onClick={save} disabled={sv}>{sv?'저장 중...':'💾 저장'}</button></div></div>
      </div>
    </div>
  );
}

// 영문 → 한글 (주문)
function mapOrder(o){
  return {
    '주문ID':o.order_id,'고객ID':o.cust_id,'발주처':o.orderer,'병원명':o.orderer,'연락처':o.phone,
    '접수일자':fmtDate(o.received_at),'납기요구일자':fmtDate(o.delivery_due),'품명':o.item_name,'규격':o.spec,
    '수량':o.qty,'공급가액':o.supply_amount,'부가세':o.vat,'금액_VAT포함':o.total_amount,
    '접수자':o.receiver,'검토자':o.reviewer,'납품일자':fmtDate(o.delivered_at),
    '추천혜택 지급일':fmtDate(o.referral_paid_at),'추천혜택 건수':o.referral_cnt,
    '발행기준':o.invoice_basis||'',
    '요구사항':o.requirements,'비고':o.notes,_raw:o
  };
}
const INVOICE_BASIS_OPTS=['청구발행','영수발행','환불발행','분할발행'];
const INVOICE_BASIS_C={'청구발행':['rgba(251,146,60,0.18)','#fb923c'],'영수발행':['rgba(16,110,86,0.25)','#4ade80'],'환불발행':['rgba(220,38,38,0.2)','#f87171'],'분할발행':['rgba(124,58,237,0.2)','#a78bfa']};
// 한글 → 영문 (주문)
function toOrderDb(f){
  const nm=f['품명']||'';
  let product=null;
  if(nm.indexOf('MediAI-BA')===0||nm==='BA')product='BA';
  else if(nm.indexOf('MediAI-OA')===0||nm==='OA')product='OA';
  else if(nm.indexOf('MediAI-SG')===0||nm==='SG')product='SG';
  else if(nm.indexOf('MediAI-SC')===0||nm==='SC')product='SC';
  return {
    cust_id:f['고객ID']||null,orderer:f['발주처']||null,phone:f['연락처']||null,
    received_at:f['접수일자']||null,delivery_due:f['납기요구일자']||null,item_name:f['품명']||null,spec:f['규격']||null,
    qty:f['수량']||null,supply_amount:f['공급가액']||null,vat:f['부가세']||null,total_amount:f['금액_VAT포함']||null,
    receiver:f['접수자']||null,reviewer:f['검토자']||null,delivered_at:f['납품일자']||null,
    referral_paid_at:f['추천혜택 지급일']||null,referral_cnt:f['추천혜택 건수']||null,
    invoice_basis:f['발행기준']||null,
    requirements:f['요구사항']||null,notes:f['비고']||null,product:product
  };
}

function OrderManagement(){
  const [allRows,setAllRows]=useState([]);
  const [ld,setLd]=useState(true);const [err,setErr]=useState(null);
  const [inputQ,setInputQ]=useState('');const [q,setQ]=useState('');
  const [showList,setShowList]=useState(false);const [selOrd,setSelOrd]=useState(null);
  const [dlBusy,setDlBusy]=useState(false);
  const debRef=useRef(null);
  // 목록 기간 필터: 기준일(접수/납품) + 연도 + 단위(전체/반기/분기/월)
  const curYearOM=new Date().getFullYear();
  const [odBasis,setOdBasis]=useState('접수일자'); // '접수일자' | '납품일자'
  const [odYear,setOdYear]=useState(0); // 0=전체
  const [odUnit,setOdUnit]=useState('all'); // all|half|quarter|month
  const [odSel,setOdSel]=useState(0); // 0=전체

  // 신규 등록 폼 상태
  const [fm,setFm]=useState({접수일자:localToday(),수량:'1'});
  const [sv,setSv]=useState(false);
  const [hist,setHist]=useState([]);const [selCust,setSelCust]=useState(null);
  const [topSrchLd,setTopSrchLd]=useState(false);const [topResults,setTopResults]=useState([]);

  const load=useCallback(async()=>{
    setLd(true);setErr(null);
    try{
      const data=await fetchAll('orders','*','order_id'); // 전체 로딩 (정렬 고정 — 1000건 초과 누락 방지)
      const sorted=(data||[]).slice().sort((a,b)=>String(b.received_at||'').localeCompare(String(a.received_at||'')));
      setAllRows(sorted.map(mapOrder));
      setLd(false);
    }catch(e){console.error(e);setErr(e.message||String(e));setLd(false);}
  },[]);
  useEffect(()=>{load();},[load]);

  const filtered=useMemo(()=>{
    let rows=allRows.filter(o=>String(o['주문ID']||'').indexOf('BENEFIT-')!==0);
    if(q){const lq=q.toLowerCase();rows=rows.filter(o=>[o['주문ID'],o['발주처'],o['병원명'],o['연락처'],o['고객ID']].some(v=>String(v||'').toLowerCase().includes(lq)));}
    if(odYear>0){rows=rows.filter(o=>inPeriod(o[odBasis],odYear,odYear,odUnit,odSel));}
    return rows;
  },[allRows,q,odBasis,odYear,odUnit,odSel]);
  // 기간 설정 다운로드 (현재 필터·기간 적용분을 DB 컬럼명 그대로 엑셀로)
  function downloadOrdersXlsx(){
    try{
      if(!window.XLSX){alert('엑셀 모듈 로딩 중입니다. 잠시 후 다시 시도해주세요.');return;}
      const raws=filtered.map(o=>{const r={...(o._raw||{})};delete r._raw;return r;});
      if(!raws.length){alert('다운로드할 데이터가 없습니다.');return;}
      const ws=XLSX.utils.json_to_sheet(raws);
      const wb=XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb,ws,'orders');
      const lbl=odYear>0?periodLabel(odYear,odYear,odUnit,odSel):'전체';
      XLSX.writeFile(wb,'주문접수_'+lbl+'_'+localToday()+'.xlsx');
    }catch(e){alert('엑셀 생성 오류: '+(e.message||e));}
  }

  // 신규폼 헬퍼
  function s(k,v){const f={...fm,[k]:v};if(k==='공급가액'){const n=parseFloat(String(v).replace(/[^\d.]/g,''))||0;f['부가세']=Math.round(n*.1);f['금액_VAT포함']=n+Math.round(n*.1);}if(k==='부가세'){const sup=parseFloat(String(f['공급가액']).replace(/[^\d.]/g,''))||0;const vt=parseFloat(String(v).replace(/[^\d.]/g,''))||0;f['금액_VAT포함']=sup+vt;}setFm(f);}
  // 상단 고객 검색 → 신규폼 자동입력 + 주문이력
  async function topSearch(){
    const term=inputQ.trim();if(!term)return;
    setTopSrchLd(true);setTopResults([]);
    try{
      let data=await searchCustomersUnified(term);
      data=data||[];setTopSrchLd(false);
      if(data.length===1)selectCust(data[0]);else setTopResults(data);
    }catch(e){setTopSrchLd(false);}
  }
  async function selectCust(cu){
    setTopResults([]);setSelCust(cu);setSelOrd(null);
    if(cu&&cu.cust_id)pushRecentCust(cu.cust_id);
    setFm(f=>({...f,고객ID:cu.cust_id,발주처:cu.hospital_name,연락처:cu.phone}));
    const {data}=await sb.from('orders').select('*').eq('cust_id',cu.cust_id).order('received_at',{ascending:false}).limit(50);
    setHist((data||[]).filter(o=>String(o.order_id||'').indexOf('BENEFIT-')!==0).map(mapOrder));
  }
  function resetForm(){setFm({접수일자:localToday(),수량:'1'});}
  async function save(){
    if(!fm.발주처){alert('병원명은 필수입니다.');return;}
    if(!fm.품명){alert('품명(제품)은 필수입니다. 제품별 분류를 위해 품명을 선택해 주세요.');return;}
    setSv(true);
    try{
      const today=new Date();const prefix='ORD-'+today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0');
      const {data:existing}=await sb.from('orders').select('order_id').like('order_id',prefix+'%');
      const seq=(existing||[]).length+1;
      const newId=prefix+'-'+String(seq).padStart(4,'0');
      const dbRow={order_id:newId,...toOrderDb(fm)};
      const {error}=await sb.from('orders').insert(dbRow);if(error)throw error;
      let cust={};
      if(fm.고객ID){const {data:cd}=await sb.from('customers').select('*').eq('cust_id',fm.고객ID).single();cust=cd||{};}
      const billingDate=fm.납품일자?new Date(fm.납품일자):new Date();
      const dueDate=new Date(billingDate);dueDate.setDate(dueDate.getDate()+30);
      const fmtD=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      const arRow={order_id:newId,cust_id:fm.고객ID||null,hospital_name:fm.발주처||cust.hospital_name||'',received_at:fm.접수일자||null,spec:fm.규격||null,qty:fm.수량||1,delivered_at:fm.납품일자||null,billed_at:fm.납품일자?fmtD(billingDate):null,due_date:fmtD(dueDate),supply_amount:fm.공급가액||null,vat:fm.부가세||null,total_amount:fm['금액_VAT포함']||null,business_reg_no:cust.business_reg_no||null,corp_name:cust.corp_name||null,ceo_name:cust.ceo_name||null,business_address:cust.business_address||null,business_type:cust.business_type||null,business_item:cust.business_item||null,tax_invoice_email:cust.tax_invoice_email||null};
      await sb.from('receivables').insert(arRow);
      if(fm['추천혜택 건수']&&fm.고객ID){await sb.from('customers').update({referral_benefit_cnt:fm['추천혜택 건수']}).eq('cust_id',fm.고객ID);}
      alert('등록되었습니다. (주문ID: '+newId+', 매출채권 자동연동 완료)');
      resetForm();
      if(selCust)selectCust(selCust); // 같은 고객 이력 갱신
      load();setSv(false);
    }catch(e){alert('오류: '+(e.message||e));setSv(false);}
  }
  // 주문이력 갱신 (수정/삭제 후)
  async function refreshHist(){
    if(selCust){const {data}=await sb.from('orders').select('*').eq('cust_id',selCust.cust_id).order('received_at',{ascending:false}).limit(50);setHist((data||[]).filter(o=>String(o.order_id||'').indexOf('BENEFIT-')!==0).map(mapOrder));}
    load();
  }

  if(ld)return <Spin/>;

  return(
    <div style={{padding:14,height:'100vh',display:'flex',flexDirection:'column',gap:10}}>
      {/* 상단: 고객 검색 + 리스트 */}
      <div style={{flexShrink:0}}>
        <div style={{fontSize:10,color:'var(--text-3)',marginBottom:4,paddingLeft:2}}>🔎 고객 검색 — Enter 시 왼쪽 신규등록에 자동 입력 + 중간에 주문이력 표시</div>
        <div style={{display:'flex',gap:8,alignItems:'center',position:'relative'}}>
          <div style={{flex:1,display:'flex',alignItems:'center',gap:6,background:'#172332',border:'2px solid #378ADD',borderRadius:8,padding:'9px 14px'}}>
            <span style={{fontSize:15,color:'#85B7EB'}}>🔍</span>
            <input value={inputQ} onChange={e=>setInputQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&topSearch()} placeholder="고객ID·병원명·원장·연락처·사업자번호·이메일·지역 검색 후 Enter" style={{border:'none',background:'transparent',padding:0,fontSize:13,flex:1}}/>
            {topSrchLd&&<span style={{fontSize:11,color:'var(--text-3)'}}>검색중...</span>}
          </div>
          <button className="btn btn-t" onClick={topSearch} style={{whiteSpace:'nowrap',padding:'8px 14px'}}>검색</button>
          <button className="btn" onClick={()=>setShowList(true)} style={{whiteSpace:'nowrap',padding:'8px 16px',fontWeight:600}}>📋 주문 리스트</button>
          {topResults.length>1&&(
            <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:'#1a2738',border:'0.5px solid var(--border-md)',borderRadius:10,boxShadow:'0 8px 28px rgba(0,0,0,0.5)',maxHeight:280,overflowY:'auto',zIndex:40}}>
              <div style={{padding:'7px 14px',fontSize:10,color:'var(--text-3)',borderBottom:'0.5px solid var(--border)'}}>검색 결과 {topResults.length}개</div>
              {topResults.map((cu,i)=>(<div key={i} onMouseDown={e=>{e.preventDefault();selectCust(cu);}} style={{padding:'9px 14px',cursor:'pointer',borderBottom:'0.5px solid var(--border)',display:'flex',alignItems:'center',gap:10}} onMouseEnter={e=>e.currentTarget.style.background='rgba(16,185,129,0.08)'} onMouseLeave={e=>e.currentTarget.style.background=''}>
                <span style={{fontWeight:600,fontSize:13}}>{cu.hospital_name}</span>
                <span style={{fontSize:11,color:'var(--text-2)'}}>{cu.ceo_name||''}</span>
                <span style={{fontSize:11,color:'var(--text-3)'}}>{cu.region||''} · {cu.plan||'-'}</span>
                <div style={{flex:1}}/>
                <span style={{fontSize:10,color:'var(--text-3)'}}>{cu.cust_id}</span>
              </div>))}
            </div>
          )}
        </div>
      </div>
      {err&&<div className="errbox">{err}</div>}

      <RecentCustCards onPick={c=>selectCust(c)} reloadKey={selCust&&selCust.cust_id}/>

      {/* 3분할: 신규등록 / 주문이력 / 주문상세 */}
      <div style={{flex:1,display:'grid',gridTemplateColumns:'minmax(0,1.1fr) minmax(0,0.9fr) minmax(0,1.1fr)',gap:10,minHeight:0,overflow:'hidden'}}>

        {/* 왼쪽: 신규 주문 등록 */}
        <div style={{background:'#172332',border:'1.5px solid #1D9E75',borderRadius:10,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          <div style={{background:'rgba(29,158,117,0.22)',borderBottom:'1px solid rgba(29,158,117,0.5)',padding:'9px 13px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
            <span style={{fontSize:12,fontWeight:700,color:'#7fe0c0'}}>📋 신규 주문 등록</span>
            <button onClick={resetForm} style={{fontSize:10,padding:'4px 9px',background:'rgba(255,255,255,0.07)',border:'0.5px solid rgba(255,255,255,0.2)',borderRadius:6,color:'var(--text-2)',cursor:'pointer'}}>초기화</button>
          </div>
          <div style={{flex:1,overflowY:'auto',padding:13,display:'flex',flexDirection:'column',gap:8}}>
            <div style={{fontSize:10,color:'var(--text-3)'}}>상단 검색으로 고객 선택 시 자동 입력됩니다</div>
            <div className="fg">
              <div className="fi"><div className="fl">고객ID</div><input className="ai" value={fm.고객ID||''} readOnly/></div>
              <div className="fi"><div className="fl">발주처(병원명) <span className="req">*</span></div><input value={fm.발주처||''} onChange={e=>s('발주처',e.target.value)}/></div>
              <div className="fi full"><div className="fl">연락처</div><input value={fm.연락처||''} onChange={e=>s('연락처',e.target.value)}/></div>

            <div className="fg">
              <div className="fi"><div className="fl">접수일자 <span className="req">*</span></div><input type="date" value={fm.접수일자||''} onChange={e=>s('접수일자',e.target.value)}/></div>
              <div className="fi"><div className="fl">납기요구일자</div><input type="date" value={fm.납기요구일자||''} onChange={e=>s('납기요구일자',e.target.value)}/></div>
              <div className="fi"><div className="fl">품명</div><select value={fm.품명||''} onChange={e=>s('품명',e.target.value)}><option value="">-</option><option>MediAI-BA</option><option>MediAI-OA</option><option>MediAI-SG</option><option>MediAI-SC</option></select></div>
              <div className="fi"><div className="fl">규격(요금제)</div><select value={fm.규격||''} onChange={e=>s('규격',e.target.value)}><option value="">-</option><option>P10</option><option>P20</option><option>P50</option><option>P100</option><option>P200</option><option>P300</option><option>P500</option><option>P1000</option><option>M100</option><option>Basic Plan</option><option>Plus plan</option></select></div>
              <div className="fi"><div className="fl">수량 <span className="req">*</span></div><input value={fm.수량||''} onChange={e=>s('수량',e.target.value)}/></div>
              <div className="fi"><div className="fl">공급가액</div><input value={fm.공급가액?Number(fm.공급가액).toLocaleString('ko-KR'):''} onChange={e=>s('공급가액',e.target.value.replace(/[^\d]/g,''))} placeholder="0" style={{textAlign:'right'}}/></div>
              <div className="fi"><div className="fl">부가세</div><input value={fm.부가세?Number(fm.부가세).toLocaleString('ko-KR'):''} onChange={e=>s('부가세',e.target.value.replace(/[^\d]/g,''))} placeholder="0" style={{textAlign:'right'}}/></div>
              <div className="fi"><div className="fl">금액 VAT포함 (자동)</div><input className="ci" value={fm['금액_VAT포함']?Number(fm['금액_VAT포함']).toLocaleString('ko-KR'):''} readOnly style={{textAlign:'right'}}/></div>
              <div className="fi"><div className="fl">접수자</div><input value={fm.접수자||''} onChange={e=>s('접수자',e.target.value)}/></div>
              <div className="fi"><div className="fl">검토자</div><input value={fm.검토자||''} onChange={e=>s('검토자',e.target.value)}/></div>
              <div className="fi"><div className="fl">납품일자</div><input type="date" value={fm.납품일자||''} onChange={e=>s('납품일자',e.target.value)}/></div>
              <div className="fi"><div className="fl">추천혜택 지급일</div><input type="date" value={fm['추천혜택 지급일']||''} onChange={e=>s('추천혜택 지급일',e.target.value)}/></div>
              <div className="fi"><div className="fl">추천혜택 건수</div><input value={fm['추천혜택 건수']||''} onChange={e=>s('추천혜택 건수',e.target.value)} placeholder="건수"/></div>
              <div className="fi"><div className="fl">세금계산서 발행기준</div><select value={fm['발행기준']||''} onChange={e=>s('발행기준',e.target.value)}><option value="">-</option>{INVOICE_BASIS_OPTS.map(o=><option key={o} value={o}>{o}</option>)}</select></div>
            </div>
            <div className="fi full"><div className="fl">요구사항</div><textarea value={fm.요구사항||''} onChange={e=>s('요구사항',e.target.value)} style={{height:46,resize:'none'}}/></div>
            <div className="fi full"><div className="fl">비고</div><select value={fm.비고||''} onChange={e=>s('비고',e.target.value)}><option value="">-</option><option value="신규">신규</option><option value="재갱신">재갱신</option></select></div>
          </div>
          <div style={{flexShrink:0,padding:'10px 13px',borderTop:'0.5px solid var(--border)',display:'flex',justifyContent:'flex-end'}}>
            <button className="btn btn-t" onClick={save} disabled={sv}>{sv?'저장 중...':'💾 저장 (매출채권 연동)'}</button>
          </div>
        </div>

        {/* 중간: 선택 고객 주문이력 */}
        <div style={{background:'#172332',border:'1.5px solid #EF9F27',borderRadius:10,overflow:'hidden',display:'flex',flexDirection:'column'}}>
